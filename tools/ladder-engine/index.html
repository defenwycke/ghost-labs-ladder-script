  txOutputs: [{ id: uid(), address: '', amount: 0 }],
  locktime: 0,
  selectedBlockId: null,
  selectedCoilId: null,
  selectedInputId: null,
  expandedBlockId: null,
  expandedInputId: null,
  expandedOutputId: null,
  contextMenu: null,
  inputContextMenu: null,
  outputContextMenu: null,
  renamingBlockId: null,
  renamingInputId: null,
  rightTab: 'properties',
  validationResult: null,
  showValidationPanel: false,
  scanPhase: 'idle',
  scanSpeed: 600,
  scanResults: {},
  scanIdx: -1,
  scanStopRung: null,
  simState: {
    blockHeight: 850000, csvBlocks: 0, csvSeconds: 0,
    inputAmount: 50000, outputAmount: 40000, feeRate: 10, medianTime: 0,
    availableKeys: new Set(), knownPreimages: new Set(), knownTemplates: new Set(), knownRoots: new Set(),
    _keysRaw: '', _preimagesRaw: '', _templatesRaw: '', _rootsRaw: '',
  },
  forcedBlocks: {},
  spentRungs: new Map(),
  simActiveRungId: null,
  simActiveStep: -1,
  simStepResults: {},
};

function appReducer(state, action) {
  switch (action.type) {
    // Simple SET actions
    case 'SET_MODE': return { ...state, mode: action.value };
    case 'SET_SHOW_EXAMPLES': return { ...state, showExamples: action.value };
    case 'TOGGLE_TOOLTIPS': return { ...state, showTooltips: !state.showTooltips };
    case 'TOGGLE_FULLSCREEN': return { ...state, ladderFullscreen: !state.ladderFullscreen };
    case 'SET_RUNGS': return { ...state, rungs: action.value };
    case 'UPDATE_RUNGS': return { ...state, rungs: action.fn(state.rungs) };
    case 'SET_TX_INPUTS': return { ...state, txInputs: action.value };
    case 'UPDATE_TX_INPUTS': return { ...state, txInputs: action.fn(state.txInputs) };
    case 'SET_TX_OUTPUTS': return { ...state, txOutputs: action.value };
    case 'UPDATE_TX_OUTPUTS': return { ...state, txOutputs: action.fn(state.txOutputs) };
    case 'SET_LOCKTIME': return { ...state, locktime: action.value };
    case 'SET_EXPANDED_BLOCK': return { ...state, expandedBlockId: action.value };
    case 'SET_EXPANDED_INPUT': return { ...state, expandedInputId: action.value };
    case 'SET_EXPANDED_OUTPUT': return { ...state, expandedOutputId: action.value };
    case 'SET_CONTEXT_MENU': return { ...state, contextMenu: action.value };
    case 'SET_INPUT_CONTEXT_MENU': return { ...state, inputContextMenu: action.value };
    case 'SET_OUTPUT_CONTEXT_MENU': return { ...state, outputContextMenu: action.value };
    case 'SET_RENAMING_BLOCK': return { ...state, renamingBlockId: action.value };
    case 'SET_RENAMING_INPUT': return { ...state, renamingInputId: action.value };
    case 'SET_RIGHT_TAB': return { ...state, rightTab: action.value };
    case 'SET_VALIDATION': return { ...state, validationResult: action.value };
    case 'SET_SHOW_VALIDATION': return { ...state, showValidationPanel: action.value };
    case 'SET_SCAN_PHASE': return { ...state, scanPhase: action.value };
    case 'SET_SCAN_SPEED': return { ...state, scanSpeed: action.value };
    case 'SET_SCAN_RESULTS': return { ...state, scanResults: action.value };
    case 'UPDATE_SCAN_RESULTS': return { ...state, scanResults: action.fn(state.scanResults) };
    case 'SET_SCAN_IDX': return { ...state, scanIdx: action.value };
    case 'UPDATE_SCAN_IDX': return { ...state, scanIdx: action.fn(state.scanIdx) };
    case 'SET_SCAN_STOP_RUNG': return { ...state, scanStopRung: action.value };
    case 'SET_SIM_STATE': return { ...state, simState: action.value };
    case 'UPDATE_SIM_STATE': return { ...state, simState: action.fn(state.simState) };
    case 'SET_FORCED_BLOCKS': return { ...state, forcedBlocks: action.value };
    case 'UPDATE_FORCED_BLOCKS': return { ...state, forcedBlocks: action.fn(state.forcedBlocks) };
    case 'SET_SPENT_RUNGS': return { ...state, spentRungs: action.value };
    case 'UPDATE_SPENT_RUNGS': return { ...state, spentRungs: action.fn(state.spentRungs) };
    case 'SET_SIM_ACTIVE': return { ...state, simActiveRungId: action.rungId, simActiveStep: action.step, simStepResults: action.results !== undefined ? action.results : state.simStepResults };
    case 'SET_SIM_STEP_RESULTS': return { ...state, simStepResults: action.value };
    case 'UPDATE_SIM_STEP_RESULTS': return { ...state, simStepResults: action.fn(state.simStepResults) };
    case 'SET_LADDER_FULLSCREEN': return { ...state, ladderFullscreen: action.value };

    // Compound: select block (clears coil/input, sets rightTab)
    case 'SELECT_BLOCK': return { ...state, selectedBlockId: action.value, selectedCoilId: null, selectedInputId: null, rightTab: 'properties' };
    case 'SELECT_COIL': return { ...state, selectedCoilId: action.value, selectedBlockId: null, selectedInputId: null, rightTab: 'properties' };
    case 'SELECT_INPUT': return { ...state, selectedInputId: action.value, selectedBlockId: null, selectedCoilId: null, rightTab: 'properties' };
    case 'DESELECT_ALL': return { ...state, selectedBlockId: null, selectedCoilId: null, selectedInputId: null };

    // Compound: reset scan
    case 'RESET_SCAN': return { ...state, scanPhase: 'idle', scanIdx: -1, scanResults: {}, scanStopRung: null };

    // Compound: clear all
    case 'CLEAR_ALL': return {
      ...state,
      rungs: [createRung()],
      selectedBlockId: null, selectedCoilId: null, selectedInputId: null,
      txInputs: [{ id: uid(), txid: '', vout: 0, sequence: '' }],
      txOutputs: [{ id: uid(), address: '', amount: 0 }],
      locktime: 0,
    };

    // Compound: load example
    case 'LOAD_EXAMPLE': return {
      ...state,
      rungs: action.rungs,
      txInputs: action.txInputs,
      txOutputs: action.txOutputs,
      selectedBlockId: null, selectedCoilId: null, selectedInputId: null,
      showExamples: false,
    };

    // Compound: view as ladder
    case 'VIEW_AS_LADDER': {
      const next = { ...state, rungs: action.rungs, selectedBlockId: null, selectedCoilId: null, selectedInputId: null, mode: 'build' };
      if (action.txInputs && action.txInputs.length > 0) next.txInputs = action.txInputs;
      if (action.txOutputs && action.txOutputs.length > 0) next.txOutputs = action.txOutputs;
      return next;
    }

    // Compound: output change (handles both rungs and txOutputs atomically)
    case 'OUTPUT_CHANGE': {
      const { rungId, field, value } = action;
      const updatedRungs = state.rungs.map(r => {
        if (r.id !== rungId) return r;
        const newOutput = { ...r.output, [field]: value };
        if (field === 'type' && value === 'relay') newOutput.txOutputId = null;
        return { ...r, output: newOutput };
      });
      let updatedOutputs = state.txOutputs;
      if (field === 'txOutputId') {
        const oldRung = state.rungs.find(r => r.id === rungId);
        const oldOutputId = oldRung?.output?.txOutputId;
        if (oldOutputId != null && oldOutputId !== value) {
          const stillReferenced = updatedRungs.some(r => r.output.type !== 'relay' && r.output.txOutputId === oldOutputId);
          if (!stillReferenced) updatedOutputs = state.txOutputs.filter(o => o.id !== oldOutputId);
        }
      }
      return { ...state, rungs: updatedRungs, txOutputs: updatedOutputs };
    }

    // Compound: import (handles rungs + txInputs + txOutputs + locktime + deselect)
    case 'IMPORT': return {
      ...state,
      rungs: action.rungs,
      txInputs: action.txInputs,
      txOutputs: action.txOutputs,
      locktime: action.locktime !== undefined ? action.locktime : state.locktime,
      selectedBlockId: null, selectedCoilId: null, selectedInputId: null,
    };

    // Compound: delete block (also deselects if this was the selected block)
    case 'DELETE_BLOCK': {
      const newRungs = state.rungs.map(r => {
        if (r.id !== action.rungId) return r;
        return { ...r, blocks: r.blocks.filter(b => b.id !== action.blockId) };
      });
      const newSelected = state.selectedBlockId === action.blockId ? null : state.selectedBlockId;
      return { ...state, rungs: newRungs, selectedBlockId: newSelected };
    }

    // Compound: add change rung (creates output + rung together)
    case 'ADD_CHANGE_RUNG': {
      if (state.rungs.length >= 8) return state;
      const outputId = action.outputId;
      const rung = createRung();
      rung.label = 'CHANGE';
      rung.blocks = [createBlock('SIG')];
      rung.output = { ...rung.output, name: 'CHANGE', txOutputId: outputId };
      return {
        ...state,
        txOutputs: [...state.txOutputs, { id: outputId, address: '', amount: 0 }],
        rungs: [...state.rungs, rung],
      };
    }

    // Compound: execute rung (mark spent + cascade-block siblings)
    case 'EXECUTE_RUNG': {
      const next = new Map(state.spentRungs);
      next.set(action.rungId, 'executed');
      const executedRung = state.rungs.find(r => r.id === action.rungId);
      if (executedRung?.txInputIds?.length > 0) {
        const spentInputs = new Set(executedRung.txInputIds);
        const sameOutput = executedRung.output?.txOutputId;
        state.rungs.forEach(r => {
          if (r.id !== action.rungId && !next.has(r.id) && r.txInputIds?.some(id => spentInputs.has(id)) && r.output?.txOutputId === sameOutput) {
            next.set(r.id, 'blocked');
          }
        });
      }
      return { ...state, spentRungs: next };
    }

    // Compound: reset sim
    case 'RESET_SIM': return {
      ...state,
      forcedBlocks: {},
      spentRungs: new Map(),
      simActiveRungId: null,
      simActiveStep: -1,
      simStepResults: {},
      scanPhase: 'idle', scanIdx: -1, scanResults: {}, scanStopRung: null,
    };

    // Compound: start rung sim
    case 'START_RUNG_SIM': return {
      ...state,
      simActiveRungId: action.rungId,
      simActiveStep: 0,
      simStepResults: {},
    };

    // Compound: step block result + advance
    case 'STEP_BLOCK': {
      const newResults = { ...state.simStepResults, [action.blockId]: action.result };
      return { ...state, simStepResults: newResults, simActiveStep: action.nextStep !== undefined ? action.nextStep : state.simActiveStep };
    }

    default: return state;
  }
}

function GuidedWalkthrough({ active, onClose }) {
  const [step, setStep] = useState(0);
  const [spotlightRect, setSpotlightRect] = useState(null);
  const [cardPos, setCardPos] = useState({ top: '50%', left: '50%', transform: 'translate(-50%, -50%)' });

  const currentStep = WALKTHROUGH_STEPS[step];

  // Measure target element and position the card
  useEffect(() => {
    if (!active) return;
    const s = WALKTHROUGH_STEPS[step];
    if (!s.targetSelector) {
      setSpotlightRect(null);
      setCardPos({ top: '50%', left: '50%', transform: 'translate(-50%, -50%)' });
      return;
    }
    const el = document.querySelector(s.targetSelector);
    if (!el) {
      setSpotlightRect(null);
      setCardPos({ top: '50%', left: '50%', transform: 'translate(-50%, -50%)' });
      return;
    }
    const r = el.getBoundingClientRect();
    const pad = 8;
    setSpotlightRect({
      top: r.top - pad,
      left: r.left - pad,
      width: r.width + pad * 2,
      height: r.height + pad * 2,
    });
    // Position card below or above target
    const cardW = 380;
    const cardH = 260;
    let top = r.bottom + 16;
    let left = Math.max(16, r.left + r.width / 2 - cardW / 2);
    if (left + cardW > window.innerWidth - 16) left = window.innerWidth - cardW - 16;
    if (top + cardH > window.innerHeight - 16) {
      top = Math.max(16, r.top - cardH - 16);
    }
    setCardPos({ top: top + 'px', left: left + 'px', transform: 'none' });
  }, [step, active]);

  // ESC to close
  useEffect(() => {
    if (!active) return;
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [active, onClose]);

  if (!active) return null;

  const isLast = step === WALKTHROUGH_STEPS.length - 1;
  const isFirst = step === 0;

  const handleNext = () => {
    if (isLast) {
      try { localStorage.setItem('ladder-walkthrough-complete', '1'); } catch(e) {}
      onClose();
    } else {
      setStep(step + 1);
    }
  };

  const handleSkip = () => {
    try { localStorage.setItem('ladder-walkthrough-complete', '1'); } catch(e) {}
    onClose();
  };

  // Build SVG mask with cutout
  const svgMask = spotlightRect ? (
    <svg style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 100001, pointerEvents: 'none' }}>
      <defs>
        <mask id="walkthrough-mask">
          <rect x="0" y="0" width="100%" height="100%" fill="white" />
          <rect
            x={spotlightRect.left} y={spotlightRect.top}
            width={spotlightRect.width} height={spotlightRect.height}
            rx="4" fill="black"
          />
        </mask>
      </defs>
      <rect x="0" y="0" width="100%" height="100%" fill="rgba(0,0,0,0.72)" mask="url(#walkthrough-mask)" />
      <rect
        x={spotlightRect.left} y={spotlightRect.top}
        width={spotlightRect.width} height={spotlightRect.height}
        rx="4" fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeDasharray="6 3"
        style={{ filter: 'drop-shadow(0 0 6px var(--amber-glow))' }}
      />
    </svg>
  ) : null;

  return (
    <div className="walkthrough-overlay">
      <div className="walkthrough-backdrop" style={{ background: spotlightRect ? 'transparent' : 'rgba(0,0,0,0.72)' }} onClick={handleSkip} />
      {svgMask}
      <div className="walkthrough-card" style={cardPos} onClick={e => e.stopPropagation()}>
        <div className="walkthrough-step-counter">STEP {step + 1} OF {WALKTHROUGH_STEPS.length}</div>
        <div className="walkthrough-title">{currentStep.title}</div>
        <div className="walkthrough-body" dangerouslySetInnerHTML={{ __html: currentStep.body }} />
        <div className="walkthrough-dots">
          {WALKTHROUGH_STEPS.map((_, i) => (
            <div key={i} className={`walkthrough-dot ${i === step ? 'active' : i < step ? 'done' : ''}`} />
          ))}
        </div>
        <div className="walkthrough-actions">
          <button className="walkthrough-btn skip" onClick={handleSkip}>SKIP</button>
          <div style={{ display: 'flex', gap: 8 }}>
            {!isFirst && <button className="walkthrough-btn" onClick={() => setStep(step - 1)}>BACK</button>}
            <button className="walkthrough-btn primary" onClick={handleNext}>{isLast ? 'FINISH' : 'NEXT'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const { mode, showExamples, showTooltips, ladderFullscreen, rungs, txInputs, txOutputs, locktime,

    simState, forcedBlocks, spentRungs, simActiveRungId, simActiveStep, simStepResults
  } = state;

  const [pendingExample, setPendingExample] = useState(() => {
    const params = new URLSearchParams(window.location.search);

  // Walkthrough state -- auto-show on first visit
  const [walkthroughActive, setWalkthroughActive] = useState(() => {

  const [rightPanelWidth, setRightPanelWidth] = useState(286);
  const rightPanelRef = useRef(null);
  const handleRightPanelResizeStart = useCallback((e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = rightPanelWidth;
    const onMove = (ev) => {
      const delta = startX - ev.clientX;
      setRightPanelWidth(Math.max(200, Math.min(600, startWidth + delta)));
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

  const isSimMode = mode === 'simulate';

  // Keyboard shortcuts: ESC closes modals/fullscreen, F11 toggles fullscreen, Delete removes selection
  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName;
      const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
      if (e.key === 'Escape') {
        if (contextMenu) dispatch({ type: 'SET_CONTEXT_MENU', value: null });
        else if (inputContextMenu) dispatch({ type: 'SET_INPUT_CONTEXT_MENU', value: null });
        else if (outputContextMenu) dispatch({ type: 'SET_OUTPUT_CONTEXT_MENU', value: null });
        else if (simActiveRungId) dispatch({ type: 'SET_SIM_ACTIVE', rungId: null, step: -1, results: {} });
        else if (showExamples) dispatch({ type: 'SET_SHOW_EXAMPLES', value: false });
        else if (ladderFullscreen) dispatch({ type: 'SET_LADDER_FULLSCREEN', value: false });
      }
      if (e.key === 'F11') {
        e.preventDefault();
        dispatch({ type: 'TOGGLE_FULLSCREEN' });
      }
      if ((e.key === 'Delete' || e.key === 'Backspace') && !isInput && !isSimMode) {
        if (selectedBlockId) {
          // Find which rung owns this block and delete it
          const rungId = rungs.find(r => r.blocks.some(b => b.id === selectedBlockId))?.id;
          if (rungId) dispatch({ type: 'DELETE_BLOCK', rungId, blockId: selectedBlockId });
        } else if (selectedInputId) {
          // Clear input assignments (txInputIds + outputRefs) for this rung
          dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
            if (r.id !== selectedInputId) return r;
            return { ...r, txInputIds: [], outputRefs: [], inputName: '' };
          })});
          dispatch({ type: 'DESELECT_ALL' });
        } else if (selectedCoilId) {
          // Clear output assignments for this rung
          dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
            if (r.id !== selectedCoilId) return r;
            return { ...r, output: { ...r.output, name: '', txOutputId: null } };
          })});
          dispatch({ type: 'DESELECT_ALL' });
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [showExamples, ladderFullscreen, simActiveRungId, contextMenu, inputContextMenu, outputContextMenu, selectedBlockId, selectedInputId, selectedCoilId, isSimMode, rungs]);

  // Auto-switch right panel tab when entering/leaving sim mode
  useEffect(() => {
    if (isSimMode && (rightTab === 'properties' || rightTab === 'tx')) {
      dispatch({ type: 'SET_RIGHT_TAB', value: 'simulate' });
    } else if (!isSimMode && rightTab === 'simulate') {
      dispatch({ type: 'SET_RIGHT_TAB', value: 'properties' });
    }
  }, [isSimMode]); // eslint-disable-line react-hooks/exhaustive-deps

  // Auto-populate available keys from diagram when entering sim mode with empty keys
  useEffect(() => {
    if (isSimMode && simState.availableKeys.size === 0) {
      const keys = new Set();
      rungs.forEach(r => r.blocks.forEach(b => {
        if (b.values.pubkey) keys.add(b.values.pubkey);
        if (b.values.signing_key) keys.add(b.values.signing_key);
        if (b.values.pubkeys) b.values.pubkeys.split(',').map(k => k.trim()).filter(Boolean).forEach(k => keys.add(k));
      }));
      if (keys.size > 0) {
        dispatch({ type: 'UPDATE_SIM_STATE', fn: prev => ({ ...prev, availableKeys: keys, _keysRaw: [...keys].join('\n') }) });
      }
    }
  }, [isSimMode]); // eslint-disable-line react-hooks/exhaustive-deps

  // Build the flat scan sequence: input → block0 → block1 → ... → coil, for each rung
  const scanSequence = useMemo(() => {
    const seq = [];
    rungs.forEach((r, ri) => {
      seq.push({ type: 'input', rung: ri });
      r.blocks.forEach((b, bi) => {
        seq.push({ type: 'block', rung: ri, block: bi, blockId: b.id });
      });
      seq.push({ type: 'coil', rung: ri });
    });
    return seq;
  }, [rungs]);

  const scanStep = scanIdx >= 0 && scanIdx < scanSequence.length ? scanSequence[scanIdx] : null;

  // Ref to hold current state for advanceScan (avoids stale closures inside updater)
  const stateRef = useRef(state);
  stateRef.current = state;

  // Advance scan one step, evaluating the block at that position
  // Skips spent rungs entirely (marks them as 'spent' in results)
  const advanceScan = useCallback(() => {
    const s = stateRef.current;
    const evalState = { ...s.simState, forcedBlocks: s.forcedBlocks, energizedOutputs, energizedRungNums };
    let next = s.scanIdx + 1;
    // Skip past any steps belonging to spent rungs
    while (next < scanSequence.length) {
      const step = scanSequence[next];
      const rung = s.rungs[step.rung];
      if (rung && s.spentRungs.has(rung.id)) {
        // Mark entire spent rung as skipped on the input step
        if (step.type === 'input') {
          dispatch({ type: 'UPDATE_SCAN_RESULTS', fn: p => ({ ...p, [`r${step.rung}_coil`]: 'spent' }) });
        }
        next++;
        continue;
      }
      break;
    }
    if (next >= scanSequence.length) {
      dispatch({ type: 'SET_SCAN_PHASE', value: 'done' });
      return;
    }
    const step = scanSequence[next];
    if (step.type === 'block') {
      const rung = s.rungs[step.rung];
      const block = rung?.blocks[step.block];
      if (block) {
        const result = evaluateBlock(block, evalState);
        dispatch({ type: 'UPDATE_SCAN_RESULTS', fn: p => ({ ...p, [`r${step.rung}b${step.block}`]: result }) });
      }
    } else if (step.type === 'coil') {
      dispatch({ type: 'UPDATE_SCAN_RESULTS', fn: p => {
        const rung = s.rungs[step.rung];
        let allSat = rung.blocks.length > 0;
        rung.blocks.forEach((b, bi) => {
          if (p[`r${step.rung}b${bi}`] !== 'satisfied') allSat = false;
        });
        if (allSat && rung.outputRefs && rung.outputRefs.length > 0) {
          allSat = rung.outputRefs.every(ref => {
            const refUpper = ref.trim().toUpperCase();
            return evalState.energizedOutputs?.has(refUpper) || evalState.energizedRungNums?.has(refUpper);
          });
        }
        return { ...p, [`r${step.rung}_coil`]: allSat ? 'pass' : 'fail' };
      }});
      // Stop after this rung if scanning a single rung
      if (s.scanStopRung !== null && step.rung === s.scanStopRung) {
        dispatch({ type: 'SET_SCAN_PHASE', value: 'done' });
      }
    }
    dispatch({ type: 'SET_SCAN_IDX', value: next });
  }, [scanSequence, energizedOutputs, energizedRungNums]);

  const rewindScan = useCallback(() => {
    const s = stateRef.current;
    const prev = s.scanIdx;
    if (prev <= 0) {
      dispatch({ type: 'SET_SCAN_IDX', value: -1 });
      dispatch({ type: 'SET_SCAN_PHASE', value: 'idle' });
      return;
    }
    const goTo = prev - 1;
    // Remove results for the step we're leaving
    const step = scanSequence[prev];
    if (step?.type === 'block') {
      dispatch({ type: 'UPDATE_SCAN_RESULTS', fn: p => { const n = { ...p }; delete n[`r${step.rung}b${step.block}`]; return n; } });
    } else if (step?.type === 'coil') {
      dispatch({ type: 'UPDATE_SCAN_RESULTS', fn: p => { const n = { ...p }; delete n[`r${step.rung}_coil`]; return n; } });
    }
    dispatch({ type: 'SET_SCAN_IDX', value: goTo });
    dispatch({ type: 'SET_SCAN_PHASE', value: goTo < 0 ? 'idle' : 'paused' });
  }, [scanSequence]);

  const resetScan = useCallback(() => {
    dispatch({ type: 'RESET_SCAN' });
  }, []);

  const startScan = useCallback(() => {
    dispatch({ type: 'RESET_SCAN' });
    dispatch({ type: 'SET_SCAN_PHASE', value: 'running' });
  }, []);

  useEffect(() => {
    if (scanPhase !== 'running') return;
    const interval = setInterval(() => {

    return () => clearInterval(interval);
  }, [scanPhase, scanSpeed, advanceScan]);

  // Reset scan when leaving sim mode or changing rungs
  useEffect(() => {
    if (!isSimMode) dispatch({ type: 'RESET_SCAN' });
  }, [isSimMode]);

  const selectedBlock = useMemo(() => {

  }, [rungs, selectedBlockId]);

  const expandedBlock = useMemo(() => {

    for (const rung of rungs) {

      }
    }
    return null;
  }, [rungs, expandedBlockId]);

  const handleNameChange = useCallback((blockId, name) => {

    }))});
  }, []);

  const handleBlockContextMenu = useCallback((x, y, block, rungId) => {
    dispatch({ type: 'SET_CONTEXT_MENU', value: { x, y, block, rungId } });

  const handleInputContextMenu = useCallback((x, y, rung) => {
    dispatch({ type: 'SET_INPUT_CONTEXT_MENU', value: { x, y, rung } });
  }, []);

  const handleOutputContextMenu = useCallback((x, y, rung) => {
    dispatch({ type: 'SET_OUTPUT_CONTEXT_MENU', value: { x, y, rung } });
  }, []);

  const handleDuplicateBlock = useCallback((rungId, blockId) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
      if (r.id !== rungId) return r;
      const src = r.blocks.find(b => b.id === blockId);
      if (!src || r.blocks.length >= MAX_BLOCKS_PER_RUNG) return r;
      const dup = createBlock(src.type);
      dup.values = { ...src.values };
      dup.inverted = src.inverted;
      dup.name = src.name ? src.name + ' (copy)' : '';
      // Assign next free slot after the source block's slot
      const srcSlot = src.slot ?? r.blocks.indexOf(src);
      for (let s = srcSlot + 1; s < MAX_BLOCKS_PER_RUNG; s++) {
        if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { dup.slot = s; break; }
      }
      if (dup.slot === undefined) {
        for (let s = 0; s < srcSlot; s++) {
          if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { dup.slot = s; break; }
        }
      }
      if (dup.slot === undefined) return r; // no free slot
      const blocks = [...r.blocks, dup].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
      return { ...r, blocks };
    })});
  }, []);

  const handleAddRung = useCallback(() => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.length >= 8 ? prev : [...prev, createRung()] });
  }, []);

  const handleAddRungWithBlock = useCallback((blockType) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
      if (prev.length >= 8) return prev;
      const rung = createRung();
      rung.blocks = [createBlock(blockType)];
      return [...prev, rung];
    }});
  }, []);

  const handleAddChangeRung = useCallback(() => {
    dispatch({ type: 'ADD_CHANGE_RUNG', outputId: uid() });
  }, []);

  const handleFillAllTestData = useCallback(() => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(rung => ({
      ...rung,
      blocks: rung.blocks.map(block => {
        const testVals = generateTestData(block.type);
        if (!testVals || Object.keys(testVals).length === 0) return block;
        // Test data fills gaps --existing values take priority
        return { ...block, values: { ...testVals, ...block.values } };
      }),
    }))});
  }, []);

  const handleDropBlock = useCallback((rungId, blockType, slotIdx) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
      if (r.id !== rungId) return r;
      if (r.blocks.length >= MAX_BLOCKS_PER_RUNG) return r;
      // Check if slot is occupied
      if (slotIdx !== undefined && r.blocks.some(b => b.slot === slotIdx)) return r;
      const newBlock = createBlock(blockType);
      newBlock.slot = slotIdx !== undefined ? slotIdx : r.blocks.length;
      // Find first free slot if assigned slot is taken
      if (r.blocks.some(b => b.slot === newBlock.slot)) {
        for (let s = 0; s < MAX_BLOCKS_PER_RUNG; s++) {
          if (!r.blocks.some(b => b.slot === s)) { newBlock.slot = s; break; }
        }
      }
      // Insert in array sorted by slot position (evaluation order = left to right)
      const blocks = [...r.blocks, newBlock].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
      return { ...r, blocks };
    })});
  }, []);

  const handleDeleteBlock = useCallback((rungId, blockId) => {
    dispatch({ type: 'DELETE_BLOCK', rungId, blockId });
  }, []);

  const handleDeleteRung = useCallback((rungId) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
      const next = prev.filter(r => r.id !== rungId);
      return next.length === 0 ? [createRung()] : next;
    }});
  }, []);

  const handleMoveRung = useCallback((fromIdx, toIdx) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
      if (fromIdx < 0 || fromIdx >= prev.length || toIdx < 0 || toIdx >= prev.length) return prev;
      const next = [...prev];
      const [moved] = next.splice(fromIdx, 1);
      next.splice(toIdx, 0, moved);
      return next;
    }});
  }, []);

  const handleMoveBlockCrossRung = useCallback((sourceRungId, blockId, targetRungId, slotIdx) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
      const srcRung = prev.find(r => r.id === sourceRungId);
      const tgtRung = prev.find(r => r.id === targetRungId);
      if (!srcRung || !tgtRung) return prev;
      const block = srcRung.blocks.find(b => b.id === blockId);
      if (!block) return prev;
      if (tgtRung.blocks.length >= MAX_BLOCKS_PER_RUNG) return prev;
      return prev.map(r => {
        if (r.id === sourceRungId) return { ...r, blocks: r.blocks.filter(b => b.id !== blockId) };
        if (r.id === targetRungId) {
          const movedBlock = { ...block };
          // Assign to target slot, or first free slot
          if (slotIdx !== undefined && !r.blocks.some(b => (b.slot ?? 0) === slotIdx)) {
            movedBlock.slot = slotIdx;
          } else {
            for (let s = 0; s < MAX_BLOCKS_PER_RUNG; s++) {
              if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { movedBlock.slot = s; break; }
            }
          }
          const blocks = [...r.blocks, movedBlock].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
          return { ...r, blocks };
        }
        return r;
      });
    }});
  }, []);

  const handleBlockChange = useCallback((blockId, field, value) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => ({
      ...r,
      blocks: r.blocks.map(b => {
        if (b.id !== blockId) return b;
        if (field === '__inverted') return { ...b, inverted: value };
        if (field === '__name') return { ...b, name: value };
        if (field === '__addInnerBlock') {
          const ibDef = getBlockDef(value);
          const ibVals = {}; (ibDef?.fields || []).forEach(f => { ibVals[f.name] = ''; });
          return { ...b, innerBlocks: [...(b.innerBlocks || []), { id: uid(), type: value, values: ibVals }] };
        }
        if (field === '__removeInnerBlock') return { ...b, innerBlocks: (b.innerBlocks || []).filter((_, i) => i !== value) };
        if (field === '__updateInnerBlock') {
          const { idx, field: ibField, value: ibVal } = value;
          return { ...b, innerBlocks: (b.innerBlocks || []).map((ib, i) => i !== idx ? ib : { ...ib, values: { ...ib.values, [ibField]: ibVal } }) };
        }
        return { ...b, values: { ...b.values, [field]: value } };
      })
    }))});
  }, []);

  const handleSelectCoil = useCallback((rungId) => {
    dispatch({ type: 'SELECT_COIL', value: rungId });
  }, []);

  const handleSelectInput = useCallback((rungId) => {
    dispatch({ type: 'SELECT_INPUT', value: rungId });
  }, []);

  const handleDeselect = useCallback(() => {
    dispatch({ type: 'DESELECT_ALL' });
  }, []);

  const handleOutputChange = useCallback((rungId, field, value) => {
    dispatch({ type: 'OUTPUT_CHANGE', rungId, field, value });
  }, []);

  const handleRungLabelChange = useCallback((rungId, label) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
      if (r.id !== rungId) return r;
      return { ...r, label };
    })});
  }, []);

  const handleRungChange = useCallback((rungId, field, value) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
      if (r.id !== rungId) return r;
      return { ...r, [field]: value };
    })});
  }, []);

  const handleReorderBlock = useCallback((rungId, sourceBlockId, target) => {
    dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
      if (r.id !== rungId) return r;
      const blocks = r.blocks.map(b => ({ ...b }));
      const srcBlock = blocks.find(b => b.id === sourceBlockId);
      if (!srcBlock) return r;
      // target can be a block id or a slot index
      let targetSlot;
      if (typeof target === 'number' && !blocks.find(b => b.id === target)) {
        targetSlot = target;
      } else {
        const tgtBlock = blocks.find(b => b.id === target);
        targetSlot = tgtBlock ? (tgtBlock.slot ?? blocks.indexOf(tgtBlock)) : srcBlock.slot;
      }
      if (targetSlot === (srcBlock.slot ?? 0)) return r;
      // Swap: if target slot is occupied, give that block the source's old slot
      const occupant = blocks.find(b => b.id !== sourceBlockId && (b.slot ?? blocks.indexOf(b)) === targetSlot);
      if (occupant) occupant.slot = srcBlock.slot ?? 0;
      srcBlock.slot = targetSlot;
      // Re-sort by slot for evaluation order
      blocks.sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
      return { ...r, blocks };
    })});
  }, []);

  const handleSimChange = useCallback((key, value) => {
    dispatch({ type: 'UPDATE_SIM_STATE', fn: prev => ({ ...prev, [key]: value }) });
  }, []);

  // Force-toggle a block: auto → forced-on → forced-off → auto
  const handleForceBlock = useCallback((blockId) => {
    dispatch({ type: 'UPDATE_FORCED_BLOCKS', fn: prev => {
      const current = prev[blockId] || null;
      if (current === null) return { ...prev, [blockId]: 'satisfied' };
      if (current === 'satisfied') return { ...prev, [blockId]: 'unsatisfied' };
      const next = { ...prev };
      delete next[blockId];
      return next;
    }});
  }, []);

  // Execute a rung (spend it) --also cascade-block rungs on the SAME output sharing the same TX inputs
  // Rungs on different outputs (e.g. spend + change) are independent and should not block each other
  const handleExecuteRung = useCallback((rungId) => {
    dispatch({ type: 'EXECUTE_RUNG', rungId });
  }, []);

  // Reset all simulation overrides
  const handleResetSim = useCallback(() => {
    dispatch({ type: 'RESET_SIM' });
  }, []);

  // Start interactive step-through for a rung
  const handleStartRungSim = useCallback((rungIndex) => {
    const rung = rungs[rungIndex];
    if (!rung || spentRungs.has(rung.id)) return;
    dispatch({ type: 'START_RUNG_SIM', rungId: rung.id });
  }, [rungs, spentRungs]);

  // Alias for rung label click
  const startScanFrom = handleStartRungSim;

  // Click a block during step-through --always advances (click = authorize this block)
  const handleStepBlock = useCallback((blockId) => {
    if (!simActiveRungId) return;
    const rung = rungs.find(r => r.id === simActiveRungId);
    if (!rung) return;
    const blockIdx = rung.blocks.findIndex(b => b.id === blockId);
    if (blockIdx !== simActiveStep) return; // must click the current step
    const nextStep = simActiveStep + 1;
    dispatch({ type: 'STEP_BLOCK', blockId, result: 'satisfied', nextStep });
    if (nextStep >= rung.blocks.length) {
      // All blocks passed --fire the coil, mark spent
      setTimeout(() => {
        dispatch({ type: 'EXECUTE_RUNG', rungId: simActiveRungId });
        dispatch({ type: 'SET_SIM_ACTIVE', rungId: null, step: -1, results: {} });
      }, 600);
    }
  }, [simActiveRungId, simActiveStep, rungs]);

  // Auto-advance step-through past forced blocks
  useEffect(() => {
    if (!simActiveRungId || simActiveStep < 0) return;
    const rung = rungs.find(r => r.id === simActiveRungId);
    if (!rung || simActiveStep >= rung.blocks.length) return;
    const block = rung.blocks[simActiveStep];
    if (!block) return;
    const forced = forcedBlocks[block.id];
    if (forced === 'satisfied') {
      // Auto-advance after a brief visual tick
      const timer = setTimeout(() => {
        const nextStep = simActiveStep + 1;
        dispatch({ type: 'STEP_BLOCK', blockId: block.id, result: 'satisfied', nextStep });
        if (nextStep >= rung.blocks.length) {
          setTimeout(() => {
            dispatch({ type: 'EXECUTE_RUNG', rungId: simActiveRungId });
            dispatch({ type: 'SET_SIM_ACTIVE', rungId: null, step: -1, results: {} });
          }, 600);
        }
      }, 200);
      return () => clearTimeout(timer);
    } else if (forced === 'unsatisfied') {
      // Forced-off --mark failed, stay here
      dispatch({ type: 'UPDATE_SIM_STEP_RESULTS', fn: prev => ({ ...prev, [block.id]: 'unsatisfied' }) });
    }
  }, [simActiveRungId, simActiveStep, rungs, forcedBlocks]);

  const totalBlocks = rungs.reduce((s, r) => s + r.blocks.length, 0);
  const liveValidation = useMemo(() => validateLadder(rungs, txInputs, txOutputs, locktime), [rungs, txInputs, txOutputs, locktime]);
  const jsonOutput = useMemo(() => {
    return JSON.stringify(exportCreateTxMLSC(rungs, txOutputs, txInputs, locktime), null, 2);
  }, [rungs, txInputs, txOutputs, locktime]);

  const descriptorOutput = useMemo(() => rungsToDescriptor(rungs), [rungs]);

  const signladderCommand = useMemo(() => {
    // Extract unique 66-char hex pubkeys from all rung block values
    const pubkeys = new Set();
    const hexPkRe = /^(02|03)[0-9a-fA-F]{64}$/;
    rungs.forEach(r => r.blocks.forEach(b => {
      Object.values(b.values || {}).forEach(v => {
        if (typeof v !== 'string') return;
        // Check comma-separated lists (MULTISIG pubkeys field)
        v.split(',').map(s => s.trim()).forEach(s => {
          if (hexPkRe.test(s)) pubkeys.add(s);
        });
      });
    }));
    // Build key map with placeholder WIFs
    const wifPrefixes = ['cVt4', 'cSr7', 'cPm2', 'cQk9', 'cWn5', 'cXj3', 'cYh8', 'cZf1'];
    const keyEntries = [...pubkeys].map((pk, i) => {
      const wif = (wifPrefixes[i % wifPrefixes.length]) + '...';
      return `"${pk}":"${wif}"`;
    });
    const keyMap = keyEntries.length > 0 ? '{' + keyEntries.join(', ') + '}' : '{}';
    // Build spent outputs from txInputs
    const spentOutputs = (txInputs || []).filter(i => i.txid).map(() =>
      '{"amount":0.001,"scriptPubKey":"c2..."}'
    );
    const spentStr = '[' + spentOutputs.join(', ') + ']';
    return `ghost-cli -signet signladder \\\n  "<TX_HEX>" \\\n  "${descriptorOutput}" \\\n  '${keyMap}' \\\n  '${spentStr}'`;
  }, [rungs, txInputs, descriptorOutput]);

  // Compute which output names and rung numbers are energized (for OUTPUT_REF cross-referencing)
  // Use simState + forcedBlocks (can't use fullSimState here --circular dependency)
  const [energizedOutputs, energizedRungNums] = useMemo(() => {
    if (!isSimMode) return [new Set(), new Set()];
    const evalState = { ...simState, forcedBlocks };
    const outputs = new Set();
    const rungNums = new Set();
    // Evaluate in two passes: first compute block satisfaction, then resolve relay deps
    const blocksSatisfied = rungs.map(r =>
      r.blocks.length > 0 && r.blocks.every(b => evaluateBlock(b, evalState) === 'satisfied')
    );
    // Iterative resolution: relay deps may cascade (max 8 relays, converges fast)
    let changed = true;
    while (changed) {
      changed = false;
      rungs.forEach((r, i) => {
        const rungKey = `R${String(i).padStart(3, '0')}`;
        if (rungNums.has(rungKey)) return; // already energized
        if (!blocksSatisfied[i]) return;
        // Check outputRefs (relay references)
        const refsSatisfied = !r.outputRefs || r.outputRefs.length === 0 ||
          r.outputRefs.every(ref => {
            const refUpper = ref.trim().toUpperCase();
            return outputs.has(refUpper) || rungNums.has(refUpper);
          });
        if (refsSatisfied) {
          if (r.output.name) outputs.add(r.output.name.trim().toUpperCase());
          rungNums.add(rungKey);
          if (r.label) rungNums.add(r.label.trim().toUpperCase());
          changed = true;
        }
      });
    }
    return [outputs, rungNums];
  }, [rungs, isSimMode, simState, forcedBlocks]);

  // Compute tx totals from inputs/outputs
  const txTotals = useMemo(() => {
    const totalOut = txOutputs.reduce((s, o) => s + (parseInt(o.amount) || 0), 0);
    const vsize = 150 + txInputs.length * 68 + txOutputs.length * 34; // rough estimate
    return { totalOut, vsize, inputCount: txInputs.filter(i => i.txid).length };
  }, [txInputs, txOutputs]);

  // Augment simState with energized outputs, forced blocks, spent rungs
  const fullSimState = useMemo(() => ({
    ...simState,
    energizedOutputs,
    energizedRungNums,
    outputAmount: txTotals.totalOut || simState.outputAmount,
    inputCount: txTotals.inputCount || 1,
    outputCount: txOutputs.filter(o => o.address || parseInt(o.amount) > 0).length || 1,
    forcedBlocks,
  }), [simState, energizedOutputs, energizedRungNums, txTotals, txOutputs, forcedBlocks]);

  // Count energized rungs
  const energizedCount = useMemo(() => {
    if (!isSimMode) return 0;
    return rungs.filter(r => r.blocks.length > 0 && r.blocks.every(b => evaluateBlock(b, fullSimState) === 'satisfied')).length;
  }, [rungs, isSimMode, fullSimState]);

  const handleClear = useCallback(() => {
    dispatch({ type: 'CLEAR_ALL' });
  }, []);

  const handleCopyJson = useCallback(() => {
    const result = validateLadder(rungs, txInputs, txOutputs, locktime);
    dispatch({ type: 'SET_VALIDATION', value: result });
    if (result.errors.length > 0) {
      dispatch({ type: 'SET_SHOW_VALIDATION', value: true });
      return; // block export

    navigator.clipboard?.writeText(jsonOutput);
    if (result.warnings.length > 0) {
      dispatch({ type: 'SET_SHOW_VALIDATION', value: true });

  }, [rungs, txInputs, txOutputs, locktime, jsonOutput]);

  const handleLoadExample = useCallback((ex) => {
    // Build tx inputs
    const newTxInputs = ex.txInputs.map(inp => ({ id: uid(), txid: inp.txid, vout: inp.vout }));
    // Build tx outputs
    const newTxOutputs = ex.txOutputs.map(out => ({ id: uid(), address: out.address, amount: out.amount }));
    // Build rungs
    const newRungs = ex.rungs.map((rd, ri) => {
      const rung = createRung();
      rung.label = rd.label || '';
      rung.output = { name: rd.output?.name || '', type: rd.output?.type || 'standard', txOutputId: null, wireType: rd.output?.wireType || 'UNLOCK', attestation: rd.output?.attestation || 'INLINE', scheme: rd.output?.scheme || 'SCHNORR' };
      // Assign tx output to coil
      if (ex.outputMap && ex.outputMap[ri] !== undefined && ex.outputMap[ri] !== null) {
        const outIdx = ex.outputMap[ri];
        if (outIdx < newTxOutputs.length) rung.output.txOutputId = newTxOutputs[outIdx].id;
      }
      // Assign tx inputs to input contact
      if (ex.inputMap && ex.inputMap[ri]) {
        rung.txInputIds = ex.inputMap[ri].map(idx => newTxInputs[idx]?.id).filter(Boolean);
      }
      // Assign output refs
      if (rd.outputRefs) {
        rung.outputRefs = [...rd.outputRefs];
      }
      // Build blocks
      rung.blocks = (rd.blocks || []).map(bd => {
        const block = createBlock(bd.type);
        if (bd.values) {
          Object.keys(bd.values).forEach(k => { block.values[k] = bd.values[k]; });
        }
        if (bd.inverted) block.inverted = true;
        return block;
      });
      return rung;
    });
    dispatch({ type: 'LOAD_EXAMPLE',
      rungs: newRungs.length > 0 ? newRungs : [createRung()],
      txInputs: newTxInputs.length > 0 ? newTxInputs : [{ id: uid(), txid: '', vout: 0 }],
      txOutputs: newTxOutputs.length > 0 ? newTxOutputs : [{ id: uid(), address: '', amount: 0 }],
    });
    // Always switch to BUILD tab when loading an example
    dispatch({ type: 'SET_MODE', value: 'build' });
  }, []);

  // Load example from URL param ?example=N
  useEffect(() => {
    if (pendingExample !== null && pendingExample >= 0 && pendingExample < EXAMPLES.length) {
      handleLoadExample(EXAMPLES[pendingExample]);
      setPendingExample(null);
    }
  }, [pendingExample, handleLoadExample]);

  const handlePrint = useCallback(() => {
    const w = window.open('', '_blank');
    if (!w) return;

    // Build ladder diagram
    const ladderRows = rungs.map((rung, ri) => {
      const rungLabel = rung.label || `R${String(ri).padStart(3, '0')}`;
      const inputCount = (rung.txInputIds || []).length;
      const inputInfo = inputCount > 0 ? `[${inputCount} VIN]` : '[INPUT]';

      const slots = [];
      for (let s = 0; s < 8; s++) {
        const block = rung.blocks.find(b => (b.slot ?? rung.blocks.indexOf(b)) === s);
        if (block) {
          const def = getBlockDef(block.type);
          const firstField = def.fields[0];
          const val = firstField ? block.values[firstField.name] || '' : '';
          const valShort = val.length > 10 ? val.substring(0, 6) + '..' : val;
          slots.push(`─┤ ${def.label}${valShort ? ' ' + valShort : ''} ├─`);
        } else {
          slots.push('────────');
        }
      }

      const coilName = rung.output.name || '';
      const coilSym = getCoilSymbol(rung.output.type);
      const txOut = txOutputs.find(o => o.id === rung.output.txOutputId);
      const txOutInfo = txOut ? `→ ${txOut.address || '?'} ${(parseInt(txOut.amount) || 0).toLocaleString()}s` : '';

      return { rungLabel, inputInfo, slots, coilSym, coilName, txOutInfo, blocks: rung.blocks, rung };

          tag: `${rung.label || 'R' + String(ri).padStart(3, '0')}.B${bi}`,

      });

      const refs = (rung.outputRefs || []).join(', ') || '—';
      return { label, coilName: rung.output.name || '—', inputs: inputs.join(', ') || '—', output, refs };
    });

    const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);

    w.document.write(`<!DOCTYPE html><html><head>

<style>

      ${r.slots.map((s, si) => `<div class="slot ${r.rung.blocks.find(b => (b.slot ?? r.rung.blocks.indexOf(b)) === si) ? 'occupied' : 'empty'}">${s}</div>`).join('')}
    </div>
    <div class="rail"></div>
    <span class="coil">${r.coilSym}${r.coilName ? '<br><span class="coil-name">' + r.coilName + '</span>' : ''}</span>

  </div>
`).join('')}
</div>

<h2>Block Detail</h2>
<table>
  <thead><tr><th>Tag</th><th>Type</th><th>INV</th><th>Fields</th></tr></thead>
  <tbody>
    ${blockDetails.map(b => `<tr><td>${b.tag}</td><td>${b.type}</td><td>${b.inverted ? 'YES' : ''}</td><td class="mono">${b.fields}</td></tr>`).join('')}
    ${blockDetails.length === 0 ? '<tr><td colspan="4" style="color:#999;text-align:center">No blocks</td></tr>' : ''}
  </tbody>
</table>

<h2>Rung I/O Mapping</h2>
<table>
  <thead><tr><th>Rung</th><th>Coil Name</th><th>TX Inputs</th><th>Output Refs</th><th>TX Output</th></tr></thead>
  <tbody>
    ${rungMappings.map(m => `<tr><td>${m.label}</td><td>${m.coilName}</td><td class="mono">${m.inputs}</td><td class="mono">${m.refs}</td><td class="mono">${m.output}</td></tr>`).join('')}
  </tbody>
</table>

<div class="page-break"></div>
<h1>APPENDIX A --TRANSACTION</h1>

<h2>Inputs (${txInputRows.length})</h2>
<table>
  <thead><tr><th>VIN</th><th>TXID</th><th>VOUT</th></tr></thead>
  <tbody>
    ${txInputRows.map(i => `<tr><td>${i.vin}</td><td class="mono">${i.txid}</td><td>${i.vout}</td></tr>`).join('')}
    ${txInputRows.length === 0 ? '<tr><td colspan="3" style="color:#999;text-align:center">No inputs defined</td></tr>' : ''}
  </tbody>
</table>

<h2>Outputs (${txOutputRows.length})</h2>
<table>
  <thead><tr><th>VOUT</th><th>Address / Script</th><th>Amount (sats)</th></tr></thead>
  <tbody>
    ${txOutputRows.map(o => `<tr><td>${o.vout}</td><td class="mono">${o.address}</td><td>${o.amount}</td></tr>`).join('')}
    ${txOutputRows.length === 0 ? '<tr><td colspan="3" style="color:#999;text-align:center">No outputs defined</td></tr>' : ''}
  </tbody>
</table>

<div class="page-break"></div>

</body></html>`);

    w.document.close();
    setTimeout(() => w.print(), 300);
  }, [rungs, txInputs, txOutputs, jsonOutput, totalBlocks]);

  // Import blocks from fields array (wire format)
  const importBlocksFromFields = useCallback((blocksData) => {
    return (blocksData || []).map(bd => {
      const block = createBlock(bd.type);
      if (bd.inverted) block.inverted = true;
      if (bd.fields) {
        const def = getBlockDef(bd.type);
        let fieldIdx = 0;
        def.fields.forEach(f => {
          if (fieldIdx < bd.fields.length) {
            const fieldData = bd.fields[fieldIdx];
            if (f.dataType === 'NUMERIC' && fieldData.hex) {
              const bytes = fieldData.hex.match(/.{2}/g) || [];
              let val = 0;
              bytes.forEach((b, i) => { val |= parseInt(b, 16) << (i * 8); });
              block.values[f.name] = String(val);
            } else if (f.dataType === 'SCHEME' && fieldData.hex) {
              const schemeRevMap = { '01': 'SCHNORR', '02': 'ECDSA', '10': 'FALCON512', '11': 'FALCON1024', '12': 'DILITHIUM3', '13': 'SPHINCS_SHA' };
              block.values[f.name] = schemeRevMap[fieldData.hex] || '';
            } else if (fieldData.hex) {
              block.values[f.name] = fieldData.hex;
            }
            fieldIdx++;
          }
        });
      }
      return block;
    });
  }, []);

  const handleImport = useCallback(() => {
    const input = prompt('Paste createtxmlsc JSON (or legacy conditions array):');
    if (!input) return;
    try {
      const data = JSON.parse(input);

      // Detect format: createtxmlsc has { inputs, outputs } at top level
      if (data.inputs && data.outputs && !Array.isArray(data)) {
        // createtxmlsc wire format
        const newTxInputs = (data.inputs || []).map(i => ({
          id: uid(), txid: i.txid || '', vout: i.vout || 0, sequence: i.sequence !== undefined ? String(i.sequence) : ''
        }));
        const newTxOutputs = [];
        const newRungs = [];

        (data.outputs || []).forEach((out, oi) => {
          const txOut = { id: uid(), address: out.address || '', amount: Math.round((out.amount || 0) * 100000000) };
          newTxOutputs.push(txOut);

          // Each condition entry is a rung assigned to this output
          (out.conditions || []).forEach((cond, ci) => {
            const rung = createRung();
            rung.label = ci === 0 ? '' : `PATH_${ci}`;
            rung.output.txOutputId = txOut.id;
            // Import coil wire fields
            if (out.coil) {
              rung.output.wireType = out.coil.type || 'UNLOCK';
              rung.output.attestation = out.coil.attestation || 'INLINE';
              rung.output.scheme = out.coil.scheme || 'SCHNORR';
            }
            rung.blocks = importBlocksFromFields(cond.blocks);
            // Assign all inputs to the rung by default
            rung.txInputIds = newTxInputs.map(i => i.id);
            newRungs.push(rung);
          });
        });

        dispatch({ type: 'IMPORT',
          rungs: newRungs.length > 0 ? newRungs : [createRung()],
          txInputs: newTxInputs.length > 0 ? newTxInputs : [{ id: uid(), txid: '', vout: 0, sequence: '' }],
          txOutputs: newTxOutputs.length > 0 ? newTxOutputs : [{ id: uid(), address: '', amount: 0 }],
          locktime: data.locktime || 0,
        });
      } else {
        // Legacy: array of rungs with blocks
        const arr = Array.isArray(data) ? data : [data];
        const imported = arr.map(rungData => {
          const rung = createRung();
          rung.blocks = importBlocksFromFields(rungData.blocks);
          return rung;
        });
        dispatch({ type: 'SET_RUNGS', value: imported.length > 0 ? imported : [createRung()] });
        dispatch({ type: 'DESELECT_ALL' });
      }
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  }, [importBlocksFromFields]);

  // VIEW AS LADDER --convert decoded JSON to builder rungs and switch to build mode
  const handleViewAsLadder = useCallback((decodedJson) => {
    try {
      const result = decodedToBuilderRungs(decodedJson);
      if (!result || result.rungs.length === 0) {
        alert('Could not parse rung structure from this JSON. Try decoding with DECODE LADDER for ladder witness hex.');
        return;
      }
      dispatch({ type: 'VIEW_AS_LADDER', rungs: result.rungs, txInputs: result.txInputs, txOutputs: result.txOutputs });
    } catch (e) {
      alert('Failed to convert: ' + e.message);
    }
  }, []);

  // Build context value with state + derived values for child components
  const contextValue = useMemo(() => ({
    ...state,
    isSimMode,
    scanSequence,
    scanStep,
    scanTotal: scanSequence.length,
    fullSimState,
    energizedOutputs,
    energizedRungNums,
    selectedBlock,
    expandedBlock,
    txTotals,
    jsonOutput,
  }), [state, isSimMode, scanSequence, scanStep, fullSimState, energizedOutputs, energizedRungNums, selectedBlock, expandedBlock, txTotals, jsonOutput]);

  return (

          <button className={`mode-tab ${mode === 'build' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_MODE', value: 'build' })} title={showTooltips ? 'Construct ladder rungs --drag blocks from palette' : undefined}>BUILD</button>
          <button className={`mode-tab ${mode === 'simulate' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_MODE', value: 'simulate' })} title={showTooltips ? 'Test rungs --click rung labels to step through, Alt+click blocks to force' : undefined}>SIMULATE</button>
          <button className={`mode-tab ${mode === 'convert' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_MODE', value: 'convert' })} title={showTooltips ? 'Paste RPC JSON output to convert back to ladder diagram' : undefined}>CONVERT</button>
          <button className={`mode-tab ${mode === 'send' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_MODE', value: 'send' })} title={showTooltips ? 'Create and fund Ladder Script outputs on signet' : undefined} style={mode === 'send' ? { color: 'var(--green-bright)', borderBottomColor: 'var(--green-bright)' } : {}}>SEND</button>
          <button className={`mode-tab ${mode === 'spend' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_MODE', value: 'spend' })} title={showTooltips ? 'Spend existing RUNG outputs on signet' : undefined} style={mode === 'spend' ? { color: 'var(--cyan)', borderBottomColor: 'var(--cyan)' } : {}}>SPEND</button>
          <button className={`mode-tab ${mode === 'review' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_MODE', value: 'review' })} title={showTooltips ? 'Review fund and spend JSON for session transactions' : undefined} style={mode === 'review' ? { color: 'var(--amber)', borderBottomColor: 'var(--amber)' } : {}}>REVIEW</button>
        </div>
        <div className="header-actions">
          <button className="header-btn" onClick={() => window.open('docs/index.html#ENGINE_GUIDE', '_blank')} title={showTooltips ? 'Open the Ladder Script engine guide in a new window' : undefined}>HELP</button>
          <button className="header-btn primary" onClick={() => dispatch({ type: 'SET_SHOW_EXAMPLES', value: true })} title={showTooltips ? 'Load pre-built example programs' : undefined}>EXAMPLES</button>
          <button className="header-btn" onClick={handleImport} title={showTooltips ? 'Import createtxmlsc JSON from clipboard' : undefined}>IMPORT</button>
          <button className="header-btn" onClick={handleCopyJson} title={showTooltips ? 'Validate and copy wire-format JSON to clipboard' : undefined}>COPY JSON</button>
          <button className="header-btn" onClick={handlePrint} title={showTooltips ? 'Print ladder diagram' : undefined}>PRINT</button>
          <button className="header-btn" onClick={() => setWalkthroughActive(true)} title={showTooltips ? 'Start the guided walkthrough tutorial' : undefined} style={{ color: 'var(--cyan)' }}>TUTORIAL</button>
        </div>
      </div>

      {/* Main */}
      <div className="main-content">
        {mode === 'convert' ? (
          <div style={{ gridColumn: '1 / -1', overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
            <ConvertPanel />
          </div>
        ) : mode === 'send' ? (
          <div style={{ gridColumn: '1 / -1', overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
            <SignetPanel />
          </div>
        ) : mode === 'spend' ? (
          <div style={{ gridColumn: '1 / -1', overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
            <SpendPanel />
          </div>
        ) : mode === 'review' ? (
          <div style={{ gridColumn: '1 / -1', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            <ReviewPanel />
          </div>
        ) : <>
        {isSimMode ? (
          <div className="palette" style={{ opacity: 0.3, pointerEvents: 'none' }}>
              <div style={{ padding: '12px 8px', fontSize: 9, color: 'var(--text-dim)', letterSpacing: 1, textAlign: 'center' }}>PALETTE LOCKED<br/>IN SIMULATOR MODE</div>
          </div>
        ) : (
          <PalettePanel />
        )}

        <LadderView
          scanSequence={scanSequence}
          fullSimState={fullSimState}
          energizedOutputs={energizedOutputs}
          energizedRungNums={energizedRungNums}
          onScanStart={startScan}
          onScanStepFwd={advanceScan}
          onScanStepBack={rewindScan}
          startScanFrom={startScanFrom}
        />

        <div className="right-panel" style={{ width: rightPanelWidth + 'px' }} ref={rightPanelRef}>
          <div className="right-panel-resize" onMouseDown={handleRightPanelResizeStart} />
          <div className="panel-tab-bar">
            {!isSimMode && <button className={`panel-tab ${rightTab === 'properties' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_RIGHT_TAB', value: 'properties' })} title={showTooltips ? 'Edit fields for the selected block, input, or coil' : undefined}>PROPERTIES</button>}
            {!isSimMode && <button className={`panel-tab ${rightTab === 'tx' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_RIGHT_TAB', value: 'tx' })} title={showTooltips ? 'Configure transaction inputs, outputs, and locktime' : undefined}>TX</button>}
            {isSimMode && <button className={`panel-tab ${rightTab === 'simulate' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_RIGHT_TAB', value: 'simulate' })} title={showTooltips ? 'Set simulation context --amounts, heights, timestamps' : undefined}>CONTEXT</button>}
            <button className={`panel-tab ${rightTab === 'descriptor' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_RIGHT_TAB', value: 'descriptor' })} title={showTooltips ? 'View the descriptor notation for the current conditions' : undefined}>DESCRIPTOR</button>
            <button className={`panel-tab ${rightTab === 'json' ? 'active' : ''}`} onClick={() => dispatch({ type: 'SET_RIGHT_TAB', value: 'json' })} title={showTooltips ? 'View the createtxmlsc RPC JSON for this transaction' : undefined}>RPC</button>
          </div>
          <div className="panel-content">
            {!isSimMode && rightTab === 'properties' && selectedInputId ? (
              <InputPropertiesPanel rungId={selectedInputId} />
            ) : !isSimMode && rightTab === 'properties' && selectedCoilId ? (
              <CoilPropertiesPanel rungId={selectedCoilId} />
            ) : !isSimMode && rightTab === 'properties' && (
              <PropertiesPanel />
            )}
            {!isSimMode && rightTab === 'tx' && (
              <TxPanel />
            )}
            {rightTab === 'simulate' && isSimMode && (
              <SimulationPanel />
            )}
            {rightTab === 'descriptor' && (
              <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden' }}>
                <div style={{ fontSize: 9, padding: '4px 8px', background: 'var(--bg-tertiary)', borderBottom: '1px solid var(--border)', color: 'var(--text-dim)', letterSpacing: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>DESCRIPTOR</span>
                  <button style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-dim)', fontSize: 9, padding: '1px 6px', cursor: 'pointer', fontFamily: 'var(--font-mono)' }} onClick={() => { navigator.clipboard?.writeText(descriptorOutput); }}>COPY</button>
                </div>
                <div style={{ overflow: 'auto', padding: '12px', fontFamily: 'var(--font-mono)', fontSize: 13, lineHeight: 1.7, whiteSpace: 'pre-wrap', wordBreak: 'break-all', color: 'var(--text-primary)', background: 'var(--bg-primary)', borderBottom: '1px solid var(--border)' }}>
                  {descriptorOutput}
                </div>
                <div style={{ fontSize: 9, padding: '4px 8px', background: 'var(--bg-tertiary)', borderBottom: '1px solid var(--border)', color: 'var(--text-dim)', letterSpacing: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>SIGNLADDER COMMAND</span>
                  <button style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-dim)', fontSize: 9, padding: '1px 6px', cursor: 'pointer', fontFamily: 'var(--font-mono)' }} onClick={() => { navigator.clipboard?.writeText(signladderCommand); }}>COPY</button>
                </div>
                <div style={{ flex: 1, overflow: 'auto', padding: '12px', fontFamily: 'var(--font-mono)', fontSize: 12, lineHeight: 1.7, whiteSpace: 'pre-wrap', wordBreak: 'break-all', color: 'var(--text-primary)', background: 'var(--bg-primary)' }}>
                  {signladderCommand}
                </div>
              </div>
            )}
            {rightTab === 'json' && (
              <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden' }}>
                <div style={{ fontSize: 9, padding: '4px 8px', background: 'var(--bg-tertiary)', borderBottom: '1px solid var(--border)', color: 'var(--text-dim)', letterSpacing: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>CREATERUNGTX RPC FORMAT</span>
                  {isSimMode && (
                    <span style={{ display: 'flex', gap: 8 }}>
                      <span><span style={{ color: '#00ff88' }}>■</span> EXEC</span>
                      <span><span style={{ color: 'var(--red)' }}>■</span> BLOCK</span>
                      <span><span style={{ color: '#00ff88', opacity: 0.6 }}>◆</span> STEP</span>
                    </span>
                  )}
                </div>
                {(() => {
                  const warnings = [];
                  // Exclude rungs whose coils are internally referenced (named output, outputRefs, or OUTPUT_REF blocks)
                  const referencedNames = new Set();
                  rungs.forEach((r, ri) => {
                    if (r.output.name) referencedNames.add(r.output.name);
                    referencedNames.add(r.label || `R${String(ri).padStart(3, '0')}`);
                  });
                  const isRungReferenced = (rung, ri) => {
                    const rungName = rung.label || `R${String(ri).padStart(3, '0')}`;
                    return rungs.some(other => other.id !== rung.id && (
                      (other.outputRefs || []).some(ref => ref === rungName || ref === rung.output.name) ||
                      other.blocks.some(b => b.type === 'OUTPUT_REF' && b.values?.ref_name && (b.values.ref_name === rungName || b.values.ref_name === rung.output.name))
                    ));
                  };
                  const unassigned = rungs.filter((r, ri) => r.output.type !== 'relay' && (r.output.txOutputId === null || r.output.txOutputId === undefined) && !isRungReferenced(r, ri));
                  if (unassigned.length > 0) warnings.push(`${unassigned.length} rung(s) not assigned to a TX output --will be excluded from wire JSON`);
                  const outRefBlocks = rungs.reduce((c, r) => c + r.blocks.filter(b => b.type === 'OUTPUT_REF').length, 0);
                  if (outRefBlocks > 0) warnings.push(`${outRefBlocks} OUTPUT_REF block(s) stripped --use input refs on the input contact instead`);
                  const definedOutputs = txOutputs.filter(o => o.address || parseInt(o.amount) > 0);
                  const emptyOutputs = definedOutputs.filter(o => {
                    const assigned = rungs.filter(r => r.output.txOutputId === o.id);
                    return assigned.length === 0;
                  });
                  if (emptyOutputs.length > 0) warnings.push(`${emptyOutputs.length} TX output(s) have no rungs assigned --will have empty conditions`);
                  if (warnings.length === 0) return null;
                  return (
                    <div style={{ padding: '4px 8px', background: 'var(--red-dim)', borderBottom: '1px solid var(--red)', fontSize: 9, color: 'var(--red-bright)', lineHeight: 1.6 }}>
                      {warnings.map((w, i) => <div key={i}>⚠ {w}</div>)}
                    </div>
                  );
                })()}
                {isSimMode ? (
                  <HighlightedJson scanStep={scanStep} />
                ) : (
                  <div className="json-output" style={{ flex: 1 }}>{jsonOutput}</div>
                )}
              </div>
            )}
          </div>
        </div>
        </>}
      </div>

      {/* Register Table --hidden in signet modes for more space */}
      {mode !== 'send' && mode !== 'spend' && mode !== 'review' && <RegisterTable fullSimState={fullSimState} />}

      {/* Status Bar */}
      <div className="status-bar">
        <div className="status-item">
          <div className={`status-dot ${totalBlocks > 0 ? 'green' : 'amber'}`} />
          {rungs.length} RUNGS
        </div>
        <div className="status-item">{totalBlocks} BLOCKS (8/RUNG MAX, 8 RUNGS MAX)</div>
        {isSimMode && (
          <div className="status-item">
            <div className={`status-dot ${energizedCount > 0 ? 'amber' : 'red'}`} />
            {energizedCount} ENERGIZED
          </div>
        )}
        {(() => {
          const unassigned = rungs.filter(r => r.output.txOutputId === null || r.output.txOutputId === undefined).length;
          const outRefBlocks = rungs.reduce((c, r) => c + r.blocks.filter(b => b.type === 'OUTPUT_REF').length, 0);
          return (
            <>
              {unassigned > 0 && <div className="status-item" style={{ color: 'var(--red)' }}>{unassigned} RUNG(S) NOT ASSIGNED TO OUTPUT</div>}
              {outRefBlocks > 0 && <div className="status-item" style={{ color: 'var(--amber)' }}>{outRefBlocks} OUT_REF BLOCK(S) --USE INPUT REFS INSTEAD</div>}
            </>
          );
        })()}
        {(() => {
          const ec = liveValidation.errors.length;
          const wc = liveValidation.warnings.length;
          if (ec > 0) return (
            <div className="status-item" style={{ color: 'var(--red-bright)', cursor: 'pointer' }} onClick={() => { dispatch({ type: 'SET_VALIDATION', value: liveValidation }); dispatch({ type: 'SET_SHOW_VALIDATION', value: true }); }}>
              <div className="status-dot red" />
              {ec} ERROR{ec !== 1 ? 'S' : ''}
            </div>
          );
          if (wc > 0) return (
            <div className="status-item" style={{ color: 'var(--amber)', cursor: 'pointer' }} onClick={() => { dispatch({ type: 'SET_VALIDATION', value: liveValidation }); dispatch({ type: 'SET_SHOW_VALIDATION', value: true }); }}>
              <div className="status-dot amber" />
              {wc} WARNING{wc !== 1 ? 'S' : ''}
            </div>
          );
          return (
            <div className="status-item" style={{ color: 'var(--green)' }}>
              <div className="status-dot green" />
              VALID
            </div>
          );
        })()}
        <div className="status-spacer" />
        <button
          className="tooltip-toggle"
          onClick={() => dispatch({ type: 'TOGGLE_TOOLTIPS' })}
          title="Toggle help tooltips"
        >{showTooltips ? '? ON' : '? OFF'}</button>
        <div className="status-item" style={{ color: 'var(--text-dim)' }}>
          GHOST LADDER v2.0
        </div>
      </div>

      {showExamples && (
        <ExamplesModal onClose={() => dispatch({ type: 'SET_SHOW_EXAMPLES', value: false })} onLoad={handleLoadExample} />
      )}
      <GuidedWalkthrough active={walkthroughActive} onClose={() => setWalkthroughActive(false)} />
      {showValidationPanel && validationResult && (
        <div className="validation-overlay" onClick={() => dispatch({ type: 'SET_SHOW_VALIDATION', value: false })}>
          <div className="validation-panel" onClick={e => e.stopPropagation()}>
            <div className="validation-header">
              <span className="validation-header-title" style={{ color: validationResult.errors.length > 0 ? 'var(--red-bright)' : 'var(--amber)' }}>
                {validationResult.errors.length > 0 ? 'VALIDATION FAILED' : 'COPIED WITH WARNINGS'}
              </span>
              <button className="validation-close" onClick={() => dispatch({ type: 'SET_SHOW_VALIDATION', value: false })}>CLOSE</button>
            </div>
            <div className="validation-body">
              {validationResult.errors.length > 0 && (
                <div className="validation-section">
                  <div className="validation-section-label" style={{ color: 'var(--red)' }}>ERRORS ({validationResult.errors.length})</div>
                  {validationResult.errors.map((e, i) => (
                    <div key={i} className="validation-item" style={{ color: 'var(--red-bright)' }}>
                      <div className="validation-dot error" />
                      {e}
                    </div>
                  ))}
                </div>
              )}
              {validationResult.warnings.length > 0 && (
                <div className="validation-section">
                  <div className="validation-section-label" style={{ color: 'var(--amber)' }}>WARNINGS ({validationResult.warnings.length})</div>
                  {validationResult.warnings.map((w, i) => (
                    <div key={i} className="validation-item" style={{ color: 'var(--amber)' }}>
                      <div className="validation-dot warning" />
                      {w}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="validation-footer">
              {validationResult.errors.length > 0
                ? 'Fix all errors before exporting --JSON was not copied'
                : 'JSON copied to clipboard --review warnings above'}
            </div>
          </div>
        </div>
      )}
      {expandedBlock && (
        <BlockModal
          block={expandedBlock}
          onChange={handleBlockChange}
          onClose={() => dispatch({ type: 'SET_EXPANDED_BLOCK', value: null })}
          rungs={rungs}
        />
      )}
      {contextMenu && (
        <BlockContextMenu
          x={contextMenu.x}
          y={contextMenu.y}
          block={contextMenu.block}
          onRename={() => {
            dispatch({ type: 'SELECT_BLOCK', value: contextMenu.block.id });
            dispatch({ type: 'SET_RENAMING_BLOCK', value: contextMenu.block.id });
          }}
          onExpand={() => dispatch({ type: 'SET_EXPANDED_BLOCK', value: contextMenu.block.id })}
          onFillTestData={() => {
            const testVals = generateTestData(contextMenu.block.type);
            dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => ({
              ...r,
              blocks: r.blocks.map(b => b.id === contextMenu.block.id
                ? { ...b, values: { ...b.values, ...testVals } }
                : b)
            }))});
          }}
          onToggleInvert={() => handleBlockChange(contextMenu.block.id, '__inverted', !contextMenu.block.inverted)}
          onDuplicate={() => handleDuplicateBlock(contextMenu.rungId, contextMenu.block.id)}
          onDelete={() => handleDeleteBlock(contextMenu.rungId, contextMenu.block.id)}
          onClose={() => dispatch({ type: 'SET_CONTEXT_MENU', value: null })}
        />
      )}
      {inputContextMenu && (
        <InputContextMenu
          x={inputContextMenu.x}
          y={inputContextMenu.y}
          rung={inputContextMenu.rung}
          onRename={() => {
            dispatch({ type: 'SELECT_INPUT', value: inputContextMenu.rung.id });
            dispatch({ type: 'SET_RENAMING_INPUT', value: inputContextMenu.rung.id });
          }}
          onExpand={() => dispatch({ type: 'SET_EXPANDED_INPUT', value: inputContextMenu.rung.id })}
          onClear={() => {
            handleRungChange(inputContextMenu.rung.id, 'txInputIds', []);
            handleRungChange(inputContextMenu.rung.id, 'outputRefs', []);
            handleRungChange(inputContextMenu.rung.id, 'inputName', '');
          }}
          onClose={() => dispatch({ type: 'SET_INPUT_CONTEXT_MENU', value: null })}
        />
      )}
      {expandedInputId && (() => {
        const ri = rungs.findIndex(r => r.id === expandedInputId);
        const rung = ri >= 0 ? rungs[ri] : null;
        return rung ? (
          <InputModal
            rung={rung}
            rungIndex={ri}
            onRungChange={handleRungChange}
            txInputs={txInputs}
            allRungs={rungs}
            onClose={() => dispatch({ type: 'SET_EXPANDED_INPUT', value: null })}
          />
        ) : null;
      })()}
      {outputContextMenu && (
        <OutputContextMenu
          x={outputContextMenu.x}
          y={outputContextMenu.y}
          rung={outputContextMenu.rung}
          onRename={() => {
            dispatch({ type: 'SELECT_COIL', value: outputContextMenu.rung.id });
          }}
          onExpand={() => dispatch({ type: 'SET_EXPANDED_OUTPUT', value: outputContextMenu.rung.id })}
          onClear={() => {
            handleOutputChange(outputContextMenu.rung.id, 'name', '');
            handleOutputChange(outputContextMenu.rung.id, 'txOutputId', null);
          }}
          onClose={() => dispatch({ type: 'SET_OUTPUT_CONTEXT_MENU', value: null })}
        />
      )}
      {expandedOutputId && (() => {
        const ri = rungs.findIndex(r => r.id === expandedOutputId);
        const rung = ri >= 0 ? rungs[ri] : null;
        return rung ? (
          <OutputModal
            rung={rung}
            rungIndex={ri}
            onChange={handleOutputChange}
            txOutputs={txOutputs}
            onClose={() => dispatch({ type: 'SET_EXPANDED_OUTPUT', value: null })}
          />
        ) : null;
      })()}
    </div>
    </AppDispatch.Provider>
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>(function(){var a=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:8801':'https://bitcoinghost.org';fetch(a+'/api/ladder/analytics/visit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page:location.pathname,referrer:document.referrer})}).catch(function(){});})()</script>
</body>
</html>
