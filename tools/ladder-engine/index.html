    <span class="rung-label">${r.rungLabel}</span>
    <span class="rung-input">${r.inputInfo}</span>
    <div class="rail"></div>
    <div class="slots">
      ${r.slots.map((s, si) => `<div class="slot ${r.rung.blocks.find(b => (b.slot ?? r.rung.blocks.indexOf(b)) === si) ? 'occupied' : 'empty'}">${s}</div>`).join('')}
    </div>
    <div class="rail"></div>
    <span class="coil">${r.coilSym}${r.coilName ? '<br><span class="coil-name">' + r.coilName + '</span>' : ''}</span>
    <span class="tx-out-info">${r.txOutInfo}</span>
  </div>
`).join('')}
</div>

<h2>Block Detail</h2>
<table>
  <thead><tr><th>Tag</th><th>Type</th><th>INV</th><th>Fields</th></tr></thead>
  <tbody>
    ${blockDetails.map(b => `<tr><td>${b.tag}</td><td>${b.type}</td><td>${b.inverted ? 'YES' : ''}</td><td class="mono">${b.fields}</td></tr>`).join('')}
    ${blockDetails.length === 0 ? '<tr><td colspan="4" style="color:#999;text-align:center">No blocks</td></tr>' : ''}
  </tbody>
</table>

<h2>Rung I/O Mapping</h2>
<table>
  <thead><tr><th>Rung</th><th>Coil Name</th><th>TX Inputs</th><th>Output Refs</th><th>TX Output</th></tr></thead>
  <tbody>
    ${rungMappings.map(m => `<tr><td>${m.label}</td><td>${m.coilName}</td><td class="mono">${m.inputs}</td><td class="mono">${m.refs}</td><td class="mono">${m.output}</td></tr>`).join('')}
  </tbody>
</table>

<div class="page-break"></div>
<h1>APPENDIX A — TRANSACTION</h1>

<h2>Inputs (${txInputRows.length})</h2>
<table>
  <thead><tr><th>VIN</th><th>TXID</th><th>VOUT</th></tr></thead>
  <tbody>
    ${txInputRows.map(i => `<tr><td>${i.vin}</td><td class="mono">${i.txid}</td><td>${i.vout}</td></tr>`).join('')}
    ${txInputRows.length === 0 ? '<tr><td colspan="3" style="color:#999;text-align:center">No inputs defined</td></tr>' : ''}
  </tbody>
</table>

<h2>Outputs (${txOutputRows.length})</h2>
<table>
  <thead><tr><th>VOUT</th><th>Address / Script</th><th>Amount (sats)</th></tr></thead>
  <tbody>
    ${txOutputRows.map(o => `<tr><td>${o.vout}</td><td class="mono">${o.address}</td><td>${o.amount}</td></tr>`).join('')}
    ${txOutputRows.length === 0 ? '<tr><td colspan="3" style="color:#999;text-align:center">No outputs defined</td></tr>' : ''}
  </tbody>
</table>

<div class="page-break"></div>
<h1>APPENDIX B — JSON</h1>
<div class="json-block">${jsonOutput.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>

<div class="footer">Ladder Script Engine — Bitcoin Ghost</div>

</body></html>`);

    w.document.close();
    setTimeout(() => w.print(), 300);
  }, [rungs, txInputs, txOutputs, jsonOutput, totalBlocks]);

  // Import blocks from fields array (wire format)
  const importBlocksFromFields = useCallback((blocksData) => {
    return (blocksData || []).map(bd => {
      const block = createBlock(bd.type);
      if (bd.inverted) block.inverted = true;
      if (bd.fields) {
        const def = getBlockDef(bd.type);
        let fieldIdx = 0;
        def.fields.forEach(f => {
          if (fieldIdx < bd.fields.length) {
            const fieldData = bd.fields[fieldIdx];
            if (f.dataType === 'NUMERIC' && fieldData.hex) {
              const bytes = fieldData.hex.match(/.{2}/g) || [];
              let val = 0;
              bytes.forEach((b, i) => { val |= parseInt(b, 16) << (i * 8); });
              block.values[f.name] = String(val);
            } else if (f.dataType === 'SCHEME' && fieldData.hex) {
              const schemeRevMap = { '10': 'FALCON512', '11': 'FALCON1024', '12': 'DILITHIUM3' };
              block.values[f.name] = schemeRevMap[fieldData.hex] || '';
            } else if (fieldData.hex) {
              block.values[f.name] = fieldData.hex;
            }
            fieldIdx++;
          }
        });
      }
      return block;
    });
  }, []);

  const handleImport = useCallback(() => {
    const input = prompt('Paste createrungtx JSON (or legacy conditions array):');
    if (!input) return;
    try {
      const data = JSON.parse(input);

      // Detect format: createrungtx has { inputs, outputs } at top level
      if (data.inputs && data.outputs && !Array.isArray(data)) {
        // createrungtx wire format
        const newTxInputs = (data.inputs || []).map(i => ({
          id: uid(), txid: i.txid || '', vout: i.vout || 0, sequence: i.sequence !== undefined ? String(i.sequence) : ''
        }));
        const newTxOutputs = [];
        const newRungs = [];

        (data.outputs || []).forEach((out, oi) => {
          const txOut = { id: uid(), address: out.address || '', amount: Math.round((out.amount || 0) * 100000000) };
          newTxOutputs.push(txOut);

          // Each condition entry is a rung assigned to this output
          (out.conditions || []).forEach((cond, ci) => {
            const rung = createRung();
            rung.label = ci === 0 ? '' : `PATH_${ci}`;
            rung.output.txOutputId = txOut.id;
            // Import coil wire fields
            if (out.coil) {
              rung.output.wireType = out.coil.type || 'UNLOCK';
              rung.output.attestation = out.coil.attestation || 'INLINE';
              rung.output.scheme = out.coil.scheme || 'SCHNORR';
            }
            rung.blocks = importBlocksFromFields(cond.blocks);
            // Assign all inputs to the rung by default
            rung.txInputIds = newTxInputs.map(i => i.id);
            newRungs.push(rung);
          });
        });

        setRungs(newRungs.length > 0 ? newRungs : [createRung()]);
        setTxInputs(newTxInputs.length > 0 ? newTxInputs : [{ id: uid(), txid: '', vout: 0, sequence: '' }]);
        setTxOutputs(newTxOutputs.length > 0 ? newTxOutputs : [{ id: uid(), address: '', amount: 0 }]);
        setLocktime(data.locktime || 0);
      } else {
        // Legacy: array of rungs with blocks
        const arr = Array.isArray(data) ? data : [data];
        const imported = arr.map(rungData => {
          const rung = createRung();
          rung.blocks = importBlocksFromFields(rungData.blocks);
          return rung;
        });
        setRungs(imported.length > 0 ? imported : [createRung()]);
      }

      setSelectedBlockId(null);
      setSelectedCoilId(null);
      setSelectedInputId(null);
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  }, [importBlocksFromFields]);

  // VIEW AS LADDER — convert decoded JSON to builder rungs and switch to build mode
  const handleViewAsLadder = useCallback((decodedJson) => {
    try {
      const result = decodedToBuilderRungs(decodedJson);
      if (!result || result.rungs.length === 0) {
        alert('Could not parse rung structure from this JSON. Try decoding with DECODE LADDER for ladder witness hex.');
        return;
      }
      setRungs(result.rungs);
      if (result.txInputs.length > 0) setTxInputs(result.txInputs);
      if (result.txOutputs.length > 0) setTxOutputs(result.txOutputs);
      setSelectedBlockId(null);
      setSelectedCoilId(null);
      setSelectedInputId(null);
      setMode('build');
    } catch (e) {
      alert('Failed to convert: ' + e.message);
    }
  }, []);

  return (
    <div className={`app ${ladderFullscreen ? 'fullscreen' : ''}`}>
      {/* Header */}
      <div className="header">
        <span className="header-title">LADDER SCRIPT ENGINE</span>
        <div className="header-divider" />
        <div className="mode-tabs">
          <button className={`mode-tab ${mode === 'build' ? 'active' : ''}`} onClick={() => setMode('build')} title={showTooltips ? 'Construct ladder rungs — drag blocks from palette' : undefined}>BUILD</button>
          <button className={`mode-tab ${mode === 'simulate' ? 'active' : ''}`} onClick={() => setMode('simulate')} title={showTooltips ? 'Test rungs — click rung labels to step through, Alt+click blocks to force' : undefined}>SIMULATE</button>
          <button className={`mode-tab ${mode === 'signet' ? 'active' : ''}`} onClick={() => setMode('signet')} title={showTooltips ? 'Submit transactions to Ghost signet via RPC proxy' : undefined} style={mode === 'signet' ? { color: 'var(--green-bright)', borderBottomColor: 'var(--green-bright)' } : {}}>SIGNET</button>
          <button className={`mode-tab ${mode === 'watch' ? 'active' : ''}`} onClick={() => setMode('watch')} title={showTooltips ? 'Live mode — block height auto-increments' : undefined}>WATCH</button>
        </div>
        <div className="header-actions">
          <button className="header-btn primary" onClick={() => setShowExamples(true)} title={showTooltips ? 'Load pre-built example programs' : undefined}>EXAMPLES</button>
          <button className="header-btn" onClick={handleImport} title={showTooltips ? 'Import createrungtx JSON from clipboard' : undefined}>IMPORT</button>
          <button className="header-btn" onClick={handleCopyJson} title={showTooltips ? 'Copy wire-format JSON to clipboard' : undefined}>COPY JSON</button>
          <button className="header-btn" onClick={handlePrint} title={showTooltips ? 'Print ladder diagram' : undefined}>PRINT</button>
        </div>
      </div>

      {/* Main */}
      <div className="main-content">
        {mode === 'signet' ? (
          <div style={{ gridColumn: '1 / -1', overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
            <SignetPanel rungs={rungs} txOutputs={txOutputs} txInputs={txInputs} locktime={locktime} onViewAsLadder={handleViewAsLadder} />
          </div>
        ) : <>
        {isSimMode ? (
          <div className="palette" style={{ opacity: mode === 'watch' && !watchLive ? 1 : 0.3, pointerEvents: 'none' }}>
            {mode === 'watch' && !watchLive ? (
              <div style={{ padding: '12px 8px' }}>
                <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1.5, color: 'var(--amber)', textTransform: 'uppercase', marginBottom: 8, textAlign: 'center' }}>WATCH MODE</div>
                <div style={{ padding: '8px', background: 'rgba(230, 168, 23, 0.1)', border: '1px solid rgba(230, 168, 23, 0.25)', fontSize: 10, color: 'var(--amber)', lineHeight: 1.6 }}>
                  Signet proxy is not available. Live block data requires a ghost-core node running the feature/ladder-script branch.
                </div>
                <div style={{ marginTop: 10, fontSize: 9, color: 'var(--text-dim)', textAlign: 'center', letterSpacing: 0.5, lineHeight: 1.6 }}>
                  Waiting for signet connection...
                </div>
              </div>
            ) : (
              <div style={{ padding: '12px 8px', fontSize: 9, color: 'var(--text-dim)', letterSpacing: 1, textAlign: 'center' }}>PALETTE LOCKED<br/>IN {mode === 'watch' ? 'WATCH' : 'SIMULATOR'} MODE</div>
            )}
          </div>
        ) : (
          <PalettePanel />
        )}

        <LadderView
          rungs={rungs}
          selectedBlock={selectedBlockId}
          selectedCoil={selectedCoilId}
          mode={mode}
          simState={fullSimState}
          onSelectBlock={(id) => { setSelectedBlockId(id); setSelectedCoilId(null); setSelectedInputId(null); setRightTab('properties'); }}
          onSelectCoil={handleSelectCoil}
          onSelectInput={handleSelectInput}
          selectedInput={selectedInputId}
          onDeleteBlock={handleDeleteBlock}
          onDeleteRung={handleDeleteRung}
          onDropBlock={handleDropBlock}
          onAddRung={handleAddRung}
          onAddRungWithBlock={handleAddRungWithBlock}
          onRungLabelChange={handleRungLabelChange}
          onReorderBlock={handleReorderBlock}
          onMoveRung={handleMoveRung}
          onMoveBlockCrossRung={handleMoveBlockCrossRung}
          txOutputs={txOutputs}
          txInputs={txInputs}
          fullscreen={ladderFullscreen}
          onToggleFullscreen={() => setLadderFullscreen(prev => !prev)}
          scanPhase={scanPhase}
          scanStep={scanStep}
          scanResults={scanResults}
          scanSpeed={scanSpeed}
          scanIdx={scanIdx}
          scanTotal={scanSequence.length}
          onScanStart={startScan}
          onScanPause={() => setScanPhase('paused')}
          onScanResume={() => setScanPhase('running')}
          onScanStepFwd={advanceScan}
          onScanStepBack={rewindScan}
          onScanReset={resetScan}
          onScanSpeedChange={setScanSpeed}
          spentRungs={spentRungs}
          forcedBlocks={forcedBlocks}
          onForceBlock={handleForceBlock}
          onExecuteRung={handleExecuteRung}
          onResetSim={handleResetSim}
          onStartScanFrom={startScanFrom}
          simActiveRungId={simActiveRungId}
          simActiveStep={simActiveStep}
          simStepResults={simStepResults}
          onStepBlock={handleStepBlock}
          tips={showTooltips}
          onNameChange={handleNameChange}
          onExpandBlock={(id) => setExpandedBlockId(id)}
          onBlockContextMenu={handleBlockContextMenu}
          renamingBlockId={renamingBlockId}
          onClearRenaming={() => setRenamingBlockId(null)}
          onClear={handleClear}
          onInputContextMenu={handleInputContextMenu}
          onRungChange={handleRungChange}
          renamingInputId={renamingInputId}
          onClearRenamingInput={() => setRenamingInputId(null)}
          onDeselect={handleDeselect}
          onOutputContextMenu={handleOutputContextMenu}
          onJustifyLeft={() => setRungs(prev => prev.map(r => ({
            ...r,
            blocks: r.blocks.map((b, i) => ({ ...b, slot: i }))
          })))}
        />

        <div className="right-panel">
          <div className="panel-tab-bar">
            {!isSimMode && <button className={`panel-tab ${rightTab === 'properties' ? 'active' : ''}`} onClick={() => setRightTab('properties')}>PROPERTIES</button>}
            {!isSimMode && <button className={`panel-tab ${rightTab === 'tx' ? 'active' : ''}`} onClick={() => setRightTab('tx')}>TX</button>}
            {isSimMode && <button className={`panel-tab ${rightTab === 'simulate' ? 'active' : ''}`} onClick={() => setRightTab('simulate')}>CONTEXT</button>}
            <button className={`panel-tab ${rightTab === 'json' ? 'active' : ''}`} onClick={() => setRightTab('json')}>RPC</button>
            <button className={`panel-tab ${rightTab === 'trend' ? 'active' : ''}`} onClick={() => setRightTab('trend')}>TREND</button>
          </div>
          <div className="panel-content">
            {!isSimMode && rightTab === 'properties' && selectedInputId ? (
              <InputPropertiesPanel
                rung={rungs.find(r => r.id === selectedInputId)}
                rungIndex={rungs.findIndex(r => r.id === selectedInputId)}
                onRungChange={handleRungChange}
                txInputs={txInputs}
                allRungs={rungs}
              />
            ) : !isSimMode && rightTab === 'properties' && selectedCoilId ? (
              <CoilPropertiesPanel
                rung={rungs.find(r => r.id === selectedCoilId)}
                rungIndex={rungs.findIndex(r => r.id === selectedCoilId)}
                onChange={handleOutputChange}
                energizedOutputs={energizedOutputs}
                txOutputs={txOutputs}
              />
            ) : !isSimMode && rightTab === 'properties' && (
              <PropertiesPanel block={selectedBlock} onChange={handleBlockChange} rungs={rungs} onExpand={(id) => setExpandedBlockId(id)} />
            )}
            {!isSimMode && rightTab === 'tx' && (
              <TxPanel
                txInputs={txInputs}
                txOutputs={txOutputs}
                txTotals={txTotals}
                onInputChange={(id, field, val) => setTxInputs(prev => prev.map(i => i.id === id ? { ...i, [field]: val } : i))}
                onOutputChange={(id, field, val) => setTxOutputs(prev => prev.map(o => o.id === id ? { ...o, [field]: val } : o))}
                onAddInput={() => setTxInputs(prev => [...prev, { id: uid(), txid: '', vout: 0, sequence: '' }])}
                onAddOutput={() => setTxOutputs(prev => [...prev, { id: uid(), address: '', amount: 0 }])}
                onRemoveInput={(id) => setTxInputs(prev => prev.length > 1 ? prev.filter(i => i.id !== id) : prev)}
                onRemoveOutput={(id) => setTxOutputs(prev => prev.length > 1 ? prev.filter(o => o.id !== id) : prev)}
                locktime={locktime}
                onLocktimeChange={setLocktime}
              />
            )}
            {rightTab === 'simulate' && isSimMode && (
              <SimulationPanel simState={simState} onSimChange={handleSimChange} />
            )}
            {rightTab === 'json' && (
              <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden' }}>
                <div style={{ fontSize: 9, padding: '4px 8px', background: 'var(--bg-tertiary)', borderBottom: '1px solid var(--border)', color: 'var(--text-dim)', letterSpacing: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span>CREATERUNGTX RPC FORMAT</span>
                  {isSimMode && (
                    <span style={{ display: 'flex', gap: 8 }}>
                      <span><span style={{ color: '#00ff88' }}>■</span> EXEC</span>
                      <span><span style={{ color: 'var(--red)' }}>■</span> BLOCK</span>
                      <span><span style={{ color: '#00ff88', opacity: 0.6 }}>◆</span> STEP</span>
                    </span>
                  )}
                </div>
                {(() => {
                  const warnings = [];
                  // Exclude rungs whose coils are internally referenced (named output, outputRefs, or OUTPUT_REF blocks)
                  const referencedNames = new Set();
                  rungs.forEach((r, ri) => {
                    if (r.output.name) referencedNames.add(r.output.name);
                    referencedNames.add(r.label || `R${String(ri).padStart(3, '0')}`);
                  });
                  const isRungReferenced = (rung, ri) => {
                    const rungName = rung.label || `R${String(ri).padStart(3, '0')}`;
                    return rungs.some(other => other.id !== rung.id && (
                      (other.outputRefs || []).some(ref => ref === rungName || ref === rung.output.name) ||
                      other.blocks.some(b => b.type === 'OUTPUT_REF' && b.values?.ref_name && (b.values.ref_name === rungName || b.values.ref_name === rung.output.name))
                    ));
                  };
                  const unassigned = rungs.filter((r, ri) => r.output.type !== 'relay' && (r.output.txOutputId === null || r.output.txOutputId === undefined) && !isRungReferenced(r, ri));
                  if (unassigned.length > 0) warnings.push(`${unassigned.length} rung(s) not assigned to a TX output — will be excluded from wire JSON`);
                  const outRefBlocks = rungs.reduce((c, r) => c + r.blocks.filter(b => b.type === 'OUTPUT_REF').length, 0);
                  if (outRefBlocks > 0) warnings.push(`${outRefBlocks} OUTPUT_REF block(s) stripped — use input refs on the input contact instead`);
                  const definedOutputs = txOutputs.filter(o => o.address || parseInt(o.amount) > 0);
                  const emptyOutputs = definedOutputs.filter(o => {
                    const assigned = rungs.filter(r => r.output.txOutputId === o.id);
                    return assigned.length === 0;
                  });
                  if (emptyOutputs.length > 0) warnings.push(`${emptyOutputs.length} TX output(s) have no rungs assigned — will have empty conditions`);
                  if (warnings.length === 0) return null;
                  return (
                    <div style={{ padding: '4px 8px', background: 'var(--red-dim)', borderBottom: '1px solid var(--red)', fontSize: 9, color: 'var(--red-bright)', lineHeight: 1.6 }}>
                      {warnings.map((w, i) => <div key={i}>⚠ {w}</div>)}
                    </div>
                  );
                })()}
                {isSimMode ? (
                  <HighlightedJson
                    rungs={rungs}
                    txOutputs={txOutputs}
                    txInputs={txInputs}
                    locktime={locktime}
                    spentRungs={spentRungs}
                    simActiveRungId={simActiveRungId}
                    simActiveStep={simActiveStep}
                    simStepResults={simStepResults}
                    scanStep={scanStep}
                    scanResults={scanResults}
                    scanPhase={scanPhase}
                  />
                ) : (
                  <div className="json-output" style={{ flex: 1 }}>{jsonOutput}</div>
                )}
              </div>
            )}
            {rightTab === 'trend' && (
              <TrendChart rungs={rungs} />
            )}
          </div>
        </div>
        </>}
      </div>

      {/* Register Table — hidden in signet and watch modes for more space */}
      {mode !== 'signet' && mode !== 'watch' && <RegisterTable rungs={rungs} simMode={isSimMode} simState={fullSimState} />}

      {/* Status Bar */}
      <div className="status-bar">
        <div className="status-item">
          <div className={`status-dot ${totalBlocks > 0 ? 'green' : 'amber'}`} />
          {rungs.length} RUNGS
        </div>
        <div className="status-item">{totalBlocks} BLOCKS (8/RUNG MAX, 16 RUNGS MAX)</div>
        {isSimMode && (
          <div className="status-item">
            <div className={`status-dot ${energizedCount > 0 ? 'amber' : 'red'}`} />
            {energizedCount} ENERGIZED
          </div>
        )}
        {mode === 'watch' && (
          <div className="status-item">
            <div className={`status-dot ${watchLive ? 'green' : 'amber'}`} />
            {watchLive ? 'SIGNET LIVE' : 'LOCAL'} HEIGHT: {simState.blockHeight}
          </div>
        )}
        {(() => {
          const unassigned = rungs.filter(r => r.output.txOutputId === null || r.output.txOutputId === undefined).length;
          const outRefBlocks = rungs.reduce((c, r) => c + r.blocks.filter(b => b.type === 'OUTPUT_REF').length, 0);
          return (
            <>
              {unassigned > 0 && <div className="status-item" style={{ color: 'var(--red)' }}>{unassigned} RUNG(S) NOT ASSIGNED TO OUTPUT</div>}
              {outRefBlocks > 0 && <div className="status-item" style={{ color: 'var(--amber)' }}>{outRefBlocks} OUT_REF BLOCK(S) — USE INPUT REFS INSTEAD</div>}
            </>
          );
        })()}
        <div className="status-spacer" />
        <button
          className="tooltip-toggle"
          onClick={() => setShowTooltips(prev => !prev)}
          title="Toggle help tooltips"
        >{showTooltips ? '? ON' : '? OFF'}</button>
        <div className="status-item" style={{ color: 'var(--text-dim)' }}>
          GHOST LADDER v1.0
        </div>
      </div>

      {showExamples && (
        <ExamplesModal onClose={() => setShowExamples(false)} onLoad={handleLoadExample} />
      )}
      {expandedBlock && (
        <BlockModal
          block={expandedBlock}
          onChange={handleBlockChange}
          onClose={() => setExpandedBlockId(null)}
          rungs={rungs}
        />
      )}
      {contextMenu && (
        <BlockContextMenu
          x={contextMenu.x}
          y={contextMenu.y}
          block={contextMenu.block}
          onRename={() => {
            setSelectedBlockId(contextMenu.block.id);
            setRenamingBlockId(contextMenu.block.id);
          }}
          onExpand={() => setExpandedBlockId(contextMenu.block.id)}
          onToggleInvert={() => handleBlockChange(contextMenu.block.id, '__inverted', !contextMenu.block.inverted)}
          onDuplicate={() => handleDuplicateBlock(contextMenu.rungId, contextMenu.block.id)}
          onDelete={() => handleDeleteBlock(contextMenu.rungId, contextMenu.block.id)}
          onClose={() => setContextMenu(null)}
        />
      )}
      {inputContextMenu && (
        <InputContextMenu
          x={inputContextMenu.x}
          y={inputContextMenu.y}
          rung={inputContextMenu.rung}
          onRename={() => {
            setSelectedInputId(inputContextMenu.rung.id);
            setRenamingInputId(inputContextMenu.rung.id);
          }}
          onExpand={() => setExpandedInputId(inputContextMenu.rung.id)}
          onClear={() => {
            handleRungChange(inputContextMenu.rung.id, 'txInputIds', []);
            handleRungChange(inputContextMenu.rung.id, 'outputRefs', []);
            handleRungChange(inputContextMenu.rung.id, 'inputName', '');
          }}
          onClose={() => setInputContextMenu(null)}
        />
      )}
      {expandedInputId && (() => {
        const ri = rungs.findIndex(r => r.id === expandedInputId);
        const rung = ri >= 0 ? rungs[ri] : null;
        return rung ? (
          <InputModal
            rung={rung}
            rungIndex={ri}
            onRungChange={handleRungChange}
            txInputs={txInputs}
            allRungs={rungs}
            onClose={() => setExpandedInputId(null)}
          />
        ) : null;
      })()}
      {outputContextMenu && (
        <OutputContextMenu
          x={outputContextMenu.x}
          y={outputContextMenu.y}
          rung={outputContextMenu.rung}
          onRename={() => {
            setSelectedCoilId(outputContextMenu.rung.id);
          }}
          onExpand={() => setExpandedOutputId(outputContextMenu.rung.id)}
          onClear={() => {
            handleOutputChange(outputContextMenu.rung.id, 'name', '');
            handleOutputChange(outputContextMenu.rung.id, 'txOutputId', null);
          }}
          onClose={() => setOutputContextMenu(null)}
        />
      )}
      {expandedOutputId && (() => {
        const ri = rungs.findIndex(r => r.id === expandedOutputId);
        const rung = ri >= 0 ? rungs[ri] : null;
        return rung ? (
          <OutputModal
            rung={rung}
            rungIndex={ri}
            onChange={handleOutputChange}
            txOutputs={txOutputs}
            onClose={() => setExpandedOutputId(null)}
          />
        ) : null;
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
