<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADDER SCRIPT ENGINE</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


/* ═══ RESET + VARIABLES ═══ */
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f8f8;
  --bg-tertiary: #f0f0f0;
  --bg-panel: #ffffff;
  --bg-hover: #f0f0f0;
  --bg-active: #e8e8e8;
  --border: #e0e0e0;
  --border-light: #d0d0d0;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-dim: #999999;
  --amber: #d4950c;
  --amber-dim: #b8860b;
  --amber-glow: #d4950c20;
  --amber-bright: #e6a817;
  --green: #27ae60;
  --green-dim: #229954;
  --green-bright: #2ecc71;
  --red: #c0392b;
  --red-dim: #a93226;
  --red-bright: #e74c3c;
  --blue: #2980b9;
  --blue-dim: #21618c;
  --cyan: #2980b9;
  --rail-color: #cccccc;
  --rail-energized: #d4950c;
  --wire-color: #cccccc;
  --wire-energized: #d4950c;
  --contact-bg: #f5f5f5;
  --contact-energized: #fff3cd;
  --coil-bg: #f5f5f5;
  --coil-energized: #fff3cd;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;
  --font-display: 'Share Tech Mono', monospace;
}

html, body, #root { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-primary);
  background: var(--bg-primary);
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* App Layout */

/* ═══ LAYOUT ═══ */
.app {
  display: grid;
  grid-template-rows: 36px 1fr auto 24px;
  height: 100vh;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  gap: 16px;
  user-select: none;
}

.header-title {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--amber);
  letter-spacing: 2px;
  white-space: nowrap;
}

.header-divider {
  width: 1px;
  height: 18px;
  background: var(--border);
}


/* ═══ TABS ═══ */
.mode-tabs {
  display: flex;
  gap: 0;
  height: 100%;
}

.mode-tab {
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: color 0.15s, border-color 0.15s;
}
.mode-tab:hover { color: var(--text-primary); }
.mode-tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.header-btn {
  padding: 4px 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.header-btn:hover {
  color: var(--text-primary);
  border-color: var(--border-light);
  background: var(--bg-hover);
}
.header-btn.primary {
  color: var(--amber);
  border-color: var(--amber-dim);
}
.header-btn.primary:hover {
  background: var(--amber-glow);
}

/* Main Content */
.main-content {
  display: grid;
  grid-template-columns: 162px 1fr auto;
  overflow: hidden;
}

/* Palette */

/* ═══ PALETTE ═══ */
.palette {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  user-select: none;
}

.palette-group {
  border-bottom: 1px solid var(--border);
}

.palette-group-header {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  cursor: pointer;
}
.palette-group-header:hover {
  color: var(--text-primary);
}
.palette-group-header .arrow {
  margin-right: 6px;
  font-size: 8px;
  transition: transform 0.15s;
}
.palette-group-header .arrow.collapsed {
  transform: rotate(-90deg);
}

.palette-item {
  display: flex;
  align-items: center;
  padding: 4px 10px 4px 22px;
  font-size: 11px;
  color: var(--text-primary);
  cursor: grab;
  transition: background 0.1s;
  gap: 8px;
}
.palette-item:hover {
  background: var(--bg-hover);
}
.palette-item:active {
  cursor: grabbing;
}
.palette-item .dot {
  width: 6px;
  height: 6px;
  flex-shrink: 0;
}

/* Ladder View */
.ladder-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

.ladder-toolbar {
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 30px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}

.ladder-toolbar-btn {
  padding: 3px 8px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  background: none;
  border: 1px solid var(--border);
  cursor: pointer;
  letter-spacing: 0.5px;
}
.ladder-toolbar-btn:hover {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

/* Rung */
.rung {
  position: relative;
  margin: 0 16px 6px 16px;
  min-height: 52px;
  transition: border-color 0.1s;
  border: 1px solid transparent;
}
.rung.drag-target-rung {
  border-color: var(--amber);
  border-radius: 3px;
}

.rung-number {
  position: absolute;
  left: -2px;
  top: 0;
  font-size: 9px;
  font-family: var(--font-display);
  color: var(--text-dim);
  letter-spacing: 1px;
  width: 44px;
  text-align: right;
  line-height: 44px;
  cursor: grab;
  user-select: none;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rung-number:active { cursor: grabbing; }
.rung-number:hover {
  color: var(--amber-dim);
}
.rung-number-sim {
  cursor: pointer;
  color: var(--text-secondary);
}
.rung-number-sim:hover {
  color: var(--amber) !important;
  text-shadow: 0 0 6px rgba(255, 170, 0, 0.4);
}
.rung-number-input {
  position: absolute;
  left: -2px;
  top: 10px;
  width: 44px;
  font-size: 9px;
  font-family: var(--font-display);
  color: var(--amber);
  background: var(--bg-primary);
  border: 1px solid var(--amber-dim);
  padding: 2px 3px;
  outline: none;
  text-align: right;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}


.rung-content {
  display: flex;
  align-items: center;
  margin-left: 44px;
  margin-right: 8px;
  height: 44px;
  position: relative;
}

.rung-slots {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  flex: 1;
  height: 44px;
  align-items: center;
}

.rung-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  position: relative;
}

.rung-slot-wire {
  width: 100%;
  height: 2px;
  background: var(--wire-color);
  transition: background 0.3s;
}
.rung-slot-wire.energized {
  background: var(--wire-energized);
  box-shadow: 0 0 4px var(--amber-glow);
}
.rung.stepping .rung-slot-wire.energized {
  background: #00ff88;
  box-shadow: 0 0 6px #00ff8860;
}

.rung-slot-drop {
  position: absolute;
  inset: 0;
  z-index: 2;
}
.rung-slot-drop.drag-over {
  background: var(--amber-glow);
  outline: 1px dashed var(--amber-dim);
  outline-offset: -1px;
}

/* Power rails */
.rail-left, .rail-right {
  width: 3px;
  height: 44px;
  flex-shrink: 0;
  transition: background 0.3s;
}
.rail-left { background: var(--rail-color); }
.rail-right { background: var(--rail-color); }
.rung.energized .rail-left,
.rung.energized .rail-right {
  background: var(--rail-energized);
  box-shadow: 0 0 6px var(--amber-glow);
}

/* Wire segments */
.wire-segment {
  height: 2px;
  min-width: 8px;
  flex-shrink: 0;
  width: 8px;
  transition: background 0.3s;
  background: var(--wire-color);
}
.wire-segment.energized {
  background: var(--wire-energized);
  box-shadow: 0 0 4px var(--amber-glow);
}

/* Contact (block) */
.contact {
  display: flex;
  align-items: center;
  height: 34px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}

.contact-bracket-left,
.contact-bracket-right {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--wire-color);
  line-height: 34px;
  transition: color 0.3s;
}
.contact.energized .contact-bracket-left,
.contact.energized .contact-bracket-right {
  color: var(--wire-energized);
}

.contact-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 72px;
  height: 34px;
  padding: 0 6px;
  background: var(--contact-bg);
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.contact.energized .contact-body {
  background: var(--contact-energized);
  border-color: var(--amber-dim);
  box-shadow: inset 0 0 12px var(--amber-glow);
}
.contact.fault .contact-body {
  background: var(--red-dim);
  border-color: var(--red);
}
.contact.selected .contact-body {
  border-color: #1a1a1a;
  box-shadow: 0 0 0 1px #1a1a1a, 0 0 8px rgba(0,0,0,0.2);
}
.contact.selected .contact-type {
  color: #1a1a1a !important;
}
.contact.selected .contact-bracket-left,
.contact.selected .contact-bracket-right {
  color: #1a1a1a !important;
}
.contact:hover .contact-body {
  border-color: var(--border-light);
}

.contact-type {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: color 0.3s;
}
.contact.energized .contact-type {
  color: var(--amber);
}
.contact.fault .contact-type {
  color: var(--red-bright);
}

.contact-value {
  font-size: 8px;
  color: var(--text-dim);
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.contact.energized .contact-value {
  color: var(--amber-dim);
}

.contact-inverted {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}
.contact-inverted::before {
  content: '';
  position: absolute;
  top: 3px;
  bottom: 3px;
  left: 50%;
  width: 0;
  border-left: 2px solid var(--red);
  transform: translateX(-50%) rotate(-45deg);
  transform-origin: center center;
}
.contact-inverted::after {
  content: 'NOT';
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 6px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.5px;
  line-height: 1;
}

/* Coil (output) */
.coil {
  display: flex;
  align-items: center;
  height: 34px;
  flex-shrink: 0;
  gap: 6px;
  min-width: 40px;
}
.coil-symbol {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--wire-color);
  transition: color 0.3s;
  flex-shrink: 0;
}
.coil.energized .coil-symbol {
  color: var(--amber);
  text-shadow: 0 0 8px var(--amber-glow);
}
.coil.selected {
  outline: 1px solid #1a1a1a;
  outline-offset: 2px;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
}
.coil.selected .coil-symbol {
  color: #1a1a1a !important;
}
.coil.selected .coil-name {
  color: #1a1a1a !important;
}
.coil:hover .coil-symbol {
  color: var(--text-primary);
}
.coil.has-tx-output .coil-symbol {
  color: var(--cyan);
}
.coil.has-tx-output .coil-name {
  color: var(--cyan);
}
.coil.has-tx-output .coil-tx-info {
  color: var(--cyan);
}
.coil.has-ref .coil-symbol {
  color: var(--green);
}
.coil.has-ref .coil-name {
  color: var(--green);
}
.coil.relay-coil {
  border: 1px dashed var(--amber-dim);
  background: #fff8e1;
}
.coil.relay-coil .coil-symbol {
  color: var(--amber);
}
.coil.relay-coil .coil-name {
  color: var(--amber-dim);
}
.coil.relay-coil.energized {
  border-color: var(--amber);
  background: #fff3cd;
}
.coil.relay-coil.energized .coil-symbol {
  color: var(--amber-bright);
  text-shadow: 0 0 10px var(--amber-glow);
}
.coil-warn {
  position: absolute;
  top: -6px;
  right: 6px;
  font-size: 9px;
  color: var(--amber);
  line-height: 1;
  z-index: 3;
  text-shadow: 0 0 4px var(--bg-primary);
}
.coil-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.coil-name {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
}
.coil.energized .coil-name {
  color: var(--amber-bright);
}
.coil-tx-info {
  font-size: 7px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
  letter-spacing: 0.3px;
}
.coil.energized .coil-tx-info {
  color: var(--green-bright);
}

/* Input contact (left side of rung --same shape as condition blocks) */
.input-contact {
  display: flex;
  align-items: center;
  height: 34px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}
.input-contact > .contact-bracket-left,
.input-contact > .contact-bracket-right {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--wire-color);
  line-height: 34px;
  transition: color 0.3s;
}
.input-contact-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  height: 34px;
  padding: 0 4px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border);
  transition: all 0.3s;
}
.input-contact-body .contact-type {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}
.input-contact-body .contact-value {
  font-size: 7px;
  color: var(--text-dim);
  margin-top: 1px;
}
/* Warning badge for unassigned inputs */
.input-warn {
  position: absolute;
  top: -4px;
  right: -2px;
  font-size: 9px;
  color: var(--amber);
  line-height: 1;
  z-index: 3;
  text-shadow: 0 0 4px var(--bg-primary);
}
.input-contact-note {
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 7px;
  color: var(--cyan);
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
}
.input-contact-note-input {
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  background: var(--bg-primary);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 8px;
  padding: 1px 4px;
  text-align: center;
  outline: none;
  z-index: 20;
}
/* Energized state */
.input-contact.energized > .contact-bracket-left,
.input-contact.energized > .contact-bracket-right {
  color: var(--wire-energized);
}
.input-contact.energized .input-contact-body {
  background: var(--contact-energized);
  border-color: var(--amber-dim);
  border-top-color: var(--amber);
  box-shadow: inset 0 0 12px var(--amber-glow);
}
.input-contact.energized .input-contact-body .contact-type {
  color: var(--amber);
}
/* Step-through green override for input contact */
.rung.stepping .input-contact.energized > .contact-bracket-left,
.rung.stepping .input-contact.energized > .contact-bracket-right {
  color: #00ff88;
}
.rung.stepping .input-contact.energized .input-contact-body {
  background: #00ff8810;
  border-color: #00ff8840;
  border-top-color: #00ff88;
  box-shadow: inset 0 0 12px #00ff8815;
}
.rung.stepping .input-contact.energized .input-contact-body .contact-type {
  color: #00ff88;
}
/* When inputs are assigned: cyan accent */
.input-contact.has-inputs > .contact-bracket-left,
.input-contact.has-inputs > .contact-bracket-right {
  color: var(--cyan);
}
.input-contact.has-inputs .input-contact-body {
  border-top-color: var(--cyan);
  border-color: var(--cyan);
  border-width: 1px;
  border-top-width: 2px;
}
.input-contact.has-inputs .input-contact-body .contact-type {
  color: var(--cyan);
}
.input-contact.has-inputs .input-contact-body .contact-value {
  color: var(--cyan);
}
.input-contact.selected .input-contact-body {
  border-color: #1a1a1a;
  box-shadow: 0 0 0 1px #1a1a1a, 0 0 8px rgba(0,0,0,0.2);
}
.input-contact.selected .input-contact-body .contact-type {
  color: #1a1a1a !important;
}
.input-contact:hover .input-contact-body {
  border-color: var(--border-light);
}

/* Drop zone (legacy, replaced by slot-based drops) */

.add-rung-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px 60px;
  padding: 6px;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.add-rung-btn:hover {
  border-color: var(--amber-dim);
  color: var(--amber-dim);
  background: var(--amber-glow);
}

/* Right Panel */
.right-panel {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 200px;
  position: relative;
}
.right-panel-resize {
  position: absolute;
  left: -3px;
  top: 0;
  bottom: 0;
  width: 6px;
  cursor: col-resize;
  z-index: 10;
}
.right-panel-resize:hover,
.right-panel-resize.dragging {
  background: var(--amber);
  opacity: 0.3;
}

.panel-tab-bar {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-tab {
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font-mono);
}
.panel-tab:hover { color: var(--text-primary); }
.panel-tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px;
  word-break: break-word;
}

/* Properties */
.prop-section {
  margin-bottom: 12px;
}
.prop-section-title {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.prop-row {
  display: flex;

  margin-bottom: 4px;
  gap: 8px;
}
.prop-label {
  font-size: 10px;
  color: var(--text-secondary);
  width: 70px;
  flex-shrink: 0;
}
.prop-input {
  flex: 1;
  padding: 3px 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  outline: none;
}
.prop-input:focus {
  border-color: var(--amber-dim);
}
.prop-input::placeholder {
  color: var(--text-dim);
}

.prop-select {
  flex: 1;
  padding: 3px 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  outline: none;

}

.prop-checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.prop-checkbox-row label {
  font-size: 10px;
  color: var(--text-secondary);
  cursor: pointer;
}

/* JSON Output */

/* ═══ JSON VIEWER ═══ */
.json-output {
  flex: 1;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  padding: 8px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--green-bright);
  white-space: pre-wrap;
  word-break: break-all;
  overflow-y: auto;
  line-height: 1.5;
}
/* Highlighted JSON --line-level annotations */
.json-highlighted .jhl-line {
  display: flex;
  line-height: 1.6;
  transition: background 0.2s, color 0.2s;
}
.json-highlighted .jhl-gutter {
  width: 12px;
  flex-shrink: 0;
  color: #00ff88;
  text-align: center;
  user-select: none;
}
.json-highlighted .jhl-code {
  flex: 1;
  white-space: pre;
}
/* Neutral --dim default */
.json-highlighted .jhl-line { color: var(--text-dim); }
/* Executed output --green text */
.json-highlighted .jhl-executed { color: #00ff88; }
.json-highlighted .jhl-executed .jhl-gutter { color: #00ff8860; }
/* Blocked output --red, dim */
.json-highlighted .jhl-blocked { color: var(--red); opacity: 0.4; }
/* Active context --slightly brighter than neutral */
.json-highlighted .jhl-active-context { color: var(--text-secondary); }
/* Passed block --bright green */
.json-highlighted .jhl-passed { color: #00ff88; background: #00ff8808; }
/* Failed block --red */
.json-highlighted .jhl-failed { color: var(--red); background: #f8514910; }
/* Cursor --current block, pulsing */
.json-highlighted .jhl-cursor {
  color: #1a1a1a;
  background: #00ff8818;
  animation: jsonCursorPulse 1s ease-in-out infinite;
}
.json-highlighted .jhl-cursor .jhl-gutter {
  color: #00ff88;
  animation: jsonCursorPulse 1s ease-in-out infinite;
}
@keyframes jsonCursorPulse {
  0%, 100% { background: #00ff8818; }
  50% { background: #00ff8830; }
}

/* Register Table */
.register-area {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  max-height: 200px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.register-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 12px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}
.register-header-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.register-header-toggle {
  font-size: 8px;
  color: var(--text-dim);
}

.register-scroll {
  overflow-y: auto;
  flex: 1;
}

.register-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 10px;
}
.register-table th {
  padding: 3px 10px;
  text-align: left;
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1;
}
.register-table td {
  padding: 3px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
  white-space: nowrap;
}
.register-table tr:hover td {
  background: var(--bg-hover);
}
.register-table .tag { color: var(--text-primary); font-weight: 500; }
.register-table .status-on {
  color: var(--amber);
}
.register-table .status-on::before {
  content: '■';
  margin-right: 4px;
}
.register-table .status-off {
  color: var(--text-dim);
}
.register-table .status-off::before {
  content: '░';
  margin-right: 4px;
}
.register-table .status-fault {
  color: var(--red);
}
.register-table .status-fault::before {
  content: '▓';
  margin-right: 4px;
}

/* Simulation Controls */
.sim-controls {
  padding: 10px;
}
.sim-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.sim-label {
  font-size: 10px;
  color: var(--text-secondary);
  width: 90px;
  flex-shrink: 0;
}
.sim-toggle {
  width: 32px;
  height: 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}
.sim-toggle::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 2px;
  width: 10px;
  height: 10px;
  background: var(--text-dim);
  transition: all 0.15s;
}
.sim-toggle.on::after {
  left: 18px;
  background: var(--amber);
  box-shadow: 0 0 4px var(--amber-glow);
}
.sim-toggle.on {
  border-color: var(--amber-dim);
}
.sim-input {
  flex: 1;
  padding: 2px 6px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  outline: none;
}
.sim-input:focus { border-color: var(--amber-dim); }

/* Status Bar */
.status-bar {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 0 12px;
  gap: 16px;
  font-size: 10px;
  color: var(--text-secondary);
  user-select: none;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.status-dot {
  width: 6px;
  height: 6px;
}
.status-dot.green { background: var(--green); }
.status-dot.amber { background: var(--amber); }
.status-dot.red { background: var(--red); }
.status-spacer { flex: 1; }
.tooltip-toggle {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  background: none;
  border: 1px solid var(--border);
  padding: 1px 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tooltip-toggle:hover {
  color: var(--amber);
  border-color: var(--amber-dim);
}

/* Simulation power flow animation */
@keyframes powerPulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}
.rung.energized .wire-segment.energized,
.rung.energized .contact.energized .contact-body {
  animation: powerPulse 2s ease-in-out infinite;
}

/* Scan animation --green highlight for active evaluation point */
@keyframes scanPulse {
  0% { box-shadow: inset 0 0 8px #00ff8840, 0 0 6px #00ff8830; }
  50% { box-shadow: inset 0 0 16px #00ff8880, 0 0 12px #00ff8860; }
  100% { box-shadow: inset 0 0 8px #00ff8840, 0 0 6px #00ff8830; }
}
@keyframes scanRungPulse {
  0% { box-shadow: inset 0 0 20px #00ff8810; }
  50% { box-shadow: inset 0 0 30px #00ff8820; }
  100% { box-shadow: inset 0 0 20px #00ff8810; }
}

.contact.scan-active .contact-body {
  border-color: #00ff88 !important;
  background: #00ff8818 !important;
  animation: scanPulse 0.8s ease-in-out infinite;
}
.contact.scan-active .contact-type {
  color: #00ff88 !important;
}
.contact.scan-active .contact-bracket-left,
.contact.scan-active .contact-bracket-right {
  color: #00ff88 !important;
}
.rung.scan-active-rung {
  background: #00ff8808;
  animation: scanRungPulse 0.8s ease-in-out infinite;
}
.rung.scan-active-rung .rail-left,
.rung.scan-active-rung .rail-right {
  background: #00ff8880;
  box-shadow: 0 0 6px #00ff8840;
}
/* Blocks not yet scanned are dimmed */
.contact.scan-pending .contact-body {
  opacity: 0.35;
}
.contact.scan-pending .contact-bracket-left,
.contact.scan-pending .contact-bracket-right {
  opacity: 0.35;
}
/* Scanned and satisfied = bright green glow */
.contact.scan-satisfied .contact-body {
  border-color: #00ff88aa !important;
  background: #00ff8815 !important;
  box-shadow: inset 0 0 8px #00ff8830;
}
.contact.scan-satisfied .contact-type {
  color: #00ff88 !important;
}
.contact.scan-satisfied .contact-bracket-left,
.contact.scan-satisfied .contact-bracket-right {
  color: #00ff8880 !important;
}
/* Scanned and unsatisfied = dim red */
.contact.scan-failed .contact-body {
  border-color: var(--red) !important;
  background: var(--red-dim) !important;
  box-shadow: inset 0 0 8px #f8514920;
}
.contact.scan-failed .contact-type {
  color: var(--red-bright) !important;
}
.contact.scan-failed .contact-bracket-left,
.contact.scan-failed .contact-bracket-right {
  color: var(--red) !important;
}
/* Rung result indicators */
.rung.scan-rung-pass .rail-left,
.rung.scan-rung-pass .rail-right {
  background: #00ff88;
  box-shadow: 0 0 8px #00ff8860;
}
.rung.scan-rung-fail .rail-left,
.rung.scan-rung-fail .rail-right {
  background: var(--red);
  box-shadow: 0 0 6px #f8514940;
}
.rung.scan-rung-spent {
  opacity: 0.3;
}
.rung.scan-rung-spent .rail-left,
.rung.scan-rung-spent .rail-right {
  background: var(--text-secondary);
}
/* Step-through mode */
.rung.stepping .rail-left {
  background: #00ff88;
  box-shadow: 0 0 8px #00ff8860;
}
.rung.step-complete .rail-left,
.rung.step-complete .rail-right {
  background: #00ff88;
  box-shadow: 0 0 8px #00ff8860;
}
.contact.step-next .contact-body {
  border-color: #00ff88 !important;
  animation: stepPulse 1s ease-in-out infinite;
  cursor: pointer !important;
}
.contact.step-next .contact-type {
  color: #00ff88 !important;
}
.contact.step-next .contact-bracket-left,
.contact.step-next .contact-bracket-right {
  color: #00ff88 !important;
}
.contact.step-passed .contact-body {
  border-color: #00ff88 !important;
  background: #00ff8815 !important;
}
.contact.step-passed .contact-type { color: #00ff88 !important; }
.contact.step-passed .contact-bracket-left,
.contact.step-passed .contact-bracket-right { color: #00ff8880 !important; }
.contact.step-failed .contact-body {
  border-color: var(--red) !important;
  background: var(--red-dim) !important;
}
.contact.step-failed .contact-type { color: var(--red) !important; }
.coil.step-complete .coil-symbol {
  color: #00ff88 !important;
  text-shadow: 0 0 8px #00ff8860;
}
@keyframes stepPulse {
  0%, 100% { box-shadow: 0 0 0 1px #00ff8840; }
  50% { box-shadow: 0 0 0 2px #00ff88, 0 0 12px #00ff8840; }
}

/* Input contact scanning */
.input-contact.scan-active .input-contact-body {
  border-color: #00ff88 !important;
  background: #00ff8818 !important;
  animation: scanPulse 0.8s ease-in-out infinite;
}
.input-contact.scan-active .input-contact-body .contact-type {
  color: #00ff88 !important;
}
/* Coil scanning */
.coil.scan-active .coil-symbol {
  color: #00ff88 !important;
  text-shadow: 0 0 12px #00ff8880;
}
.coil.scan-pass .coil-symbol {
  color: #00ff88 !important;
  text-shadow: 0 0 8px #00ff8860;
}
.coil.scan-fail .coil-symbol {
  color: var(--red-bright) !important;
}

/* Scan controls bar */
.scan-bar {
  display: flex;
  align-items: center;
  padding: 4px 12px;
  gap: 6px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.scan-btn {
  width: 26px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  cursor: pointer;
  padding: 0;
  transition: all 0.15s;
}
.scan-btn:hover {

}

.scan-btn:disabled {

.scan-divider {

.scan-label {

.scan-pos {

}
.scan-speed-control {
  display: flex;
  align-items: center;

}
.scan-speed-slider {
  width: 60px;
  height: 4px;
  -webkit-appearance: none;

  background: var(--border);

  cursor: pointer;

.scan-speed-slider::-webkit-slider-thumb {

}
.scan-speed-label {

}

/* Forced block indicator */
.contact.forced-on .contact-body {
  border-color: #00ff88 !important;
  background: #00ff8818 !important;
  box-shadow: inset 0 0 8px #00ff8830;
}
.contact.forced-on .contact-type { color: #00ff88 !important; }
.contact.forced-on .contact-bracket-left,
.contact.forced-on .contact-bracket-right { color: #00ff8880 !important; }
.contact.forced-off .contact-body {
  border-color: var(--red) !important;
  background: var(--red-dim) !important;
  box-shadow: inset 0 0 8px #f8514920;
}
.contact.forced-off .contact-type { color: var(--red-bright) !important; }
.contact.forced-off .contact-bracket-left,
.contact.forced-off .contact-bracket-right { color: var(--red) !important; }
.force-badge {
  position: absolute;
  top: -6px;
  left: -2px;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 0 3px;
  line-height: 12px;
  z-index: 5;
  text-shadow: 0 0 4px var(--bg-primary);
}
.force-badge.on { color: #00ff88; }
.force-badge.off { color: var(--red-bright); }

/* Spent rung overlay */
.rung.spent {
  pointer-events: none;
}
/* Executed path --green, full visibility */
.rung.spent-executed {
  opacity: 0.75;
}
.rung.spent-executed .rail-left,
.rung.spent-executed .rail-right {
  background: #00ff88;
  box-shadow: 0 0 6px #00ff8840;
}
.rung.spent-executed .contact-body {
  border-color: #00ff8860 !important;
  background: #00ff8810 !important;
}
.rung.spent-executed .contact-type { color: #00ff88 !important; }
.rung.spent-executed .contact-bracket-left,
.rung.spent-executed .contact-bracket-right { color: #00ff8880 !important; }
.rung.spent-executed .input-contact-body {
  border-color: #00ff8860 !important;
  background: #00ff8810 !important;
}
.rung.spent-executed .input-contact .contact-type { color: #00ff88 !important; }
.rung.spent-executed .coil .coil-symbol { color: #00ff88 !important; }
.rung.spent-executed .rung-slot-wire { background: #00ff88 !important; }
.rung.spent-executed::after {
  content: 'EXECUTED';
  position: absolute;
  right: 20px;
  bottom: -14px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #00ff88;
  z-index: 10;
  pointer-events: none;
}
/* Blocked path --red, dimmed */
.rung.spent-blocked {
  opacity: 0.4;
}
.rung.spent-blocked .rail-left,
.rung.spent-blocked .rail-right {
  background: var(--red);
  box-shadow: 0 0 4px #f8514930;
}
.rung.spent-blocked .contact-body {
  border-color: #f8514940 !important;
  background: #f8514910 !important;
}
.rung.spent-blocked .contact-type { color: var(--red) !important; }
.rung.spent-blocked .contact-bracket-left,
.rung.spent-blocked .contact-bracket-right { color: #f8514960 !important; }
.rung.spent-blocked .input-contact-body {
  border-color: #f8514940 !important;
  background: #f8514910 !important;
}
.rung.spent-blocked .input-contact .contact-type { color: var(--red) !important; }
.rung.spent-blocked .coil .coil-symbol { color: var(--red) !important; }
.rung.spent-blocked .rung-slot-wire { background: var(--red) !important; }
.rung.spent-blocked::after {
  content: 'BLOCKED';
  position: absolute;
  right: 20px;
  bottom: -14px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--red);
  z-index: 10;
  pointer-events: none;

  left: 50%;

  font-weight: 700;
  letter-spacing: 1px;
  color: #00ff88;
  background: var(--bg-primary);
  border: 1px solid #00ff8880;
  padding: 1px 6px;
  cursor: pointer;
  white-space: nowrap;
  z-index: 5;
  transition: all 0.15s;
}
.coil-execute:hover {
  background: #00ff8820;
  border-color: #00ff88;
  box-shadow: 0 0 6px #00ff8840;
}
.coil-execute-dim {
  color: var(--amber);
  border-color: var(--amber-dim);
  opacity: 0.6;
}
.coil-execute-dim:hover {
  background: rgba(255, 170, 0, 0.12);
  border-color: var(--amber);
  color: var(--amber);
  opacity: 1;
  box-shadow: 0 0 6px rgba(255, 170, 0, 0.3);

function uid() { return ++_id; }

// Block types that support inner conditions (script-hash legacy blocks)
const INNER_CONDITION_TYPES = new Set(['P2SH_LEGACY', 'P2WSH_LEGACY', 'P2TR_SCRIPT_LEGACY']);
// Block types allowed as inner conditions (no recursion, no complex compound types)
const ALLOWED_INNER_TYPES = ['SIG', 'MULTISIG', 'CSV', 'CLTV', 'CSV_TIME', 'CLTV_TIME', 'TIMELOCKED_SIG', 'CLTV_SIG'];

function createBlock(type) {
  const def = getBlockDef(type);
  const values = {};
  def.fields.forEach(f => { values[f.name] = ''; });
  const block = { id: uid(), type, values, inverted: false, name: '' };
  if (INNER_CONDITION_TYPES.has(type)) block.innerBlocks = [];
  return block;
}

function createRung() {
  return { id: uid(), label: '', blocks: [], output: { name: '', type: 'standard', txOutputId: null, wireType: 'UNLOCK', attestation: 'INLINE', scheme: 'SCHNORR' }, txInputIds: [], outputRefs: [], inputName: '' };
}

function rungDisplayName(rung, index) {

}

const BlockRegistry = {};
Object.entries(ALL_BLOCK_DEFS).forEach(([type, def]) => {
  const family = BLOCK_FAMILIES.find(f => f.blocks.some(b => b.type === type));
  BlockRegistry[type] = {
    ...def,
    family: family?.name || 'INTERNAL',
    evaluate: () => 'satisfied',

  };
});

// ─── Simulation evaluate methods ───
// Each returns 'satisfied' | 'unsatisfied' | 'unknown'
// Forced overrides and inversion handled by evaluateBlock() wrapper

BlockRegistry.OUTPUT_REF.evaluate = (block, simState) => {
  const refName = (block.values.ref_name || '').trim().toUpperCase();
  if (refName && simState.energizedOutputs?.has(refName)) return 'satisfied';
  if (refName && simState.energizedRungNums?.has(refName)) return 'satisfied';
  return 'unsatisfied';
};

BlockRegistry.SIG.evaluate = (block, simState) =>
  simState.availableKeys?.has(block.values.pubkey) ? 'satisfied' : 'unsatisfied';

BlockRegistry.MULTISIG.evaluate = (block, simState) => {
  const threshold = parseInt(block.values.threshold) || 0;
  const keys = (block.values.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
  const available = keys.filter(k => simState.availableKeys?.has(k)).length;
  return available >= threshold ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.ADAPTOR_SIG.evaluate = (block, simState) =>
  simState.availableKeys?.has(block.values.signing_key) ? 'satisfied' : 'unsatisfied';

BlockRegistry.MUSIG_THRESHOLD.evaluate = (block, simState) => {
  const keyOk = simState.availableKeys?.has(block.values.agg_pubkey);
  const m = parseInt(block.values.threshold) || 0;
  const n = parseInt(block.values.group_size) || 0;
  return (keyOk && m >= 1 && n >= m) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.KEY_REF_SIG.evaluate = () => 'satisfied';

BlockRegistry.CSV.evaluate = (block, simState) => {
  const required = parseInt(block.values.blocks) || 0;
  return (simState.csvBlocks || 0) >= required ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.CSV_TIME.evaluate = (block, simState) => {
  const required = parseInt(block.values.seconds) || 0;
  return (simState.csvSeconds || 0) >= required ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.CLTV.evaluate = (block, simState) => {
  const target = parseInt(block.values.height) || 0;
  return (simState.blockHeight || 0) >= target ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.CLTV_TIME.evaluate = (block, simState) => {
  const target = parseInt(block.values.timestamp) || 0;
  return (simState.medianTime || 0) >= target ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.TAGGED_HASH.evaluate = (block, simState) =>
  simState.knownPreimages?.has(block.values.hash) ? 'satisfied' : 'unsatisfied';

BlockRegistry.HASH_GUARDED.evaluate = (block, simState) =>
  block.values.preimage ? 'satisfied' : (simState.knownPreimages?.has(block.values.hash) ? 'satisfied' : 'unsatisfied');

BlockRegistry.AMOUNT_LOCK.evaluate = (block, simState) => {
  const min = parseInt(block.values.min) || 0;
  const max = parseInt(block.values.max) || Infinity;
  const amt = simState.inputAmount || 0;
  return (amt >= min && amt <= max) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.HYSTERESIS_FEE.evaluate = (block, simState) => {
  const high = parseInt(block.values.high_sat_vb) || 0;
  const low = parseInt(block.values.low_sat_vb) || 0;
  const rate = simState.feeRate || 0;
  return (rate >= low && rate <= high) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.HYSTERESIS_VALUE.evaluate = (block, simState) => {
  const high = parseInt(block.values.high_sats) || 0;
  const low = parseInt(block.values.low_sats) || 0;
  const amt = simState.inputAmount || 0;
  return (amt >= low && amt <= high) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.COUNTER_DOWN.evaluate = (block) =>
  (parseInt(block.values.count) || 0) > 0 ? 'satisfied' : 'unsatisfied';

BlockRegistry.COUNTER_UP.evaluate = (block) => {
  const current = parseInt(block.values.current) || 0;
  const target = parseInt(block.values.target) || 0;
  return current < target ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.COUNTER_PRESET.evaluate = (block) => {
  const current = parseInt(block.values.current) || 0;
  const preset = parseInt(block.values.preset) || 0;
  return current < preset ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.ONE_SHOT.evaluate = (block) =>
  (parseInt(block.values.state) || 0) === 0 ? 'satisfied' : 'unsatisfied';

BlockRegistry.TIMER_CONTINUOUS.evaluate = (block) => {
  const accumulated = parseInt(block.values.accumulated) || 0;
  const target = parseInt(block.values.target) || 0;
  return accumulated >= target ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.TIMER_OFF_DELAY.evaluate = (block) =>
  (parseInt(block.values.remaining) || 0) > 0 ? 'satisfied' : 'unsatisfied';

BlockRegistry.LATCH_SET.evaluate = (block) =>
  (parseInt(block.values.state) || 0) === 0 ? 'satisfied' : 'unsatisfied';

BlockRegistry.LATCH_RESET.evaluate = (block) =>
  (parseInt(block.values.state) || 0) >= 1 ? 'satisfied' : 'unsatisfied';

BlockRegistry.SEQUENCER.evaluate = (block) => {
  const current = parseInt(block.values.current) || 0;
  const total = parseInt(block.values.total) || 0;
  return (current >= 0 && total > 0 && current < total) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.COMPARE.evaluate = (block, simState) => {
  const op = parseInt(block.values.operator) || 0;
  const val = parseInt(block.values.value_b) || 0;
  const amt = simState.inputAmount || 0;
  switch(op) {
    case 1: return amt === val ? 'satisfied' : 'unsatisfied';
    case 2: return amt !== val ? 'satisfied' : 'unsatisfied';
    case 3: return amt > val ? 'satisfied' : 'unsatisfied';
    case 4: return amt < val ? 'satisfied' : 'unsatisfied';
    case 5: return amt >= val ? 'satisfied' : 'unsatisfied';
    case 6: return amt <= val ? 'satisfied' : 'unsatisfied';
    case 7: {
      const valC = parseInt(block.values.value_c) || 0;
      return (amt >= val && amt <= valC) ? 'satisfied' : 'unsatisfied';
    }
    default: return 'unknown';
  }
};

BlockRegistry.RATE_LIMIT.evaluate = (block, simState) => {
  const max = parseInt(block.values.max_per_block) || 0;
  return (simState.outputAmount || 0) <= max ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.CTV.evaluate = (block, simState) => {
  const tmplHash = (block.values.template_hash || '').trim();
  if (!tmplHash) return 'unsatisfied';
  return simState.knownTemplates?.has(tmplHash) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.VAULT_LOCK.evaluate = (block, simState) => {
  const keyOk = block.values.pubkey ? simState.availableKeys?.has(block.values.pubkey) : false;
  return keyOk ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.COSIGN.evaluate = (block, simState) => {
  const condHash = (block.values.conditions_hash || '').trim();
  if (!condHash) return 'unsatisfied';
  return simState.knownTemplates?.has(condHash) ? 'satisfied' : 'unsatisfied';
};

// Compound blocks
BlockRegistry.TIMELOCKED_SIG.evaluate = (block, simState) => {
  const keyOk = simState.availableKeys?.has(block.values.pubkey);
  const required = parseInt(block.values.blocks) || 0;
  return (keyOk && (simState.csvBlocks || 0) >= required) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.HTLC.evaluate = (block, simState) => {
  const keyOk = simState.availableKeys?.has(block.values.pubkey);
  const hashOk = block.values.preimage ? true : simState.knownPreimages?.has(block.values.hash);
  const required = parseInt(block.values.blocks) || 0;
  return (keyOk && hashOk && (simState.csvBlocks || 0) >= required) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.HASH_SIG.evaluate = (block, simState) => {
  const keyOk = simState.availableKeys?.has(block.values.pubkey);
  const hashOk = block.values.preimage ? true : simState.knownPreimages?.has(block.values.hash);
  return (keyOk && hashOk) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.PTLC.evaluate = (block, simState) => {
  const keyOk = simState.availableKeys?.has(block.values.signing_key);
  const required = parseInt(block.values.blocks) || 0;

};

BlockRegistry.CLTV_SIG.evaluate = (block, simState) => {
  const keyOk = simState.availableKeys?.has(block.values.pubkey);
  const target = parseInt(block.values.height) || 0;
  return (keyOk && (simState.blockHeight || 0) >= target) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.TIMELOCKED_MULTISIG.evaluate = (block, simState) => {
  const threshold = parseInt(block.values.threshold) || 0;
  const keys = (block.values.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
  const available = keys.filter(k => simState.availableKeys?.has(k)).length;
  const required = parseInt(block.values.blocks) || 0;
  return (available >= threshold && (simState.csvBlocks || 0) >= required) ? 'satisfied' : 'unsatisfied';
};

// Governance blocks
BlockRegistry.EPOCH_GATE.evaluate = (block, simState) => {
  const epochSize = parseInt(block.values.epoch_size) || 1;
  const windowSize = parseInt(block.values.window_size) || 0;
  return ((simState.blockHeight || 0) % epochSize) < windowSize ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.WEIGHT_LIMIT.evaluate = (block, simState) => {
  const maxWeight = parseInt(block.values.max_weight) || 0;
  const inputs = simState.inputCount || 1;
  const outputs = simState.outputCount || 1;
  const estWeight = Math.ceil((inputs * 68 + outputs * 31 + 10.5) * 4);
  return (maxWeight > 0 && estWeight <= maxWeight) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.INPUT_COUNT.evaluate = (block, simState) => {
  const min = parseInt(block.values.min) || 0;
  const max = parseInt(block.values.max) || 255;
  return ((simState.inputCount || 1) >= min && (simState.inputCount || 1) <= max) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.OUTPUT_COUNT.evaluate = (block, simState) => {
  const min = parseInt(block.values.min) || 0;
  const max = parseInt(block.values.max) || 255;
  return ((simState.outputCount || 1) >= min && (simState.outputCount || 1) <= max) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.RELATIVE_VALUE.evaluate = (block, simState) => {
  const num = parseInt(block.values.numerator) || 0;
  const den = parseInt(block.values.denominator) || 1;
  const input = simState.inputAmount || 0;
  const output = simState.outputAmount || 0;
  return (output * den >= input * num) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.ACCUMULATOR.evaluate = (block, simState) => {
  const rootHash = (block.values.merkle_root || '').trim();
  if (!rootHash) return 'unsatisfied';
  return simState.knownRoots?.has(rootHash) ? 'satisfied' : 'unsatisfied';
};

BlockRegistry.P2WSH_LEGACY.evaluate = (block) => {

BlockRegistry.P2TR_LEGACY.evaluate = (block, simState) =>

BlockRegistry.P2TR_SCRIPT_LEGACY.evaluate = (block) => {
  if (block.innerBlocks && block.innerBlocks.length > 0 && (block.values.internal_key || '').trim()) return 'satisfied';

  const sb = (block.values.script_body || block.values.preimage || '').trim();
  if (!ikey) return 'error';
  if (!sb) return 'unsatisfied';
  return 'satisfied';
};

  const allPubkeys = (block.values.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);

};

// Helper: find key from inner blocks for script-hash legacy blocks
function _findInnerKey(block, keyLookup) {
  if (!block.innerBlocks) return null;
  for (const ib of block.innerBlocks) {
    // Check pubkey, signing_key, agg_pubkey fields
    for (const field of ['pubkey', 'signing_key', 'agg_pubkey']) {
      if (ib.values?.[field]) {
        const key = keyLookup(ib.values[field]);
        if (key) return key;
      }
    }
    // Check multi-key fields (pubkeys)
    if (ib.values?.pubkeys) {
      const keys = ib.values.pubkeys.split(',').map(k => k.trim()).filter(Boolean);
      for (const pk of keys) {
        const key = keyLookup(pk);
        if (key) return key;
      }
    }
  }
  return null;
}

BlockRegistry.P2SH_LEGACY.buildSigner = (block, keyLookup, preimages, opts) => {
  const entry = { type: 'P2SH_LEGACY' };
  if (block.values.script_body) entry.script_body = block.values.script_body;
  else if (block.values.preimage) entry.preimage = block.values.preimage;
  const key = _findInnerKey(block, keyLookup);
  if (key) entry.privkey = key.privkey;
  return entry;
};

// SIMULATION ENGINE
// ═══════════════════════════════════════════════════════════════

function evaluateBlock(block, simState) {
  if (simState.forcedBlocks && simState.forcedBlocks[block.id]) {
    return simState.forcedBlocks[block.id];
  }
  const reg = BlockRegistry[block.type];
  let result = reg?.evaluate ? reg.evaluate(block, simState) : 'unknown';
  if (block.inverted) {
    if (result === 'satisfied') result = 'unsatisfied';
    else if (result === 'unsatisfied') result = 'satisfied';
  }
  return result;
}

// ═══════════════════════════════════════════════════════════════
// TRANSACTION VALIDATION
// ═══════════════════════════════════════════════════════════════

const HEX_RE = /^[0-9a-fA-F]+$/;
function isValidHex(s, exactBytes) {
  if (!s || !HEX_RE.test(s)) return false;
  if (s.length % 2 !== 0) return false;
  if (exactBytes !== undefined && s.length !== exactBytes * 2) return false;
  return true;
}

function validateLadder(rungs, txInputs, txOutputs, locktime) {
  const errors = [];   // fatal --blocks export
  const warnings = []; // non-fatal --advisory

  // ── TX INPUTS ──
  const validInputs = txInputs.filter(i => i.txid);
  if (validInputs.length === 0) {
    errors.push('No transaction inputs defined');
  }
  const seenInputs = new Set();
  validInputs.forEach((inp, idx) => {
    const txid = inp.txid.trim();
    if (!isValidHex(txid, 32)) {
      errors.push(`Input ${idx + 1}: TXID must be exactly 64 hex characters`);
    }
    const vout = parseInt(inp.vout);
    if (isNaN(vout) || vout < 0 || vout > 0xFFFFFFFF) {
      errors.push(`Input ${idx + 1}: vout must be 0–4294967295`);
    }
    const key = `${txid}:${vout}`;
    if (seenInputs.has(key)) {
      errors.push(`Input ${idx + 1}: duplicate input ${txid.substring(0, 8)}...:${vout}`);
    }
    seenInputs.add(key);
    const seq = inp.sequence;
    if (seq !== '' && seq !== undefined && seq !== null) {
      const s = parseInt(seq);
      if (isNaN(s) || s < 0 || s > 0xFFFFFFFF) {
        errors.push(`Input ${idx + 1}: sequence must be 0–4294967295`);
      }
    }
  });

  // ── TX OUTPUTS ──
  const validOutputs = txOutputs.filter(o => o.address || parseInt(o.amount) > 0);
  if (validOutputs.length === 0) {
    errors.push('No transaction outputs defined');
  }
  validOutputs.forEach((o, idx) => {
    const amt = parseInt(o.amount);
    if (isNaN(amt) || amt <= 0) {
      errors.push(`Output ${idx + 1}: amount must be greater than 0`);
    } else if (amt < 546) {
      errors.push(`Output ${idx + 1}: amount ${amt} sats is below dust limit (546) --transaction will be rejected by the network`);
    } else if (amt > 2100000000000000) {
      errors.push(`Output ${idx + 1}: amount exceeds maximum supply`);
    }
  });

  // ── LOCKTIME ──
  const lt = parseInt(locktime);
  if (lt && (lt < 0 || lt > 0xFFFFFFFF)) {
    errors.push('Locktime must be 0–4294967295');
  }

  // ── RUNGS ──
  if (rungs.length === 0 || (rungs.length === 1 && rungs[0].blocks.length === 0)) {
    errors.push('No conditions defined --add at least one block to a rung');
  }
  if (rungs.length > 8) {
    errors.push(`${rungs.length} rungs exceeds maximum of 8`);
  }

  // Track which outputs have at least one rung assigned
  const outputsWithRungs = new Set();

  // Track relay names for circular dependency detection
  const relayNames = new Map(); // name → rung index
  const relayRefs = new Map();  // rung index → [ref names]

  rungs.forEach((rung, ri) => {
    const rungLabel = rung.label || `R${String(ri).padStart(3, '0')}`;

    if (rung.blocks.length > 8) {
      errors.push(`${rungLabel}: ${rung.blocks.length} blocks exceeds maximum of 8 per rung`);
    }

    if (rung.blocks.length === 0) {
      warnings.push(`${rungLabel}: empty rung (no blocks)`);
    }

    // Track relay names
    if (rung.output.type === 'relay') {
      const name = (rung.output.name || rungLabel).trim().toUpperCase();
      relayNames.set(name, ri);
      if (rung.outputRefs && rung.outputRefs.length > 0) {
        relayRefs.set(ri, rung.outputRefs.map(r => r.trim().toUpperCase()));
      }
    } else {
      // Non-relay rung --check output assignment
      if (rung.output.txOutputId !== null && rung.output.txOutputId !== undefined) {
        outputsWithRungs.add(rung.output.txOutputId);
      }
    }

    // ── BLOCK-LEVEL VALIDATION ──
    rung.blocks.forEach((block, bi) => {
      if (block.type === 'OUTPUT_REF') return; // internal-only
      const def = getBlockDef(block.type);
      const v = block.values;
      const bLabel = `${rungLabel}/${def.label || block.type}`;

      // Check required fields
      def.fields.forEach(f => {
        if (f.optional) return;
        if (f.dataType === 'SCHEME') return; // scheme defaults to SCHNORR
        const val = v[f.name];
        if (!val && val !== 0) {
          errors.push(`${bLabel}: "${f.label}" is required`);
          return;
        }

        // Type-specific format checks
        const valStr = String(val).trim();
        if (!valStr) {
          errors.push(`${bLabel}: "${f.label}" is required`);
          return;
        }

        if (f.dataType === 'PUBKEY') {
          if (f.multi) {
            const keys = valStr.split(',').map(k => k.trim()).filter(Boolean);
            if (keys.length === 0) {
              errors.push(`${bLabel}: "${f.label}" requires at least one public key`);
            }
            keys.forEach((k, ki) => {
              if (!HEX_RE.test(k)) {
                errors.push(`${bLabel}: "${f.label}" key ${ki + 1} is not valid hex`);
              } else if (k.length % 2 !== 0) {
                errors.push(`${bLabel}: "${f.label}" key ${ki + 1} has odd hex length`);
              } else {
                const bytes = k.length / 2;
                if (bytes !== 32 && bytes !== 33 && bytes > 2048) {
                  errors.push(`${bLabel}: "${f.label}" key ${ki + 1} is ${bytes} bytes (expected 32, 33, or PQ key ≤2048)`);
                }
              }
            });
          } else {
            if (!HEX_RE.test(valStr)) {
              errors.push(`${bLabel}: "${f.label}" is not valid hex`);
            } else if (valStr.length % 2 !== 0) {
              errors.push(`${bLabel}: "${f.label}" has odd hex length`);
            } else {
              const bytes = valStr.length / 2;
              if (bytes !== 32 && bytes !== 33 && bytes > 2048) {
                errors.push(`${bLabel}: "${f.label}" is ${bytes} bytes (expected 32, 33, or PQ key ≤2048)`);
              }
            }
          }
        } else if (f.dataType === 'HASH256') {
          if (!isValidHex(valStr, 32)) {
            errors.push(`${bLabel}: "${f.label}" must be exactly 64 hex characters (32 bytes)`);
          }
        } else if (f.dataType === 'HASH160') {
          if (!isValidHex(valStr, 20)) {
            errors.push(`${bLabel}: "${f.label}" must be exactly 40 hex characters (20 bytes)`);
          }
        } else if (f.dataType === 'NUMERIC') {
          const n = parseInt(valStr);
          if (isNaN(n)) {
            errors.push(`${bLabel}: "${f.label}" must be a number`);
          } else if (n < 0 || n > 0xFFFFFFFF) {
            errors.push(`${bLabel}: "${f.label}" must be 0–4294967295`);
          }
        }
      });

      // ── BLOCK-SPECIFIC SEMANTIC CHECKS ──
      switch (block.type) {
        case 'MULTISIG':
        case 'TIMELOCKED_MULTISIG': {
          const m = parseInt(v.threshold);
          const keys = (v.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
          if (m && keys.length > 0 && m > keys.length) {
            errors.push(`${bLabel}: threshold M=${m} exceeds N=${keys.length} keys`);
          }
          if (m === 0) {
            errors.push(`${bLabel}: threshold must be ≥ 1`);
          }
          break;
        }
        case 'MUSIG_THRESHOLD': {
          const m = parseInt(v.threshold);
          const n = parseInt(v.group_size);
          if (m && n && m > n) {
            errors.push(`${bLabel}: threshold M=${m} exceeds group size N=${n}`);
          }
          if (m === 0) {
            errors.push(`${bLabel}: threshold must be ≥ 1`);
          }
          if (n && n < 2) {
            errors.push(`${bLabel}: group size must be ≥ 2`);
          }
          break;
        }
        case 'AMOUNT_LOCK': {
          const min = parseInt(v.min);
          const max = parseInt(v.max);
          if (min && max && min > max) {
            errors.push(`${bLabel}: min (${min}) exceeds max (${max})`);
          }
          break;
        }
        case 'HYSTERESIS_FEE': {
          const low = parseInt(v.low_sat_vb);
          const high = parseInt(v.high_sat_vb);
          if (low && high && low > high) {
            errors.push(`${bLabel}: low (${low}) exceeds high (${high})`);
          }
          break;
        }
        case 'HYSTERESIS_VALUE': {
          const low = parseInt(v.low_sats);
          const high = parseInt(v.high_sats);
          if (low && high && low > high) {
            errors.push(`${bLabel}: low (${low}) exceeds high (${high})`);
          }
          break;
        }
        case 'INPUT_COUNT':
        case 'OUTPUT_COUNT': {
          const min = parseInt(v.min);
          const max = parseInt(v.max);
          if (min && max && min > max) {
            errors.push(`${bLabel}: min (${min}) exceeds max (${max})`);
          }
          break;
        }
        case 'COUNTER_PRESET': {
          const cur = parseInt(v.current);
          const pre = parseInt(v.preset);
          if (!isNaN(cur) && !isNaN(pre) && cur > pre) {
            errors.push(`${bLabel}: current (${cur}) exceeds preset (${pre})`);
          }
          break;
        }
        case 'COUNTER_UP': {
          const cur = parseInt(v.current);
          const tgt = parseInt(v.target);

          }

        }
        case 'COMPARE': {

          }

            const vb = parseInt(v.value_b);
            const vc = parseInt(v.value_c);
            if (!isNaN(vb) && !isNaN(vc) && vb > vc) {
              errors.push(`${bLabel}: IN_RANGE lower bound (${vb}) exceeds upper bound (${vc})`);
            }

          }
          if (!isNaN(num) && !isNaN(den) && num > den) {
            errors.push(`${bLabel}: numerator (${num}) exceeds denominator (${den}) --ratio > 100%`);
          }

        }
        case 'ANCHOR_RESERVE': {
          const n = parseInt(v.threshold_n);

          }

        }
        case 'EPOCH_GATE': {
          const epoch = parseInt(v.epoch_size);

          if (!isNaN(epoch) && !isNaN(window) && window > epoch) {
            errors.push(`${bLabel}: window (${window}) exceeds epoch size (${epoch})`);
          }

            errors.push(`${bLabel}: epoch size cannot be zero`);
          }

        }

          const sc = parseInt(v.split_count);

          }

        case 'RECURSE_DECAY': {

          const blocks = parseInt(v.blocks);

          }

        case 'PTLC': {
          const blocks = parseInt(v.blocks);
          if (!isNaN(blocks) && blocks > 65535) {

          }

        }
      }

  // ── CIRCULAR RELAY DEPENDENCIES ──
  function hasCircularRelay(rungIdx, visited) {
    if (visited.has(rungIdx)) return true;
    visited.add(rungIdx);
    const refs = relayRefs.get(rungIdx);
    if (!refs) return false;
    for (const ref of refs) {
      const targetIdx = relayNames.get(ref);
      if (targetIdx !== undefined && hasCircularRelay(targetIdx, new Set(visited))) return true;
    }

  }
  relayRefs.forEach((refs, rungIdx) => {
    if (hasCircularRelay(rungIdx, new Set())) {
      const rung = rungs[rungIdx];
      const label = rung.label || `R${String(rungIdx).padStart(3, '0')}`;
      errors.push(`${label}: circular relay dependency detected`);

  validOutputs.forEach((o, idx) => {
    if (!outputsWithRungs.has(o.id)) {

  });

  if (validInputs.length > 0 && validOutputs.length === 1) {
    warnings.push('Only 1 output defined --no change output. Any excess input value will be lost to fees.');
  }
  return { errors, warnings };

function toNumericHex(val) {
  const n = parseInt(val) || 0;
  const buf = new Uint8Array(4);
  buf[0] = n & 0xFF;
  buf[1] = (n >> 8) & 0xFF;
  buf[2] = (n >> 16) & 0xFF;
  buf[3] = (n >> 24) & 0xFF;
  return Array.from(buf).map(b => b.toString(16).padStart(2, '0')).join('');

  for (let i = 0; i < hex.length && i < 8; i += 2) bytes.push(parseInt(hex.substr(i, 2), 16) || 0);

  return bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24);

// Convert stored rung objects back to createtxmlsc conditions format
function rungsToConditions(storedRungs) {
  return storedRungs.map(rung => {
    const cond = {
      blocks: (rung.blocks || [])
        .filter(b => b.type !== 'OUTPUT_REF')
        .map(exportBlockFields)
    };
    if (rung.relayRefs && rung.relayRefs.length > 0) {
      cond.relay_refs = rung.relayRefs;
    }
    return cond;
  });
}

// Export a single block to wire format (shared by both export functions)
function exportBlockFields(block) {
  const def = getBlockDef(block.type);
  const fields = [];
  def.fields.forEach(f => {
    if (f.noWire || f.witnessOnly || f.computed) return; // skip non-wire, witness-only, and node-computed fields
    const val = block.values[f.name];
    if (!val) return;
    if (f.dataType === 'NUMERIC') {
      fields.push({ type: 'NUMERIC', hex: toNumericHex(val) });
    } else if (f.dataType === 'PUBKEY') {
      if (f.multi) {
        val.split(',').map(k => k.trim()).filter(Boolean).forEach(k => {
          fields.push({ type: 'PUBKEY', hex: k });
        });
      } else {
        fields.push({ type: 'PUBKEY', hex: val });
      }
    } else if (f.dataType === 'HASH256') {
      fields.push({ type: 'HASH256', hex: val });
    } else if (f.dataType === 'HASH160') {
      fields.push({ type: 'HASH160', hex: val });
    } else if (f.dataType === 'PREIMAGE') {
      fields.push({ type: 'PREIMAGE', hex: val });
    } else if (f.dataType === 'SCRIPT_BODY') {
      fields.push({ type: 'SCRIPT_BODY', hex: val });
    } else if (f.dataType === 'SCHEME' && val) {
      const schemeMap = { SCHNORR: '01', ECDSA: '02', FALCON512: '10', FALCON1024: '11', DILITHIUM3: '12', SPHINCS_SHA: '13' };
      fields.push({ type: 'SCHEME', hex: schemeMap[val] || '01' });
    }
  });
  const out = { type: block.type, fields };
  if (block.inverted) out.inverted = true;
  return out;
}

// Reverse of exportBlockFields --converts wire format {type, fields:[{type,hex}]} back to record format {type, values:{fieldName: value}}
function wireFieldsToValues(wireBlock) {
  const def = getBlockDef(wireBlock.type);
  const values = {};
  const reverseScheme = { '01': 'SCHNORR', '02': 'ECDSA', '10': 'FALCON512', '11': 'FALCON1024', '12': 'DILITHIUM3', '13': 'SPHINCS_SHA' };
  let fi = 0; // wire field index
  for (const fd of def.fields) {
    if (fi >= (wireBlock.fields || []).length) break;
    const wf = wireBlock.fields[fi];
    if (fd.dataType === 'NUMERIC' && wf.type === 'NUMERIC') {
      values[fd.name] = String(fromNumericHex(wf.hex));
      fi++;
    } else if (fd.dataType === 'SCHEME' && wf.type === 'SCHEME') {
      values[fd.name] = reverseScheme[wf.hex] || 'SCHNORR';
      fi++;
    } else if (fd.dataType === 'PUBKEY' && wf.type === 'PUBKEY') {
      if (fd.multi) {
        const keys = [];
        while (fi < wireBlock.fields.length && wireBlock.fields[fi].type === 'PUBKEY') {
          keys.push(wireBlock.fields[fi].hex);
          fi++;
        }
        values[fd.name] = keys.join(', ');
      } else {
        values[fd.name] = wf.hex;
        fi++;
      }
    } else if ((fd.dataType === 'HASH256' || fd.dataType === 'HASH160') && (wf.type === 'HASH256' || wf.type === 'HASH160')) {
      values[fd.name] = wf.hex;
      fi++;
    } else if (wf.type === 'PUBKEY_COMMIT') {
      // Legacy PUBKEY_COMMIT from wire decode (no longer produced, but may appear in old data)
      values[fd.name] = wf.hex;
      fi++;
    } else if (fd.dataType === 'PREIMAGE' && wf.type === 'PREIMAGE') {
      values[fd.name] = wf.hex;
      fi++;
    } else if (fd.dataType === 'SCRIPT_BODY' && wf.type === 'SCRIPT_BODY') {
      values[fd.name] = wf.hex;
      fi++;
    } else {
      fi++; // skip unrecognized
    }
  }
  return { type: wireBlock.type, values };
}

// Legacy per-output MLSC export (retained for reference, not called)
function exportCreateRungtxLegacy(rungs, txOutputs, txInputs, locktime) {
  // Build inputs
  const inputs = txInputs
    .filter(i => i.txid)
    .map(i => {
      const inp = { txid: i.txid, vout: parseInt(i.vout) || 0 };
      const seq = parseInt(i.sequence);
      if (!isNaN(seq) && seq !== 4294967294) inp.sequence = seq;
      return inp;
    });

  // Collect relay rungs and assign indices
  const relayRungs = rungs.filter(r => r.output.type === 'relay');
  const relayNameToIndex = new Map();
  relayRungs.forEach((r, idx) => {
    const name = r.output.name || r.label || `R${String(rungs.indexOf(r)).padStart(3, '0')}`;
    relayNameToIndex.set(name, idx);
  });

  // Build relays array for wire format
  const relays = relayRungs.map(r => {
    const relay = {
      blocks: r.blocks
        .filter(b => b.type !== 'OUTPUT_REF')
        .map(exportBlockFields)
    };
    // Relay-to-relay refs
    if (r.outputRefs && r.outputRefs.length > 0) {
      const refs = r.outputRefs
        .map(ref => relayNameToIndex.get(ref))
        .filter(idx => idx !== undefined);
      if (refs.length > 0) relay.relay_refs = refs;
    }
    return relay;
  });

  // Group non-relay rungs by their assigned txOutputId
  const rungsByOutput = new Map(); // txOutputId -> [rung, ...]
  rungs.forEach(rung => {
    if (rung.output.type === 'relay') return; // skip relay rungs
    if (rung.output.txOutputId !== null && rung.output.txOutputId !== undefined) {
      const key = rung.output.txOutputId;
      if (!rungsByOutput.has(key)) rungsByOutput.set(key, []);
      rungsByOutput.get(key).push(rung);
    }
  });

  // Build outputs --each output gets its conditions from assigned rungs
  // In v4 RUNG_TX, every output MUST have at least one condition --skip empty ones
  const outputs = txOutputs
    .filter(o => rungsByOutput.has(o.id))
    .map(o => {
      const assignedRungs = rungsByOutput.get(o.id) || [];
      const amt = parseInt(o.amount) || 0;

      // Build conditions: each rung becomes an entry in the conditions array
      const conditions = assignedRungs.map(rung => {
        const cond = {
          blocks: rung.blocks
            .filter(b => b.type !== 'OUTPUT_REF')
            .map(exportBlockFields)
        };
        // Convert outputRefs (relay names) to relay_refs (relay indices)
        if (rung.outputRefs && rung.outputRefs.length > 0) {
          const refs = rung.outputRefs
            .map(ref => relayNameToIndex.get(ref))
            .filter(idx => idx !== undefined);
          if (refs.length > 0) cond.relay_refs = refs;
        }
        return cond;
      });

      // Coil: use wire fields from the first assigned rung (all rungs share one coil per output)
      const firstRung = assignedRungs[0];
      const coil = {};
      if (firstRung) {
        coil.type = firstRung.output.wireType || 'UNLOCK';
        coil.attestation = firstRung.output.attestation || 'INLINE';
        coil.scheme = firstRung.output.scheme || 'SCHNORR';
        // If UNLOCK_TO, include the address
        if (coil.type === 'UNLOCK_TO' && o.address) {
          coil.address = o.address;
        }
      } else {
        coil.type = 'UNLOCK';
        coil.attestation = 'INLINE';
        coil.scheme = 'SCHNORR';
      }

      const out = {
        amount: amt / 100000000, // sats → BTC
        conditions,
      };
      // Only include coil if non-default
      if (coil.type !== 'UNLOCK' || coil.attestation !== 'INLINE' || coil.scheme !== 'SCHNORR') {
        out.coil = coil;
      }
      return out;
    });

  const result = { inputs, outputs };
  if (relays.length > 0) result.relays = relays;
  const lt = parseInt(locktime);
  if (lt > 0) result.locktime = lt;

  return result;
}

          } else if (f.dataType === 'PREIMAGE') {
            fields.push({ type: 'PREIMAGE', hex: val });
          } else if (f.dataType === 'SCRIPT_BODY') {
            fields.push({ type: 'SCRIPT_BODY', hex: val });
          }
        });
        const out = { type: b.type, fields };
        if (b.inverted) out.inverted = true;
        return out;
      });

    // Collect pubkeys for merkle_pub_key binding
    const pubkeys = [];
    rung.blocks.forEach(b => {
      if (b.type === 'OUTPUT_REF') return;
      const def = getBlockDef(b.type);
      def.fields.forEach(f => {
        if (f.dataType !== 'PUBKEY') return;
        const val = b.values[f.name];
        if (!val) return;
        if (f.multi) {
          val.split(',').map(k => k.trim()).filter(Boolean).forEach(k => pubkeys.push(k));
        } else {
          pubkeys.push(val);
        }
      });
    });

    const rungObj = { output_index: outputIdx, blocks };
    if (pubkeys.length > 0) rungObj.pubkeys = pubkeys;
    sharedRungs.push(rungObj);
  });

  const result = { inputs, outputs: amounts, rungs: sharedRungs };
  const lt = parseInt(locktime);
  if (lt > 0) result.locktime = lt;

  return result;
}

// Export UI-friendly format (for debugging / display)
function exportConditions(rungs, txOutputs, txInputs) {
  return rungs.map((rung, ri) => {
    return {
      ...(rung.label ? { label: rung.label } : {}),
      blocks: rung.blocks.map(exportBlockFields)
    };
  });
}

function rungsToDescriptor(rungs) {
  const schemeStr = (s) => {
    if (!s || s === 'SCHNORR') return '';
    return ', ' + s.toLowerCase();
  };
  const pk = (v) => v ? '@' + v.substring(0, 8) : '@?';
  const num = (v) => v || '0';
  const hex = (v) => v || '00'.repeat(32);

  const formatBlock = (b) => {
    const v = b.values || {};
    const inv = b.inverted ? '!' : '';
    switch (b.type) {
    case 'SIG': return inv + 'sig(' + pk(v.pubkey) + schemeStr(v.scheme) + ')';
    case 'MULTISIG': {
      const pks = (v.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
      return inv + 'multisig(' + num(v.threshold) + pks.map(k => ', @' + k.substring(0, 8)).join('') + ')';
    }
    case 'ADAPTOR_SIG': return inv + 'adaptor_sig(' + pk(v.pubkey) + ', ' + pk(v.adaptor_point) + schemeStr(v.scheme) + ')';
    case 'MUSIG_THRESHOLD': {
      const pks = (v.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
      return inv + 'musig_threshold(' + num(v.threshold) + pks.map(k => ', @' + k.substring(0, 8)).join('') + ')';
    }
    case 'KEY_REF_SIG': return inv + 'key_ref_sig(' + num(v.relay_index) + ', ' + num(v.block_index) + ')';
    case 'CSV': return inv + 'csv(' + num(v.blocks) + ')';
    case 'CSV_TIME': return inv + 'csv_time(' + num(v.seconds) + ')';
    case 'CLTV': return inv + 'cltv(' + num(v.height) + ')';
    case 'CLTV_TIME': return inv + 'cltv_time(' + num(v.time) + ')';
    case 'TAGGED_HASH': return inv + 'tagged_hash(' + hex(v.tag) + ', ' + hex(v.expected) + ')';
    case 'HASH_GUARDED': return inv + 'hash_guarded(' + hex(v.hash) + ')';
    case 'CTV': return inv + 'ctv(' + hex(v.template_hash) + ')';
    case 'VAULT_LOCK': return inv + 'vault_lock(' + pk(v.recovery_key) + ', ' + pk(v.hot_key) + ', ' + num(v.delay) + ')';
    case 'AMOUNT_LOCK': return inv + 'amount_lock(' + num(v.min) + ', ' + num(v.max) + ')';
    case 'RECURSE_SAME': return inv + 'recurse_same(' + num(v.max_depth) + ')';
    case 'RECURSE_MODIFIED': return inv + 'recurse_modified(' + num(v.max_depth) + ', ' + num(v.block_idx) + ', ' + num(v.param_idx) + ', ' + num(v.delta) + ')';
    case 'RECURSE_UNTIL': return inv + 'recurse_until(' + num(v.height) + ')';
    case 'RECURSE_COUNT': return inv + 'recurse_count(' + num(v.remaining) + ')';
    case 'RECURSE_SPLIT': return inv + 'recurse_split(' + num(v.max_splits) + ', ' + num(v.min_sats) + ')';
    case 'RECURSE_DECAY': return inv + 'recurse_decay(' + num(v.max_depth) + ', ' + num(v.block_idx) + ', ' + num(v.param_idx) + ', ' + num(v.decay_per_step) + ')';
    case 'DATA_RETURN': return inv + 'data_return(' + hex(v.data) + ')';
    case 'HYSTERESIS_FEE': return inv + 'hysteresis_fee(' + num(v.low) + ', ' + num(v.high) + ')';
    case 'HYSTERESIS_VALUE': return inv + 'hysteresis_value(' + num(v.low) + ', ' + num(v.high) + ')';
    case 'TIMER_CONTINUOUS': return inv + 'timer_continuous(' + num(v.blocks) + ')';
    case 'TIMER_OFF_DELAY': return inv + 'timer_off_delay(' + num(v.trigger) + ', ' + num(v.hold) + ')';
    case 'LATCH_SET': return inv + 'latch_set(' + pk(v.pubkey) + ', ' + num(v.state) + ')';
    case 'LATCH_RESET': return inv + 'latch_reset(' + pk(v.pubkey) + ', ' + num(v.state) + ')';
    case 'COUNTER_DOWN': return inv + 'counter_down(' + pk(v.pubkey) + ', ' + num(v.count) + ')';
    case 'COUNTER_PRESET': return inv + 'counter_preset(' + pk(v.pubkey) + ', ' + num(v.count) + ')';
    case 'COUNTER_UP': return inv + 'counter_up(' + pk(v.pubkey) + ', ' + num(v.count) + ')';
    case 'COMPARE': return inv + 'compare(' + num(v.operator) + ', ' + num(v.value_b) + (v.value_c ? ', ' + v.value_c : '') + ')';
    case 'SEQUENCER': return inv + 'sequencer(' + num(v.steps) + ')';
    case 'ONE_SHOT': return inv + 'one_shot(' + pk(v.pubkey) + ', ' + num(v.window) + ')';
    case 'RATE_LIMIT': return inv + 'rate_limit(' + num(v.max_per_block) + ', ' + num(v.accumulation_cap) + ', ' + num(v.refill_blocks) + ')';
    case 'COSIGN': return inv + 'cosign(' + hex(v.conditions_hash) + ')';
    case 'TIMELOCKED_SIG': return inv + 'timelocked_sig(' + pk(v.pubkey) + ', ' + num(v.blocks || v.csv) + ')';
    case 'HTLC': return inv + 'htlc(' + pk(v.sender || v.pubkey) + ', ' + pk(v.receiver) + ', ' + hex(v.preimage || v.hash) + ', ' + num(v.csv || v.blocks) + ')';
    case 'HASH_SIG': return inv + 'hash_sig(' + pk(v.pubkey) + ', ' + hex(v.preimage || v.hash) + ')';
    case 'PTLC': return inv + 'ptlc(' + pk(v.pubkey) + ', ' + pk(v.adaptor_point) + ', ' + num(v.csv || v.blocks) + ')';
    case 'CLTV_SIG': return inv + 'cltv_sig(' + pk(v.pubkey) + ', ' + num(v.height) + ')';
    case 'TIMELOCKED_MULTISIG': {
      const pks = (v.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
      return inv + 'timelocked_multisig(' + num(v.threshold) + pks.map(k => ', @' + k.substring(0, 8)).join('') + ', ' + num(v.csv || v.blocks) + ')';
    }
    case 'EPOCH_GATE': return inv + 'epoch_gate(' + num(v.epoch_size) + ', ' + num(v.window_size || v.window) + ')';
    case 'WEIGHT_LIMIT': return inv + 'weight_limit(' + num(v.max_weight || v.max) + ')';
    case 'INPUT_COUNT': return inv + 'input_count(' + num(v.min) + ', ' + num(v.max) + ')';
    case 'OUTPUT_COUNT': return inv + 'output_count(' + num(v.min) + ', ' + num(v.max) + ')';
    case 'RELATIVE_VALUE': return inv + 'relative_value(' + num(v.numerator) + ', ' + num(v.denominator) + ')';
    case 'ACCUMULATOR': return inv + 'accumulator(' + hex(v.merkle_root) + ')';
    case 'OUTPUT_CHECK': return inv + 'output_check(' + num(v.output_index) + ', ' + num(v.min_value) + ', ' + num(v.max_value) + ', ' + hex(v.script_hash) + ')';
    case 'P2PK_LEGACY': return inv + 'p2pk(' + pk(v.pubkey) + ')';
    case 'P2PKH_LEGACY': return inv + 'p2pkh(' + pk(v.pubkey) + ')';
    case 'P2SH_LEGACY': return inv + 'p2sh(' + hex(v.script_body) + ')';
    case 'P2WPKH_LEGACY': return inv + 'p2wpkh(' + pk(v.pubkey) + ')';
    case 'P2WSH_LEGACY': return inv + 'p2wsh(' + hex(v.script_body) + ')';
    case 'P2TR_LEGACY': return inv + 'p2tr(' + pk(v.pubkey) + ')';
    case 'P2TR_SCRIPT_LEGACY': return inv + 'p2tr_script(' + hex(v.script_body) + ')';
    default: return inv + b.type.toLowerCase() + '(...)';
    }
  };

  // Filter to non-relay rungs with blocks
  const activeRungs = rungs.filter(r => r.blocks.length > 0 && r.output.type !== 'relay');
  if (activeRungs.length === 0) return 'ladder()';

  const formatRung = (r) => {
    const blocks = r.blocks.filter(b => b.type !== 'OUTPUT_REF').map(formatBlock);
    if (blocks.length === 0) return '';
    if (blocks.length === 1) return blocks[0];
    return 'and(' + blocks.join(', ') + ')';
  };

  // TX_MLSC: group rungs by output and use output() wrapper
  const rungsByOutput = new Map();
  activeRungs.forEach(r => {
    const outId = r.output.txOutputId;
    if (outId === null || outId === undefined) return;
    if (!rungsByOutput.has(outId)) rungsByOutput.set(outId, []);
    rungsByOutput.get(outId).push(r);
  });

  // Assign sequential output indices
  const outputEntries = [...rungsByOutput.entries()];
  if (outputEntries.length === 0) {
    // Fallback: no output assignment, format as flat descriptor
    const rungStrs = activeRungs.map(formatRung).filter(Boolean);
    if (rungStrs.length === 0) return 'ladder()';
    if (rungStrs.length === 1) return 'ladder(' + rungStrs[0] + ')';
    return 'ladder(or(\n  ' + rungStrs.join(',\n  ') + '\n))';
  }

  const outputParts = outputEntries.map(([_, outRungs], idx) => {
    const rungStrs = outRungs.map(formatRung).filter(Boolean);
    if (rungStrs.length === 0) return null;
    const inner = rungStrs.length === 1 ? rungStrs[0] : 'or(' + rungStrs.join(', ') + ')';
    return 'output(' + idx + ', ' + inner + ')';
  }).filter(Boolean);

  if (outputParts.length === 0) return 'ladder()';
  return 'ladder(\n  ' + outputParts.join(',\n  ') + '\n)';
}
