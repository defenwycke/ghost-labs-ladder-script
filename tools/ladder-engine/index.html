function PalettePanel({ onDragStart }) {
  const [collapsed, setCollapsed] = useState({});

  const toggle = (name) => setCollapsed(prev => ({ ...prev, [name]: !prev[name] }));

  return (
    <div className="palette">
      {BLOCK_FAMILIES.map(family => (
        <div key={family.name} className="palette-group">
          <div className="palette-group-header" onClick={() => toggle(family.name)}>
            <span className={`arrow ${collapsed[family.name] ? 'collapsed' : ''}`}>▼</span>
            {family.name}
          </div>
          {!collapsed[family.name] && family.blocks.map(block => (
            <div
              key={block.type}
              className="palette-item"
              draggable
              onDragStart={(e) => {
                e.dataTransfer.setData('blockType', block.type);
                onDragStart?.(block.type);
              }}
            >
              <div className="dot" style={{ background: family.color }} />
              {block.label}
              {block.desc && (
                <div className="palette-tip">
                  {block.desc}
                  <div className="tip-code">0x{getTypeHex(block.type)}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function ContactView({ block, rungId, selected, simMode, simResult, scanClass, onClick, onDelete, onDragStart, onDragOver, onDrop, forcedState, onForceToggle, tips, onNameChange, onExpand, onContextMenu: onCtxMenu, renaming, onClearRenaming }) {
  const def = getBlockDef(block.type);
  const isEnergized = simMode && !scanClass && simResult === 'satisfied';
  const isFault = simMode && !scanClass && simResult === 'error';
  const isForced = forcedState === 'satisfied' || forcedState === 'unsatisfied';
  const [editingNote, setEditingNote] = useState(false);
  const noteInputRef = useRef(null);

  useEffect(() => {
    if (renaming) {
      setEditingNote(true);
      onClearRenaming?.();
      setTimeout(() => noteInputRef.current?.focus(), 0);
    }
  }, [renaming, onClearRenaming]);

  const summary = useMemo(() => {
    const v = block.values;
    const scheme = v.scheme;
    const pqBadge = scheme ? `[${scheme}] ` : '';
    const first = def.fields[0];
    if (!first) return pqBadge || '';
    const val = v[first.name];
    if (!val) return pqBadge || '';
    const valStr = first.dataType === 'NUMERIC' ? val : (val.length > 12 ? val.substring(0, 6) + '..' + val.substring(val.length - 4) : val);
    return pqBadge + valStr;
  }, [block.values, def]);

  const handleClick = useCallback((e) => {
    if (simMode && !scanClass && e.altKey) {
      e.stopPropagation();
      onForceToggle?.(block.id);
    } else {
      onClick();
    }
  }, [simMode, scanClass, onClick, onForceToggle, block.id]);

  const handleDoubleClick = useCallback((e) => {
    if (simMode) return;
    e.stopPropagation();
    setEditingNote(true);
    setTimeout(() => noteInputRef.current?.focus(), 0);
  }, [simMode]);

  const handleNoteBlur = useCallback(() => {
    setEditingNote(false);
  }, []);

  const handleNoteKeyDown = useCallback((e) => {
    if (e.key === 'Enter' || e.key === 'Escape') {
      setEditingNote(false);
    }
  }, []);

  const handleContextMenu = useCallback((e) => {
    if (simMode) return;
    e.preventDefault();
    e.stopPropagation();
    onCtxMenu?.(e.clientX, e.clientY, block);
  }, [simMode, block, onCtxMenu]);

  return (
    <div
      className={`contact ${isEnergized ? 'energized' : ''} ${isFault ? 'fault' : ''} ${selected ? 'selected' : ''} ${scanClass || ''} ${isForced ? (forcedState === 'satisfied' ? 'forced-on' : 'forced-off') : ''}`}
      onClick={handleClick}
      onDoubleClick={handleDoubleClick}
      onContextMenu={handleContextMenu}
      onMouseDown={(e) => { if (e.button === 2) e.stopPropagation(); }}
      draggable={!simMode}
      onDragStart={simMode ? undefined : (e) => { e.dataTransfer.setData('reorderBlockId', String(block.id)); e.dataTransfer.setData('sourceRungId', String(rungId)); onDragStart?.(block.id, e); }}
      onDragOver={simMode ? undefined : (e) => { e.preventDefault(); e.stopPropagation(); onDragOver?.(e, block.id); }}
      onDrop={simMode ? undefined : (e) => {
        // Only handle reorder drops here; let palette drops bubble to the slot handler
        const reorderId = e.dataTransfer.getData('reorderBlockId');
        if (reorderId) { e.preventDefault(); e.stopPropagation(); onDrop?.(e, block.id); }
      }}
      title={tips ? (simMode ? (scanClass === 'step-next' ? 'Click to pass this block and advance' : 'Alt+click to force ON/OFF/AUTO') : 'Click to select · Double-click to name · Right-click for options · Drag to reorder') : undefined}
    >
      {block.inverted && <span className="contact-inverted" />}
      {isForced && <span className={`force-badge ${forcedState === 'satisfied' ? 'on' : 'off'}`}>{forcedState === 'satisfied' ? 'FORCE' : 'BLOCK'}</span>}
      <span className="contact-bracket-left" style={{ color: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor + '80' }}>─┤</span>
      <div className="contact-body" style={{ borderTopColor: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor, borderTopWidth: 2 }}>
        <span className="contact-type" style={{ color: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor }}>{def.label}</span>
        {summary && <span className="contact-value">{summary}</span>}
      </div>
      <span className="contact-bracket-right" style={{ color: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor + '80' }}>├─</span>
      {!simMode && <div className="contact-delete" onClick={(e) => { e.stopPropagation(); onDelete(); }}>✕</div>}
      {block.name && !editingNote && <span className="contact-note">{block.name}</span>}
      {editingNote && (
        <input
          ref={noteInputRef}
          className="contact-note-input"
          value={block.name || ''}
          placeholder="Name this block..."
          onChange={(e) => onNameChange?.(block.id, e.target.value)}
          onBlur={handleNoteBlur}
          onKeyDown={handleNoteKeyDown}
          onClick={(e) => e.stopPropagation()}
        />
      )}
    </div>
  );
}

function BlockContextMenu({ x, y, block, onRename, onExpand, onToggleInvert, onDuplicate, onDelete, onFillTestData, onClose }) {
  const menuRef = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) onClose();
    };
    const escHandler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('mousedown', handler);
    document.addEventListener('keydown', escHandler);
    return () => { document.removeEventListener('mousedown', handler); document.removeEventListener('keydown', escHandler); };
  }, [onClose]);

  // Clamp menu position to viewport
  const style = useMemo(() => {
    const s = { left: x, top: y };
    if (typeof window !== 'undefined') {
      if (x + 180 > window.innerWidth) s.left = window.innerWidth - 180;
      if (y + 200 > window.innerHeight) s.top = window.innerHeight - 200;
    }
    return s;
  }, [x, y]);

  return (
    <div className="block-context-menu" ref={menuRef} style={style}>
      <div className="ctx-item" onClick={() => { onRename(); onClose(); }}>
        <span className="ctx-item-icon">✎</span>RENAME
      </div>
      <div className="ctx-item" onClick={() => { onExpand(); onClose(); }}>
        <span className="ctx-item-icon">⊞</span>INSPECT
      </div>
      <div className="ctx-item" onClick={() => { onFillTestData(); onClose(); }}>
        <span className="ctx-item-icon">⚡</span>FILL TEST DATA
      </div>
      <div className="ctx-sep" />
      <div className="ctx-item" onClick={() => { onToggleInvert(); onClose(); }}>
        <span className="ctx-item-icon">{block.inverted ? '○' : '◉'}</span>{block.inverted ? 'REMOVE NOT' : 'INVERT (NOT)'}
      </div>
      <div className="ctx-item" onClick={() => { onDuplicate(); onClose(); }}>
        <span className="ctx-item-icon">⊕</span>DUPLICATE
      </div>
      <div className="ctx-sep" />
      <div className="ctx-item ctx-danger" onClick={() => { onDelete(); onClose(); }}>
        <span className="ctx-item-icon">✕</span>DELETE
      </div>
    </div>
  );
}

function InputModal({ rung, rungIndex, onRungChange, txInputs, allRungs, onClose }) {
  if (!rung) return null;
  const rungNum = rung.label || `R${String(rungIndex).padStart(3, '0')}`;

  const availableOutputs = useMemo(() => {
    if (!allRungs) return [];
    return allRungs.map((r, i) => {
      if (r.id === rung.id) return null;
      if (r.output.type !== 'relay') return null; // only relay coils can be referenced
      const label = r.label || `R${String(i).padStart(3, '0')}`;
      const coilName = r.output.name;
      const refValue = coilName || r.label || `R${String(i).padStart(3, '0')}`;
      const display = `${label}${coilName && coilName !== r.label ? ' → ' + coilName : ''}${!coilName ? ' (unnamed)' : ''}`;
      return { refValue, display, rungId: r.id };
    }).filter(Boolean);
  }, [allRungs, rung.id]);

  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'Enter' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') onClose();
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [onClose]);

  return (
    <div className="block-modal-overlay" onClick={onClose}>
      <div className="block-modal" onClick={(e) => e.stopPropagation()}>

                              <option value="DILITHIUM3">DILITHIUM3 (PQ)</option>
                              <option value="SPHINCS_SHA">SPHINCS+-SHA2 (PQ)</option>

          {/* Data Type Constraints */}
          {def.fields.length > 0 && (
            <div className="block-modal-section">

          )}
        </div>
        <div className="block-modal-footer">
          <button className="block-modal-ok" onClick={onClose}>OK</button>
        </div>
      </div>
    </div>
  );
}

const MAX_BLOCKS_PER_RUNG = 8;

function RungView({ rung, rungIndex, rungCount, selectedBlock, selectedCoil, selectedInput, simMode, simState, onSelectBlock, onSelectCoil, onSelectInput, onDeleteBlock, onDeleteRung, onDropBlock, onRungLabelChange, onReorderBlock, onMoveRung, onMoveBlockCrossRung, txOutputs, txInputs, scanStep, scanResults, scanning, isSpent, spentType, forcedBlocks, onForceBlock, onExecuteRung, onStartScanFrom, isSteppingThrough, stepActiveIdx, stepResults, onStepBlock, tips, onNameChange, onExpandBlock, onBlockContextMenu, renamingBlockId, onClearRenaming, onInputContextMenu, onRungChange, renamingInputId, onClearRenamingInput, onOutputContextMenu, isCoilReferenced }) {
  const [dropSlot, setDropSlot] = useState(null);
  const [rungDragOver, setRungDragOver] = useState(false);
  const [editingInputName, setEditingInputName] = useState(false);
  const inputNoteRef = useRef(null);

  useEffect(() => {
    if (renamingInputId === rung.id) {
      setEditingInputName(true);
      onClearRenamingInput?.();
      setTimeout(() => inputNoteRef.current?.focus(), 0);
    }
  }, [renamingInputId, rung.id, onClearRenamingInput]);

  const blockResults = useMemo(() => {
    if (!simMode) return {};
    const results = {};
    rung.blocks.forEach(b => {
      results[b.id] = evaluateBlock(b, simState);
    });
    return results;
  }, [rung.blocks, simMode, simState]);

  // Check output refs: all referenced outputs must be energized
  const outputRefsSatisfied = useMemo(() => {
    if (!simMode || !rung.outputRefs || rung.outputRefs.length === 0) return true;
    return rung.outputRefs.every(ref => {
      const refUpper = ref.trim().toUpperCase();
      return simState.energizedOutputs?.has(refUpper) || simState.energizedRungNums?.has(refUpper);
    });
  }, [simMode, rung.outputRefs, simState]);

  const rungEnergized = simMode && !scanning && rung.blocks.length > 0 &&
    rung.blocks.every(b => blockResults[b.id] === 'satisfied') && outputRefsSatisfied;

  // Scan state for this rung
  const isActiveRung = scanning && scanStep?.rung === rungIndex;
  const coilResult = scanning ? scanResults?.[`r${rungIndex}_coil`] : null;
  const rungScanClass = scanning ? (
    coilResult === 'spent' ? 'scan-rung-spent' :
    isActiveRung ? 'scan-active-rung' :
    coilResult === 'pass' ? 'scan-rung-pass' :
    coilResult === 'fail' ? 'scan-rung-fail' : ''
  ) : '';

  // Compute power flow: energized up to first unsatisfied, or up to step-through position
  const powerFlow = useMemo(() => {
    if (!simMode) return {};
    const flow = {};
    if (isSteppingThrough) {
      // In step-through: green for blocks that have been passed (index < stepActiveIdx)
      rung.blocks.forEach((b, i) => {
        flow[i] = i < stepActiveIdx && stepResults[b.id] === 'satisfied';
      });
    } else {
      let flowing = true;
      rung.blocks.forEach((b, i) => {
        flow[i] = flowing && blockResults[b.id] === 'satisfied';
        if (blockResults[b.id] !== 'satisfied') flowing = false;
      });
    }
    return flow;
  }, [simMode, rung.blocks, blockResults, isSteppingThrough, stepActiveIdx, stepResults]);

  const rungNum = `R${String(rungIndex).padStart(3, '0')}`;
  const displayName = rung.label || rungNum;
  const [editing, setEditing] = useState(false);

  const handleSlotDrop = useCallback((e, slotIdx) => {
    e.preventDefault();
    e.stopPropagation();
    setDropSlot(null);

    // Check for reorder (drag existing block to a new slot)
    const reorderId = e.dataTransfer.getData('reorderBlockId');
    if (reorderId) {
      const sourceId = parseInt(reorderId);
      const sourceRungId = e.dataTransfer.getData('sourceRungId');
      // Cross-rung move: block from a different rung
      if (sourceRungId && parseInt(sourceRungId) !== rung.id) {
        onMoveBlockCrossRung?.(parseInt(sourceRungId), sourceId, rung.id, slotIdx);
        return;
      }
      // Find block at this slot position (slot-based, not array-index-based)
      const targetBlock = rung.blocks.find(b => (b.slot ?? rung.blocks.indexOf(b)) === slotIdx);
      if (targetBlock && sourceId !== targetBlock.id) {
        onReorderBlock(rung.id, sourceId, targetBlock.id);
      } else if (!targetBlock && rung.blocks.find(b => b.id === sourceId)) {
        onReorderBlock(rung.id, sourceId, slotIdx);
      }
      return;
    }

    // New block from palette
    const blockType = e.dataTransfer.getData('blockType');
    if (blockType && rung.blocks.length < MAX_BLOCKS_PER_RUNG) {
      onDropBlock(rung.id, blockType, slotIdx);
    }
  }, [rung, onDropBlock, onReorderBlock]);

  // Handle drop on the entire rung (fallback --appends to end)
  const handleRungDrop = useCallback((e) => {
    e.preventDefault();
    setDropSlot(null);
    const reorderId = e.dataTransfer.getData('reorderBlockId');
    if (reorderId) {
      const sourceId = parseInt(reorderId);
      const sourceRungId = e.dataTransfer.getData('sourceRungId');
      if (sourceRungId && parseInt(sourceRungId) !== rung.id) {
        onMoveBlockCrossRung?.(parseInt(sourceRungId), sourceId, rung.id);
      }
      return;
    }
    const blockType = e.dataTransfer.getData('blockType');
    if (blockType && rung.blocks.length < MAX_BLOCKS_PER_RUNG) {
      onDropBlock(rung.id, blockType);
    }
  }, [rung, onDropBlock, onMoveBlockCrossRung]);

  // Is coil reached in step-through?
  const stepCoilReached = isSteppingThrough && stepActiveIdx >= rung.blocks.length;

  // Build 8 slots: blocks placed at their assigned slot positions (or packed left if no slot assigned)
  const slots = [];
  const blocksBySlot = new Map();
  rung.blocks.forEach((block, bi) => {
    const s = block.slot !== undefined ? block.slot : bi;
    blocksBySlot.set(s, { block, blockIndex: bi });
  });
  for (let i = 0; i < MAX_BLOCKS_PER_RUNG; i++) {
    const entry = blocksBySlot.get(i);
    const block = entry ? entry.block : null;
    const bi = entry ? entry.blockIndex : -1;
    const isFlowing = simMode && (block
      ? powerFlow[bi]
      : isSteppingThrough ? stepCoilReached : rungEnergized);
    slots.push({ block, index: i, blockIndex: bi, isFlowing });
  }

  return (
    <div
      className={`rung ${rungEnergized ? 'energized' : ''} ${rungScanClass} ${isSpent ? 'spent' : ''} ${spentType === 'executed' ? 'spent-executed' : ''} ${spentType === 'blocked' ? 'spent-blocked' : ''} ${isSteppingThrough ? 'stepping' : ''} ${stepCoilReached ? 'step-complete' : ''} ${rungDragOver ? 'drag-target-rung' : ''}`}
      onDragOver={simMode ? undefined : (e) => {
        if (e.dataTransfer.types.includes('rungdragidx')) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setRungDragOver(true); }
      }}
      onDragLeave={simMode ? undefined : (e) => {
        if (!e.currentTarget.contains(e.relatedTarget)) setRungDragOver(false);
      }}
      onDrop={simMode ? undefined : (e) => {
        setRungDragOver(false);
        const fromStr = e.dataTransfer.getData('rungdragidx');
        if (fromStr) { e.preventDefault(); e.stopPropagation(); onMoveRung?.(parseInt(fromStr), rungIndex); }
      }}
    >
      {editing ? (
        <input
          className="rung-number-input"
          autoFocus
          defaultValue={rung.label}
          placeholder={rungNum}
          maxLength={12}
          onBlur={(e) => { onRungLabelChange(rung.id, e.target.value.toUpperCase()); setEditing(false); }}
          onKeyDown={(e) => { if (e.key === 'Enter') { onRungLabelChange(rung.id, e.target.value.toUpperCase()); setEditing(false); } if (e.key === 'Escape') setEditing(false); }}
        />
      ) : (
        <span
          className={`rung-number ${simMode && !isSpent ? 'rung-number-sim' : ''}`}
          draggable={!simMode}
          onDragStart={simMode ? undefined : (e) => { e.dataTransfer.setData('rungdragidx', String(rungIndex)); e.dataTransfer.effectAllowed = 'move'; }}
          onDoubleClick={() => { if (!simMode) setEditing(true); }}
          onClick={() => { if (simMode && !isSpent && onStartScanFrom) onStartScanFrom(rungIndex); }}
          title={tips ? (simMode ? (isSpent ? 'SPENT --cannot simulate' : 'Click to start step-through for this rung') : 'Drag to reorder · Double-click to rename') : undefined}
        >{displayName}</span>
      )}
      <div className="rung-content">
        <div className="rail-left" />
        <div
          className={`input-contact ${rungEnergized || isSteppingThrough ? 'energized' : ''} ${selectedInput === rung.id ? 'selected' : ''} ${(rung.txInputIds && rung.txInputIds.length > 0) || (rung.outputRefs && rung.outputRefs.length > 0) ? 'has-inputs' : ''} ${scanning && isActiveRung && scanStep?.type === 'input' ? 'scan-active' : ''}`}
          onClick={() => { if (!isSteppingThrough) onSelectInput(rung.id); }}
          onDoubleClick={(e) => { if (!simMode) { e.stopPropagation(); setEditingInputName(true); setTimeout(() => inputNoteRef.current?.focus(), 0); } }}
          onContextMenu={(e) => { if (!simMode) { e.preventDefault(); e.stopPropagation(); onInputContextMenu?.(e.clientX, e.clientY, rung); } }}
          onMouseDown={(e) => { if (e.button === 2) e.stopPropagation(); }}
          title={tips ? (simMode ? 'Input contact --TX inputs feeding this rung' : 'Click to select · Double-click to name · Right-click for options') : undefined}
        >
          <span className="contact-bracket-left">─┤</span>
          <div className="input-contact-body">
            <span className="contact-type">INPUT</span>
            <span className="contact-value">
              {(() => {
                const parts = [];
                if (rung.txInputIds && rung.txInputIds.length > 0) parts.push(`${rung.txInputIds.length} VIN`);
                if (rung.outputRefs && rung.outputRefs.length > 0) parts.push(`${rung.outputRefs.length} RELAY`);
                return parts.length > 0 ? parts.join(' + ') : 'NONE';
              })()}
            </span>
          </div>
          <span className="contact-bracket-right">├─</span>
          {(!rung.txInputIds || rung.txInputIds.length === 0) && (!rung.outputRefs || rung.outputRefs.length === 0) && <span className="input-warn" title="No TX inputs or output refs assigned">⚠</span>}
          {rung.inputName && !editingInputName && <span className="input-contact-note">{rung.inputName}</span>}
          {editingInputName && (
            <input
              ref={inputNoteRef}
              className="input-contact-note-input"
              value={rung.inputName || ''}
              placeholder="Name this input..."
              onChange={(e) => onRungChange?.(rung.id, 'inputName', e.target.value)}
              onBlur={() => setEditingInputName(false)}
              onKeyDown={(e) => { if (e.key === 'Enter' || e.key === 'Escape') setEditingInputName(false); }}
              onClick={(e) => e.stopPropagation()}
            />
          )}
        </div>

        <div
          className="rung-slots"
          onDragOver={simMode ? undefined : (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }}
          onDrop={simMode ? undefined : handleRungDrop}
        >
          {slots.map((slot, i) => (
            <div
              key={i}
              className={`rung-slot ${dropSlot === i ? 'drag-target' : ''}`}
              onDragOver={simMode ? undefined : (e) => { e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = 'copy'; setDropSlot(i); }}
              onDragLeave={simMode ? undefined : (e) => {
                if (!e.currentTarget.contains(e.relatedTarget)) setDropSlot(null);
              }}
              onDrop={simMode ? undefined : (e) => handleSlotDrop(e, i)}
            >
              {slot.block ? (
                <ContactView
                  block={slot.block}
                  rungId={rung.id}
                  selected={selectedBlock === slot.block.id}
                  simMode={simMode}
                  simResult={isSteppingThrough ? (stepResults[slot.block.id] || (slot.blockIndex < stepActiveIdx ? 'satisfied' : null)) : blockResults[slot.block.id]}
                  scanClass={isSteppingThrough ? (
                    slot.blockIndex === stepActiveIdx ? 'step-next' :
                    slot.blockIndex < stepActiveIdx && (stepResults[slot.block.id] === 'satisfied') ? 'step-passed' :
                    stepResults[slot.block.id] === 'unsatisfied' || stepResults[slot.block.id] === 'error' ? 'step-failed' :
                    ''
                  ) : scanning ? (
                    isActiveRung && scanStep?.type === 'block' && scanStep?.block === slot.blockIndex ? 'scan-active' :
                    scanResults?.[`r${rungIndex}b${slot.blockIndex}`] === 'satisfied' ? 'scan-satisfied' :
                    scanResults?.[`r${rungIndex}b${slot.blockIndex}`] === 'unsatisfied' ? 'scan-failed' :
                    scanResults?.[`r${rungIndex}b${slot.blockIndex}`] ? 'scan-failed' :
                    (isActiveRung || !coilResult) ? 'scan-pending' : ''
                  ) : null}
                  onClick={() => {
                    if (isSteppingThrough && slot.blockIndex === stepActiveIdx) {
                      onStepBlock(slot.block.id);
                    } else {
                      onSelectBlock(slot.block.id);
                    }
                  }}
                  onDelete={() => onDeleteBlock(rung.id, slot.block.id)}
                  forcedState={forcedBlocks?.[slot.block.id] || null}
                  onForceToggle={onForceBlock}
                  tips={tips}
                  onNameChange={onNameChange}
                  onExpand={() => onExpandBlock?.(slot.block.id)}
                  onContextMenu={(x, y, block) => onBlockContextMenu?.(x, y, block, rung.id)}
                  renaming={renamingBlockId === slot.block.id}
                  onClearRenaming={onClearRenaming}
                />
              ) : (
                <div className={`rung-slot-wire ${slot.isFlowing ? 'energized' : ''}`} />
              )}
              {!slot.block && dropSlot === i && (
                <div className="rung-slot-drop drag-over" />
              )}
            </div>
          ))}
        </div>

        <div
          className={`coil ${rungEnergized || stepCoilReached ? 'energized' : ''} ${selectedCoil === rung.id ? 'selected' : ''} ${rung.output.txOutputId ? 'has-tx-output' : ''} ${!rung.output.txOutputId && isCoilReferenced ? 'has-ref' : ''} ${rung.output.type === 'relay' ? 'relay-coil' : ''} ${scanning && isActiveRung && scanStep?.type === 'coil' ? 'scan-active' : ''} ${coilResult === 'pass' ? 'scan-pass' : ''} ${coilResult === 'fail' ? 'scan-fail' : ''} ${stepCoilReached ? 'step-complete' : ''}`}
          onClick={() => onSelectCoil(rung.id)}
          onContextMenu={(e) => { if (!simMode) { e.preventDefault(); e.stopPropagation(); onOutputContextMenu?.(e.clientX, e.clientY, rung); } }}
          onMouseDown={(e) => { if (e.button === 2) e.stopPropagation(); }}
          style={{ cursor: 'pointer', position: 'relative' }}
          title={tips ? (simMode ? 'Output coil --rung result' : 'Click to select · Right-click for options') : undefined}
        >
          <span className="coil-symbol">{getCoilSymbol(rung.output.type)}</span>
          {(rung.output.name || rung.output.txOutputId) && (
            <div className="coil-info">
              {rung.output.name && <span className="coil-name">{rung.output.name}</span>}
              {rung.output.type !== 'relay' && (() => {
                const txOut = txOutputs?.find(o => o.id === rung.output.txOutputId);
                if (!txOut) return null;
                const addr = txOut.address || '';
                const addrShort = addr.length > 14 ? addr.substring(0, 6) + '..' + addr.slice(-4) : addr;
                const amt = parseInt(txOut.amount) || 0;
                return <span className="coil-tx-info">{addrShort}{amt > 0 ? ' ' + amt.toLocaleString() + 's' : ''}</span>;
              })()}
            </div>
          )}
          {!rung.output.txOutputId && !isCoilReferenced && rung.output.type !== 'relay' && <span className="coil-warn" title="No TX output assigned">⚠</span>}
          {simMode && !isSpent && !isSteppingThrough && onExecuteRung && (
            <span className={`coil-execute ${rungEnergized ? '' : 'coil-execute-dim'}`} onClick={(e) => { e.stopPropagation(); onExecuteRung(rung.id); }} title={tips ? (rungEnergized ? 'Execute this rung --marks as spent, cascades to shared inputs' : 'Force-execute --skip step-through, mark spent immediately') : undefined}>{rungEnergized ? 'EXECUTE' : 'FORCE'}</span>
          )}
          {stepCoilReached && (
            <span className="coil-execute" style={{ color: '#00ff88', borderColor: '#00ff88' }}>SPENT</span>
          )}
        </div>
        <div className="rail-right" />
      </div>
      {!simMode && (
        <div className="rung-controls">
          {rungIndex > 0 && <div className="rung-ctrl-btn" onClick={() => onMoveRung?.(rungIndex, rungIndex - 1)} title="Move rung up">▲</div>}
          <div className="rung-ctrl-btn delete" onClick={() => onDeleteRung(rung.id)} title="Delete rung">✕</div>
          {rungIndex < rungCount - 1 && <div className="rung-ctrl-btn" onClick={() => onMoveRung?.(rungIndex, rungIndex + 1)} title="Move rung down">▼</div>}
        </div>
      )}
    </div>
  );
}

function LadderView({ scanSequence, fullSimState, energizedOutputs, energizedRungNums, onScanStart, onScanStepFwd, onScanStepBack, startScanFrom }) {
  const ctx = useContext(AppContext);
  const dispatch = useContext(AppDispatch);
  const { rungs, mode, selectedBlockId: selectedBlock, selectedCoilId: selectedCoil, selectedInputId: selectedInput,
    txOutputs, txInputs, ladderFullscreen: fullscreen, scanPhase, scanStep, scanResults, scanSpeed, scanIdx,
    spentRungs, forcedBlocks, simActiveRungId, simActiveStep, simStepResults, renamingBlockId, renamingInputId,
    showTooltips: tips } = ctx;
  const scanTotal = scanSequence.length;
  const simState = fullSimState;
  const simMode = mode === 'simulate';

  // Dispatch-based callbacks replacing prop callbacks
  const onSelectBlock = useCallback((id) => dispatch({ type: 'SELECT_BLOCK', value: id }), [dispatch]);
  const onSelectCoil = useCallback((id) => dispatch({ type: 'SELECT_COIL', value: id }), [dispatch]);
  const onSelectInput = useCallback((id) => dispatch({ type: 'SELECT_INPUT', value: id }), [dispatch]);
  const onDeleteBlock = useCallback((rungId, blockId) => dispatch({ type: 'DELETE_BLOCK', rungId, blockId }), [dispatch]);
  const onDeleteRung = useCallback((rungId) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => { const next = prev.filter(r => r.id !== rungId); return next.length === 0 ? [createRung()] : next; } }), [dispatch]);
  const onDropBlock = useCallback((rungId, blockType, slotIdx) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
    if (r.id !== rungId) return r;
    if (r.blocks.length >= MAX_BLOCKS_PER_RUNG) return r;
    if (slotIdx !== undefined && r.blocks.some(b => b.slot === slotIdx)) return r;
    const newBlock = createBlock(blockType);
    newBlock.slot = slotIdx !== undefined ? slotIdx : r.blocks.length;
    if (r.blocks.some(b => b.slot === newBlock.slot)) {
      for (let s = 0; s < MAX_BLOCKS_PER_RUNG; s++) { if (!r.blocks.some(b => b.slot === s)) { newBlock.slot = s; break; } }
    }
    const blocks = [...r.blocks, newBlock].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
    return { ...r, blocks };
  }) }), [dispatch]);
  const onAddRung = useCallback(() => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.length >= 8 ? prev : [...prev, createRung()] }), [dispatch]);
  const onAddRungWithBlock = useCallback((blockType) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
    if (prev.length >= 8) return prev;
    const rung = createRung(); rung.blocks = [createBlock(blockType)]; return [...prev, rung];
  } }), [dispatch]);
  const onAddChangeRung = useCallback(() => dispatch({ type: 'ADD_CHANGE_RUNG', outputId: uid() }), [dispatch]);
  const onRungLabelChange = useCallback((rungId, label) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => r.id !== rungId ? r : { ...r, label }) }), [dispatch]);
  const onReorderBlock = useCallback((rungId, sourceBlockId, target) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => {
    if (r.id !== rungId) return r;
    const blocks = r.blocks.map(b => ({ ...b }));
    const srcBlock = blocks.find(b => b.id === sourceBlockId);
    if (!srcBlock) return r;
    let targetSlot;
    if (typeof target === 'number' && !blocks.find(b => b.id === target)) { targetSlot = target; }
    else { const tgtBlock = blocks.find(b => b.id === target); targetSlot = tgtBlock ? (tgtBlock.slot ?? blocks.indexOf(tgtBlock)) : srcBlock.slot; }
    if (targetSlot === (srcBlock.slot ?? 0)) return r;
    const occupant = blocks.find(b => b.id !== sourceBlockId && (b.slot ?? blocks.indexOf(b)) === targetSlot);
    if (occupant) occupant.slot = srcBlock.slot ?? 0;
    srcBlock.slot = targetSlot;
    blocks.sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
    return { ...r, blocks };
  }) }), [dispatch]);
  const onMoveRung = useCallback((fromIdx, toIdx) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
    if (fromIdx < 0 || fromIdx >= prev.length || toIdx < 0 || toIdx >= prev.length) return prev;
    const next = [...prev]; const [moved] = next.splice(fromIdx, 1); next.splice(toIdx, 0, moved); return next;
  } }), [dispatch]);
  const onMoveBlockCrossRung = useCallback((sourceRungId, blockId, targetRungId, slotIdx) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => {
    const srcRung = prev.find(r => r.id === sourceRungId);
    const tgtRung = prev.find(r => r.id === targetRungId);
    if (!srcRung || !tgtRung) return prev;
    const block = srcRung.blocks.find(b => b.id === blockId);
    if (!block || tgtRung.blocks.length >= MAX_BLOCKS_PER_RUNG) return prev;
    return prev.map(r => {
      if (r.id === sourceRungId) return { ...r, blocks: r.blocks.filter(b => b.id !== blockId) };
      if (r.id === targetRungId) {
        const movedBlock = { ...block };
        if (slotIdx !== undefined && !r.blocks.some(b => (b.slot ?? 0) === slotIdx)) { movedBlock.slot = slotIdx; }
        else { for (let s = 0; s < MAX_BLOCKS_PER_RUNG; s++) { if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { movedBlock.slot = s; break; } } }
        return { ...r, blocks: [...r.blocks, movedBlock].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0)) };
      }
      return r;
    });
  } }), [dispatch]);
  const onToggleFullscreen = useCallback(() => dispatch({ type: 'TOGGLE_FULLSCREEN' }), [dispatch]);
  const onScanPause = useCallback(() => dispatch({ type: 'SET_SCAN_PHASE', value: 'paused' }), [dispatch]);
  const onScanResume = useCallback(() => dispatch({ type: 'SET_SCAN_PHASE', value: 'running' }), [dispatch]);
  const onScanReset = useCallback(() => dispatch({ type: 'RESET_SCAN' }), [dispatch]);
  const onScanSpeedChange = useCallback((v) => dispatch({ type: 'SET_SCAN_SPEED', value: v }), [dispatch]);
  const onForceBlock = useCallback((blockId) => dispatch({ type: 'UPDATE_FORCED_BLOCKS', fn: prev => {
    const current = prev[blockId] || null;
    if (current === null) return { ...prev, [blockId]: 'satisfied' };
    if (current === 'satisfied') return { ...prev, [blockId]: 'unsatisfied' };
    const next = { ...prev }; delete next[blockId]; return next;
  } }), [dispatch]);
  const onExecuteRung = useCallback((rungId) => dispatch({ type: 'EXECUTE_RUNG', rungId }), [dispatch]);
  const onResetSim = useCallback(() => dispatch({ type: 'RESET_SIM' }), [dispatch]);
  const onStartScanFrom = startScanFrom;
  const onStepBlock = useCallback((blockId) => {
    const rung = rungs.find(r => r.id === simActiveRungId);
    if (!rung) return;
    const blockIdx = rung.blocks.findIndex(b => b.id === blockId);
    if (blockIdx !== simActiveStep) return;
    const nextStep = simActiveStep + 1;
    dispatch({ type: 'STEP_BLOCK', blockId, result: 'satisfied', nextStep });
    if (nextStep >= rung.blocks.length) {
      setTimeout(() => {
        dispatch({ type: 'EXECUTE_RUNG', rungId: simActiveRungId });
        dispatch({ type: 'SET_SIM_ACTIVE', rungId: null, step: -1, results: {} });
      }, 600);
    }
  }, [dispatch, rungs, simActiveRungId, simActiveStep]);
  const onNameChange = useCallback((blockId, name) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => ({ ...r, blocks: r.blocks.map(b => b.id === blockId ? { ...b, name } : b) })) }), [dispatch]);
  const onExpandBlock = useCallback((id) => dispatch({ type: 'SET_EXPANDED_BLOCK', value: id }), [dispatch]);
  const onBlockContextMenu = useCallback((x, y, block, rungId) => dispatch({ type: 'SET_CONTEXT_MENU', value: { x, y, block, rungId } }), [dispatch]);
  const onClearRenaming = useCallback(() => dispatch({ type: 'SET_RENAMING_BLOCK', value: null }), [dispatch]);
  const onClear = useCallback(() => dispatch({ type: 'CLEAR_ALL' }), [dispatch]);
  const onInputContextMenu = useCallback((x, y, rung) => dispatch({ type: 'SET_INPUT_CONTEXT_MENU', value: { x, y, rung } }), [dispatch]);
  const onRungChange = useCallback((rungId, field, value) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => r.id !== rungId ? r : { ...r, [field]: value }) }), [dispatch]);
  const onClearRenamingInput = useCallback(() => dispatch({ type: 'SET_RENAMING_INPUT', value: null }), [dispatch]);
  const onDeselect = useCallback(() => dispatch({ type: 'DESELECT_ALL' }), [dispatch]);
  const onOutputContextMenu = useCallback((x, y, rung) => dispatch({ type: 'SET_OUTPUT_CONTEXT_MENU', value: { x, y, rung } }), [dispatch]);
  const onFillAllTestData = useCallback(() => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(rung => ({ ...rung, blocks: rung.blocks.map(block => { const testVals = generateTestData(block.type); if (!testVals || Object.keys(testVals).length === 0) return block; const merged = { ...block.values }; Object.entries(testVals).forEach(([k, v]) => { if (!merged[k]) merged[k] = v; }); return { ...block, values: merged }; }) })) }), [dispatch]);
  const onJustifyLeft = useCallback(() => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => ({ ...r, blocks: r.blocks.map((b, i) => ({ ...b, slot: i })) })) }), [dispatch]);
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [isPanning, setIsPanning] = useState(false);
  const panStart = useRef({ x: 0, y: 0, panX: 0, panY: 0 });
  const wrapperRef = useRef(null);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      // Ctrl+scroll = zoom (fine control)
      setZoom(prev => {
        const delta = e.deltaY > 0 ? -0.05 : 0.05;
        return Math.round(Math.min(3, Math.max(0.3, prev + delta)) * 100) / 100;
      });
    } else if (e.shiftKey) {
      // Shift+scroll = horizontal pan
      setPan(prev => ({ ...prev, x: prev.x - e.deltaY }));
    } else {
      // Plain scroll = zoom
      setZoom(prev => {
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        return Math.round(Math.min(3, Math.max(0.3, prev + delta)) * 10) / 10;
      });
    }
  }, []);

  const handleMouseDown = useCallback((e) => {
    // Middle-click, shift+left-click, or right-click starts pan
    if (e.button === 1 || (e.button === 0 && e.shiftKey) || e.button === 2) {
      e.preventDefault();
      setIsPanning(true);
      panStart.current = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
    }
  }, [pan]);

  const handleMouseMove = useCallback((e) => {
    if (!isPanning) return;
    setPan({
      x: panStart.current.panX + (e.clientX - panStart.current.x),
      y: panStart.current.panY + (e.clientY - panStart.current.y),
    });
  }, [isPanning]);

  const handleMouseUp = useCallback(() => {
    setIsPanning(false);
  }, []);

  useEffect(() => {
    if (!isPanning) return;
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    return () => {
      window.removeEventListener('mousemove', handleMouseMove);
      window.removeEventListener('mouseup', handleMouseUp);
    };
  }, [isPanning, handleMouseMove, handleMouseUp]);

  // Attach wheel with passive:false so we can preventDefault
  useEffect(() => {
    const el = wrapperRef.current;
    if (!el) return;
    el.addEventListener('wheel', handleWheel, { passive: false });
    return () => el.removeEventListener('wheel', handleWheel);
  }, [handleWheel]);

  const resetView = useCallback(() => { setZoom(1); setPan({ x: 0, y: 0 }); }, []);

  // Build set of rung IDs whose coils are referenced by other rungs (via outputRefs or OUTPUT_REF blocks)
  const referencedCoilIds = useMemo(() => {
    const refs = new Set();
    rungs.forEach((r, ri) => {
      // Relay coils are always considered referenced (they don't need TX output)
      if (r.output.type === 'relay') {
        refs.add(r.id);
        return;
      }
      const rungName = r.label || `R${String(ri).padStart(3, '0')}`;
      // Check if any other rung's outputRefs reference this rung's name
      rungs.forEach(other => {
        if (other.id === r.id) return;
        if ((other.outputRefs || []).some(ref => ref === rungName || ref === r.output.name)) {
          refs.add(r.id);
        }
      });
      // If this rung has a named output, it's considered referenced for internal use
      if (r.output.name) refs.add(r.id);
    });
    return refs;
  }, [rungs]);

  return (
    <div className="ladder-area">
      <div className="ladder-toolbar">
        <span style={{ fontSize: 10, color: 'var(--text-secondary)', letterSpacing: 1 }}>LADDER</span>
        <div className="zoom-controls">
          <button className="zoom-btn" onClick={() => setZoom(z => Math.round(Math.max(0.3, z - 0.1) * 10) / 10)} title="Zoom out">−</button>
          <span className="zoom-level" onClick={resetView} style={{ cursor: 'pointer' }} title="Click to reset zoom">{Math.round(zoom * 100)}%</span>
          <button className="zoom-btn" onClick={() => setZoom(z => Math.round(Math.min(3, z + 0.1) * 10) / 10)} title="Zoom in">+</button>
          <button className="zoom-btn" onClick={resetView} title="Reset view --zoom 100% and re-centre">⌂</button>
          {!simMode && <button className="zoom-btn" onClick={onJustifyLeft} title="Justify left --pack all blocks to the left">⫷</button>}
        </div>
        <div style={{ flex: 1 }} />
        {!simMode && <button className="ladder-toolbar-btn" onClick={onAddRung}>+ RUNG</button>}
        {!simMode && <button className="ladder-toolbar-btn" onClick={onAddChangeRung} style={{ color: 'var(--green-bright)', borderColor: 'var(--green-dim)' }} title="Add a SIG change output rung">+ CHANGE</button>}
        {!simMode && <button className="ladder-toolbar-btn" onClick={onFillAllTestData} style={{ color: 'var(--cyan)', borderColor: 'rgba(0,212,255,0.3)' }} title="Fill all blocks with valid test data">FILL TEST DATA</button>}
        {!simMode && <button className="ladder-toolbar-btn" onClick={onClear} style={{ color: 'var(--red)', borderColor: 'var(--red-dim)' }} title="Clear all rungs and start fresh">CLEAR</button>}
        <button className="ladder-toolbar-btn" onClick={onToggleFullscreen} title={fullscreen ? 'Exit fullscreen (F11)' : 'Fullscreen (F11)'}>{fullscreen ? '⊡' : '⊞'}</button>
      </div>
      {simMode && (
        <div className="scan-bar">
          <button className="scan-btn" onClick={onScanReset} title="Reset">⏮</button>
          <button className="scan-btn" onClick={onScanStepBack} disabled={scanPhase === 'idle'} title="Step back">⏪</button>
          {scanPhase === 'running' ? (
            <button className="scan-btn active" onClick={onScanPause} title="Pause">⏸</button>
          ) : (
            <button className="scan-btn" onClick={scanPhase === 'idle' || scanPhase === 'done' ? onScanStart : onScanResume} title={scanPhase === 'idle' || scanPhase === 'done' ? 'Play' : 'Resume'}>▶</button>
          )}
          <button className="scan-btn" onClick={onScanStepFwd} disabled={scanPhase === 'done'} title="Step forward">⏩</button>
          <div className="scan-divider" />
          <span className="scan-pos">
            {scanPhase === 'idle' ? 'READY' :
             scanPhase === 'done' ? 'COMPLETE' :
             scanStep ? `R${String(scanStep.rung).padStart(2,'0')}${scanStep.type === 'block' ? '.B' + scanStep.block : scanStep.type === 'coil' ? '.OUT' : '.IN'}` : '—'}
          </span>
          <span className="scan-label">{scanIdx >= 0 ? scanIdx + 1 : 0}/{scanTotal}</span>
          <div className="scan-divider" />
          <div className="scan-speed-control">
            <span className="scan-label">SPEED</span>
            <input
              type="range"
              className="scan-speed-slider"
              min="100"
              max="2000"
              step="100"
              value={2100 - scanSpeed}
              onChange={(e) => onScanSpeedChange(2100 - parseInt(e.target.value))}
            />
            <span className="scan-speed-label">{scanSpeed}ms</span>
          </div>
          <div className="scan-divider" />
          <button className="scan-btn reset-sim" onClick={onResetSim} title="Reset all forced blocks and spent rungs" style={{ color: 'var(--red)', fontSize: 9, letterSpacing: 1, width: 'auto', padding: '0 8px', whiteSpace: 'nowrap' }}>RESET SIM</button>
        </div>
      )}
      <div
        className={`ladder-zoom-wrapper ${isPanning ? 'panning' : ''}`}
        ref={wrapperRef}
        onMouseDown={handleMouseDown}
        onClick={(e) => { if (e.target === e.currentTarget || e.target.classList.contains('ladder-zoom-content')) onDeselect?.(); }}
        onContextMenu={(e) => e.preventDefault()}
      >
        <div
          className="ladder-zoom-content"
          style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, padding: '16px 0' }}
        >
          {rungs.length === 0 ? (
            <div className="empty-ladder">
              <span>NO RUNGS DEFINED</span>
              <span className="hint">Drag blocks from palette or click + RUNG</span>
            </div>
          ) : (
            rungs.map((rung, i) => (
              <RungView
                key={rung.id}
                rung={rung}
                rungIndex={i}
                rungCount={rungs.length}
                selectedBlock={selectedBlock}
                selectedCoil={selectedCoil}
                simMode={simMode}
                simState={simState}
                onSelectBlock={onSelectBlock}
                onSelectCoil={onSelectCoil}
                onDeleteBlock={onDeleteBlock}
                onDeleteRung={onDeleteRung}
                onDropBlock={onDropBlock}
                onRungLabelChange={onRungLabelChange}
                onReorderBlock={onReorderBlock}
                onMoveRung={onMoveRung}
                onMoveBlockCrossRung={onMoveBlockCrossRung}
                txOutputs={txOutputs}
                txInputs={txInputs}
                selectedInput={selectedInput}
                onSelectInput={onSelectInput}
                scanStep={scanStep}
                scanResults={scanResults}
                scanning={scanPhase !== 'idle'}
                isSpent={spentRungs?.has(rung.id)}
                spentType={spentRungs?.get(rung.id) || null}
                forcedBlocks={forcedBlocks}
                onForceBlock={onForceBlock}
                onExecuteRung={onExecuteRung}
                onStartScanFrom={onStartScanFrom}
                isSteppingThrough={simActiveRungId === rung.id}
                stepActiveIdx={simActiveRungId === rung.id ? simActiveStep : -1}
                stepResults={simStepResults}
                onStepBlock={onStepBlock}
                tips={tips}
                onNameChange={onNameChange}
                onExpandBlock={onExpandBlock}
                onBlockContextMenu={onBlockContextMenu}
                renamingBlockId={renamingBlockId}
                onClearRenaming={onClearRenaming}
                onInputContextMenu={onInputContextMenu}
                onRungChange={onRungChange}
                renamingInputId={renamingInputId}
                onClearRenamingInput={onClearRenamingInput}
                onOutputContextMenu={onOutputContextMenu}
                isCoilReferenced={referencedCoilIds.has(rung.id)}
              />
            ))
          )}
          {!simMode && rungs.length < 8 && <div
            className="add-rung-btn"
            onClick={onAddRung}
            onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; e.currentTarget.style.borderColor = 'var(--amber)'; e.currentTarget.style.color = 'var(--amber)'; }}
            onDragLeave={(e) => { e.currentTarget.style.borderColor = ''; e.currentTarget.style.color = ''; }}
            onDrop={(e) => {
              e.preventDefault();
              e.currentTarget.style.borderColor = '';
              e.currentTarget.style.color = '';
              const blockType = e.dataTransfer.getData('blockType');
              if (blockType) onAddRungWithBlock(blockType);
            }}
          >+ ADD RUNG (or drop block here)</div>}
        </div>
      </div>
    </div>
  );
}

  return FIELD_TOOLTIP[field.name] || FIELD_TOOLTIP[field.dataType] || field.placeholder || '';
}

function PropertiesPanel() {
  const { selectedBlock: block, rungs } = useContext(AppContext);
  const dispatch = useContext(AppDispatch);
  const onChange = useCallback((blockId, field, value) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => ({
    ...r, blocks: r.blocks.map(b => {
      if (b.id !== blockId) return b;
      if (field === '__inverted') return { ...b, inverted: value };
      if (field === '__name') return { ...b, name: value };
      if (field === '__addInnerBlock') {
        const ibDef = getBlockDef(value);
        const ibVals = {}; (ibDef?.fields || []).forEach(f => { ibVals[f.name] = ''; });
        return { ...b, innerBlocks: [...(b.innerBlocks || []), { id: uid(), type: value, values: ibVals }] };
      }
      if (field === '__removeInnerBlock') return { ...b, innerBlocks: (b.innerBlocks || []).filter((_, i) => i !== value) };
      if (field === '__updateInnerBlock') {
        const { idx, field: ibField, value: ibVal } = value;
        return { ...b, innerBlocks: (b.innerBlocks || []).map((ib, i) => i !== idx ? ib : { ...ib, values: { ...ib.values, [ibField]: ibVal } }) };
      }
      return { ...b, values: { ...b.values, [field]: value } };
    })
  })) }), [dispatch]);
  const onExpand = useCallback((id) => dispatch({ type: 'SET_EXPANDED_BLOCK', value: id }), [dispatch]);

  // Collect all rung outputs for OUTPUT_REF dropdown (must be before early return --hooks rules)
  const allOutputs = useMemo(() => {
    if (!rungs) return [];
    const items = [];
    rungs.forEach((r, i) => {
      const rungNum = `R${String(i).padStart(3, '0')}`;
      const rungLabel = r.label || rungNum;
      const coilName = r.output.name;
      const coilSym = getCoilSymbol(r.output.type);
      const refValue = coilName || r.label || rungNum;
      const displayParts = [coilSym, rungLabel];
      if (coilName && coilName !== r.label) displayParts.push(`→ ${coilName}`);
      if (!coilName) displayParts.push('(unnamed)');
      items.push({ refValue, display: displayParts.join(' '), hasName: !!coilName });
    });
    return items;
  }, [rungs]);

  if (!block) {
    return (
      <div className="no-selection">
        <div className="icon">◇</div>
        <div>SELECT A BLOCK</div>
        <div style={{ fontSize: 9, opacity: 0.5 }}>Click a contact in the ladder to configure</div>
      </div>
    );
  }

  const def = getBlockDef(block.type);

  return (
    <div>
      <div className="prop-section">
        <div className="prop-section-title" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>BLOCK --{block.type}</span>
          <div style={{ display: 'flex', gap: 4 }}>
            <button className="block-modal-expand-btn" onClick={() => {
              const testVals = generateTestData(block.type);
              Object.entries(testVals).forEach(([field, value]) => onChange(block.id, field, value));
            }} title="Populate all fields with valid test data">TEST DATA</button>
            <button className="block-modal-expand-btn" onClick={() => onExpand?.(block.id)}>EXPAND ◇</button>
          </div>
        </div>
        <div className="prop-row">
          <span className="prop-label" title="Optional label for this block --helps identify it in complex transactions">Name</span>
          <input
            className="prop-input"
            value={block.name || ''}
            placeholder="Label this block..."
            title="Optional label for this block --helps identify it in complex transactions"
            onChange={(e) => onChange(block.id, '__name', e.target.value)}
          />
        </div>
        <div className="prop-checkbox-row">
          <input
            type="checkbox"
            id="inverted"
            checked={block.inverted}
            title="Invert this condition --SATISFIED becomes UNSATISFIED and vice versa"
            onChange={(e) => onChange(block.id, '__inverted', e.target.checked)}
          />
          <label htmlFor="inverted" title="Invert this condition --SATISFIED becomes UNSATISFIED and vice versa">INVERTED (NOT)</label>
        </div>
      </div>
      {def.fields.length > 0 && (
        <div className="prop-section">
          <div className="prop-section-title">FIELDS</div>
          {def.fields.map(field => {
            // OUTPUT_REF gets a dropdown of named coils
            if (block.type === 'OUTPUT_REF' && field.name === 'ref_name') {
              return (
                <div key={field.name}>
                  <div className="prop-row">
                    <span className="prop-label">{field.label}</span>
                    <select
                      className="prop-select"
                      value={block.values[field.name] || ''}
                      onChange={(e) => onChange(block.id, field.name, e.target.value)}
                    >
                      <option value="">— select output —</option>
                      {allOutputs.map((o, oi) => (
                        <option key={oi} value={o.refValue}>
                          {o.display}
                        </option>
                      ))}
                    </select>
                  </div>
                </div>
              );
            }
            if (field.dataType === 'SCHEME') {
              return (
                <div key={field.name} className="prop-row">
                  <span className="prop-label" title="Signature scheme --determines the cryptographic algorithm used for signing">{field.label}</span>
                  <select
                    className="prop-select"
                    value={block.values[field.name] || ''}
                    title="Signature scheme --SCHNORR (default BIP-340), ECDSA (legacy), or post-quantum algorithms"
                    onChange={(e) => onChange(block.id, field.name, e.target.value)}
                  >
                    <option value="">SCHNORR (default)</option>
                    <option value="ECDSA">ECDSA</option>
                    <option value="FALCON512">FALCON-512 (PQ)</option>
                    <option value="FALCON1024">FALCON-1024 (PQ)</option>
                    <option value="DILITHIUM3">DILITHIUM3 (PQ)</option>
                    <option value="SPHINCS_SHA">SPHINCS+-SHA2 (PQ)</option>
                  </select>
                </div>
              );
            }
            return (
              <div key={field.name} className="prop-row">
                <span className="prop-label" title={fieldTooltip(field)}>{field.label}</span>
                <input
                  className="prop-input"
                  value={block.values[field.name] || ''}
                  placeholder={field.placeholder}
                  title={fieldTooltip(field)}
                  readOnly={!!field.computed}
                  style={field.computed ? { opacity: 0.5, cursor: 'not-allowed' } : undefined}
                  onChange={field.computed ? undefined : (e) => onChange(block.id, field.name, e.target.value)}
                />
              </div>
            );
          })}
        </div>
      )}
      <div className="prop-section">
        <div className="prop-section-title">INFO</div>
        <div style={{ fontSize: 10, color: 'var(--text-dim)', lineHeight: 1.5 }}>
          Family: {BLOCK_FAMILIES.find(f => f.blocks.some(b => b.type === block.type))?.name || '?'}<br />
          Type ID: 0x{getTypeHex(block.type)}
        </div>
      </div>
    </div>
  );
}

function getTypeHex(type) {
  const map = {
    SIG:'0001',MULTISIG:'0002',ADAPTOR_SIG:'0003',MUSIG_THRESHOLD:'0004',KEY_REF_SIG:'0005',
    CSV:'0101',CSV_TIME:'0102',CLTV:'0103',CLTV_TIME:'0104',
    TAGGED_HASH:'0203',HASH_GUARDED:'0204',
    CTV:'0301',VAULT_LOCK:'0302',AMOUNT_LOCK:'0303',
    RECURSE_SAME:'0401',RECURSE_MODIFIED:'0402',RECURSE_UNTIL:'0403',
    RECURSE_COUNT:'0404',RECURSE_SPLIT:'0405',RECURSE_DECAY:'0406',
    ANCHOR:'0501',ANCHOR_CHANNEL:'0502',ANCHOR_POOL:'0503',
    ANCHOR_RESERVE:'0504',ANCHOR_SEAL:'0505',ANCHOR_ORACLE:'0506',DATA_RETURN:'0507',
    HYSTERESIS_FEE:'0601',HYSTERESIS_VALUE:'0602',
    TIMER_CONTINUOUS:'0611',TIMER_OFF_DELAY:'0612',
    LATCH_SET:'0621',LATCH_RESET:'0622',
    COUNTER_DOWN:'0631',COUNTER_PRESET:'0632',COUNTER_UP:'0633',
    COMPARE:'0641',SEQUENCER:'0651',ONE_SHOT:'0661',
    RATE_LIMIT:'0671',COSIGN:'0681',
    TIMELOCKED_SIG:'0701',HTLC:'0702',HASH_SIG:'0703',PTLC:'0704',CLTV_SIG:'0705',TIMELOCKED_MULTISIG:'0706',
    EPOCH_GATE:'0801',WEIGHT_LIMIT:'0802',INPUT_COUNT:'0803',OUTPUT_COUNT:'0804',RELATIVE_VALUE:'0805',ACCUMULATOR:'0806',OUTPUT_CHECK:'0807',
    P2PK_LEGACY:'0901',P2PKH_LEGACY:'0902',P2SH_LEGACY:'0903',P2WPKH_LEGACY:'0904',P2WSH_LEGACY:'0905',P2TR_LEGACY:'0906',P2TR_SCRIPT_LEGACY:'0907',
  };
  return map[type] || '????';
}

function InputPropertiesPanel({ rungId }) {
  const { rungs, txInputs } = useContext(AppContext);
  const dispatch = useContext(AppDispatch);
  const rungIndex = rungs.findIndex(r => r.id === rungId);
  const rung = rungIndex >= 0 ? rungs[rungIndex] : null;
  const allRungs = rungs;
  const onRungChange = useCallback((rId, field, value) => dispatch({ type: 'UPDATE_RUNGS', fn: prev => prev.map(r => r.id !== rId ? r : { ...r, [field]: value }) }), [dispatch]);
  if (!rung) {
    return (
      <div className="no-selection">
        <div className="icon">◇</div>
        <div>NO INPUT SELECTED</div>
      </div>
    );
  }

  const rungNum = rung.label || `R${String(rungIndex).padStart(3, '0')}`;

  // Build list of available outputs from other rungs for cross-referencing
  const availableOutputs = useMemo(() => {
    if (!allRungs) return [];
    return allRungs.map((r, i) => {
      if (r.id === rung.id) return null; // skip self
      if (r.output.type !== 'relay') return null; // only relay coils can be referenced
      const label = r.label || `R${String(i).padStart(3, '0')}`;
      const coilName = r.output.name;
      const coilSym = getCoilSymbol(r.output.type);
      const refValue = coilName || r.label || `R${String(i).padStart(3, '0')}`;
      const display = `${coilSym} ${label}${coilName && coilName !== r.label ? ' → ' + coilName : ''}${!coilName ? ' (unnamed)' : ''}`;
      return { refValue, display, rungId: r.id };
    }).filter(Boolean);
  }, [allRungs, rung.id]);

  return (
    <div>
      <div className="prop-section">
        <div className="prop-section-title">TX INPUTS --{rungNum}</div>
        <div style={{ fontSize: 9, color: 'var(--text-dim)', marginBottom: 8, lineHeight: 1.4 }}>
          Select which UTXOs this spending path consumes. Define inputs in the TX tab first.
        </div>
        {(txInputs || []).map((input, idx) => {
          const isChecked = (rung.txInputIds || []).includes(input.id);
          const txidShort = input.txid ? input.txid.substring(0, 8) + '..' + input.txid.slice(-4) : '(no txid)';
          return (
            <div key={input.id} className="prop-checkbox-row" style={{ padding: '4px 0', borderBottom: '1px solid var(--border)' }}>
              <input
                type="checkbox"
                id={`txin-${rung.id}-${input.id}`}
                checked={isChecked}
                onChange={(e) => {
                  const current = rung.txInputIds || [];
                  const next = e.target.checked
                    ? [...current, input.id]
                    : current.filter(id => id !== input.id);
                  onRungChange(rung.id, 'txInputIds', next);
                }}
              />
              <label htmlFor={`txin-${rung.id}-${input.id}`} style={{ fontSize: 9, lineHeight: 1.4 }}>
                <span style={{ color: 'var(--cyan)' }}>VIN {idx}</span> {txidShort}:{input.vout}
              </label>
            </div>
          );
        })}
        {(!txInputs || txInputs.length === 0) && (
          <div style={{ fontSize: 9, color: 'var(--text-dim)', lineHeight: 1.4 }}>
            No TX inputs defined. Go to the TX tab to add inputs first.
          </div>
        )}
      </div>

      <div className="prop-section">
        <div className="prop-section-title">RELAY REFERENCES</div>
        <div style={{ fontSize: 9, color: 'var(--text-dim)', marginBottom: 8, lineHeight: 1.4 }}>
          Require relay coils to be satisfied. This rung will only pass if all referenced relays pass. Set a coil type to "Relay" to make it available here.
        </div>
        {availableOutputs.map((out) => {
          const isChecked = (rung.outputRefs || []).includes(out.refValue);
          return (
            <div key={out.rungId} className="prop-checkbox-row" style={{ padding: '4px 0', borderBottom: '1px solid var(--border)' }}>
              <input
                type="checkbox"
                id={`outref-${rung.id}-${out.rungId}`}
                checked={isChecked}
                onChange={(e) => {
                  const current = rung.outputRefs || [];
                  const next = e.target.checked
                    ? [...current, out.refValue]
                    : current.filter(v => v !== out.refValue);
                  onRungChange(rung.id, 'outputRefs', next);
                }}
              />
              <label htmlFor={`outref-${rung.id}-${out.rungId}`} style={{ fontSize: 9, lineHeight: 1.4 }}>
                <span style={{ color: 'var(--amber-dim)' }}>{out.display}</span>
              </label>
            </div>
          );
        })}
        {availableOutputs.length === 0 && (
          <div style={{ fontSize: 9, color: 'var(--text-dim)', lineHeight: 1.4 }}>

      <div className="prop-section">
        <div className="prop-section-title">SUMMARY</div>
        <div style={{ fontSize: 10, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
          {(rung.txInputIds || []).length > 0 ? (

            <div><span style={{ color: 'var(--amber)' }}>{(rung.outputRefs || []).length}</span> output ref(s): {(rung.outputRefs || []).join(', ')}</div>

      </div>
    </div>
  );

function HighlightedJson({ scanStep }) {
  const { rungs, txOutputs, txInputs, locktime, spentRungs, simActiveRungId, simActiveStep, simStepResults, scanResults, scanPhase } = useContext(AppContext);
  const scrollRef = React.useRef(null);

  // Build line-level annotation map: each JSON line gets a state + optional marker
  const { lines, lineAnnotations } = React.useMemo(() => {
    const data = exportCreateTxMLSC(rungs, txOutputs, txInputs, locktime);
    const fullJson = JSON.stringify(data, null, 2);
    const jsonLines = fullJson.split('\n');
    // annotations[i] = { state: 'neutral'|'executed'|'blocked'|'active'|'passed'|'next', marker: bool }
    const annotations = jsonLines.map(() => ({ state: 'neutral', marker: false }));

    // Build rung→output/condition mapping
    // For each filtered output, find its assigned rungs (same order as exportCreateRungtx)
    const rungsByOutputHL = new Map();
    rungs.forEach(r => { if (r.output.type !== 'relay' && r.output.txOutputId != null) { const k = r.output.txOutputId; if (!rungsByOutputHL.has(k)) rungsByOutputHL.set(k, []); rungsByOutputHL.get(k).push(r); }});
    const filteredOutputs = txOutputs.filter(o => rungsByOutputHL.has(o.id));
    const rungCondMap = []; // { rungId, outputIdx, conditionIdx, blockCount, blocks: [{ blockId }] }
    filteredOutputs.forEach((txOut, outIdx) => {
      const assignedRungs = rungs.filter(r => r.output.txOutputId === txOut.id);
      assignedRungs.forEach((rung, condIdx) => {
        const wireBlocks = rung.blocks.filter(b => b.type !== 'OUTPUT_REF');
        rungCondMap.push({
          rungId: rung.id,
          outputIdx: outIdx,
          conditionIdx: condIdx,
          blockCount: wireBlocks.length,
          blocks: wireBlocks.map(b => ({ blockId: b.id })),
        });
      });
    });

    // Find line ranges for outputs, conditions, and blocks using deterministic JSON structure
    const blockRanges = []; // { outputIdx, condIdx, blockIdx, startLine, endLine }
    const condRanges = []; // { outputIdx, condIdx, startLine, endLine }
    const outputRanges = []; // { outputIdx, startLine, endLine }

    // Find where "outputs" key starts
    let outputsStartLine = -1;
    for (let i = 0; i < jsonLines.length; i++) {
      if (jsonLines[i].trim().startsWith('"outputs"')) {
        outputsStartLine = i;
        break;
      }
    }

    if (outputsStartLine >= 0 && data.outputs) {
      // For each output object, serialize it and count lines to find its range
      let cursor = outputsStartLine + 1; // line after "outputs": [
      data.outputs.forEach((output, outIdx) => {
        // Find next { from cursor
        while (cursor < jsonLines.length && !jsonLines[cursor].trim().startsWith('{')) cursor++;
        const outStart = cursor;
        const outJson = JSON.stringify(output, null, 2);
        const outLineCount = outJson.split('\n').length;
        // Adjust for indent --each line in the output gets +4 spaces indent in the parent
        const outEnd = outStart + outLineCount - 1;
        outputRanges.push({ outputIdx: outIdx, startLine: outStart, endLine: outEnd });

        // Now find conditions within this output
        if (output.conditions && output.conditions.length > 0) {
          // Find "conditions" line within this output range
          let condCursor = outStart;
          for (let i = outStart; i <= outEnd; i++) {
            if (jsonLines[i].trim().startsWith('"conditions"')) {
              condCursor = i + 1;
              break;
            }
          }

          output.conditions.forEach((cond, condIdx) => {
            // Find next { from condCursor
            while (condCursor <= outEnd && !jsonLines[condCursor].trim().startsWith('{')) condCursor++;
            const condStart = condCursor;
            const condJson = JSON.stringify(cond, null, 2);
            const condLineCount = condJson.split('\n').length;
            const condEnd = condStart + condLineCount - 1;
            condRanges.push({ outputIdx: outIdx, condIdx, startLine: condStart, endLine: condEnd });

            // Find blocks within this condition
            if (cond.blocks && cond.blocks.length > 0) {
              let blockCursor = condStart;
              for (let i = condStart; i <= condEnd; i++) {
                if (jsonLines[i].trim().startsWith('"blocks"')) {
                  blockCursor = i + 1;
                  break;
                }
              }

              cond.blocks.forEach((block, blockIdx) => {
                while (blockCursor <= condEnd && !jsonLines[blockCursor].trim().startsWith('{')) blockCursor++;
                const blockStart = blockCursor;
                const blockJson = JSON.stringify(block, null, 2);
                const blockLineCount = blockJson.split('\n').length;
                const blockEnd = blockStart + blockLineCount - 1;
                blockRanges.push({ outputIdx: outIdx, condIdx, blockIdx, startLine: blockStart, endLine: blockEnd });
                blockCursor = blockEnd + 1;
              });
            }
            condCursor = condEnd + 1;
          });
        }
        cursor = outEnd + 1;
      });
    }

    // Now apply annotations based on simulation state
    // 1. Output-level: executed/blocked for spent rungs
    outputRanges.forEach(range => {
      const txOut = filteredOutputs[range.outputIdx];
      if (!txOut) return;
      const assignedRungs = rungs.filter(r => r.output.txOutputId === txOut.id);
      let state = 'neutral';
      if (assignedRungs.some(r => spentRungs.get(r.id) === 'executed')) {
        state = 'executed';
      } else if (assignedRungs.length > 0 && assignedRungs.every(r => spentRungs.get(r.id) === 'blocked')) {
        state = 'blocked';
      }
      if (state !== 'neutral') {
        for (let i = range.startLine; i <= range.endLine && i < annotations.length; i++) {
          annotations[i].state = state;
        }
      }
    });

    // 2. Block-level: active stepping cursor
    if (simActiveRungId && simActiveStep >= 0) {
      const activeRung = rungs.find(r => r.id === simActiveRungId);
      if (activeRung) {
        const wireBlocks = activeRung.blocks.filter(b => b.type !== 'OUTPUT_REF');
        // Find which condition range this rung maps to
        const rungEntry = rungCondMap.find(rc => rc.rungId === simActiveRungId);
        if (rungEntry) {
          // Find the matching condition range
          const condRange = condRanges.find(cr => cr.outputIdx === rungEntry.outputIdx && cr.condIdx === rungEntry.conditionIdx);
          if (condRange) {
            // Mark entire condition as active context
            for (let i = condRange.startLine; i <= condRange.endLine && i < annotations.length; i++) {
              annotations[i].state = 'active-context';
            }
          }

          // Mark individual blocks
          wireBlocks.forEach((block, bIdx) => {
            const br = blockRanges.find(b => b.outputIdx === rungEntry.outputIdx && b.condIdx === rungEntry.conditionIdx && b.blockIdx === bIdx);
            if (!br) return;
            const result = simStepResults[block.id];
            if (bIdx < simActiveStep) {
              // Already passed
              for (let i = br.startLine; i <= br.endLine && i < annotations.length; i++) {
                annotations[i].state = result === 'unsatisfied' ? 'failed' : 'passed';
              }
            } else if (bIdx === simActiveStep) {
              // Current block --cursor here
              for (let i = br.startLine; i <= br.endLine && i < annotations.length; i++) {
                annotations[i].state = 'cursor';
              }
              annotations[br.startLine].marker = true;
            }
          });

          // If all blocks passed (coil firing), mark whole condition as passed
          if (simActiveStep >= wireBlocks.length) {
            if (condRange) {
              for (let i = condRange.startLine; i <= condRange.endLine && i < annotations.length; i++) {
                annotations[i].state = 'passed';
              }
            }
          }
        }
      }
    }

    // 3. Scan system (play button) --if no step-through is active
    if (!simActiveRungId && scanPhase && scanPhase !== 'idle') {
      // Apply scan results: each rung maps to a condition range
      rungCondMap.forEach((rc, rcIdx) => {
        const rungIdx = rungs.findIndex(r => r.id === rc.rungId);
        if (rungIdx < 0) return;
        const condRange = condRanges.find(cr => cr.outputIdx === rc.outputIdx && cr.condIdx === rc.conditionIdx);
        if (!condRange) return;

        // Check coil result for this rung
        const coilKey = `r${rungIdx}_coil`;
        if (scanResults[coilKey] === 'pass') {
          for (let i = condRange.startLine; i <= condRange.endLine && i < annotations.length; i++) {
            annotations[i].state = 'passed';
          }
          return;
        } else if (scanResults[coilKey] === 'fail') {
          for (let i = condRange.startLine; i <= condRange.endLine && i < annotations.length; i++) {
            annotations[i].state = 'failed';
          }
          return;
        } else if (scanResults[coilKey] === 'spent') {
          return; // skip spent rungs
        }

        // Check individual block results
        const wireBlocks = rungs[rungIdx].blocks.filter(b => b.type !== 'OUTPUT_REF');
        wireBlocks.forEach((block, bIdx) => {
          const blockKey = `r${rungIdx}b${bIdx}`;
          const br = blockRanges.find(b => b.outputIdx === rc.outputIdx && b.condIdx === rc.conditionIdx && b.blockIdx === bIdx);
          if (!br) return;
          if (scanResults[blockKey] === 'satisfied') {
            for (let i = br.startLine; i <= br.endLine && i < annotations.length; i++) {
              annotations[i].state = 'passed';
            }
          } else if (scanResults[blockKey] === 'unsatisfied' || scanResults[blockKey] === 'error') {
            for (let i = br.startLine; i <= br.endLine && i < annotations.length; i++) {
              annotations[i].state = 'failed';
            }
          }
        });

        // Current scan cursor
        if (scanStep && scanStep.rung === rungIdx && scanStep.type === 'block') {
          const br = blockRanges.find(b => b.outputIdx === rc.outputIdx && b.condIdx === rc.conditionIdx && b.blockIdx === scanStep.block);
          if (br) {
            for (let i = br.startLine; i <= br.endLine && i < annotations.length; i++) {
              annotations[i].state = 'cursor';
            }
            annotations[br.startLine].marker = true;
          }
        } else if (scanStep && scanStep.rung === rungIdx && scanStep.type === 'coil') {
          // Scanning the coil --mark whole condition as cursor
          for (let i = condRange.startLine; i <= condRange.endLine && i < annotations.length; i++) {
            if (annotations[i].state === 'neutral' || annotations[i].state === 'active-context') {
              annotations[i].state = 'cursor';
            }
          }
          annotations[condRange.startLine].marker = true;
        } else if (scanStep && scanStep.rung === rungIdx && scanStep.type === 'input') {
          // Scanning the input --light up the condition context
          for (let i = condRange.startLine; i <= condRange.endLine && i < annotations.length; i++) {
            annotations[i].state = 'active-context';
          }
          annotations[condRange.startLine].marker = true;
        }
      });
    }

    return { lines: jsonLines, lineAnnotations: annotations };
  }, [rungs, txOutputs, txInputs, locktime, spentRungs, simActiveRungId, simActiveStep, simStepResults, scanStep, scanResults, scanPhase]);

  // Auto-scroll to cursor line
  React.useEffect(() => {
    if (!scrollRef.current) return;
    const cursorIdx = lineAnnotations.findIndex(a => a.marker);
    if (cursorIdx >= 0) {
      const lineEl = scrollRef.current.children[cursorIdx];
      if (lineEl) lineEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }, [lineAnnotations]);

  return (
    <div className="json-output json-highlighted" style={{ flex: 1 }} ref={scrollRef}>
      {lines.map((line, i) => {
        const ann = lineAnnotations[i];
        const cls = ann.state !== 'neutral' ? `jhl-${ann.state}` : '';
        return (
          <div key={i} className={`jhl-line ${cls}`}>
            <span className="jhl-gutter">{ann.marker ? '►' : ' '}</span>
            <span className="jhl-code">{line}</span>
          </div>
        );
      })}
    </div>
  );
}

function RegisterTable({ fullSimState }) {
  const { rungs, isSimMode: simMode } = useContext(AppContext);
  const simState = fullSimState;
  const [expanded, setExpanded] = useState(true);

  const registers = useMemo(() => {
    const regs = [];
    rungs.forEach((rung, ri) => {
      rung.blocks.forEach((block, bi) => {
        const def = getBlockDef(block.type);
        const tag = `R${String(ri).padStart(3,'0')}.B${bi}`;
        let status = 'unknown';
        let value = '';

        if (simMode) {
          status = evaluateBlock(block, simState);
        }

        // Compute display value
        const v = block.values;
        switch (block.type) {
          case 'SIG': case 'ADAPTOR_SIG': case 'VAULT_LOCK': case 'CLTV_SIG':
            value = v.pubkey || v.signing_key || '—'; break;
          case 'MUSIG_THRESHOLD': value = `${v.threshold || '?'}-of-${v.group_size || '?'}`; break;
          case 'KEY_REF_SIG': value = `relay[${v.relay_index || '?'}].block[${v.block_index || '?'}]`; break;
          case 'PTLC': value = `${v.blocks || '?'} blk`; break;
          case 'TIMELOCKED_MULTISIG': value = `${v.threshold || '?'}-of-N ${v.blocks || '?'} blk`; break;
          case 'CSV': value = `${v.blocks || '?'} blocks`; break;
          case 'CSV_TIME': value = `${v.seconds || '?'} sec`; break;
          case 'CLTV': value = `height ${v.height || '?'}`; break;
          case 'CLTV_TIME': value = `time ${v.timestamp || '?'}`; break;
          case 'COUNTER_DOWN': value = `count ${v.count || '0'}`; break;
          case 'COUNTER_UP': value = `${v.current || '0'} / ${v.target || '?'}`; break;
          case 'COUNTER_PRESET': value = `${v.current || '0'} / ${v.preset || '?'}`; break;
          case 'ONE_SHOT': value = `state ${v.state || '0'}`; break;
          case 'TIMER_CONTINUOUS': value = `${v.accumulated || '0'} / ${v.target || '?'}`; break;
          case 'TIMER_OFF_DELAY': value = `rem ${v.remaining || '0'}`; break;
          case 'LATCH_SET': case 'LATCH_RESET': value = `state ${v.state || '0'}`; break;
          case 'SEQUENCER': value = `step ${v.current || '0'} / ${v.total || '?'}`; break;
          case 'AMOUNT_LOCK': value = `${v.min || '0'}-${v.max || '∞'} sats`; break;
          case 'HYSTERESIS_FEE': value = `${v.low_sat_vb || '0'}-${v.high_sat_vb || '?'} sat/vB`; break;
          case 'COMPARE': {
            const ops = {1:'EQ',2:'NEQ',3:'GT',4:'LT',5:'GTE',6:'LTE',7:'RANGE'};
            const opNum = parseInt(v.operator);
            value = opNum === 7 ? `${v.value_b || '?'}–${v.value_c || '?'}` : `${ops[opNum] || '?'} ${v.value_b || '?'}`;
            break;
          }
          default:
            const firstField = def.fields[0];
            if (firstField) value = v[firstField.name] || '—';
            else value = '—';
        }

        if (value.length > 20) value = value.substring(0, 8) + '..' + value.substring(value.length - 6);

        regs.push({ tag, type: def.label, value, status: simMode ? status : null, block });
      });
    });
    return regs;
  }, [rungs, simMode, simState]);

  const statusClass = (s) => {
    if (s === 'satisfied') return 'status-on';
    if (s === 'unsatisfied') return 'status-off';
    if (s === 'error') return 'status-fault';
    return '';
  };

  const statusText = (s) => {
    if (s === 'satisfied') return 'ENERGIZED';
    if (s === 'unsatisfied') return 'OFF';
    if (s === 'error') return 'FAULT';
    return '—';
  };

  return (
    <div className="register-area" style={{ maxHeight: expanded ? 200 : 26 }}>
      <div className="register-header" onClick={() => setExpanded(!expanded)}>
        <span className="register-header-title">REGISTER TABLE --{registers.length} ENTRIES</span>
        <span className="register-header-toggle">{expanded ? '▼' : '▲'}</span>
      </div>
      {expanded && (
        <div className="register-scroll">
          <table className="register-table">
            <thead>
              <tr>
                <th>Tag</th>
                <th>Type</th>
                <th>Value</th>
                {simMode && <th>Status</th>}
              </tr>
            </thead>
            <tbody>
              {registers.map((r, i) => (
                <tr key={i}>
                  <td className="tag">{r.tag}</td>
                  <td>{r.type}</td>
                  <td>{r.value}</td>
                  {simMode && <td className={statusClass(r.status)}>{statusText(r.status)}</td>}
                </tr>
              ))}
              {registers.length === 0 && (
                <tr><td colSpan={simMode ? 4 : 3} style={{ textAlign: 'center', color: 'var(--text-dim)' }}>No blocks</td></tr>
              )}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}
