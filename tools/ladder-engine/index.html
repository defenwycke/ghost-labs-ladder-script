<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADDER SCRIPT ENGINE</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #1a1a1a;
  --bg-secondary: #222222;
  --bg-tertiary: #2a2a2a;
  --bg-panel: #1e1e1e;
  --bg-hover: #333333;
  --bg-active: #3a3a3a;
  --border: #3a3a3a;
  --border-light: #444444;
  --text-primary: #d4d4d4;
  --text-secondary: #888888;
  --text-dim: #555555;
  --amber: #e6a817;
  --amber-dim: #8a6a10;
  --amber-glow: #e6a81740;
  --amber-bright: #ffc933;
  --green: #2ea043;
  --green-dim: #1a5c28;
  --green-bright: #3fb950;
  --red: #c43030;
  --red-dim: #6e1a1a;
  --red-bright: #f85149;
  --blue: #2d7dd2;
  --blue-dim: #1a4a7a;
  --cyan: #39a5b7;
  --rail-color: #4a4a4a;
  --rail-energized: #e6a817;
  --wire-color: #555555;
  --wire-energized: #e6a817;
  --contact-bg: #2a2a2a;
  --contact-energized: #3a3018;
  --coil-bg: #2a2a2a;
  --coil-energized: #3a3018;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;
  --font-display: 'Share Tech Mono', monospace;
}

html, body, #root { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-primary);
  background: var(--bg-primary);
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* App Layout */
.app {
  display: grid;
  grid-template-rows: 36px 1fr auto 24px;
  height: 100vh;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  gap: 16px;
  user-select: none;
}

.header-title {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--amber);
  letter-spacing: 2px;
  white-space: nowrap;
}

.header-divider {
  width: 1px;
  height: 18px;
  background: var(--border);
}

.mode-tabs {
  display: flex;
  gap: 0;
  height: 100%;
}

.mode-tab {
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: color 0.15s, border-color 0.15s;
}
.mode-tab:hover { color: var(--text-primary); }
.mode-tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.header-btn {
  padding: 4px 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.header-btn:hover {
  color: var(--text-primary);
  border-color: var(--border-light);
  background: var(--bg-hover);
}
.header-btn.primary {
  color: var(--amber);
  border-color: var(--amber-dim);
}
.header-btn.primary:hover {
  background: var(--amber-glow);
}

/* Main Content */
.main-content {
  display: grid;
  grid-template-columns: 180px 1fr 260px;
  overflow: hidden;
}

/* Palette */
.palette {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  user-select: none;
}

.palette-group {
  border-bottom: 1px solid var(--border);
}

.palette-group-header {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  cursor: pointer;
}
.palette-group-header:hover {
  color: var(--text-primary);
}
.palette-group-header .arrow {
  margin-right: 6px;
  font-size: 8px;
  transition: transform 0.15s;
}
.palette-group-header .arrow.collapsed {
  transform: rotate(-90deg);
}

.palette-item {
  display: flex;
  align-items: center;
  padding: 4px 10px 4px 22px;
  font-size: 11px;
  color: var(--text-primary);
  cursor: grab;
  transition: background 0.1s;
  gap: 8px;
}
.palette-item:hover {
  background: var(--bg-hover);
}
.palette-item:active {
  cursor: grabbing;
}
.palette-item .dot {
  width: 6px;
  height: 6px;
  flex-shrink: 0;
}

/* Ladder View */
.ladder-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

.ladder-toolbar {
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 30px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}

.ladder-toolbar-btn {
  padding: 3px 8px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  background: none;
  border: 1px solid var(--border);
  cursor: pointer;
  letter-spacing: 0.5px;
}
.ladder-toolbar-btn:hover {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

/* Rung */
.rung {
  position: relative;
  margin: 0 16px 6px 16px;
  min-height: 52px;
  transition: border-color 0.1s;
  border: 1px solid transparent;
}
.rung.drag-target-rung {
  border-color: var(--amber);
  border-radius: 3px;
}

.rung-number {
  position: absolute;
  left: -2px;
  top: 0;
  font-size: 9px;
  font-family: var(--font-display);
  color: var(--text-dim);
  letter-spacing: 1px;
  width: 44px;
  text-align: right;
  line-height: 44px;
  cursor: grab;
  user-select: none;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rung-number:active { cursor: grabbing; }
.rung-number:hover {
  color: var(--amber-dim);
}
.rung-number-sim {
  cursor: pointer;
  color: var(--text-secondary);
}
.rung-number-sim:hover {
  color: var(--amber) !important;
  text-shadow: 0 0 6px rgba(255, 170, 0, 0.4);
}
.rung-number-input {
  position: absolute;
  left: -2px;
  top: 10px;
  width: 44px;
  font-size: 9px;
  font-family: var(--font-display);
  color: var(--amber);
  background: var(--bg-primary);
  border: 1px solid var(--amber-dim);
  padding: 2px 3px;
  outline: none;
  text-align: right;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.rung-content {
  display: flex;
  align-items: center;
  margin-left: 44px;
  margin-right: 8px;
  height: 44px;
  position: relative;
}

.rung-slots {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  flex: 1;
  height: 44px;
  align-items: center;
}

.rung-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  position: relative;
}

.rung-slot-wire {
  width: 100%;
  height: 2px;
  background: var(--wire-color);
  transition: background 0.3s;
}
.rung-slot-wire.energized {
  background: var(--wire-energized);
  box-shadow: 0 0 4px var(--amber-glow);
}
.rung.stepping .rung-slot-wire.energized {
  background: #00ff88;
  box-shadow: 0 0 6px #00ff8860;
}

.rung-slot-drop {
  position: absolute;
  inset: 0;
  z-index: 2;
}
.rung-slot-drop.drag-over {
  background: var(--amber-glow);
  outline: 1px dashed var(--amber-dim);
  outline-offset: -1px;
}

/* Power rails */
.rail-left, .rail-right {
  width: 3px;
  height: 44px;
  flex-shrink: 0;
  transition: background 0.3s;
}
.rail-left { background: var(--rail-color); }
.rail-right { background: var(--rail-color); }
.rung.energized .rail-left,
.rung.energized .rail-right {
  background: var(--rail-energized);
  box-shadow: 0 0 6px var(--amber-glow);
}

/* Wire segments */
.wire-segment {
  height: 2px;
  min-width: 8px;
  flex-shrink: 0;
  width: 8px;
  transition: background 0.3s;
  background: var(--wire-color);
}
.wire-segment.energized {
  background: var(--wire-energized);
  box-shadow: 0 0 4px var(--amber-glow);
}

/* Contact (block) */
.contact {
  display: flex;
  align-items: center;
  height: 34px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}

.contact-bracket-left,
.contact-bracket-right {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--wire-color);
  line-height: 34px;
  transition: color 0.3s;
}
.contact.energized .contact-bracket-left,
.contact.energized .contact-bracket-right {
  color: var(--wire-energized);
}

.contact-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 72px;
  height: 34px;
  padding: 0 6px;
  background: var(--contact-bg);
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.contact.energized .contact-body {
  background: var(--contact-energized);
  border-color: var(--amber-dim);
  box-shadow: inset 0 0 12px var(--amber-glow);
}
.contact.fault .contact-body {
  background: var(--red-dim);
  border-color: var(--red);
}
.contact.selected .contact-body {
  border-color: #ffffff;
  box-shadow: 0 0 0 1px #ffffff, 0 0 8px rgba(255,255,255,0.3);
}
.contact.selected .contact-type {
  color: #ffffff !important;
}
.contact.selected .contact-bracket-left,
.contact.selected .contact-bracket-right {
  color: #ffffff !important;
}
.contact:hover .contact-body {
  border-color: var(--border-light);
}

.contact-type {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: color 0.3s;
}
.contact.energized .contact-type {
  color: var(--amber);
}
.contact.fault .contact-type {
  color: var(--red-bright);
}

.contact-value {
  font-size: 8px;
  color: var(--text-dim);
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.contact.energized .contact-value {
  color: var(--amber-dim);
}

.contact-inverted {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}
.contact-inverted::before {
  content: '';
  position: absolute;
  top: 3px;
  bottom: 3px;
  left: 50%;
  width: 0;
  border-left: 2px solid var(--red);
  transform: translateX(-50%) rotate(-45deg);
  transform-origin: center center;
}
.contact-inverted::after {
  content: 'NOT';
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 6px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.5px;
  line-height: 1;
}

/* Coil (output) */
.coil {
  display: flex;
  align-items: center;
  height: 34px;
  flex-shrink: 0;
  gap: 6px;
  min-width: 40px;
}
.coil-symbol {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--wire-color);
  transition: color 0.3s;
  flex-shrink: 0;
}
.coil.energized .coil-symbol {
  color: var(--amber);
  text-shadow: 0 0 8px var(--amber-glow);
}
.coil.selected {
  outline: 1px solid #ffffff;
  outline-offset: 2px;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
}
.coil.selected .coil-symbol {
  color: #ffffff !important;
}
.coil.selected .coil-name {
  color: #ffffff !important;
}
.coil:hover .coil-symbol {
  color: var(--text-primary);
}
.coil.has-tx-output .coil-symbol {
  color: var(--cyan);
}
.coil.has-tx-output .coil-name {
  color: var(--cyan);
}
.coil.has-tx-output .coil-tx-info {
  color: var(--cyan);
}
.coil.has-ref .coil-symbol {
  color: var(--green);
}
.coil.has-ref .coil-name {
  color: var(--green);
}
.coil.relay-coil {
  border: 1px dashed var(--amber-dim);
  background: #2a2510;
}
.coil.relay-coil .coil-symbol {
  color: var(--amber);
}
.coil.relay-coil .coil-name {
  color: var(--amber-dim);
}
.coil.relay-coil.energized {
  border-color: var(--amber);
  background: #3a3018;
}
.coil.relay-coil.energized .coil-symbol {
  color: var(--amber-bright);
  text-shadow: 0 0 10px var(--amber-glow);
}
.coil-warn {
  position: absolute;
  top: -6px;
  right: 6px;
  font-size: 9px;
  color: var(--amber);
  line-height: 1;
  z-index: 3;
  text-shadow: 0 0 4px var(--bg-primary);
}
.coil-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.coil-name {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
}
.coil.energized .coil-name {
  color: var(--amber-bright);
}
.coil-tx-info {
  font-size: 7px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
  letter-spacing: 0.3px;
}
.coil.energized .coil-tx-info {
  color: var(--green-bright);
}

/* Input contact (left side of rung — same shape as condition blocks) */
.input-contact {
  display: flex;
  align-items: center;
  height: 34px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}
.input-contact > .contact-bracket-left,
.input-contact > .contact-bracket-right {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--wire-color);
  line-height: 34px;
  transition: color 0.3s;
}
.input-contact-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  height: 34px;
  padding: 0 4px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border);
  transition: all 0.3s;
}
.input-contact-body .contact-type {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}
.input-contact-body .contact-value {
  font-size: 7px;
  color: var(--text-dim);
  margin-top: 1px;
}
/* Warning badge for unassigned inputs */
.input-warn {
  position: absolute;
  top: -4px;
  right: -2px;
  font-size: 9px;
  color: var(--amber);
  line-height: 1;
  z-index: 3;
  text-shadow: 0 0 4px var(--bg-primary);
}
.input-contact-note {
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 7px;
  color: var(--cyan);
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
}
.input-contact-note-input {
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  background: var(--bg-primary);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 8px;
  padding: 1px 4px;
  text-align: center;
  outline: none;
  z-index: 20;
}
/* Energized state */
.input-contact.energized > .contact-bracket-left,
.input-contact.energized > .contact-bracket-right {
  color: var(--wire-energized);
}
.input-contact.energized .input-contact-body {
  background: var(--contact-energized);
  border-color: var(--amber-dim);
  border-top-color: var(--amber);
  box-shadow: inset 0 0 12px var(--amber-glow);
}
.input-contact.energized .input-contact-body .contact-type {
  color: var(--amber);
}
/* Step-through green override for input contact */
.rung.stepping .input-contact.energized > .contact-bracket-left,
.rung.stepping .input-contact.energized > .contact-bracket-right {
  color: #00ff88;
}
.rung.stepping .input-contact.energized .input-contact-body {
  background: #00ff8810;
  border-color: #00ff8840;
  border-top-color: #00ff88;
  box-shadow: inset 0 0 12px #00ff8815;
}
.rung.stepping .input-contact.energized .input-contact-body .contact-type {
  color: #00ff88;
}
/* When inputs are assigned: cyan accent */
.input-contact.has-inputs > .contact-bracket-left,
.input-contact.has-inputs > .contact-bracket-right {
  color: var(--cyan);
}
.input-contact.has-inputs .input-contact-body {
  border-top-color: var(--cyan);
  border-color: var(--cyan);
  border-width: 1px;
  border-top-width: 2px;
}
.input-contact.has-inputs .input-contact-body .contact-type {
  color: var(--cyan);
}
.input-contact.has-inputs .input-contact-body .contact-value {
  color: var(--cyan);
}
.input-contact.selected .input-contact-body {
  border-color: #ffffff;
  box-shadow: 0 0 0 1px #ffffff, 0 0 8px rgba(255,255,255,0.3);
}
.input-contact.selected .input-contact-body .contact-type {
  color: #ffffff !important;
}
.input-contact:hover .input-contact-body {
  border-color: var(--border-light);
}

/* Drop zone (legacy, replaced by slot-based drops) */

.add-rung-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px 60px;
  padding: 6px;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.add-rung-btn:hover {
  border-color: var(--amber-dim);
  color: var(--amber-dim);
  background: var(--amber-glow);
}

/* Right Panel */
.right-panel {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-tab-bar {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-tab {
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font-mono);
}
.panel-tab:hover { color: var(--text-primary); }
.panel-tab.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* Properties */
.prop-section {
  margin-bottom: 12px;
}
.prop-section-title {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.prop-row {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
  gap: 8px;
}
.prop-label {
  font-size: 10px;
  color: var(--text-secondary);
  width: 70px;
  flex-shrink: 0;
}
.prop-input {
  flex: 1;
  padding: 3px 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  outline: none;
}
.prop-input:focus {
  border-color: var(--amber-dim);
}
.prop-input::placeholder {
  color: var(--text-dim);
}

.prop-select {
  flex: 1;
  padding: 3px 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  outline: none;
  cursor: pointer;
}

.prop-checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.prop-checkbox-row label {
  font-size: 10px;
  color: var(--text-secondary);
  cursor: pointer;
}

/* JSON Output */
.json-output {
  flex: 1;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  padding: 8px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--green-bright);
  white-space: pre-wrap;
  word-break: break-all;
  overflow-y: auto;
  line-height: 1.5;
}
/* Highlighted JSON — line-level annotations */
.json-highlighted .jhl-line {
  display: flex;
  line-height: 1.6;
  transition: background 0.2s, color 0.2s;
}
.json-highlighted .jhl-gutter {
  width: 12px;
  flex-shrink: 0;
  color: #00ff88;
  text-align: center;
  user-select: none;
}
.json-highlighted .jhl-code {
  flex: 1;
  white-space: pre;
}
/* Neutral — dim default */
.json-highlighted .jhl-line { color: var(--text-dim); }
/* Executed output — green text */
.json-highlighted .jhl-executed { color: #00ff88; }
.json-highlighted .jhl-executed .jhl-gutter { color: #00ff8860; }
/* Blocked output — red, dim */
.json-highlighted .jhl-blocked { color: var(--red); opacity: 0.4; }
/* Active context — slightly brighter than neutral */
.json-highlighted .jhl-active-context { color: var(--text-secondary); }
/* Passed block — bright green */
.json-highlighted .jhl-passed { color: #00ff88; background: #00ff8808; }
/* Failed block — red */
.json-highlighted .jhl-failed { color: var(--red); background: #f8514910; }
/* Cursor — current block, pulsing */
.json-highlighted .jhl-cursor {
  color: #fff;
  background: #00ff8818;
  animation: jsonCursorPulse 1s ease-in-out infinite;
}
.json-highlighted .jhl-cursor .jhl-gutter {
  color: #00ff88;
  animation: jsonCursorPulse 1s ease-in-out infinite;
}
@keyframes jsonCursorPulse {
  0%, 100% { background: #00ff8818; }
  50% { background: #00ff8830; }
}

/* Register Table */
.register-area {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  max-height: 200px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.register-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 12px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}
.register-header-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.register-header-toggle {
  font-size: 8px;
  color: var(--text-dim);
}

.register-scroll {
  overflow-y: auto;
  flex: 1;
}

.register-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 10px;
}
.register-table th {
  padding: 3px 10px;
  text-align: left;
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1;
}
.register-table td {
  padding: 3px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
  white-space: nowrap;
}
.register-table tr:hover td {
  background: var(--bg-hover);
}
.register-table .tag { color: var(--text-primary); font-weight: 500; }
.register-table .status-on {
  color: var(--amber);
}
.register-table .status-on::before {
  content: '■';
  margin-right: 4px;
}
.register-table .status-off {
  color: var(--text-dim);
}
.register-table .status-off::before {
  content: '░';
  margin-right: 4px;
}
.register-table .status-fault {
  color: var(--red);
}
.register-table .status-fault::before {
  content: '▓';
  margin-right: 4px;
}

/* Trend Chart */
.trend-chart {
  padding: 10px;
}
.trend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.trend-label {
  font-size: 9px;
  color: var(--text-secondary);
  width: 60px;
  text-align: right;
  flex-shrink: 0;
}
.trend-bar-container {
  flex: 1;
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 32px;
}
.trend-bar {
  flex: 1;
  background: var(--amber-dim);
  min-width: 4px;
  transition: height 0.3s, background 0.3s;
}
.trend-bar.current {
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber-glow);
}
.trend-bar.zero {
  background: var(--border);
  height: 2px !important;
}

/* Simulation Controls */
.sim-controls {
  padding: 10px;
}
.sim-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.sim-label {
  font-size: 10px;
  color: var(--text-secondary);
  width: 90px;
  flex-shrink: 0;
}
.sim-toggle {
  width: 32px;
  height: 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}
.sim-toggle::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 2px;
  width: 10px;
  height: 10px;
  background: var(--text-dim);
  transition: all 0.15s;
}
.sim-toggle.on::after {
  left: 18px;
  background: var(--amber);
  box-shadow: 0 0 4px var(--amber-glow);
}
.sim-toggle.on {
  border-color: var(--amber-dim);
}
.sim-input {
  flex: 1;
  padding: 2px 6px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  outline: none;
}
.sim-input:focus { border-color: var(--amber-dim); }

/* Status Bar */
.status-bar {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 0 12px;
  gap: 16px;
  font-size: 10px;
  color: var(--text-secondary);
  user-select: none;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.status-dot {
  width: 6px;
  height: 6px;
}
.status-dot.green { background: var(--green); }
.status-dot.amber { background: var(--amber); }
.status-dot.red { background: var(--red); }
.status-spacer { flex: 1; }
.tooltip-toggle {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  background: none;
  border: 1px solid var(--border);
  padding: 1px 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tooltip-toggle:hover {
  color: var(--amber);
  border-color: var(--amber-dim);
}

/* Simulation power flow animation */
@keyframes powerPulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}
.rung.energized .wire-segment.energized,
.rung.energized .contact.energized .contact-body {
  animation: powerPulse 2s ease-in-out infinite;
}

/* Scan animation — green highlight for active evaluation point */
@keyframes scanPulse {
  0% { box-shadow: inset 0 0 8px #00ff8840, 0 0 6px #00ff8830; }
  50% { box-shadow: inset 0 0 16px #00ff8880, 0 0 12px #00ff8860; }
  100% { box-shadow: inset 0 0 8px #00ff8840, 0 0 6px #00ff8830; }
}
@keyframes scanRungPulse {
  0% { box-shadow: inset 0 0 20px #00ff8810; }
  50% { box-shadow: inset 0 0 30px #00ff8820; }
  100% { box-shadow: inset 0 0 20px #00ff8810; }
}

.contact.scan-active .contact-body {
  border-color: #00ff88 !important;
  background: #00ff8818 !important;
  animation: scanPulse 0.8s ease-in-out infinite;
}
.contact.scan-active .contact-type {
  color: #00ff88 !important;
}
.contact.scan-active .contact-bracket-left,
.contact.scan-active .contact-bracket-right {
  color: #00ff88 !important;
}
.rung.scan-active-rung {
  background: #00ff8808;
  animation: scanRungPulse 0.8s ease-in-out infinite;
}
.rung.scan-active-rung .rail-left,
.rung.scan-active-rung .rail-right {
  background: #00ff8880;
  box-shadow: 0 0 6px #00ff8840;
}
/* Blocks not yet scanned are dimmed */
.contact.scan-pending .contact-body {
  opacity: 0.35;
}
.contact.scan-pending .contact-bracket-left,
.contact.scan-pending .contact-bracket-right {
  opacity: 0.35;
}
/* Scanned and satisfied = bright green glow */
.contact.scan-satisfied .contact-body {
  border-color: #00ff88aa !important;
  background: #00ff8815 !important;
  box-shadow: inset 0 0 8px #00ff8830;
}
.contact.scan-satisfied .contact-type {
  color: #00ff88 !important;
}
.contact.scan-satisfied .contact-bracket-left,
.contact.scan-satisfied .contact-bracket-right {
  color: #00ff8880 !important;
}
/* Scanned and unsatisfied = dim red */
.contact.scan-failed .contact-body {
  border-color: var(--red) !important;
  background: var(--red-dim) !important;
  box-shadow: inset 0 0 8px #f8514920;
}
.contact.scan-failed .contact-type {
  color: var(--red-bright) !important;
}
.contact.scan-failed .contact-bracket-left,
.contact.scan-failed .contact-bracket-right {
  color: var(--red) !important;
}
/* Rung result indicators */
.rung.scan-rung-pass .rail-left,
.rung.scan-rung-pass .rail-right {
  background: #00ff88;
  box-shadow: 0 0 8px #00ff8860;
}
.rung.scan-rung-fail .rail-left,
.rung.scan-rung-fail .rail-right {
  background: var(--red);
  box-shadow: 0 0 6px #f8514940;
}
.rung.scan-rung-spent {
  opacity: 0.3;
}
.rung.scan-rung-spent .rail-left,
.rung.scan-rung-spent .rail-right {
  background: var(--text-secondary);
}
/* Step-through mode */
.rung.stepping .rail-left {
  background: #00ff88;
  box-shadow: 0 0 8px #00ff8860;
}
.rung.step-complete .rail-left,
.rung.step-complete .rail-right {
  background: #00ff88;
  box-shadow: 0 0 8px #00ff8860;
}
.contact.step-next .contact-body {
  border-color: #00ff88 !important;
  animation: stepPulse 1s ease-in-out infinite;
  cursor: pointer !important;
}
.contact.step-next .contact-type {
  color: #00ff88 !important;
}
.contact.step-next .contact-bracket-left,
.contact.step-next .contact-bracket-right {
  color: #00ff88 !important;
}
.contact.step-passed .contact-body {
  border-color: #00ff88 !important;
  background: #00ff8815 !important;
}
.contact.step-passed .contact-type { color: #00ff88 !important; }
.contact.step-passed .contact-bracket-left,
.contact.step-passed .contact-bracket-right { color: #00ff8880 !important; }
.contact.step-failed .contact-body {
  border-color: var(--red) !important;
  background: var(--red-dim) !important;
}
.contact.step-failed .contact-type { color: var(--red) !important; }
.coil.step-complete .coil-symbol {
  color: #00ff88 !important;
  text-shadow: 0 0 8px #00ff8860;
}
@keyframes stepPulse {
  0%, 100% { box-shadow: 0 0 0 1px #00ff8840; }
  50% { box-shadow: 0 0 0 2px #00ff88, 0 0 12px #00ff8840; }
}

/* Input contact scanning */
.input-contact.scan-active .input-contact-body {
  border-color: #00ff88 !important;
  background: #00ff8818 !important;
  animation: scanPulse 0.8s ease-in-out infinite;
}
.input-contact.scan-active .input-contact-body .contact-type {
  color: #00ff88 !important;
}
/* Coil scanning */
.coil.scan-active .coil-symbol {
  color: #00ff88 !important;
  text-shadow: 0 0 12px #00ff8880;
}
.coil.scan-pass .coil-symbol {
  color: #00ff88 !important;
  text-shadow: 0 0 8px #00ff8860;
}
.coil.scan-fail .coil-symbol {
  color: var(--red-bright) !important;
}

/* Scan controls bar */
.scan-bar {
  display: flex;
  align-items: center;
  padding: 4px 12px;
  gap: 6px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.scan-btn {
  width: 26px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  cursor: pointer;
  padding: 0;
  transition: all 0.15s;
}
.scan-btn:hover {
  color: var(--text-primary);
  border-color: var(--border-light);
}
.scan-btn.active {
  color: #00ff88;
  border-color: #00ff8880;
  background: #00ff8815;
}
.scan-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.scan-divider {
  width: 1px;
  height: 16px;
  background: var(--border);
}
.scan-label {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.scan-pos {
  font-size: 9px;
  color: #00ff88;
  font-family: var(--font-display);
  letter-spacing: 1px;
  min-width: 70px;
}
.scan-speed-control {
  display: flex;
  align-items: center;
  gap: 4px;
}
.scan-speed-slider {
  width: 60px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
.scan-speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  background: #00ff88;
  cursor: pointer;
}
.scan-speed-label {
  font-size: 8px;
  color: var(--text-dim);
  min-width: 30px;
}

/* Forced block indicator */
.contact.forced-on .contact-body {
  border-color: #00ff88 !important;
  background: #00ff8818 !important;
  box-shadow: inset 0 0 8px #00ff8830;
}
.contact.forced-on .contact-type { color: #00ff88 !important; }
.contact.forced-on .contact-bracket-left,
.contact.forced-on .contact-bracket-right { color: #00ff8880 !important; }
.contact.forced-off .contact-body {
  border-color: var(--red) !important;
  background: var(--red-dim) !important;
  box-shadow: inset 0 0 8px #f8514920;
}
.contact.forced-off .contact-type { color: var(--red-bright) !important; }
.contact.forced-off .contact-bracket-left,
.contact.forced-off .contact-bracket-right { color: var(--red) !important; }
.force-badge {
  position: absolute;
  top: -6px;
  left: -2px;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 0 3px;
  line-height: 12px;
  z-index: 5;
  text-shadow: 0 0 4px var(--bg-primary);
}
.force-badge.on { color: #00ff88; }
.force-badge.off { color: var(--red-bright); }

/* Spent rung overlay */
.rung.spent {
  pointer-events: none;
}
/* Executed path — green, full visibility */
.rung.spent-executed {
  opacity: 0.75;
}
.rung.spent-executed .rail-left,
.rung.spent-executed .rail-right {
  background: #00ff88;
  box-shadow: 0 0 6px #00ff8840;
}
.rung.spent-executed .contact-body {
  border-color: #00ff8860 !important;
  background: #00ff8810 !important;
}
.rung.spent-executed .contact-type { color: #00ff88 !important; }
.rung.spent-executed .contact-bracket-left,
.rung.spent-executed .contact-bracket-right { color: #00ff8880 !important; }
.rung.spent-executed .input-contact-body {
  border-color: #00ff8860 !important;
  background: #00ff8810 !important;
}
.rung.spent-executed .input-contact .contact-type { color: #00ff88 !important; }
.rung.spent-executed .coil .coil-symbol { color: #00ff88 !important; }
.rung.spent-executed .rung-slot-wire { background: #00ff88 !important; }
.rung.spent-executed::after {
  content: 'EXECUTED';
  position: absolute;
  right: 20px;
  bottom: -14px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #00ff88;
  z-index: 10;
  pointer-events: none;
}
/* Blocked path — red, dimmed */
.rung.spent-blocked {
  opacity: 0.4;
}
.rung.spent-blocked .rail-left,
.rung.spent-blocked .rail-right {
  background: var(--red);
  box-shadow: 0 0 4px #f8514930;
}
.rung.spent-blocked .contact-body {
  border-color: #f8514940 !important;
  background: #f8514910 !important;
}
.rung.spent-blocked .contact-type { color: var(--red) !important; }
.rung.spent-blocked .contact-bracket-left,
.rung.spent-blocked .contact-bracket-right { color: #f8514960 !important; }
.rung.spent-blocked .input-contact-body {
  border-color: #f8514940 !important;
  background: #f8514910 !important;
}
.rung.spent-blocked .input-contact .contact-type { color: var(--red) !important; }
.rung.spent-blocked .coil .coil-symbol { color: var(--red) !important; }
.rung.spent-blocked .rung-slot-wire { background: var(--red) !important; }
.rung.spent-blocked::after {
  content: 'BLOCKED';
  position: absolute;
  right: 20px;
  bottom: -14px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--red);
  z-index: 10;
  pointer-events: none;
}

/* Execute button on coil */
.coil-execute {
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 7px;
  font-family: var(--font-mono);
  font-weight: 700;
  letter-spacing: 1px;
  color: #00ff88;
  background: var(--bg-primary);
  border: 1px solid #00ff8880;
  padding: 1px 6px;
  cursor: pointer;
  white-space: nowrap;
  z-index: 5;
  transition: all 0.15s;
}
.coil-execute:hover {
  background: #00ff8820;
  border-color: #00ff88;
  box-shadow: 0 0 6px #00ff8840;
}
.coil-execute-dim {
  color: var(--amber);
  border-color: var(--amber-dim);
  opacity: 0.6;
}
.coil-execute-dim:hover {
  background: rgba(255, 170, 0, 0.12);
  border-color: var(--amber);
  color: var(--amber);
  opacity: 1;
  box-shadow: 0 0 6px rgba(255, 170, 0, 0.3);
}

/* Delete button on contacts */
.contact-delete {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 14px;
  height: 14px;
  background: var(--red);
  color: white;
  font-size: 8px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
  line-height: 1;
}
.contact:hover .contact-delete {
  display: flex;
}

/* Rung delete */
.rung-controls {
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  display: none;
  flex-direction: column;
  gap: 2px;
  z-index: 5;
}
.rung:hover .rung-controls { display: flex; }
.rung-ctrl-btn {
  width: 16px;
  height: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.rung-ctrl-btn:hover { border-color: var(--amber); color: var(--amber); }
.rung-ctrl-btn.delete:hover { border-color: var(--red); color: var(--red); }
.rung-delete {
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 8px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
}
.rung:hover .rung-delete { display: flex; }
.rung-delete:hover { border-color: var(--red); color: var(--red); }

/* No selection state */
.no-selection {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 10px;
  text-align: center;
  gap: 8px;
  padding: 20px;
}
.no-selection .icon {
  font-size: 24px;
  opacity: 0.3;
}

/* Watch mode */
.watch-indicator {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  font-size: 10px;
  color: var(--green-bright);
  background: var(--green-dim);
  border: 1px solid var(--green);
}

@keyframes watchBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.watch-dot {
  width: 6px;
  height: 6px;
  background: var(--green-bright);
  animation: watchBlink 1s ease-in-out infinite;
}

/* Examples Modal */
.examples-overlay {
  position: fixed;
  inset: 0;

// SIMULATION ENGINE

function evaluateBlock(block, simState) {
  // Check for forced override first
  if (simState.forcedBlocks && simState.forcedBlocks[block.id]) {
    return simState.forcedBlocks[block.id]; // 'satisfied' or 'unsatisfied'
  }

  const def = getBlockDef(block.type);
  const v = block.values;

  let result = 'unknown';

  switch (block.type) {
    case 'OUTPUT_REF': {
      const refName = (v.ref_name || '').trim().toUpperCase();
      result = refName && simState.energizedOutputs?.has(refName) ? 'satisfied' : 'unsatisfied';
      // Also check energizedRungNums for unnamed coils referenced by R000 etc.
      if (result === 'unsatisfied' && refName && simState.energizedRungNums?.has(refName)) {
        result = 'satisfied';
      }
      break;
    }
    case 'SIG':
      result = simState.availableKeys?.has(v.pubkey) ? 'satisfied' : 'unsatisfied';
      break;
    case 'MULTISIG': {
      const threshold = parseInt(v.threshold) || 0;
      const keys = (v.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
      const available = keys.filter(k => simState.availableKeys?.has(k)).length;
      result = available >= threshold ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'ADAPTOR_SIG':
      result = simState.availableKeys?.has(v.signing_key) ? 'satisfied' : 'unsatisfied';
      break;
    case 'MUSIG_THRESHOLD': {
      const keyOk = simState.availableKeys?.has(v.agg_pubkey);
      const m = parseInt(v.threshold) || 0;
      const n = parseInt(v.group_size) || 0;
      result = (keyOk && m >= 1 && n >= m) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'CSV': {
      const required = parseInt(v.blocks) || 0;
      const elapsed = simState.csvBlocks || 0;
      result = elapsed >= required ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'CSV_TIME': {
      const required = parseInt(v.seconds) || 0;
      const elapsed = simState.csvSeconds || 0;
      result = elapsed >= required ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'CLTV': {
      const target = parseInt(v.height) || 0;
      const current = simState.blockHeight || 0;
      result = current >= target ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'CLTV_TIME': {
      const target = parseInt(v.timestamp) || 0;
      const current = simState.medianTime || 0;
      result = current >= target ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'HASH_PREIMAGE':
      result = simState.knownPreimages?.has(v.hash) ? 'satisfied' : 'unsatisfied';
      break;
    case 'HASH160_PREIMAGE':
      result = simState.knownPreimages?.has(v.hash) ? 'satisfied' : 'unsatisfied';
      break;
    case 'TAGGED_HASH':
      result = simState.knownPreimages?.has(v.hash) ? 'satisfied' : 'unsatisfied';
      break;
    case 'AMOUNT_LOCK': {
      const min = parseInt(v.min) || 0;
      const max = parseInt(v.max) || Infinity;
      const amt = simState.inputAmount || 0;
      result = (amt >= min && amt <= max) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'HYSTERESIS_FEE': {
      const high = parseInt(v.high_sat_vb) || 0;
      const low = parseInt(v.low_sat_vb) || 0;
      const rate = simState.feeRate || 0;
      result = (rate >= low && rate <= high) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'HYSTERESIS_VALUE': {
      const high = parseInt(v.high_sats) || 0;
      const low = parseInt(v.low_sats) || 0;
      const amt = simState.inputAmount || 0;
      result = (amt >= low && amt <= high) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'COUNTER_DOWN': {
      const count = parseInt(v.count) || 0;
      result = count > 0 ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'COUNTER_UP': {
      const current = parseInt(v.current) || 0;
      const target = parseInt(v.target) || 0;
      result = current < target ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'COUNTER_PRESET': {
      const current = parseInt(v.current) || 0;
      const preset = parseInt(v.preset) || 0;
      result = current < preset ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'ONE_SHOT': {
      const state = parseInt(v.state) || 0;
      result = state === 0 ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'TIMER_CONTINUOUS': {
      const accumulated = parseInt(v.accumulated) || 0;
      const target = parseInt(v.target) || 0;
      result = accumulated >= target ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'TIMER_OFF_DELAY': {
      const remaining = parseInt(v.remaining) || 0;
      result = remaining > 0 ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'LATCH_SET': {
      const state = parseInt(v.state) || 0;
      result = state === 0 ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'LATCH_RESET': {
      const state = parseInt(v.state) || 0;
      result = state >= 1 ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'SEQUENCER': {
      const current = parseInt(v.current) || 0;
      const total = parseInt(v.total) || 0;
      result = (current >= 0 && total > 0 && current < total) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'COMPARE': {
      const op = parseInt(v.operator) || 0;
      const val = parseInt(v.value_b) || 0;
      const amt = simState.inputAmount || 0;
      switch(op) {
        case 1: result = amt === val ? 'satisfied' : 'unsatisfied'; break;
        case 2: result = amt !== val ? 'satisfied' : 'unsatisfied'; break;
        case 3: result = amt > val ? 'satisfied' : 'unsatisfied'; break;
        case 4: result = amt < val ? 'satisfied' : 'unsatisfied'; break;
        case 5: result = amt >= val ? 'satisfied' : 'unsatisfied'; break;
        case 6: result = amt <= val ? 'satisfied' : 'unsatisfied'; break;
        default: result = 'unknown';
      }
      break;
    }
    case 'RATE_LIMIT': {
      const max = parseInt(v.max_per_block) || 0;
      const outAmt = simState.outputAmount || 0;
      result = outAmt <= max ? 'satisfied' : 'unsatisfied';
      break;
    }
    // Structural blocks: always satisfied in simulation
    case 'CTV':
    case 'VAULT_LOCK':
    case 'RECURSE_SAME':
    case 'RECURSE_MODIFIED':
    case 'RECURSE_UNTIL':
    case 'RECURSE_COUNT':
    case 'RECURSE_SPLIT':
    case 'RECURSE_DECAY':
    case 'ANCHOR':
    case 'ANCHOR_CHANNEL':
    case 'ANCHOR_POOL':
    case 'ANCHOR_RESERVE':
    case 'ANCHOR_SEAL':
    case 'ANCHOR_ORACLE':
    case 'COSIGN':
      result = 'satisfied';
      break;
    // Compound blocks: combine evaluation of their sub-components
    case 'TIMELOCKED_SIG': {
      const keyOk = simState.availableKeys?.has(v.pubkey);
      const required = parseInt(v.blocks) || 0;
      const elapsed = simState.csvBlocks || 0;
      result = (keyOk && elapsed >= required) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'HTLC': {
      const keyOk = simState.availableKeys?.has(v.pubkey);
      const hashOk = simState.knownPreimages?.has(v.hash);
      const required = parseInt(v.blocks) || 0;
      const elapsed = simState.csvBlocks || 0;
      result = (keyOk && hashOk && elapsed >= required) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'HASH_SIG': {
      const keyOk = simState.availableKeys?.has(v.pubkey);
      const hashOk = simState.knownPreimages?.has(v.hash);
      result = (keyOk && hashOk) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'PTLC': {
      const keyOk = simState.availableKeys?.has(v.signing_key);
      const required = parseInt(v.blocks) || 0;
      const elapsed = simState.csvBlocks || 0;
      result = (keyOk && elapsed >= required) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'CLTV_SIG': {
      const keyOk = simState.availableKeys?.has(v.pubkey);
      const target = parseInt(v.height) || 0;
      const current = simState.blockHeight || 0;
      result = (keyOk && current >= target) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'TIMELOCKED_MULTISIG': {
      const threshold = parseInt(v.threshold) || 0;
      const keys = (v.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
      const available = keys.filter(k => simState.availableKeys?.has(k)).length;
      const required = parseInt(v.blocks) || 0;
      const elapsed = simState.csvBlocks || 0;
      result = (available >= threshold && elapsed >= required) ? 'satisfied' : 'unsatisfied';
      break;
    }
    // Governance blocks
    case 'EPOCH_GATE': {
      const epochSize = parseInt(v.epoch_size) || 1;
      const windowSize = parseInt(v.window_size) || 0;
      const height = simState.blockHeight || 0;
      result = (height % epochSize) < windowSize ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'WEIGHT_LIMIT': {
      // Sim doesn't have tx weight — use rough estimate from tx totals
      const maxWeight = parseInt(v.max_weight) || 0;
      result = maxWeight > 0 ? 'satisfied' : 'unsatisfied'; // structural in sim
      break;
    }
    case 'INPUT_COUNT': {
      const min = parseInt(v.min) || 0;
      const max = parseInt(v.max) || 255;
      const count = simState.inputCount || 1;
      result = (count >= min && count <= max) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'OUTPUT_COUNT': {
      const min = parseInt(v.min) || 0;
      const max = parseInt(v.max) || 255;
      const count = simState.outputCount || 1;
      result = (count >= min && count <= max) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'RELATIVE_VALUE': {
      const num = parseInt(v.numerator) || 0;
      const den = parseInt(v.denominator) || 1;
      const input = simState.inputAmount || 0;
      const output = simState.outputAmount || 0;
      result = (output * den >= input * num) ? 'satisfied' : 'unsatisfied';
      break;
    }
    case 'ACCUMULATOR':
      result = 'satisfied'; // structural in sim — Merkle proof verification
      break;
    default:
      result = 'unknown';
  }

  if (block.inverted) {
    if (result === 'satisfied') result = 'unsatisfied';
    else if (result === 'unsatisfied') result = 'satisfied';
  }

  return result;
}

function toNumericHex(val) {
  const n = parseInt(val) || 0;
  const buf = new Uint8Array(4);
  buf[0] = n & 0xFF;
  buf[1] = (n >> 8) & 0xFF;
  buf[2] = (n >> 16) & 0xFF;
  buf[3] = (n >> 24) & 0xFF;
  return Array.from(buf).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Export a single block to wire format (shared by both export functions)
function exportBlockFields(block) {
  const def = getBlockDef(block.type);
  const fields = [];
  def.fields.forEach(f => {
    const val = block.values[f.name];
    if (!val) return;
    if (f.dataType === 'NUMERIC') {
      fields.push({ type: 'NUMERIC', hex: toNumericHex(val) });
    } else if (f.dataType === 'PUBKEY') {
      if (f.multi) {
        val.split(',').map(k => k.trim()).filter(Boolean).forEach(k => {
          fields.push({ type: 'PUBKEY', hex: k });
        });
      } else {
        fields.push({ type: 'PUBKEY', hex: val });
      }
    } else if (f.dataType === 'HASH256') {
      fields.push({ type: 'HASH256', hex: val });
    } else if (f.dataType === 'HASH160') {
      fields.push({ type: 'HASH160', hex: val });
    } else if (f.dataType === 'SCHEME' && val) {
      const schemeMap = { FALCON512: '10', FALCON1024: '11', DILITHIUM3: '12' };
      fields.push({ type: 'SCHEME', hex: schemeMap[val] || '00' });
    }
  });
  const out = { type: block.type, fields };
  if (block.inverted) out.inverted = true;
  return out;
}

// Export as createrungtx wire format
function exportCreateRungtx(rungs, txOutputs, txInputs, locktime) {
  // Build inputs
  const inputs = txInputs
    .filter(i => i.txid)
    .map(i => {
      const inp = { txid: i.txid, vout: parseInt(i.vout) || 0 };
      const seq = parseInt(i.sequence);
      if (!isNaN(seq) && seq !== 4294967294) inp.sequence = seq;
      return inp;
    });

  // Collect relay rungs and assign indices
  const relayRungs = rungs.filter(r => r.output.type === 'relay');
  const relayNameToIndex = new Map();
  relayRungs.forEach((r, idx) => {
    const name = r.output.name || r.label || `R${String(rungs.indexOf(r)).padStart(3, '0')}`;
    relayNameToIndex.set(name, idx);
  });

  // Build relays array for wire format
  const relays = relayRungs.map(r => {
    const relay = {
      blocks: r.blocks
        .filter(b => b.type !== 'OUTPUT_REF')
        .map(exportBlockFields)
    };
    // Relay-to-relay refs
    if (r.outputRefs && r.outputRefs.length > 0) {
      const refs = r.outputRefs
        .map(ref => relayNameToIndex.get(ref))
        .filter(idx => idx !== undefined);
      if (refs.length > 0) relay.relay_refs = refs;
    }
    return relay;
  });

  // Group non-relay rungs by their assigned txOutputId
  const rungsByOutput = new Map(); // txOutputId -> [rung, ...]
  rungs.forEach(rung => {
    if (rung.output.type === 'relay') return; // skip relay rungs
    if (rung.output.txOutputId !== null && rung.output.txOutputId !== undefined) {
      const key = rung.output.txOutputId;
      if (!rungsByOutput.has(key)) rungsByOutput.set(key, []);
      rungsByOutput.get(key).push(rung);
    }
  });

  // Build outputs — each output gets its conditions from assigned rungs
  const outputs = txOutputs
    .filter(o => o.address || parseInt(o.amount) > 0)
    .map(o => {
      const assignedRungs = rungsByOutput.get(o.id) || [];
      const amt = parseInt(o.amount) || 0;

      // Build conditions: each rung becomes an entry in the conditions array
      const conditions = assignedRungs.map(rung => {
        const cond = {
          blocks: rung.blocks
            .filter(b => b.type !== 'OUTPUT_REF')
            .map(exportBlockFields)
        };
        // Convert outputRefs (relay names) to relay_refs (relay indices)
        if (rung.outputRefs && rung.outputRefs.length > 0) {
          const refs = rung.outputRefs
            .map(ref => relayNameToIndex.get(ref))
            .filter(idx => idx !== undefined);
          if (refs.length > 0) cond.relay_refs = refs;
        }
        return cond;
      });

      // Coil: use wire fields from the first assigned rung (all rungs share one coil per output)
      const firstRung = assignedRungs[0];
      const coil = {};
      if (firstRung) {
        coil.type = firstRung.output.wireType || 'UNLOCK';
        coil.attestation = firstRung.output.attestation || 'INLINE';
        coil.scheme = firstRung.output.scheme || 'SCHNORR';
        // If UNLOCK_TO, include the address
        if (coil.type === 'UNLOCK_TO' && o.address) {
          coil.address = o.address;
        }
      } else {
        coil.type = 'UNLOCK';
        coil.attestation = 'INLINE';
        coil.scheme = 'SCHNORR';
      }

      const out = {
        amount: amt / 100000000, // sats → BTC
        conditions,
      };
      // Only include coil if non-default
      if (coil.type !== 'UNLOCK' || coil.attestation !== 'INLINE' || coil.scheme !== 'SCHNORR') {
        out.coil = coil;
      }
      return out;
    });

  const result = { inputs, outputs };
  if (relays.length > 0) result.relays = relays;
  const lt = parseInt(locktime);
  if (lt > 0) result.locktime = lt;

  return result;
}

// Export UI-friendly format (for debugging / display)
function exportConditions(rungs, txOutputs, txInputs) {
  return rungs.map((rung, ri) => ({
    ...(rung.label ? { label: rung.label } : {}),
    blocks: rung.blocks.map(exportBlockFields)
  }));
}

function PalettePanel({ onDragStart }) {
  const [collapsed, setCollapsed] = useState({});

  const toggle = (name) => setCollapsed(prev => ({ ...prev, [name]: !prev[name] }));

  return (
    <div className="palette">
      {BLOCK_FAMILIES.map(family => (
        <div key={family.name} className="palette-group">
          <div className="palette-group-header" onClick={() => toggle(family.name)}>
            <span className={`arrow ${collapsed[family.name] ? 'collapsed' : ''}`}>▼</span>
            {family.name}
          </div>
          {!collapsed[family.name] && family.blocks.map(block => (
            <div
              key={block.type}
              className="palette-item"
              draggable
              onDragStart={(e) => {
                e.dataTransfer.setData('blockType', block.type);
                onDragStart?.(block.type);
              }}
            >
              <div className="dot" style={{ background: family.color }} />
              {block.label}
              {block.desc && (
                <div className="palette-tip">
                  {block.desc}
                  <div className="tip-code">0x{getTypeHex(block.type)}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function ContactView({ block, rungId, selected, simMode, simResult, scanClass, onClick, onDelete, onDragStart, onDragOver, onDrop, forcedState, onForceToggle, tips, onNameChange, onExpand, onContextMenu: onCtxMenu, renaming, onClearRenaming }) {
  const def = getBlockDef(block.type);
  const isEnergized = simMode && !scanClass && simResult === 'satisfied';
  const isFault = simMode && !scanClass && simResult === 'error';
  const isForced = forcedState === 'satisfied' || forcedState === 'unsatisfied';
  const [editingNote, setEditingNote] = useState(false);
  const noteInputRef = useRef(null);

  useEffect(() => {
    if (renaming) {
      setEditingNote(true);
      onClearRenaming?.();
      setTimeout(() => noteInputRef.current?.focus(), 0);
    }
  }, [renaming, onClearRenaming]);

  const summary = useMemo(() => {
    const v = block.values;
    const scheme = v.scheme;
    const pqBadge = scheme ? `[${scheme}] ` : '';
    const first = def.fields[0];
    if (!first) return pqBadge || '';
    const val = v[first.name];
    if (!val) return pqBadge || '';
    const valStr = first.dataType === 'NUMERIC' ? val : (val.length > 12 ? val.substring(0, 6) + '..' + val.substring(val.length - 4) : val);
    return pqBadge + valStr;
  }, [block.values, def]);

  const handleClick = useCallback((e) => {
    if (simMode && !scanClass && e.altKey) {
      e.stopPropagation();
      onForceToggle?.(block.id);
    } else {
      onClick();
    }
  }, [simMode, scanClass, onClick, onForceToggle, block.id]);

  const handleDoubleClick = useCallback((e) => {
    if (simMode) return;
    e.stopPropagation();
    setEditingNote(true);
    setTimeout(() => noteInputRef.current?.focus(), 0);
  }, [simMode]);

  const handleNoteBlur = useCallback(() => {
    setEditingNote(false);
  }, []);

  const handleNoteKeyDown = useCallback((e) => {
    if (e.key === 'Enter' || e.key === 'Escape') {
      setEditingNote(false);
    }
  }, []);

  const handleContextMenu = useCallback((e) => {
    if (simMode) return;
    e.preventDefault();
    e.stopPropagation();
    onCtxMenu?.(e.clientX, e.clientY, block);
  }, [simMode, block, onCtxMenu]);

  return (
    <div
      className={`contact ${isEnergized ? 'energized' : ''} ${isFault ? 'fault' : ''} ${selected ? 'selected' : ''} ${scanClass || ''} ${isForced ? (forcedState === 'satisfied' ? 'forced-on' : 'forced-off') : ''}`}
      onClick={handleClick}
      onDoubleClick={handleDoubleClick}
      onContextMenu={handleContextMenu}
      onMouseDown={(e) => { if (e.button === 2) e.stopPropagation(); }}
      draggable={!simMode}
      onDragStart={simMode ? undefined : (e) => { e.dataTransfer.setData('reorderBlockId', String(block.id)); e.dataTransfer.setData('sourceRungId', String(rungId)); onDragStart?.(block.id, e); }}
      onDragOver={simMode ? undefined : (e) => { e.preventDefault(); e.stopPropagation(); onDragOver?.(e, block.id); }}
      onDrop={simMode ? undefined : (e) => {
        // Only handle reorder drops here; let palette drops bubble to the slot handler
        const reorderId = e.dataTransfer.getData('reorderBlockId');
        if (reorderId) { e.preventDefault(); e.stopPropagation(); onDrop?.(e, block.id); }
      }}
      title={tips ? (simMode ? (scanClass === 'step-next' ? 'Click to pass this block and advance' : 'Alt+click to force ON/OFF/AUTO') : 'Click to select · Double-click to name · Right-click for options · Drag to reorder') : undefined}
    >
      {block.inverted && <span className="contact-inverted" />}
      {isForced && <span className={`force-badge ${forcedState === 'satisfied' ? 'on' : 'off'}`}>{forcedState === 'satisfied' ? 'FORCE' : 'BLOCK'}</span>}
      <span className="contact-bracket-left" style={{ color: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor + '80' }}>─┤</span>
      <div className="contact-body" style={{ borderTopColor: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor, borderTopWidth: 2 }}>
        <span className="contact-type" style={{ color: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor }}>{def.label}</span>
        {summary && <span className="contact-value">{summary}</span>}
      </div>
      <span className="contact-bracket-right" style={{ color: isEnergized && !isForced ? undefined : isForced ? undefined : def.familyColor + '80' }}>├─</span>
      {!simMode && <div className="contact-delete" onClick={(e) => { e.stopPropagation(); onDelete(); }}>✕</div>}
      {block.name && !editingNote && <span className="contact-note">{block.name}</span>}
      {editingNote && (
        <input
          ref={noteInputRef}
          className="contact-note-input"
          value={block.name || ''}
          placeholder="Name this block..."
          onChange={(e) => onNameChange?.(block.id, e.target.value)}
          onBlur={handleNoteBlur}
          onKeyDown={handleNoteKeyDown}
          onClick={(e) => e.stopPropagation()}
        />
      )}
    </div>
  );
}

function BlockContextMenu({ x, y, block, onRename, onExpand, onToggleInvert, onDuplicate, onDelete, onClose }) {
  const menuRef = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) onClose();
    };
    const escHandler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('mousedown', handler);
    document.addEventListener('keydown', escHandler);
    return () => { document.removeEventListener('mousedown', handler); document.removeEventListener('keydown', escHandler); };
  }, [onClose]);

  // Clamp menu position to viewport
  const style = useMemo(() => {
    const s = { left: x, top: y };
    if (typeof window !== 'undefined') {
      if (x + 180 > window.innerWidth) s.left = window.innerWidth - 180;
      if (y + 200 > window.innerHeight) s.top = window.innerHeight - 200;
    }
    return s;
  }, [x, y]);

  return (
    <div className="block-context-menu" ref={menuRef} style={style}>
      <div className="ctx-item" onClick={() => { onRename(); onClose(); }}>
        <span className="ctx-item-icon">✎</span>RENAME
      </div>
      <div className="ctx-item" onClick={() => { onExpand(); onClose(); }}>
        <span className="ctx-item-icon">⊞</span>INSPECT
      </div>
      <div className="ctx-sep" />
      <div className="ctx-item" onClick={() => { onToggleInvert(); onClose(); }}>
        <span className="ctx-item-icon">{block.inverted ? '○' : '◉'}</span>{block.inverted ? 'REMOVE NOT' : 'INVERT (NOT)'}
      </div>
      <div className="ctx-item" onClick={() => { onDuplicate(); onClose(); }}>
        <span className="ctx-item-icon">⊕</span>DUPLICATE
      </div>
      <div className="ctx-sep" />
      <div className="ctx-item ctx-danger" onClick={() => { onDelete(); onClose(); }}>
        <span className="ctx-item-icon">✕</span>DELETE
      </div>
    </div>
  );
}

function InputModal({ rung, rungIndex, onRungChange, txInputs, allRungs, onClose }) {
  if (!rung) return null;
  const rungNum = rung.label || `R${String(rungIndex).padStart(3, '0')}`;

  const availableOutputs = useMemo(() => {
    if (!allRungs) return [];
    return allRungs.map((r, i) => {
      if (r.id === rung.id) return null;
      if (r.output.type !== 'relay') return null; // only relay coils can be referenced
      const label = r.label || `R${String(i).padStart(3, '0')}`;
      const coilName = r.output.name;
      const refValue = coilName || r.label || `R${String(i).padStart(3, '0')}`;
      const display = `${label}${coilName && coilName !== r.label ? ' → ' + coilName : ''}${!coilName ? ' (unnamed)' : ''}`;
      return { refValue, display, rungId: r.id };
    }).filter(Boolean);
  }, [allRungs, rung.id]);

  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'Enter' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') onClose();
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [onClose]);

  return (
    <div className="block-modal-overlay" onClick={onClose}>
      <div className="block-modal" onClick={(e) => e.stopPropagation()}>
        <div className="block-modal-header">
          <span className="block-modal-type-badge" style={{ color: 'var(--cyan)' }}>
            <span className="block-modal-type-dot" style={{ background: 'var(--cyan)' }} />
            INPUT
          </span>
          <span className="block-modal-family">{rungNum}</span>
          <span className="block-modal-hex">Rung Input Contact</span>
          <button className="block-modal-close" onClick={onClose}>ESC</button>
        </div>
        <div className="block-modal-body">
          <div className="block-modal-section">
            <div className="block-modal-section-title">NAME / NOTE</div>
            <input
              className="block-modal-note-input"
              value={rung.inputName || ''}
              placeholder="Label this input contact..."
              onChange={(e) => onRungChange(rung.id, 'inputName', e.target.value)}
            />
          </div>
          <div className="block-modal-section">
            <div className="block-modal-section-title">TX INPUTS (UTXOs)</div>
            <div style={{ fontSize: 9, color: 'var(--text-dim)', marginBottom: 8, lineHeight: 1.4 }}>
              Select which UTXOs this spending path consumes.
            </div>
            {(txInputs || []).map((input, idx) => {
              const isChecked = (rung.txInputIds || []).includes(input.id);
              const txidShort = input.txid ? input.txid.substring(0, 8) + '..' + input.txid.slice(-4) : '(no txid)';
              return (
                <div key={input.id} style={{ padding: '4px 0', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <input
                    type="checkbox"
                    id={`im-txin-${rung.id}-${input.id}`}
                    checked={isChecked}
                    onChange={(e) => {
                      const current = rung.txInputIds || [];
                      const next = e.target.checked ? [...current, input.id] : current.filter(id => id !== input.id);
                      onRungChange(rung.id, 'txInputIds', next);
                    }}
                  />
                  <label htmlFor={`im-txin-${rung.id}-${input.id}`} style={{ fontSize: 9, lineHeight: 1.4 }}>
                    <span style={{ color: 'var(--cyan)' }}>VIN {idx}</span> {txidShort}:{input.vout}
                  </label>
                </div>
              );
            })}
            {(!txInputs || txInputs.length === 0) && (
              <div style={{ fontSize: 9, color: 'var(--text-dim)' }}>No TX inputs defined. Add inputs in the TX tab.</div>
            )}
          </div>
          <div className="block-modal-section">
            <div className="block-modal-section-title">RELAY REFERENCES</div>
            <div style={{ fontSize: 9, color: 'var(--text-dim)', marginBottom: 8, lineHeight: 1.4 }}>
              Require relay coils to be satisfied before this rung can pass.
            </div>
            {availableOutputs.map((out) => {
              const isChecked = (rung.outputRefs || []).includes(out.refValue);
              return (
                <div key={out.rungId} style={{ padding: '4px 0', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <input
                    type="checkbox"
                    id={`im-outref-${rung.id}-${out.rungId}`}
                    checked={isChecked}
                    onChange={(e) => {
                      const current = rung.outputRefs || [];
                      const next = e.target.checked ? [...current, out.refValue] : current.filter(v => v !== out.refValue);
                      onRungChange(rung.id, 'outputRefs', next);
                    }}
                  />
                  <label htmlFor={`im-outref-${rung.id}-${out.rungId}`} style={{ fontSize: 9, lineHeight: 1.4 }}>
                    <span style={{ color: 'var(--amber-dim)' }}>{out.display}</span>
                  </label>
                </div>
              );
            })}
            {availableOutputs.length === 0 && (
              <div style={{ fontSize: 9, color: 'var(--text-dim)' }}>No relay coils available. Set a coil type to "Relay" first.</div>
            )}
          </div>
        </div>
        <div className="block-modal-footer">
          <button className="block-modal-ok" onClick={onClose}>OK</button>
        </div>
      </div>
    </div>
  );
}
