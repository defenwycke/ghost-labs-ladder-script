const SIGNET_API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8801'
  : 'https://bitcoinghost.org';

function SignetPanel({ rungs, txOutputs, txInputs, locktime, onViewAsLadder }) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState('');
  const [error, setError] = useState(null);
  const [walletInfo, setWalletInfo] = useState(null);
  const [newAddress, setNewAddress] = useState('');
  const [utxos, setUtxos] = useState(null);
  const [faucetAddr, setFaucetAddr] = useState('');
  const [txHex, setTxHex] = useState('');
  const [signedHex, setSignedHex] = useState('');
  const [txid, setTxid] = useState('');
  const [txHistory, setTxHistory] = useState([]);
  const [expandedTx, setExpandedTx] = useState(null);
  const [lookupTxid, setLookupTxid] = useState('');
  const [lookupResult, setLookupResult] = useState(null);
  const [decodeHex, setDecodeHex] = useState('');
  const [decodeResult, setDecodeResult] = useState(null);
  const [validateHex, setValidateHex] = useState('');
  const [validateResult, setValidateResult] = useState(null);
  const [mempoolInfo, setMempoolInfo] = useState(null);
  const [recentBlocks, setRecentBlocks] = useState(null);
  const [pasteJson, setPasteJson] = useState('');
  const [pasteError, setPasteError] = useState(null);

  const apiCall = async (endpoint, body, silent) => {
    if (!silent) setError(null);
    setLoading(endpoint);
    try {
      const opts = body !== undefined
        ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
        : {};
      const r = await fetch(SIGNET_API + endpoint, opts);
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail?.rpc_error || data.detail || `HTTP ${r.status}`);
      return data;
    } catch (e) {
      if (!silent) setError(e.message);
      return null;
    } finally {
      setLoading('');
    }
  };

  useEffect(() => {
    fetch(SIGNET_API + '/api/ladder/status')
      .then(r => r.json())
      .then(d => {
        setStatus(d);
        if (d.status === 'ok') {
          apiCall('/api/ladder/wallet/balance', undefined, true).then(d => d && setWalletInfo(d));
          apiCall('/api/ladder/mempool', undefined, true).then(d => d && setMempoolInfo(d));
          apiCall('/api/ladder/blocks/recent', undefined, true).then(d => d && setRecentBlocks(d));
        }
      })
      .catch(() => setStatus({ status: 'offline' }));
  }, []);

  useEffect(() => {
    if (txHistory.length === 0) return;
    const pending = txHistory.filter(t => t.confirmations === 0);
    if (pending.length === 0) return;
    const interval = setInterval(() => {
      pending.forEach(async (t) => {
        const data = await apiCall('/api/ladder/tx/' + t.txid, undefined, true);
        if (data && data.confirmations > 0) {
          setTxHistory(prev => prev.map(h => h.txid === t.txid ? { ...h, confirmations: data.confirmations } : h));
        }
      });
    }, 15000);
    return () => clearInterval(interval);
  }, [txHistory]);

  const online = status && status.status === 'ok';

  const refreshWallet = async () => {
    const d = await apiCall('/api/ladder/wallet/balance', undefined, true);
    if (d) setWalletInfo(d);
  };
  const handleNewAddress = async () => {
    const d = await apiCall('/api/ladder/wallet/address');
    if (d) { setNewAddress(d.address); setFaucetAddr(d.address); }
  };
  const handleLoadUtxos = async () => {
    const d = await apiCall('/api/ladder/wallet/utxos');
    if (d) setUtxos(d);
  };
  const handleFaucet = async () => {
    if (!faucetAddr) { setError('Enter a signet address.'); return; }
    const data = await apiCall('/api/ladder/faucet', { address: faucetAddr });
    if (data) { addToHistory('faucet', data.txid, 'Faucet: ' + data.amount + ' tBTC'); setTimeout(refreshWallet, 2000); }
  };
  const handleCreate = async () => {
    const txData = exportCreateRungtx(rungs, txOutputs, txInputs, locktime);
    const data = await apiCall('/api/ladder/create', txData);
    if (data) { setTxHex(data.hex); setSignedHex(''); setTxid(''); }
  };
  const handleSign = async () => {
    if (!txHex) { setError('No transaction hex. Create first.'); return; }
    const data = await apiCall('/api/ladder/sign', { hex: txHex });
    if (data) setSignedHex(data.hex || txHex);
  };
  const handleBroadcast = async () => {
    const hex = signedHex || txHex;
    if (!hex) { setError('No transaction to broadcast.'); return; }
    const data = await apiCall('/api/ladder/broadcast', { hex });
    if (data) { setTxid(data.txid); addToHistory('broadcast', data.txid, rungs.length + ' rungs'); setTimeout(refreshWallet, 2000); }
  };
  const handleDecode = async () => {
    if (!decodeHex.trim()) { setError('Enter hex to decode.'); return; }
    const data = await apiCall('/api/ladder/decode', { hex: decodeHex.trim() });
    if (data) setDecodeResult(data);
  };
  const handleDecodeTx = async () => {
    if (!decodeHex.trim()) { setError('Enter hex to decode.'); return; }
    const data = await apiCall('/api/ladder/decode-tx', { hex: decodeHex.trim() });
    if (data) setDecodeResult(data);
  };
  const handleValidate = async () => {
    if (!validateHex.trim()) { setError('Enter hex to validate.'); return; }
    const data = await apiCall('/api/ladder/validate', { hex: validateHex.trim() });
    if (data) setValidateResult(data);
  };
  const handleLookup = async () => {
    if (!lookupTxid) return;
    const data = await apiCall('/api/ladder/tx/' + lookupTxid);
    if (data) setLookupResult(data);
  };
  const refreshMempool = async () => {
    const [mp, bl] = await Promise.all([
      apiCall('/api/ladder/mempool', undefined, true),
      apiCall('/api/ladder/blocks/recent', undefined, true),
    ]);
    if (mp) setMempoolInfo(mp);
    if (bl) setRecentBlocks(bl);
  };
  const addToHistory = (type, txid, detail) => {
    setTxHistory(prev => [{ type, txid, detail, time: Date.now(), confirmations: 0 }, ...prev]);
  };

  const sty = {
    section: { marginBottom: 12, padding: '12px 16px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', fontSize: 12 },
    label: { fontSize: 10, fontWeight: 600, letterSpacing: 1.5, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: 6 },
    input: { width: '100%', padding: '6px 8px', background: 'var(--bg-primary)', border: '1px solid var(--border)', color: 'var(--text-primary)', fontFamily: 'var(--font-mono)', fontSize: 12, outline: 'none', marginBottom: 8 },
    btn: { padding: '6px 12px', fontSize: 11, fontFamily: 'var(--font-mono)', fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer', border: '1px solid', transition: 'all 0.15s', marginRight: 6 },
    btnPrimary: { color: 'var(--amber)', background: 'var(--amber-glow)', borderColor: 'var(--amber-dim)' },
    btnGreen: { color: 'var(--green-bright)', background: 'var(--green-dim)', borderColor: 'var(--green)' },
    btnDefault: { color: 'var(--text-secondary)', background: 'var(--bg-tertiary)', borderColor: 'var(--border)' },
    result: { marginTop: 8, padding: '8px 10px', background: 'var(--bg-primary)', border: '1px solid var(--border)', fontSize: 11, fontFamily: 'var(--font-mono)', wordBreak: 'break-all', maxHeight: 140, overflow: 'auto', color: 'var(--text-secondary)' },
    dot: (color) => ({ width: 8, height: 8, borderRadius: '50%', background: color, display: 'inline-block', marginRight: 8, boxShadow: `0 0 6px ${color}` }),
    divider: { borderTop: '1px solid var(--border)', margin: '20px 0', opacity: 0.5 },
    sectionTitle: { fontSize: 11, fontWeight: 700, letterSpacing: 2, color: 'var(--amber)', textTransform: 'uppercase', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 },
    grid2: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 },
    kv: { display: 'flex', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid var(--border)' },
    kvLabel: { color: 'var(--text-dim)', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 },
    kvValue: { color: 'var(--text-primary)', fontFamily: 'var(--font-mono)', fontSize: 12 },
  };

  const formatSats = (btc) => { if (btc == null) return '—'; return Math.round(btc * 1e8).toLocaleString() + ' sats'; };
  const formatBtc = (btc) => { if (btc == null) return '—'; return parseFloat(btc).toFixed(8) + ' tBTC'; };
  const timeAgo = (ts) => { const s = Math.floor((Date.now() - ts) / 1000); if (s < 60) return s + 's ago'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; return Math.floor(s / 3600) + 'h ago'; };

  return (
    <div style={{ padding: '20px 32px', overflow: 'auto', flex: 1, maxWidth: 1008, margin: '0 auto', width: '100%' }}>
      {/* STATUS BAR */}
      <div style={{ ...sty.section, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={sty.dot(online ? '#2ea043' : '#c43030')} />
          <span style={{ color: online ? 'var(--green-bright)' : 'var(--red-bright)', fontSize: 13, fontWeight: 600, letterSpacing: 1 }}>
            {online ? 'GHOST SIGNET ONLINE' : 'SIGNET OFFLINE'}
          </span>
          {online && <span style={{ color: 'var(--text-dim)', fontSize: 11 }}>Block {status.blocks}</span>}
        </div>
        {online && mempoolInfo && (
          <div style={{ display: 'flex', gap: 16, fontSize: 11, color: 'var(--text-dim)' }}>
            <span>Mempool: {mempoolInfo.size} txs</span>
            <span>{(mempoolInfo.bytes / 1024).toFixed(1)} KB</span>
          </div>
        )}
      </div>
      {!online && (
        <div style={{ ...sty.section, borderColor: 'var(--amber-dim)', background: 'var(--amber-glow)' }}>
          <div style={{ color: 'var(--amber)', fontSize: 11, lineHeight: 1.6 }}>
            Signet proxy is not available. The Ladder Script RPC commands require a ghost-core node running the feature/ladder-script branch. Build and test transactions locally using the BUILD, SIMULATE, and RPC tabs.
          </div>
        </div>
      )}

      {/* VIEW EXISTING TX AS LADDER — works offline, no signet required */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>VIEW TRANSACTION AS LADDER</div>
      <div style={sty.section}>
        <div style={sty.label}>PASTE RUNG TX JSON</div>
        <div style={{ color: 'var(--text-dim)', fontSize: 10, marginBottom: 6, lineHeight: 1.5 }}>
          Paste decoded JSON from <code style={{ color: 'var(--amber)', background: 'var(--bg-primary)', padding: '0 3px' }}>decoderung</code>, <code style={{ color: 'var(--amber)', background: 'var(--bg-primary)', padding: '0 3px' }}>createrungtx</code>, or <code style={{ color: 'var(--amber)', background: 'var(--bg-primary)', padding: '0 3px' }}>decoderawtransaction</code> output to visualize it as a ladder diagram. Works offline.
        </div>
        <textarea
          style={{ ...sty.input, height: 100, resize: 'vertical', fontFamily: 'var(--font-mono)', fontSize: 11 }}
          placeholder={'{\n  "rungs": [{ "blocks": [{ "block_type": "SIG", "params": [...] }], "coil": {...} }]\n}'}
          value={pasteJson}
          onChange={e => { setPasteJson(e.target.value); setPasteError(null); }}
        />
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <button style={{ ...sty.btn, ...sty.btnPrimary }} onClick={() => {
            if (!pasteJson.trim()) { setPasteError('Paste some JSON first.'); return; }
            try {
              const parsed = JSON.parse(pasteJson.trim());
              const result = decodedToBuilderRungs(parsed);
              if (!result || result.rungs.length === 0) {
                setPasteError('Could not find rung structure. Expected { rungs: [...] } or { outputs: [{ conditions: [...] }] } format.');
                return;
              }
              setPasteError(null);
              onViewAsLadder(parsed);
            } catch (e) {
              setPasteError('Invalid JSON: ' + e.message);
            }
          }}>VIEW AS LADDER</button>
          <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={() => { setPasteJson(''); setPasteError(null); }}>CLEAR</button>
          {pasteError && <span style={{ color: 'var(--red-bright)', fontSize: 10, marginLeft: 4 }}>{pasteError}</span>}
        </div>
      </div>

      {/* WALLET */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>WALLET</div>
      <div style={sty.grid2}>
        <div style={sty.section}>
          <div style={sty.label}>BALANCE</div>
          {walletInfo ? (<>
            <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'var(--font-mono)', color: 'var(--amber-bright)', marginBottom: 4 }}>{formatBtc(walletInfo.balance)}</div>
            <div style={{ fontSize: 11, color: 'var(--text-dim)' }}>{formatSats(walletInfo.balance)}</div>
            {walletInfo.unconfirmed_balance > 0 && <div style={{ fontSize: 11, color: 'var(--amber)', marginTop: 4 }}>+ {formatBtc(walletInfo.unconfirmed_balance)} unconfirmed</div>}
            <div style={{ ...sty.kv, marginTop: 8, borderBottom: 'none' }}><span style={sty.kvLabel}>TX COUNT</span><span style={sty.kvValue}>{walletInfo.txcount}</span></div>
            <button style={{ ...sty.btn, ...sty.btnDefault, marginTop: 8 }} onClick={refreshWallet}>{loading === '/api/ladder/wallet/balance' ? 'LOADING...' : 'REFRESH'}</button>
          </>) : <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>{online ? 'Loading...' : 'Unavailable'}</div>}
        </div>
        <div style={sty.section}>
          <div style={sty.label}>ADDRESS</div>
          <button style={{ ...sty.btn, ...sty.btnGreen, opacity: online ? 1 : 0.3, marginBottom: 8 }} onClick={handleNewAddress} disabled={!online || loading === '/api/ladder/wallet/address'}>
            {loading === '/api/ladder/wallet/address' ? 'GENERATING...' : 'GENERATE NEW ADDRESS'}
          </button>
          {newAddress && (
            <div style={{ ...sty.result, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, maxHeight: 'none' }}>
              <span style={{ wordBreak: 'break-all', flex: 1 }}>{newAddress}</span>
              <button style={{ ...sty.btn, ...sty.btnDefault, marginRight: 0, whiteSpace: 'nowrap' }} onClick={() => navigator.clipboard.writeText(newAddress)}>COPY</button>
            </div>
          )}
          <div style={{ ...sty.label, marginTop: 12 }}>FAUCET</div>
          <input style={sty.input} placeholder="tb1q... signet address" value={faucetAddr} onChange={e => setFaucetAddr(e.target.value)} disabled={!online} />
          <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleFaucet} disabled={!online || loading === '/api/ladder/faucet'}>
            {loading === '/api/ladder/faucet' ? 'SENDING...' : 'REQUEST 0.001 tBTC'}
          </button>
        </div>
      </div>

      {/* UTXOs */}
      <div style={sty.section}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <div style={sty.label}>AVAILABLE UTXOs</div>
          <button style={{ ...sty.btn, ...sty.btnDefault, opacity: online ? 1 : 0.3 }} onClick={handleLoadUtxos} disabled={!online || loading === '/api/ladder/wallet/utxos'}>
            {loading === '/api/ladder/wallet/utxos' ? 'LOADING...' : utxos ? 'REFRESH' : 'LOAD UTXOs'}
          </button>
        </div>
        {utxos && utxos.length === 0 && <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>No UTXOs. Use the faucet to get test coins.</div>}
        {utxos && utxos.length > 0 && (
          <div style={{ maxHeight: 200, overflow: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11, fontFamily: 'var(--font-mono)' }}>
              <thead><tr style={{ color: 'var(--text-dim)', textAlign: 'left', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 }}>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>TXID</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>VOUT</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>AMOUNT</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>CONF</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}></th>
              </tr></thead>
              <tbody>{utxos.map((u, i) => (
                <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                  <td style={{ padding: '4px 8px', color: 'var(--text-secondary)' }} title={u.txid}>{u.txid.substring(0, 12)}...</td>
                  <td style={{ padding: '4px 8px' }}>{u.vout}</td>
                  <td style={{ padding: '4px 8px', textAlign: 'right', color: 'var(--amber)' }}>{formatSats(u.amount)}</td>
                  <td style={{ padding: '4px 8px', color: u.confirmations > 0 ? 'var(--green-bright)' : 'var(--amber)' }}>{u.confirmations}</td>
                  <td style={{ padding: '4px 8px' }}><button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 6px', fontSize: 9, marginRight: 0 }} onClick={() => navigator.clipboard.writeText(u.txid + ':' + u.vout)} title="Copy txid:vout">COPY</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>

      {/* BUILD & BROADCAST */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>BUILD &amp; BROADCAST</div>
      <div style={{ ...sty.section, padding: '16px 20px' }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-start' }}>
          <div style={{ flex: '1 1 200px', minWidth: 200 }}>
            <div style={sty.label}>1. CREATE</div>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 6 }}>Sends ladder JSON to createrungtx RPC.</div>
            <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleCreate} disabled={!online || loading === '/api/ladder/create'}>
              {loading === '/api/ladder/create' ? 'CREATING...' : 'CREATERUNGTX'}
            </button>
            {txHex && (<div style={{ ...sty.result, marginTop: 6 }}><div style={{ color: 'var(--green-bright)', marginBottom: 4 }}>TX HEX ({txHex.length / 2} bytes)</div>{txHex.substring(0, 80)}...<button style={{ ...sty.btn, ...sty.btnDefault, marginTop: 4, display: 'block' }} onClick={() => navigator.clipboard.writeText(txHex)}>COPY HEX</button></div>)}
          </div>
          <div style={{ color: 'var(--border-light)', fontSize: 20, alignSelf: 'center', padding: '20px 0' }}>&#x2192;</div>
          <div style={{ flex: '1 1 200px', minWidth: 200 }}>
            <div style={sty.label}>2. SIGN</div>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 6 }}>Signs via signrungtx RPC.</div>
            <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: (online && txHex) ? 1 : 0.3 }} onClick={handleSign} disabled={!online || !txHex || loading === '/api/ladder/sign'}>
              {loading === '/api/ladder/sign' ? 'SIGNING...' : 'SIGNRUNGTX'}
            </button>
            {signedHex && signedHex !== txHex && (<div style={{ ...sty.result, marginTop: 6 }}><div style={{ color: 'var(--green-bright)', marginBottom: 4 }}>SIGNED ({signedHex.length / 2} bytes)</div>{signedHex.substring(0, 80)}...</div>)}
          </div>
          <div style={{ color: 'var(--border-light)', fontSize: 20, alignSelf: 'center', padding: '20px 0' }}>&#x2192;</div>
          <div style={{ flex: '1 1 200px', minWidth: 200 }}>
            <div style={sty.label}>3. BROADCAST</div>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 6 }}>Push to signet network.</div>
            <button style={{ ...sty.btn, ...sty.btnGreen, opacity: (online && (signedHex || txHex)) ? 1 : 0.3 }} onClick={handleBroadcast} disabled={!online || !(signedHex || txHex) || loading === '/api/ladder/broadcast'}>
              {loading === '/api/ladder/broadcast' ? 'BROADCASTING...' : 'BROADCAST'}
            </button>
            {txid && (<div style={{ ...sty.result, marginTop: 6 }}><div style={{ color: 'var(--green-bright)', marginBottom: 4 }}>SUCCESS</div><a href={`https://mempool.space/signet/tx/${txid}`} target="_blank" rel="noopener" style={{ color: 'var(--amber)', textDecoration: 'none', wordBreak: 'break-all', fontSize: 10 }}>{txid}</a></div>)}
          </div>
        </div>
      </div>

      {/* SESSION HISTORY */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>SESSION HISTORY</div>
      <div style={sty.section}>
        {txHistory.length === 0 ? (
          <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>No transactions this session.</div>
        ) : (
          <div style={{ maxHeight: 240, overflow: 'auto' }}>
            {txHistory.map((tx, i) => (
              <div key={i} style={{ padding: '8px 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }} onClick={() => setExpandedTx(expandedTx === i ? null : i)}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={sty.dot(tx.confirmations > 0 ? '#2ea043' : '#e6a817')} />
                    <span style={{ color: 'var(--text-primary)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>{tx.txid.substring(0, 16)}...</span>
                    <span style={{ fontSize: 9, padding: '2px 6px', letterSpacing: 1, fontWeight: 600, background: tx.type === 'broadcast' ? 'var(--green-dim)' : 'var(--amber-glow)', color: tx.type === 'broadcast' ? 'var(--green-bright)' : 'var(--amber)', border: `1px solid ${tx.type === 'broadcast' ? 'var(--green)' : 'var(--amber-dim)'}` }}>{tx.type.toUpperCase()}</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 10, color: 'var(--text-dim)' }}>
                    <span>{tx.detail}</span>
                    <span>{tx.confirmations > 0 ? tx.confirmations + ' conf' : 'pending'}</span>
                    <span>{timeAgo(tx.time)}</span>
                  </div>
                </div>
                {expandedTx === i && (
                  <div style={{ marginTop: 8, padding: '8px', background: 'var(--bg-primary)', border: '1px solid var(--border)', fontSize: 10, fontFamily: 'var(--font-mono)' }}>
                    <div style={{ marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>TXID: </span><span style={{ color: 'var(--text-primary)', wordBreak: 'break-all' }}>{tx.txid}</span></div>
                    <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                      <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9 }} onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText(tx.txid); }}>COPY TXID</button>
                      <a href={`https://mempool.space/signet/tx/${tx.txid}`} target="_blank" rel="noopener" style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9, textDecoration: 'none', color: 'var(--amber)' }} onClick={(e) => e.stopPropagation()}>MEMPOOL.SPACE</a>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* DECODE & VALIDATE */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>DECODE &amp; VALIDATE</div>
      <div style={sty.grid2}>
        <div style={sty.section}>
          <div style={sty.label}>DECODE RAW HEX</div>
          <textarea style={{ ...sty.input, height: 60, resize: 'vertical', fontFamily: 'var(--font-mono)' }} placeholder="Paste raw transaction or ladder witness hex..." value={decodeHex} onChange={e => setDecodeHex(e.target.value)} disabled={!online} />
          <div style={{ display: 'flex', gap: 6 }}>
            <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleDecode} disabled={!online || loading === '/api/ladder/decode'}>{loading === '/api/ladder/decode' ? 'DECODING...' : 'DECODE LADDER'}</button>
            <button style={{ ...sty.btn, ...sty.btnDefault, opacity: online ? 1 : 0.3 }} onClick={handleDecodeTx} disabled={!online || loading === '/api/ladder/decode-tx'}>{loading === '/api/ladder/decode-tx' ? 'DECODING...' : 'DECODE RAW TX'}</button>
          </div>
          {decodeResult && (<div style={{ ...sty.result, maxHeight: 260 }}>
            {decodedToBuilderRungs(decodeResult) && (
              <button style={{ ...sty.btn, ...sty.btnPrimary, marginBottom: 8, display: 'block' }} onClick={() => onViewAsLadder(decodeResult)}>VIEW AS LADDER</button>
            )}
            <pre style={{ whiteSpace: 'pre-wrap', margin: 0 }}>{JSON.stringify(decodeResult, null, 2)}</pre>
          </div>)}
        </div>
        <div style={sty.section}>
          <div style={sty.label}>VALIDATE LADDER</div>
          <textarea style={{ ...sty.input, height: 60, resize: 'vertical', fontFamily: 'var(--font-mono)' }} placeholder="Paste ladder witness hex to validate..." value={validateHex} onChange={e => setValidateHex(e.target.value)} disabled={!online} />
          <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleValidate} disabled={!online || loading === '/api/ladder/validate'}>{loading === '/api/ladder/validate' ? 'VALIDATING...' : 'VALIDATE'}</button>
          {validateResult && (
            <div style={{ ...sty.result, maxHeight: 220 }}>
              {validateResult.valid !== undefined && <div style={{ color: validateResult.valid ? 'var(--green-bright)' : 'var(--red-bright)', marginBottom: 6, fontWeight: 600 }}>{validateResult.valid ? 'VALID LADDER STRUCTURE' : 'INVALID'}</div>}
              <pre style={{ whiteSpace: 'pre-wrap', margin: 0 }}>{JSON.stringify(validateResult, null, 2)}</pre>
            </div>
          )}
        </div>
      </div>

      {/* TRANSACTION LOOKUP */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>TRANSACTION LOOKUP</div>
      <div style={sty.section}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <input style={{ ...sty.input, flex: 1, marginBottom: 0 }} placeholder="txid (64 hex chars)" value={lookupTxid} onChange={e => setLookupTxid(e.target.value)} disabled={!online} />
          <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleLookup} disabled={!online}>LOOKUP</button>
        </div>
        {lookupResult && (
          <div style={{ ...sty.result, maxHeight: 300, marginTop: 10 }}>
            <div style={{ display: 'flex', gap: 12, marginBottom: 8, flexWrap: 'wrap' }}>
              <div><span style={{ color: 'var(--text-dim)' }}>CONF: </span><span style={{ color: lookupResult.confirmations > 0 ? 'var(--green-bright)' : 'var(--amber)' }}>{lookupResult.confirmations || 0}</span></div>
              <div><span style={{ color: 'var(--text-dim)' }}>SIZE: </span>{lookupResult.size} bytes</div>
              <div><span style={{ color: 'var(--text-dim)' }}>VSIZE: </span>{lookupResult.vsize} vbytes</div>
              {lookupResult.version && <div><span style={{ color: 'var(--text-dim)' }}>VERSION: </span>{lookupResult.version}</div>}
            </div>
            {lookupResult.vin && (<div style={{ marginBottom: 6 }}><div style={{ color: 'var(--text-dim)', fontSize: 9, letterSpacing: 1, marginBottom: 2 }}>INPUTS ({lookupResult.vin.length})</div>{lookupResult.vin.map((vin, i) => <div key={i} style={{ fontSize: 10, color: 'var(--text-secondary)', padding: '2px 0' }}>{vin.coinbase ? 'coinbase' : `${(vin.txid || '').substring(0, 16)}...:${vin.vout}`}</div>)}</div>)}
            {lookupResult.vout && (<div><div style={{ color: 'var(--text-dim)', fontSize: 9, letterSpacing: 1, marginBottom: 2 }}>OUTPUTS ({lookupResult.vout.length})</div>{lookupResult.vout.map((vout, i) => <div key={i} style={{ fontSize: 10, color: 'var(--text-secondary)', padding: '2px 0', display: 'flex', justifyContent: 'space-between' }}><span>#{vout.n} {vout.scriptPubKey?.type || ''}</span><span style={{ color: 'var(--amber)' }}>{formatSats(vout.value)}</span></div>)}</div>)}
            {decodedToBuilderRungs(lookupResult) && (
              <button style={{ ...sty.btn, ...sty.btnPrimary, marginTop: 8, display: 'block' }} onClick={() => onViewAsLadder(lookupResult)}>VIEW AS LADDER</button>
            )}
            <details style={{ marginTop: 8 }}><summary style={{ cursor: 'pointer', color: 'var(--text-dim)', fontSize: 10 }}>RAW JSON</summary><pre style={{ whiteSpace: 'pre-wrap', margin: '4px 0 0', fontSize: 10 }}>{JSON.stringify(lookupResult, null, 2)}</pre></details>
          </div>
        )}
      </div>

      {/* RECENT BLOCKS */}
      <div style={sty.divider} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={sty.sectionTitle}>RECENT BLOCKS</div>
        <button style={{ ...sty.btn, ...sty.btnDefault, opacity: online ? 1 : 0.3 }} onClick={refreshMempool} disabled={!online}>REFRESH</button>
      </div>
      <div style={sty.section}>
        {recentBlocks && recentBlocks.length > 0 ? (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11, fontFamily: 'var(--font-mono)' }}>
            <thead><tr style={{ color: 'var(--text-dim)', textAlign: 'left', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 }}>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>HEIGHT</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>HASH</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>TXs</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>SIZE</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>TIME</th>
            </tr></thead>
            <tbody>{recentBlocks.map((b, i) => (
              <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                <td style={{ padding: '6px 8px', color: 'var(--amber)' }}>{b.height}</td>
                <td style={{ padding: '6px 8px', color: 'var(--text-secondary)' }} title={b.hash}>{b.hash.substring(0, 16)}...</td>
                <td style={{ padding: '6px 8px', textAlign: 'right' }}>{b.tx_count}</td>
                <td style={{ padding: '6px 8px', textAlign: 'right', color: 'var(--text-dim)' }}>{(b.size / 1024).toFixed(1)} KB</td>
                <td style={{ padding: '6px 8px', color: 'var(--text-dim)' }}>{new Date(b.time * 1000).toLocaleTimeString()}</td>
              </tr>
            ))}</tbody>
          </table>
        ) : <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>{online ? 'Loading...' : 'Unavailable'}</div>}
      </div>

      {/* ERROR */}
      {error && (
        <div style={{ ...sty.section, borderColor: 'var(--red)', background: 'var(--red-dim)', position: 'sticky', bottom: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ color: 'var(--red-bright)', fontSize: 11 }}>{error}</div>
            <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, marginRight: 0 }} onClick={() => setError(null)}>DISMISS</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const [mode, setMode] = useState('build');
  const [showExamples, setShowExamples] = useState(false);
  const [pendingExample, setPendingExample] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    const ex = params.get('example');
    return ex !== null ? parseInt(ex, 10) : null;
  });
  const [showTooltips, setShowTooltips] = useState(true);
  const [ladderFullscreen, setLadderFullscreen] = useState(false);
  const [rungs, setRungs] = useState([createRung()]);
  const [selectedBlockId, setSelectedBlockId] = useState(null);
  const [selectedCoilId, setSelectedCoilId] = useState(null);
  const [selectedInputId, setSelectedInputId] = useState(null);
  const [expandedBlockId, setExpandedBlockId] = useState(null);
  const [contextMenu, setContextMenu] = useState(null); // { x, y, block, rungId }
  const [inputContextMenu, setInputContextMenu] = useState(null); // { x, y, rung }
  const [expandedInputId, setExpandedInputId] = useState(null); // rung id for InputModal
  const [expandedOutputId, setExpandedOutputId] = useState(null); // rung id for OutputModal
  const [outputContextMenu, setOutputContextMenu] = useState(null); // { x, y, rung }
  const [renamingBlockId, setRenamingBlockId] = useState(null);
  const [renamingInputId, setRenamingInputId] = useState(null);
  const [rightTab, setRightTab] = useState('properties');
  const [txInputs, setTxInputs] = useState([{ id: uid(), txid: '', vout: 0, sequence: '' }]);
  const [txOutputs, setTxOutputs] = useState([{ id: uid(), address: '', amount: 0 }]);
  const [locktime, setLocktime] = useState(0);
  // Scan animation state
  const [scanPhase, setScanPhase] = useState('idle'); // idle | running | paused | done
  const [scanPos, setScanPos] = useState({ rung: 0, block: -1, phase: 'input' }); // phase: input | blocks | coil
  const [scanSpeed, setScanSpeed] = useState(600); // ms per step
  const [scanResults, setScanResults] = useState({}); // { 'r0': 'pending', 'r0b0': 'satisfied', ... }

  const [simState, setSimState] = useState({
    blockHeight: 850000,
    csvBlocks: 0,
    csvSeconds: 0,
    inputAmount: 50000,
    outputAmount: 40000,
    feeRate: 10,
    medianTime: 0,
    availableKeys: new Set(),
    knownPreimages: new Set(),
    _keysRaw: '',
    _preimagesRaw: '',
  });

  // Interactive sim: forced block states and spent tracking
  const [forcedBlocks, setForcedBlocks] = useState({}); // blockId → 'satisfied' | 'unsatisfied' | null
  const [spentRungs, setSpentRungs] = useState(new Map()); // rungId → 'executed' | 'blocked'

  // Rung step-through: click rung label → click each block to advance green power line
  const [simActiveRungId, setSimActiveRungId] = useState(null); // rung ID being stepped
  const [simActiveStep, setSimActiveStep] = useState(-1); // -1=input, 0..n-1=block index, n=coil reached
  const [simStepResults, setSimStepResults] = useState({}); // blockId → 'satisfied'|'unsatisfied'|'error'

  // Keyboard shortcuts: ESC closes modals/fullscreen, F11 toggles fullscreen, Delete removes selection
  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName;
      const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
      if (e.key === 'Escape') {
        if (contextMenu) setContextMenu(null);
        else if (inputContextMenu) setInputContextMenu(null);
        else if (outputContextMenu) setOutputContextMenu(null);
        else if (simActiveRungId) { setSimActiveRungId(null); setSimActiveStep(-1); setSimStepResults({}); }
        else if (showExamples) setShowExamples(false);
        else if (ladderFullscreen) setLadderFullscreen(false);
      }
      if (e.key === 'F11') {
        e.preventDefault();
        setLadderFullscreen(prev => !prev);
      }
      if ((e.key === 'Delete' || e.key === 'Backspace') && !isInput && !isSimMode) {
        if (selectedBlockId) {
          // Find which rung owns this block and delete it
          setRungs(prev => prev.map(r => {
            if (r.blocks.some(b => b.id === selectedBlockId)) {
              return { ...r, blocks: r.blocks.filter(b => b.id !== selectedBlockId) };
            }
            return r;
          }));
          setSelectedBlockId(null);
        } else if (selectedInputId) {
          // Clear input assignments (txInputIds + outputRefs) for this rung
          setRungs(prev => prev.map(r => {
            if (r.id !== selectedInputId) return r;
            return { ...r, txInputIds: [], outputRefs: [], inputName: '' };
          }));
          setSelectedInputId(null);
        } else if (selectedCoilId) {
          // Clear output assignments for this rung
          setRungs(prev => prev.map(r => {
            if (r.id !== selectedCoilId) return r;
            return { ...r, output: { ...r.output, name: '', txOutputId: null } };
          }));
          setSelectedCoilId(null);
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [showExamples, ladderFullscreen, simActiveRungId, contextMenu, inputContextMenu, outputContextMenu, selectedBlockId, selectedInputId, selectedCoilId, isSimMode]);

  const isSimMode = mode === 'simulate' || mode === 'watch';

  // Auto-switch right panel tab when entering/leaving sim mode
  useEffect(() => {
    if (isSimMode && (rightTab === 'properties' || rightTab === 'tx')) {
      setRightTab('simulate');
    } else if (!isSimMode && rightTab === 'simulate') {
      setRightTab('properties');
    }
  }, [isSimMode]); // eslint-disable-line react-hooks/exhaustive-deps

  // Watch mode — poll signet for real block height, no fallback ticker
  const [watchLive, setWatchLive] = useState(false);
  useEffect(() => {
    if (mode !== 'watch') { setWatchLive(false); return; }
    let cancelled = false;

    const pollSignet = async () => {
      try {
        const r = await fetch(SIGNET_API + '/api/ladder/status');
        if (cancelled) return;
        if (r.ok) {
          const data = await r.json();
          if (data.blocks) {
            setWatchLive(true);
            setSimState(prev => {
              const heightDelta = data.blocks - (prev.blockHeight || 0);
              return {
                ...prev,
                blockHeight: data.blocks,
                csvBlocks: prev.csvBlocks + Math.max(0, heightDelta),
              };
            });
          }
        } else {
          setWatchLive(false);
        }
      } catch {
        if (!cancelled) setWatchLive(false);
      }
    };

    pollSignet();
    const signetInterval = setInterval(pollSignet, 10000);

    return () => { cancelled = true; clearInterval(signetInterval); };
  }, [mode]);

  // Build the flat scan sequence: input → block0 → block1 → ... → coil, for each rung
  const scanSequence = useMemo(() => {
    const seq = [];
    rungs.forEach((r, ri) => {
      seq.push({ type: 'input', rung: ri });
      r.blocks.forEach((b, bi) => {
        seq.push({ type: 'block', rung: ri, block: bi, blockId: b.id });
      });
      seq.push({ type: 'coil', rung: ri });
    });
    return seq;
  }, [rungs]);

  const [scanIdx, setScanIdx] = useState(-1);
  const [scanStopRung, setScanStopRung] = useState(null); // if set, stop after this rung's coil
  const scanStep = scanIdx >= 0 && scanIdx < scanSequence.length ? scanSequence[scanIdx] : null;

  // Advance scan one step, evaluating the block at that position
  // Skips spent rungs entirely (marks them as 'spent' in results)
  const advanceScan = useCallback(() => {
    const evalState = { ...simState, forcedBlocks, energizedOutputs, energizedRungNums };
    setScanIdx(prev => {
      let next = prev + 1;
      // Skip past any steps belonging to spent rungs
      while (next < scanSequence.length) {
        const step = scanSequence[next];
        const rung = rungs[step.rung];
        if (rung && spentRungs.has(rung.id)) {
          // Mark entire spent rung as skipped on the input step
          if (step.type === 'input') {
            setScanResults(p => ({ ...p, [`r${step.rung}_coil`]: 'spent' }));
          }
          next++;
          continue;
        }
        break;
      }
      if (next >= scanSequence.length) {
        setScanPhase('done');
        return prev;
      }
      const step = scanSequence[next];
      if (step.type === 'block') {
        const rung = rungs[step.rung];
        const block = rung?.blocks[step.block];
        if (block) {
          const result = evaluateBlock(block, evalState);
          setScanResults(prev => ({ ...prev, [`r${step.rung}b${step.block}`]: result }));
        }
      } else if (step.type === 'coil') {
        setScanResults(prev => {
          const rung = rungs[step.rung];
          let allSat = rung.blocks.length > 0;
          rung.blocks.forEach((b, bi) => {
            if (prev[`r${step.rung}b${bi}`] !== 'satisfied') allSat = false;
          });
          if (allSat && rung.outputRefs && rung.outputRefs.length > 0) {
            allSat = rung.outputRefs.every(ref => {
              const refUpper = ref.trim().toUpperCase();
              return evalState.energizedOutputs?.has(refUpper) || evalState.energizedRungNums?.has(refUpper);
            });
          }
          return { ...prev, [`r${step.rung}_coil`]: allSat ? 'pass' : 'fail' };
        });
        // Stop after this rung if scanning a single rung
        if (scanStopRung !== null && step.rung === scanStopRung) {
          setScanPhase('done');
        }
      }
      return next;
    });
  }, [scanSequence, rungs, simState, forcedBlocks, energizedOutputs, energizedRungNums, spentRungs, scanStopRung]);

  const rewindScan = useCallback(() => {
    setScanIdx(prev => {
      if (prev <= 0) return -1;
      const goTo = prev - 1;
      // Remove results for the step we're leaving
      const step = scanSequence[prev];
      if (step?.type === 'block') {
        setScanResults(p => { const n = { ...p }; delete n[`r${step.rung}b${step.block}`]; return n; });
      } else if (step?.type === 'coil') {
        setScanResults(p => { const n = { ...p }; delete n[`r${step.rung}_coil`]; return n; });
      }
      if (goTo < 0) setScanPhase('idle');
      else setScanPhase('paused');
      return goTo;
    });
  }, [scanSequence]);

  const resetScan = useCallback(() => {
    setScanPhase('idle');
    setScanIdx(-1);
    setScanResults({});
    setScanStopRung(null);
  }, []);

  const startScan = useCallback(() => {
    resetScan();
    setScanStopRung(null);
    setScanPhase('running');
    setScanIdx(-1); // will advance to 0 on first tick
  }, [resetScan]);

  // Scan timer
  useEffect(() => {
    if (scanPhase !== 'running') return;
    const interval = setInterval(() => {
      advanceScan();
    }, scanSpeed);
    return () => clearInterval(interval);
  }, [scanPhase, scanSpeed, advanceScan]);

  // Reset scan when leaving sim mode or changing rungs
  useEffect(() => {
    if (!isSimMode) resetScan();
  }, [isSimMode]);

  const selectedBlock = useMemo(() => {
    for (const rung of rungs) {
      for (const block of rung.blocks) {
        if (block.id === selectedBlockId) return block;
      }
    }
    return null;
  }, [rungs, selectedBlockId]);

  const expandedBlock = useMemo(() => {
    if (!expandedBlockId) return null;
    for (const rung of rungs) {
      for (const block of rung.blocks) {
        if (block.id === expandedBlockId) return block;
      }
    }
    return null;
  }, [rungs, expandedBlockId]);

  const handleNameChange = useCallback((blockId, name) => {
    setRungs(prev => prev.map(r => ({
      ...r,
      blocks: r.blocks.map(b => b.id === blockId ? { ...b, name } : b)
    })));
  }, []);

  const handleBlockContextMenu = useCallback((x, y, block, rungId) => {
    setContextMenu({ x, y, block, rungId });
  }, []);

  const handleInputContextMenu = useCallback((x, y, rung) => {
    setInputContextMenu({ x, y, rung });
  }, []);

  const handleOutputContextMenu = useCallback((x, y, rung) => {
    setOutputContextMenu({ x, y, rung });
  }, []);

  const handleDuplicateBlock = useCallback((rungId, blockId) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      const src = r.blocks.find(b => b.id === blockId);
      if (!src || r.blocks.length >= MAX_BLOCKS_PER_RUNG) return r;
      const dup = createBlock(src.type);
      dup.values = { ...src.values };
      dup.inverted = src.inverted;
      dup.name = src.name ? src.name + ' (copy)' : '';
      // Assign next free slot after the source block's slot
      const srcSlot = src.slot ?? r.blocks.indexOf(src);
      for (let s = srcSlot + 1; s < MAX_BLOCKS_PER_RUNG; s++) {
        if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { dup.slot = s; break; }
      }
      if (dup.slot === undefined) {
        for (let s = 0; s < srcSlot; s++) {
          if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { dup.slot = s; break; }
        }
      }
      if (dup.slot === undefined) return r; // no free slot
      const blocks = [...r.blocks, dup].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
      return { ...r, blocks };
    }));
  }, []);

  const handleAddRung = useCallback(() => {
    setRungs(prev => prev.length >= 16 ? prev : [...prev, createRung()]);
  }, []);

  const handleAddRungWithBlock = useCallback((blockType) => {
    setRungs(prev => {
      if (prev.length >= 16) return prev;
      const rung = createRung();
      rung.blocks = [createBlock(blockType)];
      return [...prev, rung];
    });
  }, []);

  const handleDropBlock = useCallback((rungId, blockType, slotIdx) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      if (r.blocks.length >= MAX_BLOCKS_PER_RUNG) return r;
      // Check if slot is occupied
      if (slotIdx !== undefined && r.blocks.some(b => b.slot === slotIdx)) return r;
      const newBlock = createBlock(blockType);
      newBlock.slot = slotIdx !== undefined ? slotIdx : r.blocks.length;
      // Find first free slot if assigned slot is taken
      if (r.blocks.some(b => b.slot === newBlock.slot)) {
        for (let s = 0; s < MAX_BLOCKS_PER_RUNG; s++) {
          if (!r.blocks.some(b => b.slot === s)) { newBlock.slot = s; break; }
        }
      }
      // Insert in array sorted by slot position (evaluation order = left to right)
      const blocks = [...r.blocks, newBlock].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
      return { ...r, blocks };
    }));
  }, []);

  const handleDeleteBlock = useCallback((rungId, blockId) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      return { ...r, blocks: r.blocks.filter(b => b.id !== blockId) };
    }));
    if (selectedBlockId === blockId) setSelectedBlockId(null);
  }, [selectedBlockId]);

  const handleDeleteRung = useCallback((rungId) => {
    setRungs(prev => {
      const next = prev.filter(r => r.id !== rungId);
      return next.length === 0 ? [createRung()] : next;
    });
  }, []);

  const handleMoveRung = useCallback((fromIdx, toIdx) => {
    setRungs(prev => {
      if (fromIdx < 0 || fromIdx >= prev.length || toIdx < 0 || toIdx >= prev.length) return prev;
      const next = [...prev];
      const [moved] = next.splice(fromIdx, 1);
      next.splice(toIdx, 0, moved);
      return next;
    });
  }, []);

  const handleMoveBlockCrossRung = useCallback((sourceRungId, blockId, targetRungId, slotIdx) => {
    setRungs(prev => {
      const srcRung = prev.find(r => r.id === sourceRungId);
      const tgtRung = prev.find(r => r.id === targetRungId);
      if (!srcRung || !tgtRung) return prev;
      const block = srcRung.blocks.find(b => b.id === blockId);
      if (!block) return prev;
      if (tgtRung.blocks.length >= MAX_BLOCKS_PER_RUNG) return prev;
      return prev.map(r => {
        if (r.id === sourceRungId) return { ...r, blocks: r.blocks.filter(b => b.id !== blockId) };
        if (r.id === targetRungId) {
          const movedBlock = { ...block };
          // Assign to target slot, or first free slot
          if (slotIdx !== undefined && !r.blocks.some(b => (b.slot ?? 0) === slotIdx)) {
            movedBlock.slot = slotIdx;
          } else {
            for (let s = 0; s < MAX_BLOCKS_PER_RUNG; s++) {
              if (!r.blocks.some(b => (b.slot ?? r.blocks.indexOf(b)) === s)) { movedBlock.slot = s; break; }
            }
          }
          const blocks = [...r.blocks, movedBlock].sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
          return { ...r, blocks };
        }
        return r;
      });
    });
  }, []);

  const handleBlockChange = useCallback((blockId, field, value) => {
    setRungs(prev => prev.map(r => ({
      ...r,
      blocks: r.blocks.map(b => {
        if (b.id !== blockId) return b;
        if (field === '__inverted') return { ...b, inverted: value };
        if (field === '__name') return { ...b, name: value };
        return { ...b, values: { ...b.values, [field]: value } };
      })
    })));
  }, []);

  const handleSelectCoil = useCallback((rungId) => {
    setSelectedCoilId(rungId);
    setSelectedBlockId(null);
    setSelectedInputId(null);
    setRightTab('properties');
  }, []);

  const handleSelectInput = useCallback((rungId) => {
    setSelectedInputId(rungId);
    setSelectedBlockId(null);
    setSelectedCoilId(null);
    setRightTab('properties');
  }, []);

  const handleDeselect = useCallback(() => {
    setSelectedBlockId(null);
    setSelectedCoilId(null);
    setSelectedInputId(null);
  }, []);

  const handleOutputChange = useCallback((rungId, field, value) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      const newOutput = { ...r.output, [field]: value };
      // Relay coils don't map to TX outputs — clear assignment when switching to relay
      if (field === 'type' && value === 'relay') {
        newOutput.txOutputId = null;
      }
      return { ...r, output: newOutput };
    }));
  }, []);

  const handleRungLabelChange = useCallback((rungId, label) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      return { ...r, label };
    }));
  }, []);

  const handleRungChange = useCallback((rungId, field, value) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      return { ...r, [field]: value };
    }));
  }, []);

  const handleReorderBlock = useCallback((rungId, sourceBlockId, target) => {
    setRungs(prev => prev.map(r => {
      if (r.id !== rungId) return r;
      const blocks = r.blocks.map(b => ({ ...b }));
      const srcBlock = blocks.find(b => b.id === sourceBlockId);
      if (!srcBlock) return r;
      // target can be a block id or a slot index
      let targetSlot;
      if (typeof target === 'number' && !blocks.find(b => b.id === target)) {
        targetSlot = target;
      } else {
        const tgtBlock = blocks.find(b => b.id === target);
        targetSlot = tgtBlock ? (tgtBlock.slot ?? blocks.indexOf(tgtBlock)) : srcBlock.slot;
      }
      if (targetSlot === (srcBlock.slot ?? 0)) return r;
      // Swap: if target slot is occupied, give that block the source's old slot
      const occupant = blocks.find(b => b.id !== sourceBlockId && (b.slot ?? blocks.indexOf(b)) === targetSlot);
      if (occupant) occupant.slot = srcBlock.slot ?? 0;
      srcBlock.slot = targetSlot;
      // Re-sort by slot for evaluation order
      blocks.sort((a, b) => (a.slot ?? 0) - (b.slot ?? 0));
      return { ...r, blocks };
    }));
  }, []);

  const handleSimChange = useCallback((key, value) => {
    setSimState(prev => ({ ...prev, [key]: value }));
  }, []);

  // Force-toggle a block: auto → forced-on → forced-off → auto
  const handleForceBlock = useCallback((blockId) => {
    setForcedBlocks(prev => {
      const current = prev[blockId] || null;
      if (current === null) return { ...prev, [blockId]: 'satisfied' };
      if (current === 'satisfied') return { ...prev, [blockId]: 'unsatisfied' };
      const next = { ...prev };
      delete next[blockId];
      return next;
    });
  }, []);

  // Execute a rung (spend it) — also cascade-block rungs sharing the same TX inputs
  const handleExecuteRung = useCallback((rungId) => {
    setSpentRungs(prev => {
      const next = new Map(prev);
      next.set(rungId, 'executed');
      const executedRung = rungs.find(r => r.id === rungId);
      if (executedRung?.txInputIds?.length > 0) {
        const spentInputs = new Set(executedRung.txInputIds);
        rungs.forEach(r => {
          if (r.id !== rungId && !next.has(r.id) && r.txInputIds?.some(id => spentInputs.has(id))) {
            next.set(r.id, 'blocked');
          }
        });
      }
      return next;
    });
  }, [rungs]);

  // Reset all simulation overrides
  const handleResetSim = useCallback(() => {
    setForcedBlocks({});
    setSpentRungs(new Map());
    setSimActiveRungId(null);
    setSimActiveStep(-1);
    setSimStepResults({});
    resetScan();
  }, [resetScan]);

  // Start interactive step-through for a rung
  const handleStartRungSim = useCallback((rungIndex) => {
    const rung = rungs[rungIndex];
    if (!rung || spentRungs.has(rung.id)) return;
    setSimActiveRungId(rung.id);
    setSimActiveStep(0); // ready for first block click
    setSimStepResults({});
  }, [rungs, spentRungs]);

  // Alias for rung label click
  const startScanFrom = handleStartRungSim;

  // Click a block during step-through — always advances (click = authorize this block)
  const handleStepBlock = useCallback((blockId) => {
    if (!simActiveRungId) return;
    const rung = rungs.find(r => r.id === simActiveRungId);
    if (!rung) return;
    const blockIdx = rung.blocks.findIndex(b => b.id === blockId);
    if (blockIdx !== simActiveStep) return; // must click the current step
    setSimStepResults(prev => ({ ...prev, [blockId]: 'satisfied' }));
    const nextStep = simActiveStep + 1;
    if (nextStep >= rung.blocks.length) {
      // All blocks passed — fire the coil, mark spent
      setSimActiveStep(nextStep);
      setTimeout(() => {
        handleExecuteRung(simActiveRungId);
        setSimActiveRungId(null);
        setSimActiveStep(-1);
        setSimStepResults({});
      }, 600);
    } else {
      setSimActiveStep(nextStep);
    }
  }, [simActiveRungId, simActiveStep, rungs, handleExecuteRung]);

  // Auto-advance step-through past forced blocks
  useEffect(() => {
    if (!simActiveRungId || simActiveStep < 0) return;
    const rung = rungs.find(r => r.id === simActiveRungId);
    if (!rung || simActiveStep >= rung.blocks.length) return;
    const block = rung.blocks[simActiveStep];
    if (!block) return;
    const forced = forcedBlocks[block.id];
    if (forced === 'satisfied') {
      // Auto-advance after a brief visual tick
      const timer = setTimeout(() => {
        setSimStepResults(prev => ({ ...prev, [block.id]: 'satisfied' }));
        const nextStep = simActiveStep + 1;
        if (nextStep >= rung.blocks.length) {
          setSimActiveStep(nextStep);
          setTimeout(() => {
            handleExecuteRung(simActiveRungId);
            setSimActiveRungId(null);
            setSimActiveStep(-1);
            setSimStepResults({});
          }, 600);
        } else {
          setSimActiveStep(nextStep);
        }
      }, 200);
      return () => clearTimeout(timer);
    } else if (forced === 'unsatisfied') {
      // Forced-off — mark failed, stay here
      setSimStepResults(prev => ({ ...prev, [block.id]: 'unsatisfied' }));
    }
  }, [simActiveRungId, simActiveStep, rungs, forcedBlocks, handleExecuteRung]);

  const totalBlocks = rungs.reduce((s, r) => s + r.blocks.length, 0);
  const jsonOutput = useMemo(() => {
    return JSON.stringify(exportCreateRungtx(rungs, txOutputs, txInputs, locktime), null, 2);
  }, [rungs, txInputs, txOutputs, locktime]);

  // Compute which output names and rung numbers are energized (for OUTPUT_REF cross-referencing)
  // Use simState + forcedBlocks (can't use fullSimState here — circular dependency)
  const [energizedOutputs, energizedRungNums] = useMemo(() => {
    if (!isSimMode) return [new Set(), new Set()];
    const evalState = { ...simState, forcedBlocks };
    const outputs = new Set();
    const rungNums = new Set();
    // Evaluate in two passes: first compute block satisfaction, then resolve relay deps
    const blocksSatisfied = rungs.map(r =>
      r.blocks.length > 0 && r.blocks.every(b => evaluateBlock(b, evalState) === 'satisfied')
    );
    // Iterative resolution: relay deps may cascade (max 8 relays, converges fast)
    let changed = true;
    while (changed) {
      changed = false;
      rungs.forEach((r, i) => {
        const rungKey = `R${String(i).padStart(3, '0')}`;
        if (rungNums.has(rungKey)) return; // already energized
        if (!blocksSatisfied[i]) return;
        // Check outputRefs (relay references)
        const refsSatisfied = !r.outputRefs || r.outputRefs.length === 0 ||
          r.outputRefs.every(ref => {
            const refUpper = ref.trim().toUpperCase();
            return outputs.has(refUpper) || rungNums.has(refUpper);
          });
        if (refsSatisfied) {
          if (r.output.name) outputs.add(r.output.name.trim().toUpperCase());
          rungNums.add(rungKey);
          if (r.label) rungNums.add(r.label.trim().toUpperCase());
          changed = true;
        }
      });
    }
    return [outputs, rungNums];
  }, [rungs, isSimMode, simState, forcedBlocks]);

  // Compute tx totals from inputs/outputs
  const txTotals = useMemo(() => {
    const totalOut = txOutputs.reduce((s, o) => s + (parseInt(o.amount) || 0), 0);
    const vsize = 150 + txInputs.length * 68 + txOutputs.length * 34; // rough estimate
    return { totalOut, vsize, inputCount: txInputs.filter(i => i.txid).length };
  }, [txInputs, txOutputs]);

  // Augment simState with energized outputs, forced blocks, spent rungs
  const fullSimState = useMemo(() => ({
    ...simState,
    energizedOutputs,
    energizedRungNums,
    outputAmount: txTotals.totalOut || simState.outputAmount,
    inputCount: txTotals.inputCount || 1,
    outputCount: txOutputs.filter(o => o.address || parseInt(o.amount) > 0).length || 1,
    forcedBlocks,
  }), [simState, energizedOutputs, energizedRungNums, txTotals, txOutputs, forcedBlocks]);

  // Count energized rungs
  const energizedCount = useMemo(() => {
    if (!isSimMode) return 0;
    return rungs.filter(r => r.blocks.length > 0 && r.blocks.every(b => evaluateBlock(b, fullSimState) === 'satisfied')).length;
  }, [rungs, isSimMode, fullSimState]);

  const handleClear = useCallback(() => {
    setRungs([createRung()]);
    setSelectedBlockId(null);
    setSelectedCoilId(null);
    setSelectedInputId(null);
    setTxInputs([{ id: uid(), txid: '', vout: 0, sequence: '' }]);
    setTxOutputs([{ id: uid(), address: '', amount: 0 }]);
    setLocktime(0);
  }, []);

  const handleCopyJson = useCallback(() => {
    navigator.clipboard?.writeText(jsonOutput);
  }, [jsonOutput]);

  const handleLoadExample = useCallback((ex) => {
    // Build tx inputs
    const newTxInputs = ex.txInputs.map(inp => ({ id: uid(), txid: inp.txid, vout: inp.vout }));
    // Build tx outputs
    const newTxOutputs = ex.txOutputs.map(out => ({ id: uid(), address: out.address, amount: out.amount }));
    // Build rungs
    const newRungs = ex.rungs.map((rd, ri) => {
      const rung = createRung();
      rung.label = rd.label || '';
      rung.output = { name: rd.output?.name || '', type: rd.output?.type || 'standard', txOutputId: null, wireType: rd.output?.wireType || 'UNLOCK', attestation: rd.output?.attestation || 'INLINE', scheme: rd.output?.scheme || 'SCHNORR' };
      // Assign tx output to coil
      if (ex.outputMap && ex.outputMap[ri] !== undefined && ex.outputMap[ri] !== null) {
        const outIdx = ex.outputMap[ri];
        if (outIdx < newTxOutputs.length) rung.output.txOutputId = newTxOutputs[outIdx].id;
      }
      // Assign tx inputs to input contact
      if (ex.inputMap && ex.inputMap[ri]) {
        rung.txInputIds = ex.inputMap[ri].map(idx => newTxInputs[idx]?.id).filter(Boolean);
      }
      // Assign output refs
      if (rd.outputRefs) {
        rung.outputRefs = [...rd.outputRefs];
      }
      // Build blocks
      rung.blocks = (rd.blocks || []).map(bd => {
        const block = createBlock(bd.type);
        if (bd.values) {
          Object.keys(bd.values).forEach(k => { block.values[k] = bd.values[k]; });
        }
        if (bd.inverted) block.inverted = true;
        return block;
      });
      return rung;
    });
    setRungs(newRungs.length > 0 ? newRungs : [createRung()]);
    setTxInputs(newTxInputs.length > 0 ? newTxInputs : [{ id: uid(), txid: '', vout: 0 }]);
    setTxOutputs(newTxOutputs.length > 0 ? newTxOutputs : [{ id: uid(), address: '', amount: 0 }]);
    setSelectedBlockId(null);
    setSelectedCoilId(null);
    setSelectedInputId(null);
    setShowExamples(false);
  }, []);

  // Load example from URL param ?example=N
  useEffect(() => {
    if (pendingExample !== null && pendingExample >= 0 && pendingExample < EXAMPLES.length) {
      handleLoadExample(EXAMPLES[pendingExample]);
      setPendingExample(null);
    }
  }, [pendingExample, handleLoadExample]);

  const handlePrint = useCallback(() => {
    const w = window.open('', '_blank');
    if (!w) return;

    // Build ladder diagram
    const ladderRows = rungs.map((rung, ri) => {
      const rungLabel = rung.label || `R${String(ri).padStart(3, '0')}`;
      const inputCount = (rung.txInputIds || []).length;
      const inputInfo = inputCount > 0 ? `[${inputCount} VIN]` : '[INPUT]';

      const slots = [];
      for (let s = 0; s < 8; s++) {
        const block = rung.blocks.find(b => (b.slot ?? rung.blocks.indexOf(b)) === s);
        if (block) {
          const def = getBlockDef(block.type);
          const firstField = def.fields[0];
          const val = firstField ? block.values[firstField.name] || '' : '';
          const valShort = val.length > 10 ? val.substring(0, 6) + '..' : val;
          slots.push(`─┤ ${def.label}${valShort ? ' ' + valShort : ''} ├─`);
        } else {
          slots.push('────────');
        }
      }

      const coilName = rung.output.name || '';
      const coilSym = getCoilSymbol(rung.output.type);
      const txOut = txOutputs.find(o => o.id === rung.output.txOutputId);
      const txOutInfo = txOut ? `→ ${txOut.address || '?'} ${(parseInt(txOut.amount) || 0).toLocaleString()}s` : '';

      return { rungLabel, inputInfo, slots, coilSym, coilName, txOutInfo, blocks: rung.blocks, rung };
    });

    // Build block detail table
    const blockDetails = [];
    rungs.forEach((rung, ri) => {
      rung.blocks.forEach((block, bi) => {
        const def = getBlockDef(block.type);
        const fields = def.fields.map(f => `${f.label}: ${block.values[f.name] || '—'}`).join(', ');
        blockDetails.push({
          tag: `${rung.label || 'R' + String(ri).padStart(3, '0')}.B${bi}`,
          type: def.label,
          inverted: block.inverted,
          fields: fields || '—',
        });
      });
    });

    // TX inputs
    const txInputRows = txInputs.filter(i => i.txid).map((inp, idx) => ({
      vin: idx,
      txid: inp.txid,
      vout: inp.vout,
    }));

    // TX outputs
    const txOutputRows = txOutputs.filter(o => o.address || o.amount).map((out, idx) => ({
      vout: idx,
      address: out.address || '—',
      amount: (parseInt(out.amount) || 0).toLocaleString(),
    }));

    // Rung-to-TX mapping
    const rungMappings = rungs.map((rung, ri) => {
      const label = rung.label || `R${String(ri).padStart(3, '0')}`;
      const inputs = (rung.txInputIds || []).map(id => {
        const inp = txInputs.find(i => i.id === id);
        const idx = txInputs.indexOf(inp);
        return inp ? `VIN ${idx} (${inp.txid ? inp.txid.substring(0, 8) + '..' : '?'}:${inp.vout})` : '?';
      });
      const txOut = txOutputs.find(o => o.id === rung.output.txOutputId);
      const outIdx = txOutputs.indexOf(txOut);
      const output = txOut ? `VOUT ${outIdx} (${txOut.address ? txOut.address.substring(0, 16) + '..' : '?'})` : '—';
      const refs = (rung.outputRefs || []).join(', ') || '—';
      return { label, coilName: rung.output.name || '—', inputs: inputs.join(', ') || '—', output, refs };
    });

    w.document.write(`<!DOCTYPE html><html><head>
<title>Ladder Script — ${timestamp}</title>
<style>
  @page { size: A4; margin: 15mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; font-size: 9px; color: #111; background: #fff; padding: 20px; }
  h1 { font-size: 14px; border-bottom: 2px solid #111; padding-bottom: 4px; margin-bottom: 4px; letter-spacing: 2px; }
  h2 { font-size: 11px; border-bottom: 1px solid #888; padding-bottom: 3px; margin: 16px 0 8px 0; letter-spacing: 1px; text-transform: uppercase; }
  .meta { font-size: 8px; color: #666; margin-bottom: 12px; }
  .ladder { margin: 8px 0; }
  .rung-row { display: flex; align-items: center; height: 28px; border-bottom: 1px dotted #ddd; }
  .rung-label { width: 60px; font-weight: bold; font-size: 8px; color: #333; flex-shrink: 0; }
  .rung-input { width: 50px; font-size: 7px; color: #666; flex-shrink: 0; }
  .rail { width: 2px; background: #111; height: 28px; flex-shrink: 0; }
  .slots { display: grid; grid-template-columns: repeat(8, 1fr); flex: 1; height: 28px; align-items: center; font-size: 8px; }

  .slot.empty { color: #ccc; }

  .tx-out-info { font-size: 7px; color: #888; margin-left: 4px; }

<div class="ladder">
${ladderRows.map(r => `
