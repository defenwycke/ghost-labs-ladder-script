// ═══════════════════════════════════════════════════════════════
// DECODED JSON → BUILDER RUNG CONVERTER
// ═══════════════════════════════════════════════════════════════

// Convert decoded rung JSON (from decoderung RPC, createtxmlsc format, or raw tx)
// into the builder's internal rung format for visualization.
function decodedToBuilderRungs(data) {
  if (!data || typeof data !== 'object') return null;

  const parseHexNumeric = (hex) => {
    if (!hex) return '0';
    const bytes = hex.match(/.{2}/g) || [];
    let val = 0;
    bytes.forEach((b, i) => { val |= parseInt(b, 16) << (i * 8); });
    return String(val);
  };
  const SCHEME_REV = { '01': 'SCHNORR', '02': 'ECDSA', '10': 'FALCON512', '11': 'FALCON1024', '12': 'DILITHIUM3', '13': 'SPHINCS_SHA' };

  const convertBlock = (bd) => {
    const typeName = bd.block_type || bd.type || bd.block || 'SIG';
    const block = createBlock(typeName);
    block.inverted = !!bd.inverted;

    const params = bd.params || bd.fields || [];
    const def = getBlockDef(typeName);

    if (Array.isArray(params) && params.length > 0) {
      let pi = 0;
      for (const field of def.fields) {
        if (pi >= params.length) break;
        if (field.multi) {
          // Collect consecutive params matching this field's dataType
          const vals = [];
          while (pi < params.length) {
            const p = params[pi];
            const pType = (p.type || p.data_type || '').toUpperCase();
            if (pType && pType !== field.dataType && vals.length > 0) break;
            vals.push(p.hex || p.data || String(p.value || ''));
            pi++;
          }
          block.values[field.name] = vals.join(', ');
        } else {
          const p = params[pi];
          const hex = p.hex || p.data || '';
          if (field.dataType === 'NUMERIC') {
            block.values[field.name] = hex ? parseHexNumeric(hex) : String(p.value != null ? p.value : '');
          } else if (field.dataType === 'SCHEME') {
            block.values[field.name] = SCHEME_REV[hex] || hex || String(p.value || '');
          } else {
            block.values[field.name] = hex || String(p.value || '');
          }
          pi++;
        }
      }
    } else if (typeof params === 'object' && !Array.isArray(params)) {
      // Named params: { key: "02abc...", scheme: "SCHNORR", blocks: 144 }
      for (const field of def.fields) {
        const val = params[field.name] ?? params[field.label?.toLowerCase()] ?? '';
        if (val !== '') block.values[field.name] = String(val);
      }
    }
    return block;
  };

  const convertRung = (rd) => {
    const rung = createRung();
    const blocksData = rd.blocks || rd.contacts || [];
    rung.blocks = blocksData.map(convertBlock);
    const coil = rd.coil || {};
    rung.output.wireType = coil.coil_type || coil.type || 'UNLOCK';
    rung.output.attestation = coil.attestation || 'INLINE';
    rung.output.scheme = coil.scheme || 'SCHNORR';
    rung.label = rd.label || '';
    return rung;
  };

  // Format 1: decoderung output --{ rungs: [...] } or { n_rungs, rungs: [...] }
  if (data.rungs && Array.isArray(data.rungs)) {
    return { rungs: data.rungs.map(convertRung), txInputs: [], txOutputs: [] };
  }
  // Format 2: bare array of rungs
  if (Array.isArray(data) && data.length > 0 && (data[0].blocks || data[0].contacts)) {
    return { rungs: data.map(convertRung), txInputs: [], txOutputs: [] };
  }
  // Format 3: createtxmlsc / wire format --{ inputs, outputs[].conditions[].blocks[] }
  if (data.outputs && Array.isArray(data.outputs)) {
    const txInputs = (data.inputs || []).map(i => ({ id: uid(), txid: i.txid || '', vout: i.vout || 0, sequence: i.sequence !== undefined ? String(i.sequence) : '' }));
    const txOutputs = [];
    const rungs = [];
    data.outputs.forEach((out) => {
      const txOut = { id: uid(), address: out.address || '', amount: Math.round((out.value || out.amount || 0) * (out.value ? 1e8 : 1)) };
      txOutputs.push(txOut);
      // Each output may have rungs or conditions
      const rungsData = out.rungs || [];
      const conditionsData = out.conditions || [];
      const entries = rungsData.length > 0 ? rungsData : conditionsData;
      entries.forEach((entry) => {
        const rung = convertRung(entry);
        rung.output.txOutputId = txOut.id;
        if (out.coil) {
          rung.output.wireType = out.coil.type || out.coil.coil_type || rung.output.wireType;
          rung.output.attestation = out.coil.attestation || rung.output.attestation;
          rung.output.scheme = out.coil.scheme || rung.output.scheme;
        }
        rung.txInputIds = txInputs.map(i => i.id);
        rungs.push(rung);
      });
    });
    return { rungs, txInputs, txOutputs };
  }
  // Format 4: raw tx with version 4 --{ version: 4, vin, vout[].rung_conditions }
  if (data.version === 4 && data.vout) {
    const txInputs = (data.vin || []).map(v => ({ id: uid(), txid: v.txid || '', vout: v.vout || 0, sequence: v.sequence !== undefined ? String(v.sequence) : '' }));
    const txOutputs = [];
    const rungs = [];
    data.vout.forEach((vout) => {
      const txOut = { id: uid(), address: vout.scriptPubKey?.address || '', amount: Math.round((vout.value || 0) * 1e8) };
      txOutputs.push(txOut);
      const rc = vout.rung_conditions || vout.ladder || vout.rungs;
      if (rc) {
        const rungsData = Array.isArray(rc) ? rc : (rc.rungs || [rc]);
        rungsData.forEach((rd) => {
          const rung = convertRung(rd);
          rung.output.txOutputId = txOut.id;
          rung.txInputIds = txInputs.map(i => i.id);
          rungs.push(rung);
        });
      }
    });
    return rungs.length > 0 ? { rungs, txInputs, txOutputs } : null;
  }
  return null;
}

// RECORD MODULE (v2)
// ═══════════════════════════════════════════════════════════════

const RECORD_VERSION = 2;
const ENGINE_VERSION = '2.0';
const RECORD_STORAGE_KEY = 'ghost_rung_keys';
const RECORD_MAX_COUNT = 100;

function createRecord(txid, { vout = 0, scheme, amount, walletKey, conditionKeys, preimages, rungs, relays, ctvOutputsMap } = {}) {
  // Count block types for drift detection
  const blockTypeChecksums = {};
  (rungs || []).forEach(r => {
    (r.blocks || []).forEach(b => {
      blockTypeChecksums[b.type] = (blockTypeChecksums[b.type] || 0) + 1;
    });
  });

  return {
    version: RECORD_VERSION,
    engineVersion: ENGINE_VERSION,
    txid,
    vout,
    timestamp: Date.now(),
    scheme: scheme || 'SCHNORR',
    amount: amount || 0,
    walletKey: walletKey ? { pubkey: walletKey.pubkey, privkey: walletKey.privkey } : null,
    conditionKeys: (conditionKeys || []).map(kp => ({
      pubkey: kp.pubkey, privkey: kp.privkey,
      pubkey_commit: kp.pubkey_commit || '',
      scheme: kp.scheme || scheme || 'SCHNORR',
    })),
    preimages: preimages || [],
    rungs: rungs || [],
    relays: relays || undefined,
    ctvOutputsMap: ctvOutputsMap || undefined,
    blockTypeChecksums,
    outputCount: (rungs || []).filter(r => r.vout != null).length,
  };
}

function migrateRecord(rec) {
  if (!rec || typeof rec !== 'object') return null;
  // v1 records have no version field
  if (!rec.version) {
    const blockTypeChecksums = {};
    (rec.rungs || []).forEach(r => {
      (r.blocks || []).forEach(b => {
        blockTypeChecksums[b.type] = (blockTypeChecksums[b.type] || 0) + 1;
      });
    });
    return {
      ...rec,
      version: RECORD_VERSION,
      engineVersion: rec.engineVersion || '1.0',
      blockTypeChecksums,
      outputCount: (rec.rungs || []).filter(r => r.vout != null).length,
      // Ensure vout field exists
      vout: rec.vout ?? 0,
    };
  }
  return rec;
}

function saveRecord(record) {
  try {
    const existing = JSON.parse(localStorage.getItem(RECORD_STORAGE_KEY) || '[]');
    existing.push(record);
    if (existing.length > RECORD_MAX_COUNT) existing.splice(0, existing.length - RECORD_MAX_COUNT);
    localStorage.setItem(RECORD_STORAGE_KEY, JSON.stringify(existing));
    return true;
  } catch (e) {
    console.warn('Failed to save record:', e);
    return false;
  }
}

function loadAllRecords() {
  try {
    const recs = JSON.parse(localStorage.getItem(RECORD_STORAGE_KEY) || '[]');
    return recs.map(migrateRecord).filter(Boolean);
  } catch (e) {
    return [];
  }
}

function deleteRecord(txid) {
  try {
    const recs = JSON.parse(localStorage.getItem(RECORD_STORAGE_KEY) || '[]');
    const filtered = recs.filter(r => r.txid !== txid);
    localStorage.setItem(RECORD_STORAGE_KEY, JSON.stringify(filtered));
    return true;
  } catch (e) {
    return false;
  }
}

// SESSION TX LOG (for Review tab)
// ═══════════════════════════════════════════════════════════════

const SESSION_LOG_KEY = 'ghost_session_txlog';
const SESSION_LOG_MAX = 50;

// Save a new fund entry. Each entry holds fund JSON and (later) its spend JSON.
function saveSessionTx({ fundTxid, label, timestamp, fundJson, fundSize }) {
  try {
    const log = JSON.parse(localStorage.getItem(SESSION_LOG_KEY) || '[]');
    log.unshift({ fundTxid, label: label || '', timestamp: timestamp || Date.now(), fundJson: fundJson || null, fundSize: fundSize || null, spendTxid: null, spendJson: null, spendSize: null });
    if (log.length > SESSION_LOG_MAX) log.length = SESSION_LOG_MAX;
    localStorage.setItem(SESSION_LOG_KEY, JSON.stringify(log));
  } catch (e) { console.warn('Failed to save session tx:', e); }
}

// Attach spend JSON to the fund entry it spends from.
function updateSessionTxSpend(fundTxid, spendTxid, spendJson, spendSize) {
  try {
    const log = JSON.parse(localStorage.getItem(SESSION_LOG_KEY) || '[]');
    const entry = log.find(e => e.fundTxid === fundTxid);
    if (entry) {
      entry.spendTxid = spendTxid;
      entry.spendJson = spendJson;
      if (spendSize) entry.spendSize = spendSize;
    } else {
      // Fund was created before Review tab existed -- create a standalone entry
      log.unshift({ fundTxid, label: 'Spend ' + fundTxid.substring(0, 8) + '..', timestamp: Date.now(), fundJson: null, spendTxid: spendTxid, spendJson: spendJson, fundSize: null, spendSize: spendSize || null });
      if (log.length > SESSION_LOG_MAX) log.length = SESSION_LOG_MAX;
    }
    localStorage.setItem(SESSION_LOG_KEY, JSON.stringify(log));
  } catch (e) { console.warn('Failed to update session tx:', e); }
}

function loadSessionLog() {
  try { return JSON.parse(localStorage.getItem(SESSION_LOG_KEY) || '[]'); }
  catch (e) { return []; }
}

function clearSessionLog() {
  localStorage.removeItem(SESSION_LOG_KEY);
}

// Seed the session log with a demo entry if empty (quantum vault fund+spend pair)
function seedSessionLogIfEmpty() {
  try {

const SIGNET_API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8801'
  : 'https://bitcoinghost.org';

async function apiCallBase(endpoint, body) {
  const opts = body !== undefined
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    : {};
  const r = await fetch(SIGNET_API + endpoint, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail?.rpc_error || data.detail || `HTTP ${r.status}`);
  return data;
}

function ConvertPanel() {
  const dispatch = useContext(AppDispatch);
  const onViewAsLadder = useCallback((decodedJson) => {
    try {
      const result = decodedToBuilderRungs(decodedJson);
      if (!result || result.rungs.length === 0) { alert('Could not parse rung structure from this JSON.'); return; }
      dispatch({ type: 'VIEW_AS_LADDER', rungs: result.rungs, txInputs: result.txInputs, txOutputs: result.txOutputs });
    } catch (e) { alert('Failed to convert: ' + e.message); }
  }, [dispatch]);
  const [pasteJson, setPasteJson] = useState('');
  const [pasteError, setPasteError] = useState(null);

  const sty = {
    section: { marginBottom: 12, padding: '12px 16px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', fontSize: 12 },
    label: { fontSize: 10, fontWeight: 600, letterSpacing: 1.5, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: 6 },
    input: { width: '100%', padding: '6px 8px', background: 'var(--bg-primary)', border: '1px solid var(--border)', color: 'var(--text-primary)', fontFamily: 'var(--font-mono)', fontSize: 12, outline: 'none', marginBottom: 8 },
    btn: { padding: '6px 12px', fontSize: 11, fontFamily: 'var(--font-mono)', fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer', border: '1px solid', transition: 'all 0.15s', marginRight: 6 },
    btnPrimary: { color: 'var(--amber)', background: 'var(--amber-glow)', borderColor: 'var(--amber-dim)' },
    btnDefault: { color: 'var(--text-secondary)', background: 'var(--bg-tertiary)', borderColor: 'var(--border)' },
    sectionTitle: { fontSize: 11, fontWeight: 700, letterSpacing: 2, color: 'var(--amber)', textTransform: 'uppercase', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 },
  };

  return (
    <div style={{ padding: '20px 32px', overflow: 'auto', flex: 1, maxWidth: 1008, margin: '0 auto', width: '100%' }}>
      <div style={sty.sectionTitle}>CONVERT JSON TO LADDER</div>
      <div style={sty.section}>
        <div style={sty.label}>PASTE RUNG TX JSON</div>
        <div style={{ color: 'var(--text-dim)', fontSize: 10, marginBottom: 6, lineHeight: 1.5 }}>
          Paste decoded JSON from <code style={{ color: 'var(--amber)', background: 'var(--bg-primary)', padding: '0 3px' }}>decoderung</code>, <code style={{ color: 'var(--amber)', background: 'var(--bg-primary)', padding: '0 3px' }}>createtxmlsc</code>, or <code style={{ color: 'var(--amber)', background: 'var(--bg-primary)', padding: '0 3px' }}>decoderawtransaction</code> output to visualize it as a ladder diagram. Works offline --no signet connection needed.
        </div>
        <textarea
          style={{ ...sty.input, height: 160, resize: 'vertical', fontFamily: 'var(--font-mono)', fontSize: 11 }}
          placeholder={'{\n  "rungs": [{ "blocks": [{ "block_type": "SIG", "params": [...] }], "coil": {...} }]\n}'}
          value={pasteJson}
          onChange={e => { setPasteJson(e.target.value); setPasteError(null); }}
        />
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <button style={{ ...sty.btn, ...sty.btnPrimary }} onClick={() => {
            if (!pasteJson.trim()) { setPasteError('Paste some JSON first.'); return; }
            try {
              const parsed = JSON.parse(pasteJson.trim());
              const result = decodedToBuilderRungs(parsed);
              if (!result || result.rungs.length === 0) {
                setPasteError('Could not find rung structure. Expected { rungs: [...] } or { outputs: [{ conditions: [...] }] } format.');
                return;
              }
              setPasteError(null);
              onViewAsLadder(parsed);
            } catch (e) {
              setPasteError('Invalid JSON: ' + e.message);
            }
          }}>VIEW AS LADDER</button>
          <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={() => { navigator.clipboard.readText().then(t => { setPasteJson(t); setPasteError(null); }); }}>PASTE FROM CLIPBOARD</button>
          <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={() => { setPasteJson(''); setPasteError(null); }}>CLEAR</button>
        </div>
        {pasteError && <div style={{ marginTop: 8, padding: '6px 10px', background: 'rgba(200,40,40,0.1)', border: '1px solid rgba(200,40,40,0.3)', fontSize: 10, color: 'var(--red-bright)' }}>{pasteError}</div>}
      </div>
      <div style={{ ...sty.section, borderColor: 'var(--border)', background: 'var(--bg-tertiary)' }}>
        <div style={{ color: 'var(--text-dim)', fontSize: 11, lineHeight: 1.7 }}>
          <strong style={{ color: 'var(--text-secondary)' }}>Supported formats:</strong>
          <ul style={{ margin: '6px 0 0 16px', padding: 0 }}>
            <li><code style={{ color: 'var(--amber)' }}>decoderung</code> output --decoded witness/conditions with block_type, params</li>
            <li><code style={{ color: 'var(--amber)' }}>createtxmlsc</code> format --inputs, outputs with conditions and blocks</li>
            <li><code style={{ color: 'var(--amber)' }}>decoderawtransaction</code> output --raw tx with scriptPubKey</li>
          </ul>
        </div>
      </div>
    </div>
  );
}

// ─── Pure fund-planning helpers (no API calls, no React state) ───

/**
 * planFund: Scan rungs + outputs and compute everything needed to fund a RUNG transaction.
 * Returns a pure data plan --caller handles async API calls and state updates.
 *
 * @param {Array} rungs          - current rungs array
 * @param {Array} txOutputs      - current txOutputs array
 * @param {Object} options       - { scheme: string }
 * @returns {Object} plan
 */
function planFund(rungs, txOutputs, options) {
  const { scheme } = options;
  const errors = [];

  // ── 1. Inventory keys and hashes via BlockRegistry.fundNeeds() ──
  const pubkeyFields = [];    // { ri, bi, field, multi }
  const emptyPubkeySigs = []; // { ri, bi } --SIG-family blocks with empty pubkey
  const hashFields = [];      // { ri, bi, hashType, field }

  rungs.forEach((rung, ri) => {
    rung.blocks.forEach((block, bi) => {
      const reg = BlockRegistry[block.type];
      if (!reg) return;
      const needs = reg.fundNeeds(block);
      needs.keys.forEach(kn => {
        if (block.values[kn.field]) {
          pubkeyFields.push({ ri, bi, field: kn.field, multi: kn.multi });
        } else if (kn.field === 'pubkey' && !kn.multi) {
          emptyPubkeySigs.push({ ri, bi });
        }
      });
      needs.hashes.forEach(hn => {
        if (block.values[hn.field]) {
          // Normalize hash type to lowercase (fundNeeds uses uppercase: SHA256, HASH160, TAGGED)
          const hashType = (hn.type || 'sha256').toLowerCase();
          hashFields.push({ ri, bi, hashType, field: hn.field });
        }
      });
      // Collect pubkeys from inner blocks (P2SH/P2WSH/P2TR_SCRIPT)
      if (block.innerBlocks) {
        for (const ib of block.innerBlocks) {
          const ibReg = BlockRegistry[ib.type];
          if (!ibReg) continue;
          const ibNeeds = ibReg.fundNeeds(ib);
          ibNeeds.keys.forEach(kn => {
            if (kn.multi && ib.values?.[kn.field]) {
              ib.values[kn.field].split(',').map(k => k.trim()).filter(Boolean).forEach(k => {
                pubkeyFields.push({ ri, bi, field: kn.field, multi: false, _innerBlockId: ib.id, _innerPk: k });
              });
            } else if (!kn.multi && ib.values?.[kn.field]) {
              pubkeyFields.push({ ri, bi, field: kn.field, multi: false, _innerBlockId: ib.id, _innerPk: ib.values[kn.field] });
            }
          });
        }
      }
    });
  });

  // ── 2. Collect unique pubkeys and count keypairs needed ──
  const allPubkeysNeeded = new Set();
  pubkeyFields.forEach(pf => {
    if (pf._innerPk) {
      // Inner block pubkey --use directly
      allPubkeysNeeded.add(pf._innerPk);
    } else {
      const block = rungs[pf.ri].blocks[pf.bi];
      if (pf.multi) {
        const keys = (block.values[pf.field] || '').split(',').map(k => k.trim()).filter(Boolean);
        keys.forEach(k => allPubkeysNeeded.add(k));
      } else {
        allPubkeysNeeded.add(block.values[pf.field]);
      }
    }
  });
  const keypairCount = Math.max(allPubkeysNeeded.size + emptyPubkeySigs.length, 1);

  // ── 3. Identify valid outputs (those with rung conditions) ──
  const rungsByOutput = new Map();
  rungs.forEach(r => {
    if (r.output.type === 'relay') return;
    if (r.output.txOutputId != null) {
      if (!rungsByOutput.has(r.output.txOutputId)) rungsByOutput.set(r.output.txOutputId, []);
      rungsByOutput.get(r.output.txOutputId).push(r);
    }
  });
  const validTxOutputs = txOutputs.filter(o => rungsByOutput.has(o.id)).map(o => ({ ...o }));
  if (validTxOutputs.length === 0) {
    errors.push('No outputs have rung conditions assigned. Go to BUILD and assign rungs to outputs.');
  }

  // ── 4. Fee estimate + output minimum enforcement ──
  // PQ witness sizes (pubkey + sig): Falcon-512 ~1563B, Falcon-1024 ~3073B, Dilithium3 ~5245B, SPHINCS ~49248B
  // Fee accounts for witness weight (segwit: witness bytes / 4 in vB)
  const isPQ = scheme !== 'SCHNORR' && scheme !== 'ECDSA';
  const pqWitnessExtra = { FALCON512: 1563, FALCON1024: 3073, DILITHIUM3: 5245, SPHINCS_SHA: 49248 };
  const witnessBytes = pqWitnessExtra[scheme] || 0;
  const outputCount = validTxOutputs.length;
  const numBlocks = rungs.reduce((s, r) => s + r.blocks.length, 0);
  const baseFee = 200 + 150 * (outputCount + 1) + 100 * numBlocks;
  const feeSats = Math.max(1000, baseFee + Math.ceil(witnessBytes / 4));

  // Ensure output amounts are sufficient for their rung constraints
  // Spend fee must also account for PQ witness size
  const spendFeeEstimate = Math.max(1000, Math.ceil(witnessBytes / 4) + 500);

  for (const txOut of validTxOutputs) {
    const outputRungs = rungsByOutput.get(txOut.id) || [];
    let minRequired = spendFeeEstimate + 1000; // at minimum: spendable after fee (1000 sats floor avoids dust)
    for (const rung of outputRungs) {
      // RECURSE_SPLIT: needs min_sats * 2 + fee
      const splitBlock = rung.blocks.find(b => b.type === 'RECURSE_SPLIT');
      if (splitBlock) {
        const minSats = parseInt(splitBlock.values?.min_sats) || 546;
        minRequired = Math.max(minRequired, minSats * 2 + spendFeeEstimate);
      }
      // AMOUNT_LOCK: output must hold at least min + fee (so spend can meet the lock)
      const amtBlock = rung.blocks.find(b => b.type === 'AMOUNT_LOCK');
      if (amtBlock) {
        const lockMin = parseInt(amtBlock.values?.min) || 0;
        if (lockMin > 0) minRequired = Math.max(minRequired, lockMin + spendFeeEstimate);
      }
    }
    const currentAmount = parseInt(txOut.amount) || 0;
    if (currentAmount < minRequired) {
      txOut.amount = minRequired;
    }
  }

  const totalOutputSats = validTxOutputs.reduce((sum, o) => sum + (parseInt(o.amount) || 0), 0);
  const needSats = totalOutputSats > 0 ? totalOutputSats + feeSats : 0;


  return {
    pubkeyFields,
    emptyPubkeySigs,
    allPubkeysNeeded,
    keypairCount,
    hashFields,
    validTxOutputs,
    feeSats,
    needSats,
    isPQ,
    errors,
  };
}

/**
 * selectUtxos: Greedily pick confirmed UTXOs until we meet needSats.
 * @param {Array} confirmed - sorted desc by amount, each { amount (BTC float), txid, vout, ... }
 * @param {number} needSats - total satoshis needed (outputs + fee)
 * @returns {{ selected: Array, selectedTotal: number }}
 */
function selectUtxos(confirmed, needSats) {
  const selected = [];
  let selectedTotal = 0;
  for (const u of confirmed) {
    selected.push(u);
    selectedTotal += Math.round(u.amount * 1e8);
    if (needSats > 0 && selectedTotal >= needSats) break;
    if (needSats === 0 && selected.length >= 1) break;
  }
  return { selected, selectedTotal };
}

/**
 * buildFundOutputs: Distribute satoshis across outputs, scaling down if needed.
 * @param {Array} validTxOutputs - outputs with rung conditions
 * @param {number} selectedTotal - total sats from selected UTXOs
 * @param {number} feeSats       - estimated fee in sats
 * @returns {{ outputAmounts: number[], zeroAmountIndices: number[] }}
 */
function buildFundOutputs(validTxOutputs, selectedTotal, feeSats) {
  const outputCount = validTxOutputs.length;
  const outputAmounts = [];
  let allocatedSats = 0;
  const zeroAmountIndices = [];

  for (let i = 0; i < outputCount; i++) {
    const existingAmt = parseInt(validTxOutputs[i]?.amount) || 0;
    outputAmounts.push(existingAmt);
    if (existingAmt > 0) {
      allocatedSats += existingAmt;
    } else {
      zeroAmountIndices.push(i);
    }
  }

  // Distribute remaining sats to zero-amount outputs
  const remainingSats = selectedTotal - feeSats - allocatedSats;
  if (zeroAmountIndices.length > 0 && remainingSats > 0) {
    const perZero = Math.floor(remainingSats / zeroAmountIndices.length);
    zeroAmountIndices.forEach(idx => { outputAmounts[idx] = perZero; });
  } else if (zeroAmountIndices.length > 0) {
    const perAll = Math.floor((selectedTotal - feeSats) / outputCount);
    outputAmounts.forEach((_, i) => { outputAmounts[i] = perAll; });
  }

  // Scale down if needed
  let totalNewOutputSats = outputAmounts.reduce((s, a) => s + a, 0);
  if (totalNewOutputSats + feeSats > selectedTotal) {
    const overshoot = totalNewOutputSats + feeSats - selectedTotal;
    if (zeroAmountIndices.length > 0) {
      const reduceEach = Math.ceil(overshoot / zeroAmountIndices.length);
      zeroAmountIndices.forEach(idx => { outputAmounts[idx] = Math.max(546, outputAmounts[idx] - reduceEach); });
    } else {
      const available = selectedTotal - feeSats;
      const perOutput = Math.floor(available / outputAmounts.length);
      outputAmounts.forEach((_, i) => { outputAmounts[i] = perOutput; });
    }
  }

  return { outputAmounts, zeroAmountIndices };
}

/**
 * applyFundKeypairs: Return a new rungs array with replaced pubkeys, hashes, and scheme.
 * Pure function --no state mutation.
 *
 * @param {Array} rungs            - current rungs
 * @param {Map}   oldToNew         - old pubkey -> new pubkey
 * @param {Map}   emptyKeyMap      - "ri:bi" -> new pubkey (for empty SIG blocks)
 * @param {Map}   hashReplacements - "ri:bi" -> { preimage, hash }
 * @param {string} scheme          - signing scheme
 * @returns {Array} new rungs array with replacements applied
 */
function applyFundKeypairs(rungs, oldToNew, emptyKeyMap, hashReplacements, scheme) {
  return rungs.map((rung, ri) => ({
    ...rung,
    blocks: rung.blocks.map((block, bi) => {
      const reg = BlockRegistry[block.type];
      if (!reg) return block;
      const vals = { ...block.values };
      const needs = reg.fundNeeds(block);

      // Replace key fields
      needs.keys.forEach(kn => {
        if (kn.multi) {
          if (vals[kn.field]) {
            vals[kn.field] = vals[kn.field].split(',').map(k => k.trim()).filter(Boolean).map(k => oldToNew.get(k) || k).join(', ');
            vals.scheme = scheme;
          }
        } else if (vals[kn.field] && oldToNew.has(vals[kn.field])) {
          vals[kn.field] = oldToNew.get(vals[kn.field]);
          vals.scheme = scheme;
        } else if (kn.field === 'pubkey' && !vals[kn.field] && emptyKeyMap.has(`${ri}:${bi}`)) {
          vals.pubkey = emptyKeyMap.get(`${ri}:${bi}`);
          vals.scheme = scheme;
        }
      });

      // Replace hash values with real hashes and store preimage (node-computed hash model)
      const hr = hashReplacements.get(`${ri}:${bi}`);
      if (hr) {
        if (vals.hash !== undefined) vals.hash = hr.hash;
        vals.preimage = hr.preimage;
      }

      // Replace pubkeys in inner blocks
      let updatedInner = block.innerBlocks;
      if (block.innerBlocks && block.innerBlocks.length > 0) {
        updatedInner = block.innerBlocks.map(ib => {
          const ibVals = { ...ib.values };
          const ibReg = BlockRegistry[ib.type];
          if (ibReg) {
            const ibNeeds = ibReg.fundNeeds(ib);
            ibNeeds.keys.forEach(kn => {
              if (kn.multi && ibVals[kn.field]) {
                ibVals[kn.field] = ibVals[kn.field].split(',').map(k => k.trim()).filter(Boolean).map(k => oldToNew.get(k) || k).join(', ');
              } else if (!kn.multi && ibVals[kn.field] && oldToNew.has(ibVals[kn.field])) {
                ibVals[kn.field] = oldToNew.get(ibVals[kn.field]);
              }
            });
          }
          return { ...ib, values: ibVals };
        });
      }

      return { ...block, values: vals, innerBlocks: updatedInner };
    }),
    // Also set the coil scheme for outputs
    output: rung.output.type !== 'relay' ? { ...rung.output, scheme } : rung.output,
  }));
}

/**
 * buildRungSnapshot: Build a frozen rungSnapshot array for the localStorage fund record.
 * Pure function --applies key/hash replacements and resolves vout indices.
 *
 * @param {Array} rungs            - rungs to snapshot (pre-filtered: no Change, no relay)
 * @param {Array} newOutputs       - final output array (with addresses and amounts)
 * @param {Map}   oldToNew         - old pubkey -> new pubkey
 * @param {Map}   emptyKeyMap      - "ri:bi" -> new pubkey
 * @param {Map}   hashReplacements - "ri:bi" -> { preimage, hash }
 * @param {string} scheme          - signing scheme
 * @returns {Array} snapshot entries: { label, vout, blocks, coilType, coilAddress }
 */
function buildRungSnapshot(rungs, newOutputs, oldToNew, emptyKeyMap, hashReplacements, scheme) {
  return rungs.map((r, ri) => {
    const updatedBlocks = r.blocks.map((block, bi) => {
      const reg = BlockRegistry[block.type];
      const bv = { ...block.values };
      if (reg) {
        const needs = reg.fundNeeds(block);
        needs.keys.forEach(kn => {
          if (kn.multi) {
            if (bv[kn.field]) {
              bv[kn.field] = bv[kn.field].split(',').map(k => k.trim()).filter(Boolean).map(k => oldToNew.get(k) || k).join(', ');
              bv.scheme = scheme;
            }
          } else if (bv[kn.field] && oldToNew.has(bv[kn.field])) {
            bv[kn.field] = oldToNew.get(bv[kn.field]);
            bv.scheme = scheme;
          } else if (kn.field === 'pubkey' && !bv[kn.field] && emptyKeyMap.has(`${ri}:${bi}`)) {
            bv.pubkey = emptyKeyMap.get(`${ri}:${bi}`);
            bv.scheme = scheme;
          }
        });
      }
      const hr = hashReplacements.get(`${ri}:${bi}`);
      if (hr) {
        if (bv.hash !== undefined) bv.hash = hr.hash;
        bv.preimage = hr.preimage;
      }
      const entry = { type: block.type, values: bv };
      // Preserve innerBlocks for script-hash legacy blocks
      if (block.innerBlocks && block.innerBlocks.length > 0) {
        entry.innerBlocks = block.innerBlocks.map(ib => {
          const ibv = { ...ib.values };
          const ibReg = BlockRegistry[ib.type];
          if (ibReg) {
            const ibNeeds = ibReg.fundNeeds(ib);
            ibNeeds.keys.forEach(kn => {
              if (!kn.multi && ibv[kn.field] && oldToNew.has(ibv[kn.field])) ibv[kn.field] = oldToNew.get(ibv[kn.field]);
              else if (kn.multi && ibv[kn.field]) ibv[kn.field] = ibv[kn.field].split(',').map(k => k.trim()).filter(Boolean).map(k => oldToNew.get(k) || k).join(', ');
            });
          }
          return { id: ib.id, type: ib.type, values: ibv };
        });
      }
      return entry;
    });
    const voutIdx = newOutputs.findIndex(o => o.id === r.output?.txOutputId);
    const coilType = r.output?.wireType || 'UNLOCK';
    let coilAddress = null;
    if (coilType === 'UNLOCK_TO') {
      const matchedOut = newOutputs.find(o => o.id === r.output?.txOutputId);
      coilAddress = matchedOut?.address || null;
    }
    const coilScheme = r.output?.scheme || scheme || 'SCHNORR';
    return { label: r.label, vout: voutIdx >= 0 ? voutIdx : null, blocks: updatedBlocks, coilType, coilAddress, coilScheme };
  });
}

// ═══════════════════════════════════════════════════════════════
// planSpend --pure function that computes spend plan from a record
// ═══════════════════════════════════════════════════════════════
// Returns: { targetRung, rungIdx, rungBlocks, signerBlocks, timelocks,
//            outputClassification, validationResults, needsAccumulatorProof,
//            fallbackSig, errors, warnings, infos }
// Does NOT: make API calls, touch React state, or produce logging.
function planSpend(record, options) {
  const { vout = 0, rungIdx: requestedRungIdx = 0 } = options || {};
  const rec = record;
  const scheme = rec.scheme || 'SCHNORR';
  const isPQ = scheme !== 'SCHNORR' && scheme !== 'ECDSA';

  const errors = [];
  const warnings = [];
  const infos = [];

  // ── 1. Resolve target rung ──
  const allRungs = rec.rungs || [];
  const voutRungs = allRungs.filter(r => r.vout === vout);
  const rungIdx = Math.min(requestedRungIdx, Math.max(0, voutRungs.length - 1));
  const targetRung = voutRungs.length > 0 ? voutRungs[rungIdx] : allRungs[0];
  const rungBlocks = targetRung?.blocks || [];

  if (voutRungs.length > 1) {
    infos.push('Using condition ' + rungIdx + ' of ' + voutRungs.length + ' for vout ' + vout + ' (' + (targetRung.label || 'unlabeled') + ')');
  }
  if (targetRung?.label) {
    infos.push('Spending rung: ' + targetRung.label + ' (' + rungBlocks.map(b => b.type).join(' + ') + ')');
  }

  // ── 2. Build pubkey→key lookup ──
  const conditionKeys = rec.conditionKeys || [];
  if (conditionKeys.length === 0) {
    errors.push('No signing keys found. This record has no stored keys.');
    return { targetRung, rungIdx, rungBlocks, signerBlocks: [], timelocks: { inputSequence: 0xfffffffe, txLocktime: 0, csvBlocks: 0, csvTimeSeconds: 0 }, outputClassification: { recurseBlocks: [], mutationBlocks: [], validationBlocks: [], ctvBlock: null, splitBlock: null }, validationResults: [], needsAccumulatorProof: false, fallbackSig: false, errors, warnings, infos };
  }

  const keyByPubkey = new Map();
  conditionKeys.forEach(k => { if (k.pubkey) keyByPubkey.set(k.pubkey, k); });

  // Helper: find key by matching block's pubkey field to conditionKeys
  const findKeyForBlock = (b, preferField) => {
    if (preferField && b.values?.[preferField] && keyByPubkey.has(b.values[preferField])) {
      return keyByPubkey.get(b.values[preferField]);
    }
    const pubkeyFields = ['pubkey', 'signing_key', 'agg_pubkey', 'hot_key', 'recovery_key', 'local_key', 'remote_key'];
    for (const fname of pubkeyFields) {
      const val = b.values?.[fname];
      if (val && keyByPubkey.has(val)) return keyByPubkey.get(val);
    }
    return null;
  };
  let fallbackKeyIdx = 0;

  // ── Filter preimages to target rung ──
  const allPreimages = rec.preimages || [];
  const targetRungAbsIdx = allRungs.indexOf(targetRung);
  const preimages = allPreimages.filter(p => p.ri === targetRungAbsIdx || p.ri === undefined);
  let preimageIdx = 0;

  // ── 3. Build signer blocks using BlockRegistry where available ──
  const signerBlocks = [];
  let needsAccumulatorProof = false;
  // Track ACCUMULATOR leaf data for handleSpend to use
  let accumulatorLeaves = null;

  for (const b of rungBlocks) {
    const reg = BlockRegistry[b.type];

    // ── ACCUMULATOR: flag for async proof (handled by caller) ──
    if (b.type === 'ACCUMULATOR') {
      const leaves = (b.values?.merkle_leaves || '').split(',').map(s => s.trim()).filter(Boolean);
      if (leaves.length > 0) {
        needsAccumulatorProof = true;
        accumulatorLeaves = leaves;
      } else {
        warnings.push('ACCUMULATOR: no merkle_leaves stored --proof cannot be generated');
        signerBlocks.push({ type: b.type });
      }
      continue;
    }

    // ── COSIGN: no witness data needed ──
    if (b.type === 'COSIGN') {
      signerBlocks.push({ type: b.type });
      infos.push('COSIGN: co-input required (conditions_hash=' + (b.values?.conditions_hash || '?').substring(0, 16) + '...)');
      continue;
    }

    // ── KEY_REF_SIG: resolve from relays before trying buildSigner ──
    if (b.type === 'KEY_REF_SIG') {
      let key = findKeyForBlock(b);
      if (!key && rec.relays) {
        const ri = parseInt(b.values?.relay_index) || 0;
        const bi = parseInt(b.values?.block_index) || 0;
        const relayBlock = rec.relays[ri]?.blocks?.[bi];
        if (relayBlock) {
          const refPubkey = relayBlock.values?.pubkey || relayBlock.values?.signing_key || relayBlock.values?.agg_pubkey;
          if (refPubkey && keyByPubkey.has(refPubkey)) {
            key = keyByPubkey.get(refPubkey);
            infos.push('KEY_REF_SIG: resolved key from relay[' + ri + '].block[' + bi + ']');
          }
        }
      }
      if (!key) { key = conditionKeys[fallbackKeyIdx]; fallbackKeyIdx++; }
      if (!key) { errors.push('No matching key for KEY_REF_SIG block.'); continue; }
      const entry = { type: b.type };
      if (isPQ) { entry.pq_privkey = key.privkey; entry.pq_pubkey = key.pubkey; entry.scheme = scheme; }
      else { entry.privkey = key.privkey; }
      signerBlocks.push(entry);
      continue;
    }

    // ── Try BlockRegistry.buildSigner for types that have it ──
    if (reg && typeof reg.buildSigner === 'function') {
      // Build a preimage map for buildSigner (hash → preimage string)
      const preimageMap = {};
      // Populate from rung-filtered preimages
      for (const p of preimages) {
        const pi = p.preimage || p;
        const hash = p.hash;
        if (hash && pi) preimageMap[hash] = pi;
      }
      // Also map block's own hash field to next available preimage
      if (b.values?.hash && preimageIdx < preimages.length && !preimageMap[b.values.hash]) {
        const pi = preimages[preimageIdx]?.preimage || preimages[preimageIdx];
        preimageMap[b.values.hash] = pi;
      }

      const keyLookup = (pubkey) => keyByPubkey.get(pubkey) || null;
      const result = reg.buildSigner(b, keyLookup, preimageMap, { scheme, isPQ });

      if (result) {
        // Track preimage consumption
        const preimageTypes = ['TAGGED_HASH', 'HASH_SIG', 'HTLC'];
        if (preimageTypes.includes(b.type) && result.preimage) {
          preimageIdx++;
        }

        // ── PQ key field transformation ──
        if (isPQ && result.privkey && b.type !== 'ADAPTOR_SIG' && b.type !== 'PTLC') {
          const key = findKeyForBlock(b) || conditionKeys[fallbackKeyIdx - 1];
          result.pq_privkey = result.privkey;
          result.pq_pubkey = key?.pubkey || '';
          result.scheme = scheme;
          delete result.privkey;
        }
        if (isPQ && result.privkeys) {
          // Multi-key PQ transformation: ALL N pubkeys needed for merkle_pub_key leaf
          const blockPubkeys = (b.values?.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
          const pubkeys = blockPubkeys.map(pk => {
            const kp = keyByPubkey.get(pk);
            return kp?.pubkey || pk; // use stored pubkey, fallback to block value
          });
          result.pq_privkeys = result.privkeys;
          result.pq_pubkeys = pubkeys;
          result.scheme = scheme;
          delete result.privkeys;
          infos.push('Detected ' + b.type + ' (N=' + blockPubkeys.length + ', providing ' + result.pq_privkeys.length + ' signing keys)');
        }

        // ── ADAPTOR_SIG / PTLC: include adaptor_secret if stored ──
        if ((b.type === 'ADAPTOR_SIG' || b.type === 'PTLC') && b.values?.adaptor_secret) {
          result.adaptor_secret = b.values.adaptor_secret;
        }

        signerBlocks.push(result);
        continue;
      }

      // buildSigner returned null --try fallback key assignment
      // Single-key types
      const singleKeyTypes = ['SIG', 'ADAPTOR_SIG', 'MUSIG_THRESHOLD', 'VAULT_LOCK', 'TIMELOCKED_SIG', 'CLTV_SIG', 'PTLC'];
      if (singleKeyTypes.includes(b.type)) {
        let key = conditionKeys[fallbackKeyIdx]; fallbackKeyIdx++;
        if (!key) { errors.push('No matching key for ' + b.type + ' block. Expected pubkey: ' + (b.values?.pubkey || b.values?.signing_key || '?')); continue; }
        const entry = { type: b.type };
        if (isPQ && b.type !== 'ADAPTOR_SIG' && b.type !== 'PTLC') {
          entry.pq_privkey = key.privkey; entry.pq_pubkey = key.pubkey; entry.scheme = scheme;
        } else {
          entry.privkey = key.privkey;
        }
        if ((b.type === 'ADAPTOR_SIG' || b.type === 'PTLC') && b.values?.adaptor_secret) {
          entry.adaptor_secret = b.values.adaptor_secret;
        }
        signerBlocks.push(entry);
        continue;
      }

      // Multi-key types
      const multiKeyTypes = ['MULTISIG', 'TIMELOCKED_MULTISIG'];
      if (multiKeyTypes.includes(b.type)) {
        // ALL N pubkeys needed for merkle_pub_key leaf, but only M privkeys for signing
        const allPubkeys = (b.values?.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
        const threshold = parseInt(b.values?.threshold) || 2;
        const privkeys = [];
        const pubkeys = [];
        for (const pk of allPubkeys) {
          const kp = keyByPubkey.get(pk) || conditionKeys[fallbackKeyIdx++];
          if (kp) { privkeys.push(kp.privkey); pubkeys.push(kp.pubkey || pk); }
        }
        if (privkeys.length < threshold) { errors.push(b.type + ' requires ' + threshold + ' signing keys but only found ' + privkeys.length + '.'); continue; }
        if (isPQ) {
          signerBlocks.push({ type: b.type, scheme, pq_privkeys: privkeys, pq_pubkeys: pubkeys });
        } else {
          signerBlocks.push({ type: b.type, privkeys, pubkeys: allPubkeys });
        }
        infos.push('Detected ' + b.type + ' (N=' + allPubkeys.length + ', M=' + threshold + ', providing ' + privkeys.length + ' keys)');
        continue;
      }

      // Preimage-only types where buildSigner returned null (missing preimage)
      const preimageOnlyTypes = ['TAGGED_HASH'];
      if (preimageOnlyTypes.includes(b.type)) {
        signerBlocks.push({ type: b.type });
        continue;
      }

      // Preimage+sig compound types where buildSigner returned null
      const preimSigTypes = ['HASH_SIG', 'HTLC'];
      if (preimSigTypes.includes(b.type)) {
        errors.push(b.type + ' block requires a key and preimage but buildSigner failed. Check stored keys/preimages.');
        continue;
      }
    }

    // ── No buildSigner --types that need no witness (CSV, CLTV, covenants, governance, etc.) ──
    signerBlocks.push({ type: b.type });
  }

  // Fallback: if no blocks detected, use simple SIG format
  let fallbackSig = false;
  if (signerBlocks.length === 0 && conditionKeys.length > 0) {
    const key = conditionKeys[0];
    if (isPQ) {
      signerBlocks.push({ type: 'SIG', pq_privkey: key.privkey, pq_pubkey: key.pubkey, scheme });
    } else {
      signerBlocks.push({ type: 'SIG', privkey: key.privkey });
    }
    fallbackSig = true;
  }

  // ── 4. Detect timelocks using BlockRegistry.timelockNeeds ──
  let inputSequence = 0xfffffffe;
  let txLocktime = 0;
  let csvTimeSeconds = 0;
  let csvBlocks = 0;

  for (const b of rungBlocks) {
    const reg = BlockRegistry[b.type];

    // VAULT_LOCK: hot-key vs recovery-key path detection
    if (b.type === 'VAULT_LOCK') {
      const matchedKey = findKeyForBlock(b);
      const isRecovery = matchedKey && b.values?.recovery_key === matchedKey.pubkey;
      if (!isRecovery) {
        const vaultDelay = parseInt(b.values?.delay) || 144;
        csvBlocks = vaultDelay;
        inputSequence = vaultDelay;
        infos.push('VAULT_LOCK: hot-key path, delay=' + vaultDelay);
      } else {
        infos.push('VAULT_LOCK: recovery-key path --no CSV delay');
      }
      continue;
    }

    // Use timelockNeeds from registry if available
    if (reg && typeof reg.timelockNeeds === 'function') {
      const tl = reg.timelockNeeds(b);
      if (tl) {
        if (tl.type === 'CSV') {
          csvBlocks = tl.blocks;
          inputSequence = tl.blocks;
          infos.push('Setting input sequence=' + tl.blocks + ' for CSV lock');
        } else if (tl.type === 'CSV_TIME') {
          csvTimeSeconds = tl.seconds;
          inputSequence = (Math.ceil(tl.seconds / 512) | 0x400000);
          infos.push('Setting input sequence=0x' + inputSequence.toString(16) + ' for CSV_TIME lock (' + tl.seconds + 's)');
        } else if (tl.type === 'CLTV') {
          txLocktime = tl.height;
          infos.push('Setting locktime=' + tl.height + ' for CLTV lock');
        } else if (tl.type === 'CLTV_TIME') {
          txLocktime = tl.timestamp;
          infos.push('Setting locktime=' + tl.timestamp + ' for CLTV_TIME lock');
        }
      }
    }
  }

  // ── 5. Classify blocks for output construction using outputRole ──
  const recurseBlocks = [];
  const mutationBlocks = [];
  const validationBlocks = [];
  let ctvBlock = null;
  let splitBlock = null;

  for (const b of rungBlocks) {
    const reg = BlockRegistry[b.type];
    const role = reg?.outputRole || 'none';

    switch (role) {
      case 'ctv': {
        const ctvKey = Object.keys(rec.ctvOutputsMap || {}).find(k => k.split(':')[0] === String(rungIdx));
        if (ctvKey && rec.ctvOutputsMap[ctvKey]) {
          ctvBlock = { outputs: rec.ctvOutputsMap[ctvKey].outputs };
          infos.push('CTV: found pre-committed template outputs');
        } else {
          warnings.push('CTV block present but no stored template outputs --will build outputs from other blocks');
        }
        break;
      }
      case 'split':
        splitBlock = b;
        recurseBlocks.push(b);
        infos.push('RECURSE_SPLIT: max_splits=' + (b.values?.max_splits || '?') + ', min_sats=' + (b.values?.min_sats || '546'));
        break;
      case 'recurse':
        recurseBlocks.push(b);
        break;
      case 'mutation':
        mutationBlocks.push(b);
        recurseBlocks.push(b);
        break;
      case 'validation':
        validationBlocks.push(b);
        break;
      // 'none' --no effect on output construction
    }
  }

  // ── 6. Validate TX-structure constraints ──
  const validationResults = [];
  // Note: sendSats is not available here (depends on UTXO lookup + fee),
  // so we store the constraints for handleSpend to evaluate with actual amounts.
  for (const b of validationBlocks) {
    if (b.type === 'AMOUNT_LOCK') {
      validationResults.push({ type: 'AMOUNT_LOCK', min: parseInt(b.values?.min) || 0, max: parseInt(b.values?.max) || Number.MAX_SAFE_INTEGER });
    }
    if (b.type === 'RELATIVE_VALUE') {
      validationResults.push({ type: 'RELATIVE_VALUE', numerator: parseInt(b.values?.numerator) || 0, denominator: parseInt(b.values?.denominator) || 1 });
    }
  }

  return {
    targetRung,
    rungIdx,
    rungBlocks,
    voutRungs,
    signerBlocks,
    timelocks: { inputSequence, txLocktime, csvBlocks, csvTimeSeconds },
    outputClassification: { recurseBlocks, mutationBlocks, validationBlocks, ctvBlock, splitBlock },
    validationResults,
    needsAccumulatorProof,
    accumulatorLeaves,
    fallbackSig,
    errors,
    warnings,
    infos,
  };
}

function SignetPanel() {

  const onViewAsLadder = useCallback((decodedJson) => {

  const [txid, setTxid] = useState('');
  const [mined, setMined] = useState(false);
  const [txHistory, setTxHistory] = useState([]);
  const [expandedTx, setExpandedTx] = useState(null);
  const [lookupTxid, setLookupTxid] = useState('');
  const [lookupResult, setLookupResult] = useState(null);
  const [decodeHex, setDecodeHex] = useState('');
  const [decodeResult, setDecodeResult] = useState(null);
  const [validateHex, setValidateHex] = useState('');
  const [validateResult, setValidateResult] = useState(null);
  const [mempoolInfo, setMempoolInfo] = useState(null);
  const [recentBlocks, setRecentBlocks] = useState(null);
  const [expandedBlock, setExpandedBlock] = useState(null);

  const apiCall = async (endpoint, body, silent) => {

    } catch (e) {
      const msg = e.message === 'Failed to fetch'
        ? 'Signet proxy unreachable --check that the ladder-script proxy is running on ' + SIGNET_API

  const refreshWallet = async () => {

  const handleNewAddress = async () => {

  };
  const handleLoadUtxos = async () => {

  const handleFaucet = async () => {
    if (!faucetAddr) { setError('Enter a signet address.'); return; }

  };
  const handleCreate = async () => {
    const txData = exportCreateTxMLSC(rungs, txOutputs, txInputs, locktime);
    const data = await apiCall('/api/ladder/create', txData);
    if (data) { setTxHex(data.hex); setSignedHex(''); setTxid(''); setMined(false); }
  };
  const handleSign = async () => {
    if (!txHex) { setError('No transaction hex. Create first.'); return; }
    if (!signingData) { setError('No signing data. Click FUND FROM WALLET first.'); return; }

    // Bootstrap signing: the wallet UTXOs are standard wpkh outputs, not ladder outputs.
    // The ladder conditions define the new OUTPUT spending rules (already encoded by createtxmlsc).
    // For INPUT signing, we use the standard wallet key (even when outputs use PQ schemes).
    const inputKey = signingData.walletKey || signingData.keypairs[0];
    const signers = signingData.selectedUtxos.map((u, inputIdx) => ({
      input: inputIdx,
      privkey: inputKey.privkey,
    }));

    // Build spent_outputs
    const spent_outputs = signingData.selectedUtxos.map(u => ({
      amount: u.amount,
      scriptPubKey: u.scriptPubKey,
    }));

    const data = await apiCall('/api/ladder/sign', {
      hex: txHex,
      signers,
      spent_outputs,
    });
    if (data) setSignedHex(data.hex || txHex);
  };
  const handleBroadcast = async () => {
    const hex = signedHex || txHex;
    if (!hex) { setError('No transaction to broadcast.'); return; }
    const data = await apiCall('/api/ladder/broadcast', { hex });
    if (data) {
      setTxid(data.txid);
      addToHistory('broadcast', data.txid, rungs.length + ' rungs');
      // Save to session log for Review tab (decoded tx with full wire data)
      const fundSize = hex ? Math.floor(hex.length / 2) : null;
      let fundPayload = exportCreateTxMLSC(rungs, txOutputs, txInputs, locktime);
      try {
        const decoded = await apiCallBase('/api/ladder/tx/' + data.txid);
        if (decoded) fundPayload = decoded;
      } catch (e) { /* use createtxmlsc fallback */ }
      saveSessionTx({ fundTxid: data.txid, label: rungs.length + ' rungs', fundJson: fundPayload, fundSize });
      setTimeout(refreshWallet, 2000);
      refreshMempool();
      // Save record via Record Module so SPEND tab can find this output
      if (signingData) {
        const totalSats = txOutputs.reduce((s, o) => s + (parseInt(o.amount) || 0), 0);
        // Build rungs from snapshot (preferred) or fallback to live rungs
        const recordRungs = signingData.rungSnapshot || rungs.filter(r => r.output.type !== 'relay').map(r => {
          const voutIdx = txOutputs.findIndex(o => o.id === r.output?.txOutputId);
          const relayRungs = rungs.filter(rr => rr.output.type === 'relay');
          const relayNameMap = new Map();
          relayRungs.forEach((rr, idx) => { relayNameMap.set(rr.output.name || rr.label || 'R' + String(rungs.indexOf(rr)).padStart(3, '0'), idx); });
          const relayRefs = (r.outputRefs || []).map(ref => relayNameMap.get(ref)).filter(idx => idx !== undefined);
          const coilType = r.output?.wireType || 'UNLOCK';
          const coilAddress = (coilType === 'UNLOCK_TO') ? (txOutputs.find(o => o.id === r.output?.txOutputId)?.address || null) : null;
          return { label: r.label, vout: voutIdx >= 0 ? voutIdx : null, blocks: r.blocks.map(b => {
            const entry = { type: b.type, values: { ...b.values } };
            if (b.innerBlocks && b.innerBlocks.length > 0) entry.innerBlocks = b.innerBlocks.map(ib => ({ id: ib.id, type: ib.type, values: { ...ib.values } }));
            return entry;
          }), relayRefs: relayRefs.length > 0 ? relayRefs : undefined, coilType, coilAddress };
        });
        const recordRelays = (() => {
          const rr = rungs.filter(r => r.output.type === 'relay');
          if (rr.length === 0) return undefined;
          return rr.map(r => ({ blocks: r.blocks.filter(b => b.type !== 'OUTPUT_REF').map(b => ({ type: b.type, values: { ...b.values } })) }));
        })();
        const record = createRecord(data.txid, {
          scheme: signingData.scheme || fundScheme || 'SCHNORR',
          amount: totalSats,
          walletKey: signingData.walletKey,
          conditionKeys: signingData.keypairs || [],
          preimages: signingData.preimages || [],
          rungs: recordRungs,
          relays: recordRelays,
          ctvOutputsMap: signingData.ctvOutputsMap,
        });
        saveRecord(record);
      }
    }
  };
  const handleDecode = async () => {
    if (!decodeHex.trim()) { setError('Enter hex to decode.'); return; }
    const data = await apiCall('/api/ladder/decode', { hex: decodeHex.trim() }, true);
    if (data) { setDecodeResult(data); return; }
    // Fallback: try decoding as a full raw transaction
    const txData = await apiCall('/api/ladder/decode-tx', { hex: decodeHex.trim() });
    if (txData) setDecodeResult(txData);
  };
  const handleDecodeTx = async () => {
    if (!decodeHex.trim()) { setError('Enter hex to decode.'); return; }
    const data = await apiCall('/api/ladder/decode-tx', { hex: decodeHex.trim() });
    if (data) setDecodeResult(data);
  };
  const handleValidate = async () => {
    if (!validateHex.trim()) { setError('Enter hex to validate.'); return; }
    const data = await apiCall('/api/ladder/validate', { hex: validateHex.trim() });
    if (data) setValidateResult(data);
  };
  const handleLookup = async () => {
    if (!lookupTxid) return;
    const data = await apiCall('/api/ladder/tx/' + lookupTxid);
    if (data) setLookupResult(data);
  };
  const refreshMempool = async () => {
    const [mp, bl] = await Promise.all([
      apiCall('/api/ladder/mempool', undefined, true),
      apiCall('/api/ladder/blocks/recent', undefined, true),
    ]);
    if (mp) setMempoolInfo(mp);
    if (bl) setRecentBlocks(bl);
  };
  const addToHistory = (type, txid, detail) => {
    setTxHistory(prev => [{ type, txid, detail, time: Date.now(), confirmations: 0 }, ...prev]);
  };

  const handleFundFromWallet = async () => {
    setError(null);
    try {
    // 1. Pure planning --inventory keys, hashes, outputs, fees
    const plan = planFund(rungs, txOutputs, { scheme: fundScheme });
    if (plan.errors.length > 0) { setError(plan.errors[0]); return; }
    const { pubkeyFields, emptyPubkeySigs, allPubkeysNeeded, keypairCount, hashFields,
            validTxOutputs, feeSats, needSats, isPQ } = plan;

    // 2. Fetch UTXOs
    const utxoData = await apiCall('/api/ladder/wallet/utxos');
    if (!utxoData || utxoData.length === 0) { setError('No UTXOs in wallet. Use faucet or mine blocks first.'); return; }
    const confirmed = utxoData.filter(u => u.confirmations > 0).sort((a, b) => b.amount - a.amount);
    if (confirmed.length === 0) { setError('No confirmed UTXOs. Mine a block first.'); return; }

    // 3. Generate keypairs (async API calls)
    const keypairs = [];
    for (let i = 0; i < keypairCount; i++) {
      if (isPQ) {
        const kp = await apiCall('/api/ladder/pq/keypair', { scheme: fundScheme });
        if (!kp) { setError('Failed to generate PQ keypair. Check liboqs support.'); return; }
        keypairs.push(kp);
      } else {
        const kp = await apiCall('/api/ladder/wallet/keypair');
        if (!kp) { setError('Failed to generate wallet keypair.'); return; }
        keypairs.push(kp);
      }
    }
    // Standard wallet keypair for input signing (inputs are always standard p2wpkh)
    const walletKey = isPQ ? await apiCall('/api/ladder/wallet/keypair') : keypairs[0];
    if (!walletKey) { setError('Failed to generate wallet keypair for input signing.'); return; }

    // 4. Generate preimages for hash blocks (async API calls)
    const preimagesGenerated = [];
    const hashReplacements = new Map(); // "ri:bi" -> { preimage, hash }
    for (const hf of hashFields) {
      const pi = await apiCall('/api/ladder/preimage', undefined, true);
      if (pi) {
        const newHash = hf.hashType === 'hash160' ? pi.hash160 : pi.sha256;
        hashReplacements.set(`${hf.ri}:${hf.bi}`, { preimage: pi.preimage, hash: newHash });
        preimagesGenerated.push({ preimage: pi.preimage, hash: newHash, type: hf.hashType, ri: hf.ri, bi: hf.bi });
      }
    }

    // 5. Map old fake pubkeys to new pubkeys
    const oldToNew = new Map();
    const oldKeys = [...allPubkeysNeeded];
    oldKeys.forEach((oldKey, i) => {
      const kp = keypairs[i % keypairs.length];
      oldToNew.set(oldKey, kp.pubkey);
    });
    const emptyKeyMap = new Map();
    emptyPubkeySigs.forEach((entry, i) => {
      const kp = keypairs[(allPubkeysNeeded.size + i) % keypairs.length];
      emptyKeyMap.set(`${entry.ri}:${entry.bi}`, kp.pubkey);
    });

    // 6. Replace pubkeys in rungs via pure helper, then apply to local array + React state
    const updatedRungs = applyFundKeypairs(rungs, oldToNew, emptyKeyMap, hashReplacements, fundScheme);
    for (let i = 0; i < rungs.length; i++) {
      rungs[i] = updatedRungs[i];
    }

    // 6-legacy removed --HASH160(pubkey) for P2PKH/P2WPKH now computed by node via PUBKEY→HASH160 auto-conversion.

    // 6-inner. Serialize inner conditions for P2SH/P2WSH/P2TR_SCRIPT legacy blocks
    for (let ri = 0; ri < updatedRungs.length; ri++) {
      for (let bi = 0; bi < updatedRungs[ri].blocks.length; bi++) {
        const block = updatedRungs[ri].blocks[bi];
        if (!INNER_CONDITION_TYPES.has(block.type)) continue;
        if (!block.innerBlocks || block.innerBlocks.length === 0) continue;

        // Inner block pubkeys already replaced by applyFundKeypairs
        const updatedInner = block.innerBlocks;

        // Build wire-format conditions from inner blocks
        const innerConditions = [{ blocks: updatedInner.map(exportBlockFields) }];

        // Use createtxmlsc via API to serialize the inner conditions
        const dummyPayload = {
          inputs: [{ txid: '0'.repeat(64), vout: 0 }],
          outputs: [{ amount: 0.00001, conditions: innerConditions }]
        };
        const dummyResult = await apiCall('/api/ladder/create', dummyPayload, true);
        if (!dummyResult || !dummyResult.hex) {
          console.error('Failed to serialize inner conditions for', block.type);
          continue;
        }

        // Decode to get scriptPubKey
        const decoded = await apiCall('/api/ladder/decode-tx', { hex: dummyResult.hex }, true);
        if (!decoded?.vout?.[0]?.scriptPubKey?.hex) {
          console.error('Failed to decode inner conditions tx');
          continue;
        }
        // Strip 1-byte RUNG_CONDITIONS_PREFIX to get raw serialised conditions
        const scriptHex = decoded.vout[0].scriptPubKey.hex;
        const preimageHex = scriptHex.substring(2); // skip prefix byte

        // Store serialised inner conditions as preimage --node computes hash automatically
        updatedRungs[ri].blocks[bi] = {
          ...block,
          innerBlocks: updatedInner,
          values: { ...block.values, preimage: preimageHex }
        };
        rungs[ri] = updatedRungs[ri];
      }
    }

    setRungs(() => updatedRungs);

    // 6a. Auto-compute ACCUMULATOR Merkle roots from leaves (async crypto)
    for (let ri = 0; ri < rungs.length; ri++) {
      for (let bi = 0; bi < rungs[ri].blocks.length; bi++) {
        const block = rungs[ri].blocks[bi];
        if (block.type !== 'ACCUMULATOR' || !block.values?.merkle_leaves) continue;
        const leaves = block.values.merkle_leaves.split(',').map(s => s.trim()).filter(Boolean);
        if (leaves.length === 0) continue;
        const root = await computeMerkleRoot(leaves);
        rungs[ri].blocks[bi] = { ...block, values: { ...block.values, merkle_root: root } };
        setRungs(prev => prev.map((r, rri) => {
          if (rri !== ri) return r;
          return { ...r, blocks: r.blocks.map((b, bbi) => {
            if (bbi !== bi) return b;
            return { ...b, values: { ...b.values, merkle_root: root } };
          })};
        }));
      }
    }

    // 6b. Auto-compute CTV template hashes (async API calls)
    const ctvOutputsMap = new Map();
    for (let ri = 0; ri < rungs.length; ri++) {
      const rung = rungs[ri];
      for (let bi = 0; bi < rung.blocks.length; bi++) {
        const block = rung.blocks[bi];
        if (block.type !== 'CTV') continue;

        const rungBlocks = rung.blocks;
        const hasSplit = rungBlocks.some(b => b.type === 'RECURSE_SPLIT');

        const rungOutputId = rung.output?.txOutputId;
        const rungTxOutput = txOutputs.find(o => o.id === rungOutputId);
        const outputSats = rungTxOutput ? (parseInt(rungTxOutput.amount) || 10000) : 10000;
        const feeSats_ctv = 500;
        const spendableSats = outputSats - feeSats_ctv;

        let templateOutputs;
        if (hasSplit) {
          const halfSats = Math.floor(spendableSats / 2);
          const makeSplitConds = () => {
            const conds = rungsToConditions([rung]);
            for (const cond of conds) {
              for (const blk of cond.blocks) {
                if (blk.type === 'RECURSE_SPLIT') {
                  for (const f of blk.fields) {
                    if (f.type === 'NUMERIC') { f.hex = toNumericHex(String(Math.max(0, fromNumericHex(f.hex) - 1))); break; }
                  }
                }
              }
            }
            return conds;
          };
          templateOutputs = [
            { amount: halfSats / 1e8, conditions: makeSplitConds() },
            { amount: (spendableSats - halfSats) / 1e8, conditions: makeSplitConds() },
          ];
        } else {
          templateOutputs = [{
            amount: spendableSats / 1e8,
            conditions: [{ blocks: [{ type: 'SIG', fields: [{ type: 'PUBKEY', hex: walletKey.pubkey }] }] }],
          }];
        }

        const templateTxData = {
          inputs: [{ txid: '0'.repeat(64), vout: 0 }],
          outputs: templateOutputs,
        };
        try {
          const templateResult = await apiCall('/api/ladder/create', templateTxData, true);
          if (templateResult && templateResult.hex) {
            const ctvResult = await apiCall('/api/ladder/ctv-hash', { hex: templateResult.hex, input_index: 0 }, true);
            if (ctvResult && ctvResult.hash) {
              setRungs(prev => prev.map((r, rri) => {
                if (rri !== ri) return r;
                return { ...r, blocks: r.blocks.map((b, bbi) => {
                  if (bbi !== bi) return b;
                  return { ...b, values: { ...b.values, template_hash: ctvResult.hash } };
                })};
              }));
              rungs[ri].blocks[bi].values.template_hash = ctvResult.hash;
              ctvOutputsMap.set(`${ri}:${bi}`, { outputs: templateOutputs });
            }
          }
        } catch (ctvErr) {
          console.warn('[CTV] Failed to auto-compute template hash:', ctvErr);
        }
      }
    }

    // 7. Clean up orphaned outputs from state
    if (validTxOutputs.length < txOutputs.length) {
      setTxOutputs(validTxOutputs);
    }

    // 8. Select UTXOs via pure helper
    const { selected, selectedTotal } = selectUtxos(confirmed, needSats);

    // 9. Compute output amounts via pure helper
    const outputCount = validTxOutputs.length;
    const { outputAmounts, zeroAmountIndices } = buildFundOutputs(validTxOutputs, selectedTotal, feeSats);

    // 10. Generate fresh addresses for outputs (async API calls) and assemble newOutputs
    const newOutputs = [];
    for (let i = 0; i < outputCount; i++) {
      const addrData = await apiCall('/api/ladder/wallet/address');
      if (!addrData) { setError('Failed to generate address.'); return; }
      newOutputs.push({
        id: validTxOutputs[i]?.id || uid(),
        address: addrData.address,
        amount: outputAmounts[i],
      });
    }

    // 11. Change output handling --respects user's changeMode preference.
    const prevChangeRungs = rungs.filter(r => r.label === 'Change');
    const prevChangeOutputIds = new Set(prevChangeRungs.map(r => r.output?.txOutputId).filter(Boolean));
    if (prevChangeRungs.length > 0) {
      newOutputs.splice(0, newOutputs.length, ...newOutputs.filter(o => !prevChangeOutputIds.has(o.id)));
      setTxOutputs(prev => prev.filter(o => !prevChangeOutputIds.has(o.id)));
    }
    let totalNewOutputSats = newOutputs.reduce((s, o) => s + o.amount, 0);
    const impliedFee = selectedTotal - totalNewOutputSats;
    if (changeMode !== 'none' && impliedFee > feeSats && impliedFee > 5000) {
      const changeSats = impliedFee - feeSats;
      if (changeSats >= 546) {
        const changeAddr = await apiCall('/api/ladder/wallet/address');
        if (changeAddr) {
          const changeOutputId = uid();
          newOutputs.push({ id: changeOutputId, address: changeAddr.address, amount: changeSats });
          const changeRung = createRung();
          changeRung.label = 'Change';
          changeRung.blocks = [{ id: uid(), type: 'SIG', values: { pubkey: walletKey.pubkey, scheme: fundScheme } }];
          changeRung.output = { type: 'condition', txOutputId: changeOutputId, wireType: 'UNLOCK', attestation: 'INLINE', scheme: fundScheme };
          setRungs(prev => [...prev.filter(r => r.label !== 'Change'), changeRung]);
        }
      }
    } else if (changeMode === 'none' && impliedFee > 5000) {
      setError(null);
      console.warn('No change output: ' + impliedFee + ' sats will be miner fee.');
    }

    // 12. Build spent outputs for signing
    const spentOutputs = selected.map(u => ({
      amount: u.amount,
      scriptPubKey: u.scriptPubKey || u.desc || '',
    }));

    // 13. Build rung snapshot via pure helper
    const snapshotRungs = rungs.filter(r => r.label !== 'Change' && r.output.type !== 'relay');
    const rungSnapshot = buildRungSnapshot(snapshotRungs, newOutputs, oldToNew, emptyKeyMap, hashReplacements, fundScheme);
    // Append change rung if one was created (it's not in the closure's rungs yet)
    if (changeMode !== 'none') {
      const changeOut = newOutputs[newOutputs.length - 1];
      const changeIdx = newOutputs.length - 1;
      if (changeOut && newOutputs.length > outputCount) {
        rungSnapshot.push({
          label: 'Change',
          vout: changeIdx,
          blocks: [{ type: 'SIG', values: { pubkey: walletKey.pubkey, scheme: fundScheme } }],
        });
      }
    }
    setSigningData({
      keypairs,
      walletKey,
      oldToNew,
      spentOutputs,
      selectedUtxos: selected,
      scheme: fundScheme,
      preimages: preimagesGenerated,
      rungSnapshot,
      ctvOutputsMap: Object.fromEntries(ctvOutputsMap),
    });

    // 14. Update engine state
    const newInputs = selected.map(u => ({
      id: uid(),
      txid: u.txid,
      vout: u.vout,
      sequence: '',
    }));
    setTxInputs(newInputs);
    setTxOutputs(newOutputs);

    // 15. Verify rung->output assignments are still valid after output replacement
    const newOutputIds = new Set(newOutputs.map(o => o.id));
    const allNewInputIds = newInputs.map(i => i.id);
    setRungs(prev => {
      const assignedOutputIds = new Set(prev.filter(r => r.output.txOutputId != null && newOutputIds.has(r.output.txOutputId)).map(r => r.output.txOutputId));
      const unassignedOutputs = newOutputs.filter(o => !assignedOutputIds.has(o.id));
      let nextUnassigned = 0;
      return prev.map(r => {
        let updated = r;
        if (r.output.txOutputId != null && !newOutputIds.has(r.output.txOutputId)) {
          if (nextUnassigned < unassignedOutputs.length) {
            const newOut = unassignedOutputs[nextUnassigned++];
            updated = { ...updated, output: { ...updated.output, txOutputId: newOut.id } };
          }
        }
        if (!updated.txInputIds || updated.txInputIds.length === 0 || updated.label === 'Change') {
          updated = { ...updated, txInputIds: allNewInputIds };
        }
        return updated;
      });
    });
    setTxHex('');
    setSignedHex('');
    setTxid('');
    setMined(false);
    setError(null);
    setFunded(true);
    setTimeout(() => setFunded(false), 4000);
    } catch (e) {
      setError('Fund failed: ' + (e.message || e));
      console.error('handleFundFromWallet error:', e);
    }
  };

  const sty = {
    section: { marginBottom: 12, padding: '12px 16px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', fontSize: 12 },
    label: { fontSize: 10, fontWeight: 600, letterSpacing: 1.5, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: 6 },

    btn: { padding: '6px 12px', fontSize: 11, fontFamily: 'var(--font-mono)', fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer', border: '1px solid', transition: 'all 0.15s', marginRight: 6 },
    btnPrimary: { color: 'var(--amber)', background: 'var(--amber-glow)', borderColor: 'var(--amber-dim)' },

    result: { marginTop: 8, padding: '8px 10px', background: 'var(--bg-primary)', border: '1px solid var(--border)', fontSize: 11, fontFamily: 'var(--font-mono)', wordBreak: 'break-all', maxHeight: 140, overflow: 'auto', color: 'var(--text-secondary)' },
    dot: (color) => ({ width: 8, height: 8, borderRadius: '50%', background: color, display: 'inline-block', marginRight: 8, boxShadow: `0 0 6px ${color}` }),
    divider: { borderTop: '1px solid var(--border)', margin: '20px 0', opacity: 0.5 },

    grid2: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 },

  const formatBtc = (btc) => { if (btc == null) return '—'; return parseFloat(btc).toFixed(8) + ' tBTC'; };
  const timeAgo = (ts) => { const s = Math.floor((Date.now() - ts) / 1000); if (s < 60) return s + 's ago'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; return Math.floor(s / 3600) + 'h ago'; };

  return (

          {online && <span style={{ color: 'var(--text-dim)', fontSize: 11 }}>Block {status.blocks}</span>}
        </div>
        {online && mempoolInfo && (

            <span>{(mempoolInfo.bytes / 1024).toFixed(1)} KB</span>
          </div>
        )}
      </div>
      {!online && (
        <div style={{ ...sty.section, borderColor: 'var(--amber-dim)', background: 'var(--amber-glow)' }}>
          <div style={{ color: 'var(--amber)', fontSize: 11, lineHeight: 1.6 }}>
            Signet proxy is not available. The Ladder Script RPC commands require a ghost-core node running the feature/ladder-script branch. Build and test transactions locally using the BUILD, SIMULATE, and RPC tabs.
          </div>

      {/* WALLET */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>WALLET</div>
      <div style={sty.grid2}>

          {walletInfo ? (<>

            <div style={{ ...sty.kv, marginTop: 8, borderBottom: 'none' }}><span style={sty.kvLabel}>TX COUNT</span><span style={sty.kvValue}>{walletInfo.txcount}</span></div>

          <div style={{ ...sty.label, marginTop: 12 }}>FAUCET</div>

          <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleFaucet} disabled={!online || loading === '/api/ladder/faucet'}>

          </button>
        </div>

      {/* UTXOs */}
      <div style={sty.section}>

          <div style={sty.label}>AVAILABLE UTXOs</div>
          <button style={{ ...sty.btn, ...sty.btnDefault, opacity: online ? 1 : 0.3 }} onClick={handleLoadUtxos} disabled={!online || loading === '/api/ladder/wallet/utxos'}>
            {loading === '/api/ladder/wallet/utxos' ? 'LOADING...' : utxos ? 'REFRESH' : 'LOAD UTXOs'}
          </button>
        </div>
        {utxos && utxos.length === 0 && <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>No UTXOs. Use the faucet to get test coins.</div>}
        {utxos && utxos.length > 0 && (
          <div style={{ maxHeight: 200, overflow: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11, fontFamily: 'var(--font-mono)' }}>
              <thead><tr style={{ color: 'var(--text-dim)', textAlign: 'left', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 }}>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>TXID</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>VOUT</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>AMOUNT</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>CONF</th>
                <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}></th>
              </tr></thead>
              <tbody>{utxos.map((u, i) => (
                <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                  <td style={{ padding: '4px 8px', color: 'var(--text-secondary)' }} title={u.txid}>{u.txid.substring(0, 12)}...</td>
                  <td style={{ padding: '4px 8px' }}>{u.vout}</td>
                  <td style={{ padding: '4px 8px', textAlign: 'right', color: 'var(--amber)' }}>{formatSats(u.amount)}</td>
                  <td style={{ padding: '4px 8px', color: u.confirmations > 0 ? 'var(--green-bright)' : 'var(--amber)' }}>{u.confirmations}</td>
                  <td style={{ padding: '4px 8px' }}><button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 6px', fontSize: 9, marginRight: 0, ...(copiedKey === 'utxo-'+i ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(u.txid + ':' + u.vout, 'utxo-'+i)} title="Copy txid:vout">{copiedKey === 'utxo-'+i ? '✓' : 'COPY'}</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>

      {/* BUILD & BROADCAST */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>BUILD &amp; BROADCAST</div>
      {/* TX PREVIEW --inputs, outputs, rungs + JSON */}
      {(() => {
        const txJson = exportCreateTxMLSC(rungs, txOutputs, txInputs, locktime);
        const jsonStr = JSON.stringify(txJson, null, 2);
        const hasInputs = txJson.inputs && txJson.inputs.length > 0;
        const hasOutputs = txJson.outputs && txJson.outputs.length > 0;
        const hasFakeInputs = (txJson.inputs && txJson.inputs.some(i => !(/^[0-9a-f]{64}$/i.test(i.txid)))) ||
          (txOutputs.some(o => o.address && !o.address.startsWith('bcrt1')));
        const droppedOutputs = txOutputs.filter(o => (o.address || parseInt(o.amount) > 0) && !rungs.some(r => r.output.type !== 'relay' && r.output.txOutputId === o.id));
        return (<>
        {/* DROPPED OUTPUT WARNING */}
        {droppedOutputs.length > 0 && (
          <div style={{ marginBottom: 12, padding: '10px 16px', background: 'rgba(255,68,68,0.1)', border: '1px solid var(--red)', fontSize: 11, color: '#ff6666', lineHeight: 1.6 }}>
            <strong>WARNING:</strong> {droppedOutputs.length} output(s) have no conditions assigned and will be excluded from the transaction. In a v4 RUNG_TX, every output must have at least one rung condition. Go to BUILD and assign rungs to all outputs.
            {droppedOutputs.map((o, i) => <div key={i} style={{ marginTop: 4, fontSize: 10, color: '#ff9999' }}>• {o.address ? o.address.substring(0, 20) + '...' : '(no addr)'} --{(parseInt(o.amount) || 0).toLocaleString()} sats --NO CONDITIONS</div>)}
          </div>
        )}
        {/* FUNDED SUCCESS BANNER */}
        {funded && (
          <div style={{ marginBottom: 12, padding: '10px 16px', background: 'var(--green-dim)', border: '1px solid var(--green)', display: 'flex', alignItems: 'center', gap: 10, animation: 'fadeIn 0.3s' }}>
            <span style={{ color: 'var(--green-bright)', fontSize: 18 }}>&#x2713;</span>
            <span style={{ color: 'var(--green-bright)', fontSize: 12, fontWeight: 600, letterSpacing: 0.5 }}>Funded --inputs and outputs replaced with real wallet data{signingData?.scheme && signingData.scheme !== 'SCHNORR' ? ` [${signingData.scheme}]` : ''}</span>
          </div>
        )}
        {/* INPUTS / OUTPUTS GRID */}
        <div style={{ ...sty.section, marginBottom: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div style={sty.label}>TRANSACTION</div>
            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
              <span style={{ fontSize: 10, color: 'var(--text-dim)' }}>
                {hasInputs ? txJson.inputs.length + ' in' : '0 in'}
                {' / '}
                {hasOutputs ? txJson.outputs.length + ' out' : '0 out'}
                {' / '}
                {rungs.length + ' rung' + (rungs.length !== 1 ? 's' : '')}
              </span>
              {online && (<>
                <select
                  style={{ padding: '3px 6px', fontSize: 9, fontFamily: 'var(--font-mono)', background: 'var(--bg-primary)', color: fundScheme !== 'SCHNORR' && fundScheme !== 'ECDSA' ? 'var(--cyan)' : 'var(--text-secondary)', border: '1px solid var(--border)', cursor: 'pointer' }}
                  value={fundScheme}
                  onChange={(e) => setFundScheme(e.target.value)}
                  title="Signature scheme for output conditions"
                >
                  <option value="SCHNORR">SCHNORR</option>
                  <option value="ECDSA">ECDSA</option>
                  <option value="FALCON512">FALCON-512</option>
                  <option value="FALCON1024">FALCON-1024</option>
                  <option value="DILITHIUM3">DILITHIUM-3</option>
                  <option value="SPHINCS_SHA">SPHINCS+</option>
                </select>
                <button style={{ ...sty.btn, ...(hasFakeInputs || !hasInputs ? sty.btnPrimary : sty.btnDefault), padding: '4px 10px', fontSize: 10 }} onClick={handleFundFromWallet} disabled={loading}>
                  {loading === '/api/ladder/wallet/utxos' ? 'LOADING...' : 'FUND FROM WALLET'}
                </button>
              </>)}
            </div>
          </div>
          {hasFakeInputs && online && !funded && (
            <div style={{ marginBottom: 10, padding: '6px 10px', background: 'var(--amber-glow)', border: '1px solid var(--amber-dim)', fontSize: 10, color: 'var(--amber)' }}>
              Inputs contain example data. Click FUND FROM WALLET to replace with real wallet UTXOs and valid addresses.
            </div>
          )}
          {!hasInputs && !funded && (
            <div style={{ marginBottom: 10, padding: '6px 10px', background: 'var(--amber-glow)', border: '1px solid var(--amber-dim)', fontSize: 10, color: 'var(--amber)' }}>
              No inputs. Add in BUILD tab or click FUND FROM WALLET.
            </div>
          )}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 10, color: 'var(--amber)', fontWeight: 600, letterSpacing: 1, marginBottom: 4 }}>INPUTS</div>
              {txInputs.filter(i => i.txid).length > 0 ? txInputs.filter(i => i.txid).map((inp, i) => (
                <div key={i} style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', padding: '4px 6px', marginBottom: 2, background: 'var(--bg-primary)', border: '1px solid var(--border)' }}>
                  <span style={{ color: 'var(--text-dim)' }}>#{i} </span>
                  <span style={{ color: hasFakeInputs ? 'var(--amber)' : 'var(--text-primary)' }}>{inp.txid.substring(0, 12)}...{inp.txid.substring(inp.txid.length - 4)}</span>
                  <span style={{ color: 'var(--text-dim)' }}>:{inp.vout}</span>
                </div>
              )) : <div style={{ fontSize: 10, color: 'var(--text-dim)', padding: '4px 6px' }}>None</div>}
            </div>
            <div>
              <div style={{ fontSize: 10, color: 'var(--amber)', fontWeight: 600, letterSpacing: 1, marginBottom: 4 }}>OUTPUTS</div>
              {txOutputs.filter(o => rungs.some(r => r.output.type !== 'relay' && r.output.txOutputId === o.id)).map((out, i) => (
                <div key={i} style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', padding: '4px 6px', marginBottom: 2, background: 'var(--bg-primary)', border: '1px solid var(--border)' }}>
                  <span style={{ color: 'var(--text-dim)' }}>#{i} </span>
                  <span style={{ color: out.address && !out.address.startsWith('bcrt1') ? 'var(--amber)' : 'inherit' }}>{out.address ? out.address.substring(0, 16) + '...' : '(no addr)'}</span>
