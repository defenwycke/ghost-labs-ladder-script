                  <span style={{ color: 'var(--amber)', float: 'right' }}>{parseInt(out.amount) > 0 ? formatSats(parseInt(out.amount) / 1e8) : '—'}</span>
                </div>
              ))}
            </div>
          </div>
          {/* CHANGE OUTPUT CONTROLS */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10, padding: '6px 10px', background: 'var(--bg-primary)', border: '1px solid var(--border)' }}>
            <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: 1.2, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Change</span>
            {['auto', 'none'].map(m => (
              <label key={m} style={{ display: 'flex', alignItems: 'center', gap: 3, fontSize: 9, color: changeMode === m ? 'var(--green-bright)' : 'var(--text-dim)', cursor: 'pointer' }}>
                <input type="radio" name="changeMode" value={m} checked={changeMode === m} onChange={() => setChangeMode(m)}
                  style={{ width: 10, height: 10, accentColor: 'var(--green-bright)' }} />
                {m === 'auto' ? 'Auto (SIG)' : 'None'}
              </label>
            ))}
            <span style={{ fontSize: 8, color: 'var(--text-dim)', marginLeft: 'auto' }}>
              {changeMode === 'none' ? 'No change -- full UTXO consumed as fee+outputs' : 'Standard SIG condition'}
            </span>
          </div>
          <div>
            <div style={{ fontSize: 10, color: 'var(--amber)', fontWeight: 600, letterSpacing: 1, marginBottom: 4 }}>RUNGS</div>
            {rungs.length > 0 ? (
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {rungs.map((r, i) => (
                  <span key={i} style={{ fontSize: 9, padding: '2px 6px', background: 'var(--bg-primary)', border: '1px solid var(--border)', color: 'var(--text-secondary)', letterSpacing: 0.5 }}>
                    {r.label || `R${i}`}: {r.blocks.map(b => b.type).join(' + ')}
                  </span>
                ))}
              </div>
            ) : <div style={{ fontSize: 10, color: 'var(--text-dim)', padding: '4px 6px' }}>No rungs --design in BUILD tab first</div>}
          </div>
        </div>
        {/* COLLAPSIBLE JSON */}
        <div style={{ ...sty.section, marginBottom: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: showTxJson ? 8 : 0 }}>
            <div style={{ ...sty.label, marginBottom: 0, cursor: 'pointer' }} onClick={() => setShowTxJson(!showTxJson)}>
              {showTxJson ? '\u25BC' : '\u25B6'} CREATERUNGTX JSON
            </div>
            <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9, ...(copiedKey === 'json' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(jsonStr, 'json')}>{copiedKey === 'json' ? '✓ COPIED' : 'COPY JSON'}</button>
          </div>
          {showTxJson && (
            <pre style={{ margin: 0, padding: '10px 12px', background: 'var(--bg-primary)', border: '1px solid var(--border)', fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', overflow: 'auto', maxHeight: 400, whiteSpace: 'pre-wrap', wordBreak: 'break-all', lineHeight: 1.5 }}>{jsonStr}</pre>
          )}
        </div>
        </>);
      })()}
      <div style={{ ...sty.section, padding: '16px 20px' }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <div style={{ flex: '1 1 160px', minWidth: 140, textAlign: 'center' }}>
            <div style={sty.label}>1. CREATE</div>
            <button style={{ ...sty.btn, ...(txHex ? sty.btnGreen : sty.btnPrimary), opacity: online ? 1 : 0.3 }} onClick={handleCreate} disabled={!online || loading === '/api/ladder/create'}>
              {loading === '/api/ladder/create' ? 'CREATING...' : txHex ? '\u2713 CREATED' : 'CREATERUNGTX'}
            </button>
          </div>
          <div style={{ color: txHex ? 'var(--green-bright)' : 'var(--border-light)', fontSize: 20 }}>&#x2192;</div>
          <div style={{ flex: '1 1 160px', minWidth: 140, textAlign: 'center' }}>
            <div style={sty.label}>2. SIGN</div>
            <button style={{ ...sty.btn, ...(signedHex ? sty.btnGreen : txHex ? sty.btnPrimary : sty.btnDefault), opacity: (online && txHex) ? 1 : 0.3 }} onClick={handleSign} disabled={!online || !txHex || loading === '/api/ladder/sign'}>
              {loading === '/api/ladder/sign' ? 'SIGNING...' : signedHex ? '\u2713 SIGNED' : 'SIGNRUNGTX'}
            </button>
          </div>
          <div style={{ color: signedHex ? 'var(--green-bright)' : 'var(--border-light)', fontSize: 20 }}>&#x2192;</div>
          <div style={{ flex: '1 1 160px', minWidth: 140, textAlign: 'center' }}>
            <div style={sty.label}>3. BROADCAST</div>
            <button style={{ ...sty.btn, ...(txid ? sty.btnGreen : signedHex ? sty.btnPrimary : sty.btnDefault), opacity: (online && signedHex) ? 1 : 0.3 }} onClick={handleBroadcast} disabled={!online || !signedHex || loading === '/api/ladder/broadcast'}>
              {loading === '/api/ladder/broadcast' ? 'BROADCASTING...' : txid ? '\u2713 BROADCAST' : 'BROADCAST'}
            </button>
          </div>
          <div style={{ color: txid ? 'var(--green-bright)' : 'var(--border-light)', fontSize: 20 }}>&#x2192;</div>
          <div style={{ flex: '1 1 160px', minWidth: 140, textAlign: 'center' }}>
            <div style={sty.label}>4. CONFIRM</div>
            <button style={{ ...sty.btn, ...(mined ? sty.btnGreen : txid ? sty.btnPrimary : sty.btnDefault), opacity: (online && txid) ? 1 : 0.3 }} onClick={async () => {
              const d = await apiCall('/api/ladder/mine', { blocks: 1 });
              if (d) {
                setMined(true);
                refreshWallet();
                refreshMempool();
                setTxHistory(prev => prev.map(h => h.txid === txid ? { ...h, confirmations: (h.confirmations || 0) + 1 } : h));
              }
            }} disabled={!online || !txid || loading === '/api/ladder/mine'}>
              {loading === '/api/ladder/mine' ? 'MINING...' : mined ? '\u2713 CONFIRMED' : 'MINE BLOCK'}
            </button>
          </div>
        </div>
        {/* Results row --shown below the buttons */}
        {(txHex || signedHex || txid) && (
          <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 6 }}>
            {txHex && (<div style={{ ...sty.result, margin: 0 }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}><span style={{ color: 'var(--green-bright)' }}>TX HEX ({txHex.length / 2} bytes)</span><button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, ...(copiedKey === 'txhex' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(txHex, 'txhex')}>{copiedKey === 'txhex' ? '✓ COPIED' : 'COPY'}</button></div><span style={{ fontSize: 10, wordBreak: 'break-all' }}>{txHex.substring(0, 100)}...</span></div>)}
            {signedHex && signedHex !== txHex && (<div style={{ ...sty.result, margin: 0 }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}><span style={{ color: 'var(--green-bright)' }}>SIGNED ({signedHex.length / 2} bytes)</span><button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, ...(copiedKey === 'signed' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(signedHex, 'signed')}>{copiedKey === 'signed' ? '✓ COPIED' : 'COPY'}</button></div><span style={{ fontSize: 10, wordBreak: 'break-all' }}>{signedHex.substring(0, 100)}...</span></div>)}
            {txid && (<div style={{ ...sty.result, margin: 0 }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><span style={{ color: 'var(--green-bright)' }}>BROADCAST SUCCESS</span><button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, ...(copiedKey === 'txid' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(txid, 'txid')}>{copiedKey === 'txid' ? '✓ COPIED' : 'COPY TXID'}</button></div><span style={{ color: 'var(--amber)', wordBreak: 'break-all', fontSize: 10 }}>{txid}</span></div>)}
          </div>
        )}
      </div>

      {/* SESSION HISTORY */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>SESSION HISTORY</div>
      <div style={sty.section}>
        {txHistory.length === 0 ? (
          <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>No transactions this session.</div>
        ) : (
          <div style={{ maxHeight: 240, overflow: 'auto' }}>
            {txHistory.map((tx, i) => (
              <div key={i} style={{ padding: '8px 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }} onClick={() => setExpandedTx(expandedTx === i ? null : i)}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={sty.dot(tx.confirmations > 0 ? '#2ea043' : '#e6a817')} />
                    <span style={{ color: 'var(--text-primary)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>{tx.txid.substring(0, 16)}...</span>
                    <span style={{ fontSize: 9, padding: '2px 6px', letterSpacing: 1, fontWeight: 600, background: tx.type === 'broadcast' ? 'var(--green-dim)' : 'var(--amber-glow)', color: tx.type === 'broadcast' ? 'var(--green-bright)' : 'var(--amber)', border: `1px solid ${tx.type === 'broadcast' ? 'var(--green)' : 'var(--amber-dim)'}` }}>{tx.type.toUpperCase()}</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 10, color: 'var(--text-dim)' }}>
                    <span>{tx.detail}</span>
                    <span>{tx.confirmations > 0 ? tx.confirmations + ' conf' : 'pending'}</span>
                    <span>{timeAgo(tx.time)}</span>
                  </div>
                </div>
                {expandedTx === i && (
                  <div style={{ marginTop: 8, padding: '8px', background: 'var(--bg-primary)', border: '1px solid var(--border)', fontSize: 10, fontFamily: 'var(--font-mono)' }}>
                    <div style={{ marginBottom: 4 }}><span style={{ color: 'var(--text-dim)' }}>TXID: </span><span style={{ color: 'var(--text-primary)', wordBreak: 'break-all' }}>{tx.txid}</span></div>
                    <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                      <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9, ...(copiedKey === 'hist-'+tx.txid ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={(e) => { e.stopPropagation(); copyWithFeedback(tx.txid, 'hist-'+tx.txid); }}>{copiedKey === 'hist-'+tx.txid ? '✓ COPIED' : 'COPY TXID'}</button>
                      <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9, color: 'var(--amber)' }} onClick={async (e) => { e.stopPropagation(); const d = await apiCall(`/api/ladder/tx/${tx.txid}`, undefined, true); if (d) { tx.detail_data = d; setTxHistory(prev => [...prev]); } }}>VIEW TX</button>
                    </div>
                    {tx.detail_data && (
                      <div style={{ marginTop: 8, padding: '8px', background: 'var(--bg-tertiary)', border: '1px solid var(--border)', fontSize: 10, fontFamily: 'var(--font-mono)', maxHeight: 200, overflow: 'auto' }}>
                        <div><span style={{ color: 'var(--text-dim)' }}>CONFIRMATIONS: </span><span style={{ color: tx.detail_data.confirmations > 0 ? 'var(--green-bright)' : 'var(--amber)' }}>{tx.detail_data.confirmations ?? 'pending'}</span></div>
                        <div><span style={{ color: 'var(--text-dim)' }}>SIZE: </span>{tx.detail_data.size} bytes / {tx.detail_data.vsize} vbytes</div>
                        <div><span style={{ color: 'var(--text-dim)' }}>INPUTS: </span>{tx.detail_data.vin?.length}</div>
                        <div><span style={{ color: 'var(--text-dim)' }}>OUTPUTS: </span>{tx.detail_data.vout?.length}</div>
                        {tx.detail_data.vout?.map((v, vi) => (
                          <div key={vi} style={{ marginTop: 4, paddingLeft: 8, borderLeft: '2px solid var(--border)' }}>
                            <span style={{ color: 'var(--amber)' }}>OUT[{vi}]</span> {v.value} tBTC
                            <span style={{ color: 'var(--text-dim)', marginLeft: 8 }}>{v.scriptPubKey?.type}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* DECODE & VALIDATE */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>DECODE &amp; VALIDATE</div>
      <div style={sty.grid2}>
        <div style={sty.section}>
          <div style={sty.label}>DECODE RAW HEX</div>
          <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 6 }}>DECODE LADDER parses raw ladder hex (scriptPubKey data or witness stack item). DECODE RAW TX parses a full transaction. Either accepts full tx hex --ladder decode falls back to raw tx automatically.</div>
          <textarea style={{ ...sty.input, height: 60, resize: 'vertical', fontFamily: 'var(--font-mono)' }} placeholder="Paste raw transaction or ladder witness hex..." value={decodeHex} onChange={e => setDecodeHex(e.target.value)} disabled={!online} />
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleDecode} disabled={!online || loading === '/api/ladder/decode'}>{loading === '/api/ladder/decode' ? 'DECODING...' : 'DECODE LADDER'}</button>
            <button style={{ ...sty.btn, ...sty.btnDefault, opacity: online ? 1 : 0.3 }} onClick={handleDecodeTx} disabled={!online || loading === '/api/ladder/decode-tx'}>{loading === '/api/ladder/decode-tx' ? 'DECODING...' : 'DECODE RAW TX'}</button>
            {(signedHex || txHex) && <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={() => setDecodeHex(signedHex || txHex)}>USE CURRENT TX</button>}
            {decodeHex && <button style={{ ...sty.btn, ...sty.btnDefault, ...(copiedKey === 'decode-input' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(decodeHex, 'decode-input')}>{copiedKey === 'decode-input' ? '✓ COPIED' : 'COPY HEX'}</button>}
          </div>
          {decodeResult && (<div style={{ ...sty.result, maxHeight: 260 }}>
            <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
              {decodedToBuilderRungs(decodeResult) && (
                <button style={{ ...sty.btn, ...sty.btnPrimary }} onClick={() => onViewAsLadder(decodeResult)}>VIEW AS LADDER</button>
              )}
              <button style={{ ...sty.btn, ...sty.btnDefault, ...(copiedKey === 'decode' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(JSON.stringify(decodeResult, null, 2), 'decode')}>{copiedKey === 'decode' ? '✓ COPIED' : 'COPY'}</button>
            </div>
            <pre style={{ whiteSpace: 'pre-wrap', margin: 0 }}>{JSON.stringify(decodeResult, null, 2)}</pre>
          </div>)}
        </div>
        <div style={sty.section}>
          <div style={sty.label}>VALIDATE LADDER</div>
          <div style={{ fontSize: 10, color: 'var(--text-dim)', marginBottom: 6 }}>Paste a raw ladder conditions or witness hex (from scriptPubKey or witness stack, not the full transaction).</div>
          <textarea style={{ ...sty.input, height: 60, resize: 'vertical', fontFamily: 'var(--font-mono)' }} placeholder="Paste ladder conditions/witness hex..." value={validateHex} onChange={e => setValidateHex(e.target.value)} disabled={!online} />
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleValidate} disabled={!online || loading === '/api/ladder/validate'}>{loading === '/api/ladder/validate' ? 'VALIDATING...' : 'VALIDATE'}</button>
            {(signedHex || txHex) && <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={() => setValidateHex(signedHex || txHex)}>USE CURRENT TX</button>}
            {validateHex && <button style={{ ...sty.btn, ...sty.btnDefault, ...(copiedKey === 'validate-input' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(validateHex, 'validate-input')}>{copiedKey === 'validate-input' ? '✓ COPIED' : 'COPY HEX'}</button>}
          </div>
          {validateResult && (
            <div style={{ ...sty.result, maxHeight: 220 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                {validateResult.valid !== undefined && <div style={{ color: validateResult.valid ? 'var(--green-bright)' : 'var(--red-bright)', fontWeight: 600 }}>{validateResult.valid ? 'VALID LADDER STRUCTURE' : 'INVALID'}</div>}
                <button style={{ ...sty.btn, ...sty.btnDefault, ...(copiedKey === 'validate' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(JSON.stringify(validateResult, null, 2), 'validate')}>{copiedKey === 'validate' ? '✓ COPIED' : 'COPY'}</button>
              </div>
              <pre style={{ whiteSpace: 'pre-wrap', margin: 0 }}>{JSON.stringify(validateResult, null, 2)}</pre>
            </div>
          )}
        </div>
      </div>

      {/* TRANSACTION LOOKUP */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle} data-lookup="1">TRANSACTION LOOKUP</div>
      <div style={sty.section}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <input style={{ ...sty.input, flex: 1, marginBottom: 0 }} placeholder="txid (64 hex chars)" value={lookupTxid} onChange={e => setLookupTxid(e.target.value)} disabled={!online} />
          <button style={{ ...sty.btn, ...sty.btnPrimary, opacity: online ? 1 : 0.3 }} onClick={handleLookup} disabled={!online}>LOOKUP</button>
          {txid && <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={() => setLookupTxid(txid)}>USE CURRENT TX</button>}
        </div>
        {lookupResult && (
          <div style={{ ...sty.result, maxHeight: 300, marginTop: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                <div><span style={{ color: 'var(--text-dim)' }}>CONF: </span><span style={{ color: lookupResult.confirmations > 0 ? 'var(--green-bright)' : 'var(--amber)' }}>{lookupResult.confirmations || 0}</span></div>
                <div><span style={{ color: 'var(--text-dim)' }}>SIZE: </span>{lookupResult.size} bytes</div>
                <div><span style={{ color: 'var(--text-dim)' }}>VSIZE: </span>{lookupResult.vsize} vbytes</div>
                {lookupResult.version && <div><span style={{ color: 'var(--text-dim)' }}>VERSION: </span>{lookupResult.version}</div>}
              </div>
              <div style={{ display: 'flex', gap: 4 }}>
                {lookupResult.hex && <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, ...(copiedKey === 'lookup-hex' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(lookupResult.hex, 'lookup-hex')}>{copiedKey === 'lookup-hex' ? '✓ COPIED' : 'COPY HEX'}</button>}
                <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, ...(copiedKey === 'lookup' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(JSON.stringify(lookupResult, null, 2), 'lookup')}>{copiedKey === 'lookup' ? '✓ COPIED' : 'COPY JSON'}</button>
              </div>
            </div>
            {lookupResult.vin && (<div style={{ marginBottom: 6 }}><div style={{ color: 'var(--text-dim)', fontSize: 9, letterSpacing: 1, marginBottom: 2 }}>INPUTS ({lookupResult.vin.length})</div>{lookupResult.vin.map((vin, i) => <div key={i} style={{ fontSize: 10, color: 'var(--text-secondary)', padding: '2px 0' }}>{vin.coinbase ? 'coinbase' : `${(vin.txid || '').substring(0, 16)}...:${vin.vout}`}</div>)}</div>)}
            {lookupResult.vout && (<div><div style={{ color: 'var(--text-dim)', fontSize: 9, letterSpacing: 1, marginBottom: 2 }}>OUTPUTS ({lookupResult.vout.length})</div>{lookupResult.vout.map((vout, i) => <div key={i} style={{ fontSize: 10, color: 'var(--text-secondary)', padding: '2px 0', display: 'flex', justifyContent: 'space-between' }}><span>#{vout.n} {vout.scriptPubKey?.type || ''}</span><span style={{ color: 'var(--amber)' }}>{formatSats(vout.value)}</span></div>)}</div>)}
            {decodedToBuilderRungs(lookupResult) && (
              <button style={{ ...sty.btn, ...sty.btnPrimary, marginTop: 8, display: 'block' }} onClick={() => onViewAsLadder(lookupResult)}>VIEW AS LADDER</button>
            )}
            <details style={{ marginTop: 8 }}><summary style={{ cursor: 'pointer', color: 'var(--text-dim)', fontSize: 10 }}>RAW JSON</summary><div style={{ display: 'flex', justifyContent: 'flex-end', margin: '4px 0' }}><button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, ...(copiedKey === 'lookup-raw' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(JSON.stringify(lookupResult, null, 2), 'lookup-raw')}>{copiedKey === 'lookup-raw' ? '✓ COPIED' : 'COPY JSON'}</button></div><pre style={{ whiteSpace: 'pre-wrap', margin: 0, fontSize: 10 }}>{JSON.stringify(lookupResult, null, 2)}</pre></details>
          </div>
        )}
      </div>

      {/* RECENT BLOCKS */}
      <div style={sty.divider} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={sty.sectionTitle}>RECENT BLOCKS</div>
        <button style={{ ...sty.btn, ...sty.btnDefault, opacity: online ? 1 : 0.3 }} onClick={refreshMempool} disabled={!online}>REFRESH</button>
      </div>
      <div style={sty.section}>
        {recentBlocks && recentBlocks.length > 0 ? (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11, fontFamily: 'var(--font-mono)' }}>
            <thead><tr style={{ color: 'var(--text-dim)', textAlign: 'left', fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 }}>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>HEIGHT</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>HASH</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>TXs</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>SIZE</th>
              <th style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)' }}>TIME</th>
            </tr></thead>
            <tbody>{recentBlocks.map((b, i) => (
              <React.Fragment key={i}>
              <tr style={{ borderBottom: expandedBlock === b.height ? 'none' : '1px solid var(--border)', cursor: 'pointer' }} onClick={() => setExpandedBlock(expandedBlock === b.height ? null : b.height)}>
                <td style={{ padding: '6px 8px', color: 'var(--amber)' }}>{expandedBlock === b.height ? '▼' : '▶'} {b.height}</td>
                <td style={{ padding: '6px 8px', color: 'var(--text-secondary)' }} title={b.hash}>{b.hash.substring(0, 16)}...</td>
                <td style={{ padding: '6px 8px', textAlign: 'right' }}>{b.tx_count}</td>
                <td style={{ padding: '6px 8px', textAlign: 'right', color: 'var(--text-dim)' }}>{(b.size / 1024).toFixed(1)} KB</td>
                <td style={{ padding: '6px 8px', color: 'var(--text-dim)' }}>{new Date(b.time * 1000).toLocaleTimeString()}</td>
              </tr>
              {expandedBlock === b.height && b.txids && b.txids.length > 0 && (
                <tr><td colSpan={5} style={{ padding: '0 8px 8px', borderBottom: '1px solid var(--border)' }}>
                  <div style={{ background: 'var(--bg-primary)', border: '1px solid var(--border)', borderRadius: 4, padding: '6px 10px' }}>
                    <div style={{ fontSize: 9, color: 'var(--text-dim)', letterSpacing: 1, marginBottom: 4 }}>TRANSACTIONS ({b.txids.length})</div>
                    {b.txids.map((txid, j) => (
                      <div key={j} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '3px 0', borderBottom: j < b.txids.length - 1 ? '1px solid var(--border)' : 'none' }}>
                        <span style={{ fontSize: 10, color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)', wordBreak: 'break-all', flex: 1, marginRight: 8 }}>{txid}</span>
                        <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
                          <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 6px', fontSize: 9, ...(copiedKey === 'blk-'+txid ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={(e) => { e.stopPropagation(); copyWithFeedback(txid, 'blk-'+txid); }}>{copiedKey === 'blk-'+txid ? '✓' : 'COPY'}</button>
                          <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 6px', fontSize: 9, color: 'var(--amber)' }} onClick={async (e) => { e.stopPropagation(); setLookupTxid(txid); document.querySelector('[data-lookup]')?.scrollIntoView({ behavior: 'smooth' }); const d = await apiCall('/api/ladder/tx/' + txid, undefined, true); if (d) setLookupResult(d); }}>LOOKUP</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </td></tr>
              )}
              </React.Fragment>
            ))}</tbody>
          </table>
        ) : <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>{online ? 'Loading...' : 'Unavailable'}</div>}
      </div>

      {/* ERROR */}
      {error && (
        <div style={{ ...sty.section, borderColor: 'var(--red)', background: 'var(--red-dim)', position: 'sticky', bottom: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ color: 'var(--red-bright)', fontSize: 11 }}>{error}</div>
            <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, marginRight: 0 }} onClick={() => setError(null)}>DISMISS</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SPEND PANEL --spend existing RUNG outputs
// ═══════════════════════════════════════════════════════════════

function SpendPanel() {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState('');
  const [error, setError] = useState(null);
  const [records, setRecords] = useState([]);
  const [selectedRecord, setSelectedRecord] = useState(null);
  const [lookupTxid, setLookupTxid] = useState('');
  const [lookupVout, setLookupVout] = useState(0);
  const [destAddress, setDestAddress] = useState('');
  const [spendLog, setSpendLog] = useState([]);
  const [spending, setSpending] = useState(false);
  const [spendResult, setSpendResult] = useState(null);
  const [spendTxJson, setSpendTxJson] = useState(null);
  const [copiedKey, setCopiedKey] = useState(null);
  const [selectedRungIdx, setSelectedRungIdx] = useState(0);
  const [selectedVout, setSelectedVout] = useState(null); // null = use rec.vout default

  const copyWithFeedback = (text, key) => {
    navigator.clipboard.writeText(text);
    setCopiedKey(key);
    setTimeout(() => setCopiedKey(prev => prev === key ? null : prev), 1500);
  };

  const apiCall = async (endpoint, body, silent) => {
    if (!silent) setError(null);
    setLoading(endpoint);
    try {
      return await apiCallBase(endpoint, body);
    } catch (e) {
      const msg = e.message === 'Failed to fetch'
        ? 'Signet proxy unreachable --check that the ladder-script proxy is running on ' + SIGNET_API
        : e.message;
      if (!silent) setError(msg);
      return null;
    } finally {
      setLoading('');
    }
  };

  useEffect(() => {
    fetch(SIGNET_API + '/api/ladder/status')
      .then(r => r.json())
      .then(d => setStatus(d))
      .catch(() => setStatus({ status: 'offline' }));
    loadRecords();
  }, []);

  // URL param support
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const txid = params.get('spend_txid');
    if (txid) {
      setLookupTxid(txid);
      setLookupVout(parseInt(params.get('spend_vout')) || 0);
    }
  }, []);

  // Note: shadows module-level loadRecords() --adds component state management
  const loadRecords = () => {
    try {
      const all = loadAllRecords();
      // Filter stale records (no vout tracking --pre-v2)
      const valid = all.filter(r => r.rungs && r.rungs.length > 0 && r.rungs[0].vout !== undefined);
      setRecords(valid.reverse()); // newest first
    } catch { setRecords([]); }
  };

  const selectRecord = (rec) => {
    setSelectedRecord(rec);
    setSelectedRungIdx(0);
    setSelectedVout(null);
    setSpendResult(null);
    setSpendLog([]);
    setError(null);
  };

  const handleLookupTxid = () => {
    const txid = lookupTxid.trim();
    if (!txid || txid.length !== 64) { setError('Enter a valid 64-character TXID.'); return; }
    // Check localStorage first
    const stored = records.find(r => r.txid === txid);
    if (stored) {
      selectRecord(stored);
    } else {
      selectRecord({
        txid, vout: lookupVout, conditionKeys: [], preimages: [], rungs: [],
        scheme: 'SCHNORR', walletKey: null, amount: 0,
      });
    }
  };

  const handleSpend = async () => {
    if (spending || !selectedRecord) return;
    setSpending(true);
    setSpendResult(null);
    const log = [];
    const addLog = (msg, cls) => { log.push({ msg, cls: cls || 'info', time: new Date().toLocaleTimeString() }); setSpendLog([...log]); };

    try {
      const rec = selectedRecord;
      const txid = rec.txid;
      const vout = selectedVout !== null ? selectedVout : (rec.vout || 0);
      const scheme = rec.scheme || 'SCHNORR';
      const isPQ = scheme !== 'SCHNORR' && scheme !== 'ECDSA';

      // ── Run planSpend to compute signer blocks, timelocks, output classification ──
      const plan = planSpend(rec, { vout, rungIdx: selectedRungIdx });

      // Emit plan messages
      plan.infos.forEach(msg => addLog(msg, 'info'));
      plan.warnings.forEach(msg => addLog(msg, 'warn'));
      if (plan.errors.length > 0) throw new Error(plan.errors.join('; '));

      const { targetRung, rungIdx, rungBlocks, voutRungs, signerBlocks, timelocks, outputClassification, validationResults, needsAccumulatorProof, accumulatorLeaves } = plan;
      const { inputSequence, txLocktime, csvBlocks, csvTimeSeconds } = timelocks;
      const { recurseBlocks, mutationBlocks, validationBlocks, ctvBlock, splitBlock } = outputClassification;

      // ── Handle async ACCUMULATOR Merkle proof ──
      if (needsAccumulatorProof && accumulatorLeaves) {
        const proof = await computeMerkleProof(accumulatorLeaves, 0);
        // Find the ACCUMULATOR placeholder in signerBlocks and replace it
        const accIdx = signerBlocks.findIndex(sb => sb.type === 'ACCUMULATOR' && !sb.proof);
        if (accIdx >= 0) {
          signerBlocks[accIdx] = { type: 'ACCUMULATOR', proof: proof.siblings, leaf: proof.leaf };
        } else {
          signerBlocks.push({ type: 'ACCUMULATOR', proof: proof.siblings, leaf: proof.leaf });
        }
        addLog('ACCUMULATOR: Merkle proof (' + proof.siblings.length + ' siblings, leaf[0])', 'info');
      }

      // 1. Check proxy
      addLog('Connecting to proxy...');
      const st = await apiCall('/api/ladder/status', undefined, true);
      if (!st || st.status !== 'ok') throw new Error('Signet proxy is offline.');
      addLog('Connected. Height: ' + st.blocks, 'ok');

      // 2. Look up the UTXO
      addLog('Looking up UTXO ' + txid.substring(0, 16) + ':' + vout + '...');
      const txData = await apiCall('/api/ladder/tx/' + txid, undefined, true);
      if (!txData) throw new Error('Transaction not found on chain.');
      const utxoOutput = txData.vout[vout];
      if (!utxoOutput) throw new Error('Output index ' + vout + ' not found in transaction.');
      const utxoAmountSats = Math.round(utxoOutput.value * 1e8);
      addLog('Found UTXO: ' + utxoAmountSats.toLocaleString() + ' sats', 'ok');

      // 3. Get destination address
      let dest = destAddress.trim();
      if (!dest && targetRung.coilType === 'UNLOCK_TO' && targetRung.coilAddress) {
        dest = targetRung.coilAddress;
        addLog('UNLOCK_TO: destination locked to ' + dest.substring(0, 20) + '...', 'info');
      }
      if (!dest) {
        addLog('Generating destination address...');
        const addrData = await apiCall('/api/ladder/wallet/address', undefined, true);
        if (!addrData) throw new Error('Failed to generate address.');
        dest = addrData.address;
        setDestAddress(dest);
        addLog('Destination: ' + dest, 'ok');
      }

      // 4. Build the spending transaction
      // PQ witness (pubkey + sig): Falcon-512 ~1563B, Falcon-1024 ~3073B, Dilithium3 ~5245B, SPHINCS ~49248B
      const pqWitnessMap = { FALCON512: 1563, FALCON1024: 3073, DILITHIUM3: 5245, SPHINCS_SHA: 49248 };
      const witnessOverhead = pqWitnessMap[scheme] || 0;
      const feeSats = Math.max(1000, 500 + Math.ceil(witnessOverhead / 4));
      const sendSats = utxoAmountSats - feeSats;
      if (sendSats < 1000) throw new Error('UTXO too small to spend after fees (' + utxoAmountSats + ' sats, fee ' + feeSats + ')');

      addLog('Building spending tx (' + sendSats.toLocaleString() + ' sats after ' + feeSats + ' fee)...');

      // Validate TX-structure constraints with actual amounts
      for (const v of validationResults) {
        if (v.type === 'AMOUNT_LOCK') {
          if (sendSats < v.min || sendSats > v.max) addLog('AMOUNT_LOCK: output ' + sendSats + ' sats outside [' + v.min + ', ' + v.max + '] --backend will enforce', 'warn');
          else addLog('AMOUNT_LOCK: ' + sendSats + ' sats within [' + v.min + ', ' + v.max + ']', 'ok');
        }
        if (v.type === 'RELATIVE_VALUE') {
          const minOutput = Math.ceil(utxoAmountSats * v.numerator / v.denominator);
          if (sendSats < minOutput) addLog('RELATIVE_VALUE: output ' + sendSats + ' < ' + minOutput + ' required --backend will enforce', 'warn');
          else addLog('RELATIVE_VALUE: ' + sendSats + ' sats >= ' + minOutput + ' required', 'ok');
        }
      }

      if (txLocktime > 500000000) {
        addLog('CLTV_TIME lock: tx locked until ' + new Date(txLocktime * 1000).toISOString(), 'warn');
      } else if (txLocktime > 0 && st.blocks < txLocktime) {
        addLog('CLTV lock: needs height ' + txLocktime + ' but chain at ' + st.blocks, 'warn');
      }
      if (inputSequence < 0x400000 && inputSequence > 1) {
        addLog('CSV: ' + inputSequence + ' blocks relative timelock', 'info');
      }

      // Get a wallet key for the output condition
      const walletKey = rec.walletKey || await apiCall('/api/ladder/wallet/keypair', undefined, true);
      if (!walletKey) throw new Error('Failed to generate wallet keypair.');

      const spendInputs = [{ txid, vout, sequence: inputSequence }];

      // ─── COSIGN: detect and add co-input (async --stays in handleSpend) ───
      const cosignBlock = rungBlocks.find(b => b.type === 'COSIGN');
      let coInput = null;
      if (cosignBlock) {
        const condHash = cosignBlock.values?.conditions_hash;
        if (!condHash) {
          addLog('COSIGN block has no conditions_hash --backend will reject', 'warn');
        } else {
          const allRecords = loadAllRecords();
          for (const cr of allRecords) {
            if (cr.txid === txid && (cr.vout || 0) === vout) continue;
            const coTxData = await apiCall('/api/ladder/tx/' + cr.txid, undefined, true);
            if (!coTxData) continue;
            const coOut = coTxData.vout[cr.vout || 0];
            if (!coOut) continue;
            const spkHex = coOut.scriptPubKey?.hex || '';
            if (!spkHex) continue;
            const spkHash = bytesToHex(await sha256Bytes(hexToBytes(spkHex)));
            if (spkHash === condHash) {
              const coRungs = cr.rungs || [];
              const coRung = coRungs[0];
              const coBlocks = coRung?.blocks || [];
              const coKeyByPubkey = new Map();
              (cr.conditionKeys || []).forEach(k => { if (k.pubkey) coKeyByPubkey.set(k.pubkey, k); });
              const coSignerBlocks = [];
              for (const cb of coBlocks) {
                if (['SIG', 'TIMELOCKED_SIG', 'CLTV_SIG', 'KEY_REF_SIG'].includes(cb.type)) {
                  const pk = cb.values?.pubkey || cb.values?.signing_key;
                  const ck = pk ? coKeyByPubkey.get(pk) : (cr.conditionKeys || [])[0];
                  if (ck) coSignerBlocks.push({ type: cb.type, privkey: ck.privkey });
                  else coSignerBlocks.push({ type: cb.type });
                } else if (cb.type === 'MULTISIG' || cb.type === 'TIMELOCKED_MULTISIG') {
                  const thresh = parseInt(cb.values?.threshold) || 2;
                  const pks = (cb.values?.pubkeys || '').split(',').map(k => k.trim()).filter(Boolean);
                  const privkeys = pks.slice(0, thresh).map(pk => coKeyByPubkey.get(pk)?.privkey).filter(Boolean);
                  coSignerBlocks.push({ type: cb.type, privkeys });
                } else {
                  coSignerBlocks.push({ type: cb.type });
                }
              }
              const coAmountSats = Math.round(coOut.value * 1e8);
              coInput = {
                txid: cr.txid, vout: cr.vout || 0,
                amount: coAmountSats,
                scriptPubKey: spkHex,
                signerBlocks: coSignerBlocks,
                spentOutput: { amount: coOut.value, scriptPubKey: spkHex },
              };
              spendInputs.push({ txid: cr.txid, vout: cr.vout || 0, sequence: 0xfffffffe });
              addLog('COSIGN: found co-input ' + cr.txid.substring(0, 16) + ':' + (cr.vout || 0) + ' (' + coAmountSats + ' sats)', 'ok');
              break;
            }
          }
          if (!coInput) {
            addLog('COSIGN: no matching co-input found in records (hash=' + condHash.substring(0, 16) + '...). Spend may fail.', 'warn');
          }
        }
      }

      const spendAmount = sendSats / 1e8;
      const freshSigOutput = { amount: spendAmount, conditions: [{ blocks: [{ type: 'SIG', fields: [{ type: 'PUBKEY', hex: walletKey.pubkey }] }] }] };

      // ─── Build outputs using plan's output classification ───
      let createOutputs;

      if (ctvBlock) {
        createOutputs = ctvBlock.outputs.map(o => ({ amount: o.amount, conditions: o.conditions, _isCarryForward: true }));
        addLog('CTV: ' + createOutputs.length + ' template output(s)', 'ok');

      } else if (recurseBlocks.length > 0) {
        let exhausted = false;
        for (const rb of recurseBlocks) {
          if (rb.type === 'RECURSE_COUNT') {
            const remaining = parseInt(rb.values?.remaining) || 0;
            if (remaining <= 0) { exhausted = true; addLog('RECURSE_COUNT exhausted --free spend', 'ok'); }
          }
          if (rb.type === 'RECURSE_SPLIT') {
            const maxSplits = parseInt(rb.values?.max_splits) || 0;
            if (maxSplits <= 0) { exhausted = true; addLog('RECURSE_SPLIT exhausted --free spend', 'ok'); }
          }
          if (rb.type === 'RECURSE_UNTIL') {
            const target = parseInt(rb.values?.target_height) || 0;
            if (st.blocks >= target) { exhausted = true; addLog('RECURSE_UNTIL: height ' + target + ' reached --free spend', 'ok'); }
          }
        }

        if (exhausted) {
          createOutputs = [freshSigOutput];
        } else {
          const buildCarryConditions = () => {
            const conds = rungsToConditions(voutRungs);
            for (const cond of conds) {
              for (const blk of cond.blocks) {
                if (blk.type === 'RECURSE_SPLIT') {
                  for (const f of blk.fields) {
                    if (f.type === 'NUMERIC') { f.hex = toNumericHex(String(Math.max(0, fromNumericHex(f.hex) - 1))); break; }
                  }
                }
                if (blk.type === 'RECURSE_COUNT') {
                  for (const f of blk.fields) {
                    if (f.type === 'NUMERIC') { f.hex = toNumericHex(String(Math.max(0, fromNumericHex(f.hex) - 1))); break; }
                  }
                }
              }
            }
            // Condition-type fields match C++ IsConditionDataType: HASH256, HASH160, NUMERIC, SCHEME, DATA
            // PUBKEY is folded into Merkle leaf (merkle_pub_key), not stored as condition field
            const isConditionField = (t) => t === 'HASH256' || t === 'HASH160' || t === 'NUMERIC' || t === 'SCHEME' || t === 'DATA';
            for (const mb of mutationBlocks) {
              const blockIdx = parseInt(mb.values?.block_idx) || 0;
              const paramIdx = parseInt(mb.values?.param_idx) || 0;
              const rawDelta = parseInt(mb.values?.delta || mb.values?.decay_per_step) || 1;
              const delta = mb.type === 'RECURSE_DECAY' ? -rawDelta : rawDelta;
              if (conds[0] && conds[0].blocks[blockIdx]) {
                const targetBlock = conds[0].blocks[blockIdx];
                let condCount = 0;
                for (let fi = 0; fi < targetBlock.fields.length; fi++) {
                  if (isConditionField(targetBlock.fields[fi].type)) {
                    if (condCount === paramIdx) {
                      if (targetBlock.fields[fi].type !== 'NUMERIC') {
                        addLog('Mutation error: param_idx=' + paramIdx + ' targets non-NUMERIC field (' + targetBlock.fields[fi].type + ')', 'error');
                        break;
                      }
                      const oldVal = fromNumericHex(targetBlock.fields[fi].hex);
                      const newVal = oldVal + delta;
                      targetBlock.fields[fi].hex = toNumericHex(String(newVal));
                      addLog('Mutation [block=' + blockIdx + ', param=' + paramIdx + ']: ' + oldVal + ' → ' + newVal + ' (' + mb.type + ')', 'info');
                      break;
                    }
                    condCount++;
                  }
                }
              }
            }
            return conds;
          };

          if (splitBlock) {
            const minSats = parseInt(splitBlock.values?.min_sats) || 546;
            const half = Math.floor(sendSats / 2);
            if (half < minSats) throw new Error('RECURSE_SPLIT: half (' + half + ' sats) below min_sats (' + minSats + '). Need at least ' + (minSats * 2 + feeSats) + ' sats in UTXO.');
            createOutputs = [
              { amount: half / 1e8, conditions: buildCarryConditions(), _isCarryForward: true },
              { amount: (sendSats - half) / 1e8, conditions: buildCarryConditions(), _isCarryForward: true },
            ];
            const maxSplits = parseInt(splitBlock.values?.max_splits) || 0;
            addLog('RECURSE_SPLIT: 2-way (' + half + ' + ' + (sendSats - half) + ' sats), splits ' + maxSplits + ' → ' + (maxSplits - 1), 'info');
          } else {
            createOutputs = [{ amount: spendAmount, conditions: buildCarryConditions(), _isCarryForward: true }];
            const types = recurseBlocks.map(b => b.type).join(' + ');
            addLog('Carry-forward: ' + types, 'info');
          }
        }

      } else {
        createOutputs = [freshSigOutput];
      }

      // Build create payload
      const createPayload = { inputs: spendInputs, outputs: createOutputs };
      if (rec.relays && rec.relays.length > 0) {
        createPayload.relays = rec.relays.map(r => ({
          blocks: (r.blocks || []).filter(b => b.type !== 'OUTPUT_REF').map(exportBlockFields)
        }));
      }
      if (txLocktime > 0) createPayload.locktime = txLocktime;
      const createResult = await apiCall('/api/ladder/create', createPayload, true);
      if (!createResult || !createResult.hex) throw new Error('Failed to create spending tx.');
      addLog('Unsigned tx created (' + (createResult.hex.length / 2) + ' bytes)', 'ok');

      // 5. Sign using blocks-based signer format
      addLog('Signing with ' + signerBlocks.length + ' block(s), ' + scheme + ' scheme...');
      const signerEntry = { input: 0, blocks: signerBlocks };
      // MLSC inputs require conditions for Merkle proof computation.
      // Pass conditions exactly as they were when the output was created.
      if (voutRungs.length > 0) {
        signerEntry.conditions = voutRungs.map(r => ({
          blocks: (r.blocks || []).filter(b => b.type !== 'OUTPUT_REF').map(exportBlockFields)
        }));
      }
      if (rec.relays && rec.relays.length > 0) {
        signerEntry.relays = rec.relays.map(r => ({
          blocks: (r.blocks || []).filter(b => b.type !== 'OUTPUT_REF').map(exportBlockFields)
        }));
      }
      if (voutRungs.length > 1) {
        signerEntry.rung = rungIdx;
        addLog('Passing rung index ' + rungIdx + ' to signladder (condition ' + (rungIdx + 1) + ' of ' + voutRungs.length + ')', 'info');
      }
      // Pass coil if non-default (PQ scheme, UNLOCK_TO, etc.) — must match fund-time coil for Merkle leaf
      const coilScheme = targetRung.coilScheme || rec.scheme || 'SCHNORR';
      const coilType = targetRung.coilType || 'UNLOCK';
      if (coilType !== 'UNLOCK' || coilScheme !== 'SCHNORR') {
        signerEntry.coil = { type: coilType, attestation: 'INLINE', scheme: coilScheme };
        if (coilType === 'UNLOCK_TO' && targetRung.coilAddress) {
          signerEntry.coil.address = targetRung.coilAddress;
        }
        addLog('Coil: ' + coilType + '/' + coilScheme, 'info');
      }
      const signers = [signerEntry];
      const spent_outputs = [{ amount: utxoOutput.value, scriptPubKey: utxoOutput.scriptPubKey?.hex || '' }];
      if (coInput) {
        signers.push({ input: 1, blocks: coInput.signerBlocks });
        spent_outputs.push(coInput.spentOutput);
        addLog('COSIGN: signing co-input with ' + coInput.signerBlocks.length + ' block(s)', 'info');
      }
      const signPayload = {
        hex: createResult.hex,
        signers,
        spent_outputs,
      };
      const signResult = await apiCall('/api/ladder/sign', signPayload, true);
      if (!signResult || !signResult.hex) throw new Error('Signing failed.');
      addLog(signerBlocks.length + ' signature block(s) applied (' + scheme + ')', 'ok');

      // 6. Satisfy relative timelocks before broadcast
      if (csvTimeSeconds > 0) {
        addLog('CSV_TIME requires ' + csvTimeSeconds + 's to elapse (MTP-based). Mining blocks alone may not satisfy this --you may need to wait.', 'warn');
        addLog('Mining 6 blocks to advance MTP slightly...', 'info');
        await apiCall('/api/ladder/mine', { blocks: 6 }, true);
      } else if (csvBlocks > 1) {
        let remaining = csvBlocks;
        addLog('Mining ' + remaining + ' block(s) for CSV relative lock...', 'info');
        while (remaining > 0) {
          const batch = Math.min(remaining, 50);
          await apiCall('/api/ladder/mine', { blocks: batch }, true);
          remaining -= batch;
          if (remaining > 0) addLog('Mined ' + batch + ', ' + remaining + ' remaining...', 'info');
        }
        addLog('CSV lock satisfied (' + csvBlocks + ' blocks mined)', 'ok');
      }

      // 7. Broadcast
      addLog('Broadcasting...');
      let bcResult;
      try {
        const r = await fetch(SIGNET_API + '/api/ladder/broadcast', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hex: signResult.hex }),
        });
        bcResult = await r.json();
        if (!r.ok) throw new Error(bcResult.detail?.rpc_error || bcResult.detail || 'HTTP ' + r.status);
      } catch (e) {
        throw new Error('Broadcast failed: ' + e.message);
      }
      if (!bcResult.txid) throw new Error('Broadcast failed: no txid returned.');
      addLog('Broadcast! TXID: ' + bcResult.txid, 'ok');

      // 8. Mine confirmation
      addLog('Mining confirmation block...');
      await apiCall('/api/ladder/mine', { blocks: 1 }, true);
      addLog('Confirmed!', 'ok');

      // 9. Save child records for carry-forward outputs (enables chained recursive spends)
      const carryOutputs = createOutputs.filter(o => o._isCarryForward);
      if (carryOutputs.length > 0) {
        try {
          carryOutputs.forEach((co, idx) => {
            const childRungs = (co.conditions || []).map(cond => {
              const blocks = (cond.blocks || []).map(wb => wireFieldsToValues(wb));
              return { label: (targetRung.label || 'Rung') + ' → child ' + idx, vout: idx, blocks, coilType: targetRung.coilType || 'UNLOCK', coilAddress: targetRung.coilAddress || null };
            });
            const childAmount = Math.round(co.amount * 1e8);
            const childRecord = createRecord(bcResult.txid, {
              vout: idx,
              scheme: rec.scheme || 'SCHNORR',
              amount: childAmount,
              walletKey: rec.walletKey,
              conditionKeys: rec.conditionKeys || [],
              preimages: rec.preimages || [],
              rungs: childRungs,
              relays: rec.relays,
              ctvOutputsMap: rec.ctvOutputsMap,
            });
            saveRecord(childRecord);
          });
          addLog('Saved ' + carryOutputs.length + ' child record(s) for recursive spend', 'ok');
          loadRecords();
        } catch (e) { addLog('Warning: failed to save child records: ' + e.message, 'warn'); }
      }

      setSpendResult({ txid: bcResult.txid, amount: sendSats, scheme, destAddress: dest });
      // Save decoded tx (with witness) to session log for Review tab
      const spendSize = signResult.hex ? Math.floor(signResult.hex.length / 2) : null;
      let decodedSpend = createPayload; // fallback
      try {
        const decoded = await apiCall('/api/ladder/tx/' + bcResult.txid, undefined, true);
        if (decoded) decodedSpend = decoded;
      } catch (e) { /* use createPayload fallback */ }
      updateSessionTxSpend(txid, bcResult.txid, decodedSpend, spendSize);

    } catch (e) {
      addLog('ERROR: ' + e.message, 'err');
    } finally {
      setSpending(false);
    }
  };

  const handleClearRecord = (txid) => {
    deleteRecord(txid);
    loadRecords();
    if (selectedRecord && selectedRecord.txid === txid) setSelectedRecord(null);
  };

  const online = status && status.status === 'ok';

  const sty = {
    section: { marginBottom: 12, padding: '12px 16px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', fontSize: 12 },
    label: { fontSize: 10, fontWeight: 600, letterSpacing: 1.5, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: 6 },
    input: { width: '100%', padding: '6px 8px', background: 'var(--bg-primary)', border: '1px solid var(--border)', color: 'var(--text-primary)', fontFamily: 'var(--font-mono)', fontSize: 12, outline: 'none', marginBottom: 8 },
    btn: { padding: '6px 12px', fontSize: 11, fontFamily: 'var(--font-mono)', fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer', border: '1px solid', transition: 'all 0.15s', marginRight: 6 },
    btnPrimary: { color: 'var(--amber)', background: 'var(--amber-glow)', borderColor: 'var(--amber-dim)' },
    btnCyan: { color: 'var(--cyan)', background: 'rgba(0,200,255,0.08)', borderColor: 'rgba(0,200,255,0.3)' },
    btnGreen: { color: 'var(--green-bright)', background: 'var(--green-dim)', borderColor: 'var(--green)' },
    btnDefault: { color: 'var(--text-secondary)', background: 'var(--bg-tertiary)', borderColor: 'var(--border)' },
    btnDanger: { color: 'var(--red-bright)', background: 'var(--red-dim)', borderColor: 'var(--red)' },
    divider: { borderTop: '1px solid var(--border)', margin: '20px 0', opacity: 0.5 },
    sectionTitle: { fontSize: 11, fontWeight: 700, letterSpacing: 2, color: 'var(--cyan)', textTransform: 'uppercase', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 },
    dot: (color) => ({ width: 8, height: 8, borderRadius: '50%', background: color, display: 'inline-block', marginRight: 8, boxShadow: `0 0 6px ${color}` }),
  };

  const formatSats = (sats) => { if (sats == null) return '—'; return parseInt(sats).toLocaleString() + ' sats'; };

  return (
    <div style={{ padding: '20px 32px', overflow: 'auto', flex: 1, maxWidth: 1008, margin: '0 auto', width: '100%' }}>
      {/* STATUS BAR */}
      <div style={{ ...sty.section, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={sty.dot(online ? '#00d4ff' : '#c43030')} />
          <span style={{ color: online ? 'var(--cyan)' : 'var(--red-bright)', fontSize: 13, fontWeight: 600, letterSpacing: 1 }}>
            {online ? 'SPEND RUNG OUTPUTS' : 'SIGNET OFFLINE'}
          </span>
          {online && status.blocks && <span style={{ color: 'var(--text-dim)', fontSize: 11 }}>Block {status.blocks}</span>}
        </div>
        <button style={{ ...sty.btn, ...sty.btnDefault }} onClick={loadRecords}>REFRESH RECORDS</button>
      </div>

      {!online && (
        <div style={{ ...sty.section, borderColor: 'var(--amber-dim)', background: 'var(--amber-glow)' }}>
          <div style={{ color: 'var(--amber)', fontSize: 11, lineHeight: 1.6 }}>
            Signet proxy is not available. Spending RUNG outputs requires a ghost-core node. Create and send RUNG outputs first using the SEND tab.
          </div>
        </div>
      )}

      {/* SAVED RECORDS */}
      <div style={sty.divider} />
      <div style={sty.sectionTitle}>SAVED RUNG OUTPUTS</div>
      <div style={{ ...sty.section, maxHeight: 300, overflow: 'auto' }}>
        {records.length === 0 ? (
          <div style={{ color: 'var(--text-dim)', fontSize: 11, lineHeight: 1.6 }}>
            No saved RUNG outputs. Use the <strong style={{ color: 'var(--green-bright)' }}>SEND</strong> tab to create and fund a Ladder Script output first. After broadcasting, the output and its signing keys will appear here.
          </div>
        ) : records.map((rec, i) => {
          const isSelected = selectedRecord && selectedRecord.txid === rec.txid;
          const scheme = rec.scheme || 'SCHNORR';
          const isPQ = scheme !== 'SCHNORR' && scheme !== 'ECDSA';
          return (
            <div key={rec.txid + '-' + i} onClick={() => selectRecord(rec)} style={{
              padding: '10px 14px', marginBottom: 6, cursor: 'pointer', border: '1px solid',
              borderColor: isSelected ? 'var(--cyan)' : 'var(--border)',
              background: isSelected ? 'rgba(0,212,255,0.05)' : 'var(--bg-primary)',
              transition: 'all 0.15s', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8,
            }}>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--amber)', marginBottom: 2 }}>
                  {rec.txid.substring(0, 16)}...{rec.txid.substring(rec.txid.length - 8)}
                </div>
                <div style={{ display: 'flex', gap: 12, fontSize: 10, color: 'var(--text-dim)' }}>
                  <span style={{ color: isPQ ? 'var(--cyan)' : 'var(--text-secondary)' }}>{scheme}</span>
                  <span style={{ color: 'var(--green-bright)' }}>{formatSats(rec.amount)}</span>
                  <span>{new Date(rec.timestamp).toLocaleString()}</span>
                  <span>{(rec.rungs || []).length} rung(s){(rec.rungs || []).filter(r => r.label).length > 0 ? ': ' + (rec.rungs || []).filter(r => r.label).map(r => r.label).join(', ') : ''}</span>
                  <span>{(rec.conditionKeys || []).length} key(s)</span>
                </div>
              </div>
              <button style={{ ...sty.btn, ...sty.btnDanger, padding: '2px 8px', fontSize: 9, marginRight: 0 }} onClick={(e) => { e.stopPropagation(); handleClearRecord(rec.txid); }} title="Remove from saved records">DEL</button>
            </div>
          );
        })}
      </div>

      {/* MANUAL TXID LOOKUP */}
      <div style={sty.section}>
        <div style={sty.label}>MANUAL TXID LOOKUP</div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <input style={{ ...sty.input, flex: 1, marginBottom: 0 }} placeholder="64-hex txid of RUNG output" value={lookupTxid} onChange={e => setLookupTxid(e.target.value)} />
          <input style={{ ...sty.input, width: 60, marginBottom: 0, textAlign: 'center' }} type="number" placeholder="vout" value={lookupVout} onChange={e => setLookupVout(parseInt(e.target.value) || 0)} min={0} />
          <button style={{ ...sty.btn, ...sty.btnCyan, whiteSpace: 'nowrap' }} onClick={handleLookupTxid} disabled={!online}>LOAD</button>
        </div>
        <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 4 }}>If the TXID exists in saved records, keys will be auto-loaded. Otherwise you can enter keys manually.</div>
      </div>

      {/* SELECTED OUTPUT --SPEND PANEL */}
      {selectedRecord && (<>
        <div style={sty.divider} />
        <div style={sty.sectionTitle}>SPEND: {selectedRecord.txid.substring(0, 20)}...</div>

        {/* Output (vout) Selector --show when record has rungs with different vouts */}
        {(() => {
          const allRungs = selectedRecord.rungs || [];
          const uniqueVouts = [...new Set(allRungs.map(r => r.vout).filter(v => v !== null && v !== undefined))].sort((a, b) => a - b);
          const activeVout = selectedVout !== null ? selectedVout : (selectedRecord.vout || 0);
          if (uniqueVouts.length > 1) {
            return (
              <div style={{ ...sty.section, borderColor: 'var(--amber-dim)', background: 'var(--amber-glow)' }}>
                <div style={sty.label}>SELECT OUTPUT TO SPEND</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {uniqueVouts.map(v => {
                    const vRungs = allRungs.filter(r => r.vout === v);
                    const labels = vRungs.map(r => r.label).filter(Boolean).join(', ');
                    const isActive = v === activeVout;
                    return (
                      <button key={v} onClick={() => { setSelectedVout(v); setSelectedRungIdx(0); }} style={{
                        ...sty.btn, padding: '6px 14px',
                        color: isActive ? 'var(--amber)' : 'var(--text-secondary)',
                        background: isActive ? 'var(--amber-glow)' : 'var(--bg-primary)',
                        borderColor: isActive ? 'var(--amber)' : 'var(--border)',
                        marginRight: 0,
                      }}>
                        vout {v}{labels ? ' --' + labels : ''} ({vRungs.length} condition{vRungs.length > 1 ? 's' : ''})
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          }
          return null;
        })()}

        {/* Conditions + Rung Selector */}
        {(() => {
          const vout = selectedVout !== null ? selectedVout : (selectedRecord.vout || 0);
          const allRungs = selectedRecord.rungs || [];
          const voutRungs = allRungs.filter(r => r.vout === vout);
          const hasMultipleConditions = voutRungs.length > 1;
          return (<>
            {hasMultipleConditions && (
              <div style={{ ...sty.section, borderColor: 'var(--cyan)', background: 'rgba(0,212,255,0.04)' }}>
                <div style={sty.label}>SELECT CONDITION PATH</div>
                <div style={{ fontSize: 10, color: 'var(--text-secondary)', marginBottom: 8 }}>
                  This output has {voutRungs.length} spending conditions (OR paths). Choose which one to satisfy:
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {voutRungs.map((rung, ri) => {
                    const isActive = ri === selectedRungIdx;
                    return (
                      <div key={ri} onClick={() => setSelectedRungIdx(ri)} style={{
                        padding: '8px 12px', cursor: 'pointer', border: '1px solid',
                        borderColor: isActive ? 'var(--cyan)' : 'var(--border)',
                        background: isActive ? 'rgba(0,212,255,0.08)' : 'var(--bg-primary)',
                        transition: 'all 0.15s', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                      }}>
                        <div>
                          <span style={{ fontSize: 10, fontWeight: 700, color: isActive ? 'var(--cyan)' : 'var(--text-dim)', marginRight: 8 }}>
                            {isActive ? '\u25B6' : '\u25CB'} CONDITION {ri}
                          </span>
                          {rung.label && <span style={{ fontSize: 10, color: 'var(--amber)', fontWeight: 600 }}>{rung.label}</span>}
                        </div>
                        <span style={{ fontSize: 9, fontFamily: 'var(--font-mono)', color: 'var(--text-dim)' }}>
                          {(rung.blocks || []).map(b => b.type).join(' + ')}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            <div style={sty.section}>
              <div style={sty.label}>CONDITIONS</div>
              {allRungs.length > 0 ? (
                allRungs.map((rung, ri) => {
                  const isTarget = hasMultipleConditions
                    ? (voutRungs.indexOf(rung) === selectedRungIdx)
                    : (ri === 0);
                  return (
                    <div key={ri} style={{
                      marginBottom: 8, padding: '8px 10px',
                      background: isTarget ? 'rgba(0,212,255,0.05)' : 'var(--bg-primary)',
                      border: '1px solid',
                      borderColor: isTarget ? 'var(--cyan)' : 'var(--border)',
                      opacity: (hasMultipleConditions && rung.vout === vout && !isTarget) ? 0.4 : 1,
                    }}>
                      <div style={{ fontSize: 10, fontWeight: 600, color: isTarget ? 'var(--cyan)' : 'var(--amber)', letterSpacing: 1, marginBottom: 4, display: 'flex', justifyContent: 'space-between' }}>
                        <span>RUNG {ri}{rung.label ? ': ' + rung.label : ''}</span>
                        {isTarget && <span style={{ fontSize: 9, color: 'var(--cyan)', fontWeight: 400 }}>SPENDING THIS</span>}
                      </div>
                      {(rung.blocks || []).map((b, bi) => (
                        <div key={bi} style={{ display: 'flex', gap: 8, alignItems: 'center', fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', padding: '2px 0' }}>
                          <span style={{ fontSize: 9, fontWeight: 600, color: 'var(--white)', background: 'var(--bg-tertiary)', padding: '1px 6px', letterSpacing: 0.5 }}>{b.type}</span>
                          {Object.entries(b.values || {}).filter(([k, v]) => v && k !== 'scheme').map(([k, v]) => (
                            <span key={k}><span style={{ color: 'var(--text-dim)' }}>{k}:</span> {typeof v === 'string' && v.length > 24 ? v.substring(0, 10) + '...' + v.substring(v.length - 6) : String(v)}</span>
                          ))}
                        </div>
                      ))}
                    </div>
                  );
                })
              ) : (
                <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>No condition data stored. The proxy will decode the UTXO on spend.</div>
              )}
            </div>
          </>);
        })()}

        {/* Signing keys */}
        <div style={sty.section}>
          <div style={sty.label}>SIGNING KEYS</div>
          {selectedRecord.conditionKeys && selectedRecord.conditionKeys.length > 0 ? (
            selectedRecord.conditionKeys.map((kp, i) => (
              <div key={i} style={{ padding: '6px 10px', marginBottom: 4, background: 'var(--bg-primary)', border: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>KEY {i + 1} --{kp.scheme || selectedRecord.scheme || 'SCHNORR'}</div>
                  <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={kp.pubkey}>
                    PUB: {kp.pubkey ? kp.pubkey.substring(0, 24) + '...' : '(none)'}
                  </div>
                  <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--green-bright)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={kp.privkey}>
                    PRIV: {kp.privkey ? kp.privkey.substring(0, 20) + '...' : '(none)'}
                  </div>
                </div>
                <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9, marginRight: 0, ...(copiedKey === 'key-'+i ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(kp.privkey, 'key-'+i)}>{copiedKey === 'key-'+i ? '✓' : 'COPY'}</button>
              </div>
            ))
          ) : (
            <div style={{ fontSize: 10, color: 'var(--amber)' }}>No stored keys. This output cannot be spent without the signing keys.</div>
          )}
        </div>

        {/* Destination */}
        <div style={sty.section}>
          <div style={sty.label}>DESTINATION ADDRESS</div>
          <input style={sty.input} placeholder="Leave blank to auto-generate a new wallet address" value={destAddress} onChange={e => setDestAddress(e.target.value)} />
          <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>The spent funds will be sent to this address. If left blank, a new wallet address is generated automatically.</div>
        </div>

        {/* SPEND BUTTON */}
        <div style={{ ...sty.section, padding: '16px 20px', textAlign: 'center' }}>
          <button style={{
            padding: '12px 32px', fontSize: 14, fontFamily: 'var(--font-mono)', fontWeight: 700, letterSpacing: 1,
            cursor: spending ? 'wait' : 'pointer', border: '2px solid',
            borderColor: spending ? 'var(--border)' : 'var(--cyan)',
            color: spending ? 'var(--text-dim)' : 'var(--cyan)',
            background: spending ? 'var(--bg-tertiary)' : 'rgba(0,212,255,0.08)',
            transition: 'all 0.2s', width: '100%',
          }} onClick={handleSpend} disabled={spending || !online || !selectedRecord.conditionKeys?.length}>
            {spending ? 'SPENDING...' : 'SIGN & SPEND'}
          </button>
          {!selectedRecord.conditionKeys?.length && (
            <div style={{ marginTop: 8, fontSize: 10, color: 'var(--amber)' }}>Cannot spend --no signing keys available for this output.</div>
          )}
        </div>

        {/* LOG */}
        {spendLog.length > 0 && (
          <div style={{ ...sty.section, maxHeight: 260, overflow: 'auto', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
            <div style={sty.label}>SPEND LOG</div>
            {spendLog.map((entry, i) => (
              <div key={i} style={{
                padding: '3px 0', borderBottom: '1px solid var(--border)',
                color: entry.cls === 'ok' ? 'var(--green-bright)' : entry.cls === 'err' ? 'var(--red-bright)' : 'var(--text-secondary)',
              }}>
                <span style={{ color: 'var(--text-dim)', fontSize: 9, marginRight: 8 }}>{entry.time}</span>
                {entry.msg}
              </div>
            ))}
          </div>
        )}

        {/* RESULT */}
        {spendResult && (
          <div style={{ ...sty.section, borderColor: 'var(--green)', background: 'var(--green-dim)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ color: 'var(--green-bright)', fontSize: 18 }}>&#x2713;</span>
                <span style={{ color: 'var(--green-bright)', fontSize: 13, fontWeight: 700, letterSpacing: 1 }}>SPEND CONFIRMED</span>
              </div>
              <div style={{ display: 'flex', gap: 4 }}>
                <button style={{ ...sty.btn, ...sty.btnCyan, padding: '3px 10px', fontSize: 9 }} onClick={async () => {
                  const data = await apiCall('/api/ladder/tx/' + spendResult.txid, undefined, true);
                  if (data) setSpendTxJson(data);
                }}>{spendTxJson ? 'REFRESH' : 'VIEW JSON'}</button>
                {spendTxJson && <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 10px', fontSize: 9, marginRight: 0, ...(copiedKey === 'spend-json' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(JSON.stringify(spendTxJson, null, 2), 'spend-json')}>{copiedKey === 'spend-json' ? '✓ COPIED' : 'COPY JSON'}</button>}
              </div>
            </div>
            <div style={{ display: 'grid', gap: 6 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>TXID</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--amber)', wordBreak: 'break-all' }}>{spendResult.txid}</div>
                </div>
                <button style={{ ...sty.btn, ...sty.btnDefault, padding: '3px 8px', fontSize: 9, marginRight: 0, ...(copiedKey === 'spend-txid' ? { color: 'var(--green-bright)', borderColor: 'var(--green-bright)' } : {}) }} onClick={() => copyWithFeedback(spendResult.txid, 'spend-txid')}>{copiedKey === 'spend-txid' ? '✓ COPIED' : 'COPY'}</button>
              </div>
              <div style={{ display: 'flex', gap: 24, fontSize: 11 }}>
                <div><span style={{ color: 'var(--text-dim)' }}>Amount: </span><span style={{ color: 'var(--green-bright)' }}>{spendResult.amount.toLocaleString()} sats</span></div>
                <div><span style={{ color: 'var(--text-dim)' }}>Scheme: </span><span style={{ color: 'var(--cyan)' }}>{spendResult.scheme}</span></div>
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-dim)' }}>Destination: <span style={{ color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)' }}>{spendResult.destAddress}</span></div>
            </div>
            {spendTxJson && (
              <pre style={{ marginTop: 10, padding: '10px 12px', background: 'var(--bg-primary)', border: '1px solid var(--border)', fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', overflow: 'auto', maxHeight: 400, whiteSpace: 'pre-wrap', wordBreak: 'break-all', lineHeight: 1.5 }}>{JSON.stringify(spendTxJson, null, 2)}</pre>
            )}
          </div>
        )}
      </>)}

      {/* ERROR */}
      {error && (
        <div style={{ ...sty.section, borderColor: 'var(--red)', background: 'var(--red-dim)', position: 'sticky', bottom: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ color: 'var(--red-bright)', fontSize: 11 }}>{error}</div>
            <button style={{ ...sty.btn, ...sty.btnDefault, padding: '2px 8px', fontSize: 9, marginRight: 0 }} onClick={() => setError(null)}>DISMISS</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// REVIEW PANEL
// ═══════════════════════════════════════════════════════════════

function ReviewPanel() {
  const [sessionLog, setSessionLog] = useState(() => loadSessionLog());
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [copiedKey, setCopiedKey] = useState(null);

  const refresh = () => setSessionLog(loadSessionLog());

  const copyWithFeedback = (text, key) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopiedKey(key);
      setTimeout(() => setCopiedKey(null), 1500);
    });
  };

  const selected = selectedIdx !== null ? sessionLog[selectedIdx] : null;
  const fundStr = selected?.fundJson ? JSON.stringify(selected.fundJson, null, 2) : null;
  const spendStr = selected?.spendJson ? JSON.stringify(selected.spendJson, null, 2) : null;
  const hasBoth = !!(fundStr && spendStr);

  const timeAgo = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  };

  const badgeStyle = (present) => ({
    fontSize: 8, padding: '1px 5px', letterSpacing: 1, fontWeight: 700, borderRadius: 2,
    background: present ? 'var(--green-dim)' : 'var(--bg-tertiary)',
    color: present ? 'var(--green-bright)' : 'var(--text-dim)',
    border: '1px solid ' + (present ? 'var(--green)' : 'var(--border)'),
  });

  return (
    <div style={{ display: 'flex', flex: 1, minHeight: 0, gap: 0 }}>
      {/* TX List Sidebar */}
      <div style={{ width: 260, minWidth: 260, borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', background: 'var(--bg-secondary)' }}>
        <div style={{ padding: '10px 12px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1.2, color: 'var(--amber)', textTransform: 'uppercase' }}>Session Transactions</span>
          <div style={{ display: 'flex', gap: 4 }}>
            <button onClick={refresh} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-dim)', cursor: 'pointer', fontSize: 9, padding: '2px 6px', letterSpacing: 0.5 }}>REFRESH</button>
            <button onClick={() => { clearSessionLog(); setSessionLog([]); setSelectedIdx(null); }} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--red)', cursor: 'pointer', fontSize: 9, padding: '2px 6px', letterSpacing: 0.5 }}>CLEAR</button>
          </div>
        </div>
        <div style={{ flex: 1, overflow: 'auto' }}>
          {sessionLog.length === 0 ? (
            <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-dim)', fontSize: 11 }}>
              No transactions yet.<br/><br/>
              <span style={{ fontSize: 10 }}>Use the SEND tab to fund outputs, then SPEND to spend them. Both JSONs will appear here side by side.</span>
            </div>
          ) : sessionLog.map((tx, i) => (
            <div key={i}
              onClick={() => setSelectedIdx(i)}
              style={{
                padding: '8px 12px', cursor: 'pointer', borderBottom: '1px solid var(--border)',
                background: selectedIdx === i ? 'var(--bg-primary)' : 'transparent',
                borderLeft: selectedIdx === i ? '2px solid var(--amber)' : '2px solid transparent',
              }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 3 }}>
                <span style={badgeStyle(!!tx.fundJson)}>FUND</span>
                <span style={badgeStyle(!!tx.spendJson)}>SPEND</span>
                <span style={{ fontSize: 9, color: 'var(--text-dim)', marginLeft: 'auto' }}>{timeAgo(tx.timestamp)}</span>
              </div>
              <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {(tx.fundTxid || '').substring(0, 24)}...
