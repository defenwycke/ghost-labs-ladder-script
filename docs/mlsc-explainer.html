<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLSC Transaction Lifecycle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --nblue:#00d4ff;--ngreen:#00ff88;--npurple:#b366ff;--norange:#ff8800;
  --npink:#ff4488;--nyellow:#ffdd00;--nred:#ff2244;--ncyan:#00ffcc;
}
body{background:#000;color:#fff;font-family:var(--sans);min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.94);backdrop-filter:blur(10px);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;height:46px;padding:0 1rem;gap:.75rem}
.logo{font-family:var(--mono);font-size:.78rem;font-weight:700;color:#444;letter-spacing:.1em;white-space:nowrap}
.logo b{color:var(--nblue)}
.act-tabs{display:flex;gap:1px}
.act-tab{padding:.3rem .7rem;font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:none;background:none;color:#444;cursor:pointer;transition:.15s;white-space:nowrap}
.act-tab:hover{color:#888}
.act-tab.on{color:var(--nblue)}
.act-tab[data-a="1"].on{color:var(--ngreen)}
.act-tab[data-a="2"].on{color:var(--norange)}
.progress{flex:1;height:2px;background:#111;border-radius:1px;margin:0 .5rem;position:relative}
.progress-fill{height:100%;border-radius:1px;transition:width .3s;background:var(--nblue)}
.nr{margin-left:auto;display:flex;align-items:center;gap:.4rem}
.nr button{width:28px;height:28px;border-radius:5px;border:1px solid #222;background:transparent;color:#fff;font-family:var(--mono);font-size:.85rem;cursor:pointer;transition:.12s}
.nr button:hover{border-color:#444;background:#111}
.nr button:disabled{opacity:.12;cursor:default}
.nr .ct{font-family:var(--mono);font-size:.6rem;color:#444;min-width:48px;text-align:center}

/* MAIN */
.main{max-width:880px;margin:0 auto;padding:1.75rem 1.5rem 3rem}
.scene{display:none;animation:fin .4s ease}.scene.on{display:block}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

/* TITLES */
.act-label{font-family:var(--mono);font-size:.66rem;color:#333;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.25rem}
.title{font-family:var(--mono);font-size:1.14rem;font-weight:700;color:#fff;margin-bottom:.15rem}
.sub{font-family:var(--mono);font-size:.74rem;color:#555;margin-bottom:1.5rem;letter-spacing:.03em}

/* ENGINE-STYLE LADDER */
.eng-ladder{margin:1rem 0;font-family:var(--mono)}
.eng-rung{display:flex;align-items:center;margin-bottom:6px;min-height:52px;position:relative}
.eng-rail{width:3px;height:52px;flex-shrink:0}
.eng-rail-l{background:#333}
.eng-rail-r{background:#333}
.eng-wire{flex:1;height:2px;background:#2a2a2a}
.eng-wire.hot{background:var(--norange);box-shadow:0 0 4px rgba(255,136,0,.3)}
.eng-contact{display:flex;align-items:center;flex-shrink:0;height:40px;cursor:default}
.eng-bracket{font-size:15px;color:#444;line-height:40px;user-select:none}
.eng-contact.hot .eng-bracket{color:var(--norange)}
.eng-body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:80px;height:38px;padding:0 8px;background:#0d0d0d;border:1px solid #222;border-top-width:2px;transition:.2s}
.eng-body .eng-type{font-size:11px;font-weight:600;color:#888;letter-spacing:.5px}
.eng-body .eng-val{font-size:9px;color:#555;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
.eng-contact.hot .eng-body{background:#1a1200;border-color:#ff880040;box-shadow:inset 0 0 12px rgba(255,136,0,.06)}
.eng-contact.hot .eng-type{color:var(--norange)}
.eng-contact.hot .eng-val{color:#bb6600}
.eng-coil{display:flex;align-items:center;height:40px;flex-shrink:0;gap:2px;cursor:default}
.eng-coil-sym{font-size:14px;color:#444}
.eng-coil.hot .eng-coil-sym{color:var(--norange);text-shadow:0 0 6px rgba(255,136,0,.3)}
.eng-coil-name{font-size:9px;color:#555;font-weight:600}
.eng-coil.hot .eng-coil-name{color:var(--norange)}
.eng-rung-num{position:absolute;left:-36px;font-size:10px;color:#333;letter-spacing:1px;text-align:right;width:30px}
.eng-or{text-align:center;font-size:10px;color:#333;padding:2px 0;letter-spacing:2px}

/* LEGACY LADDER VIS (simple) */
.ladder{position:relative;padding:1.5rem 0 1rem 80px}
.ladder-rail{position:absolute;left:36px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--nblue),var(--npurple),var(--ngreen))}
.rung-vis{position:relative;margin-bottom:1.5rem;padding-left:1.5rem}
.rung-vis::before{content:'';position:absolute;left:-44px;top:18px;width:44px;height:2px}
.rung-vis.r0::before{background:var(--nblue)}
.rung-vis.r1::before{background:var(--npurple)}
.rung-vis .rung-label{font-family:var(--mono);font-size:.84rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.rung-vis.r0 .rung-label{color:var(--nblue)}
.rung-vis.r1 .rung-label{color:var(--npurple)}
.or-badge{font-family:var(--mono);font-size:.66rem;color:#555;border:1px solid #333;padding:1px 6px;border-radius:3px;margin-left:auto}
.block-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .7rem;border-radius:5px;font-family:var(--mono);font-size:.84rem;font-weight:600;margin-right:.4rem;margin-bottom:.3rem}
.block-chip.sig{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);color:var(--nblue)}
.block-chip.csv{background:rgba(179,102,255,.06);border:1px solid rgba(179,102,255,.2);color:var(--npurple)}
.block-chip.coil{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);color:var(--ngreen)}
.and-pill{font-size:.6rem;color:#555;padding:0 .3rem}
.coil-vis{position:relative;margin-top:1rem;padding-left:1.5rem}
.coil-vis::before{content:'';position:absolute;left:-44px;top:14px;width:44px;height:2px;background:var(--ngreen)}

/* CARD */
.card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:1rem;margin-bottom:.75rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.card.blue::before{background:var(--nblue)}.card.purple::before{background:var(--npurple)}.card.green::before{background:var(--ngreen)}.card.orange::before{background:var(--norange)}.card.pink::before{background:var(--npink)}
.card-t{font-family:var(--mono);font-size:.9rem;font-weight:600;color:#fff;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.badge{font-size:.66rem;padding:2px 6px;border-radius:3px;font-weight:500}

/* FIELD SLOT */
.fs{display:flex;align-items:stretch;margin-bottom:2px;border-radius:3px;overflow:hidden;min-height:44px}
.fs-l{width:110px;flex-shrink:0;padding:.5rem .6rem;font-family:var(--mono);font-size:.74rem;font-weight:600;display:flex;align-items:center}
.fs-m{flex:1;padding:.5rem .7rem;background:#080808;font-family:var(--mono);font-size:.78rem;display:flex;flex-direction:column;justify-content:center;gap:.15rem}
.fs-r{width:160px;flex-shrink:0;padding:.5rem .6rem;font-family:var(--mono);font-size:.67rem;display:flex;align-items:center;gap:.25rem;border-left:1px solid #1a1a1a}
.fs .hex{color:var(--npurple);word-break:break-all}
.fs .note{color:#444;font-size:.67rem}
.fs .arrow{color:var(--ngreen);font-size:.85rem}
.fs .action{color:var(--ncyan);line-height:1.3}

/* CONSTRAINT */
.cst{display:inline-block;font-family:var(--mono);font-size:.6rem;padding:1px 5px;border-radius:2px;margin-left:.3rem}
.cst.ok{background:rgba(0,255,136,.06);color:var(--ngreen);border:1px solid rgba(0,255,136,.15)}
.cst.no{background:rgba(255,34,68,.06);color:var(--nred);border:1px solid rgba(255,34,68,.15)}

/* SERIAL VIEW */
.sv{background:#050505;border:1px solid #1a1a1a;border-radius:5px;padding:.8rem .9rem;margin:.5rem 0;font-family:var(--mono);font-size:.82rem;line-height:2}
.sv .lbl{font-size:.66rem;color:#333;display:block;margin-bottom:.2rem;letter-spacing:.04em;text-transform:uppercase}
.b{display:inline-block;padding:1px 3px;border-radius:2px;margin:1px}
.b.s{background:rgba(0,212,255,.05);color:var(--nblue)}
.b.v{background:rgba(0,255,136,.05);color:var(--ngreen)}
.b.k{background:rgba(255,68,136,.05);color:var(--npink)}
.b.d{color:#333}
.bn{color:#333;font-size:.66rem;margin-left:.2rem}

/* HASH ARROW */
.ha{text-align:center;padding:.5rem 0}
.ha .fn{font-family:var(--mono);font-size:.72rem;color:#333}
.ha .ar{font-size:1.6rem;color:var(--npurple);text-shadow:0 0 10px var(--npurple)}

/* LEAF */
.leaf{background:#0a0a0a;border-radius:7px;padding:.9rem 1rem;margin:.5rem 0;position:relative}
.leaf::before{content:'';position:absolute;inset:0;border-radius:7px;padding:1px;background:linear-gradient(135deg,var(--ngreen),var(--nblue),var(--npurple));-webkit-mask:linear-gradient(#fff 0 0)content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.leaf .n{font-family:var(--mono);font-size:.78rem;color:var(--ngreen);font-weight:600;margin-bottom:.15rem}
.leaf .h{font-family:var(--mono);font-size:1rem;color:#fff;font-weight:700;text-shadow:0 0 15px rgba(0,255,136,.15)}
.leaf .g{font-family:var(--mono);font-size:.7rem;color:var(--npurple);margin-top:.3rem;opacity:.75}

/* TREE SVG */
.tree{padding:1.5rem 0;text-align:center}
.tree svg{width:100%;max-width:700px}
.tree svg text{font-family:'JetBrains Mono',monospace}

/* OUTPUT */
.out{text-align:center;padding:1.75rem;margin:.75rem 0;border:1px solid var(--ngreen);border-radius:8px;background:rgba(0,255,136,.015);box-shadow:0 0 30px rgba(0,255,136,.03)}
.out .pre{font-family:var(--mono);font-size:.6rem;color:#444;margin-bottom:.3rem}
.out .val{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--ngreen);text-shadow:0 0 15px rgba(0,255,136,.25);margin-bottom:.3rem}
.out .sz{font-family:var(--mono);font-size:.65rem;color:#444}
.out .msg{margin-top:.75rem;font-size:.96rem;line-height:1.6;color:#ccc}
.out .msg strong{color:var(--nyellow)}

/* CHECK */
.chk{display:flex;align-items:center;gap:.4rem;padding:.2rem 0;font-family:var(--mono);font-size:.72rem}
.chk.ok{color:var(--ngreen)}.chk.no{color:var(--nred)}
.chk .ic{width:13px;height:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700;flex-shrink:0}
.chk.ok .ic{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2)}
.chk.no .ic{background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.2)}

/* CALLOUT */
.co{border-left:2px solid var(--norange);background:rgba(255,136,0,.02);padding:.7rem .9rem;margin:.5rem 0;font-size:.86rem;color:var(--norange);line-height:1.5;font-family:var(--mono)}

/* STAGE */
.stg{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:1rem;margin-bottom:.6rem}
.stg-h{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.stg-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.6rem;font-weight:700;flex-shrink:0}
.stg-t{font-family:var(--mono);font-size:.86rem;font-weight:600;color:#fff}

/* DESC */
.desc{font-size:.94rem;line-height:1.6;color:#aaa;margin-bottom:.75rem}
.desc code{font-family:var(--mono);font-size:.82rem;color:var(--ncyan);background:rgba(0,255,204,.04);padding:1px 4px;border-radius:2px}
.desc strong{color:#fff}

/* RESULT */
.result{text-align:center;padding:1.5rem;border-radius:8px;margin:.75rem 0;border:1px solid var(--ngreen);background:rgba(0,255,136,.015);box-shadow:0 0 30px rgba(0,255,136,.04)}
.result h3{font-family:var(--mono);font-size:1.2rem;color:var(--ngreen);text-shadow:0 0 12px rgba(0,255,136,.25);margin-bottom:.3rem}
.result p{color:#ccc;font-size:.9rem}
.result .dim{color:#444;font-size:.78rem;margin-top:.25rem}

/* UTXO/BLOCKCHAIN */
.where-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:.75rem 0}
.where-box{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:1rem;text-align:center}
.where-box .wt{font-family:var(--mono);font-size:.74rem;color:#444;margin-bottom:.3rem;letter-spacing:.06em;text-transform:uppercase}
.where-box .wv{font-family:var(--mono);font-size:1rem;font-weight:600;margin-bottom:.2rem}
.where-box .ws{font-family:var(--mono);font-size:.72rem;color:#444}

@media(max-width:700px){.fs-r{display:none}.fs-l{width:80px}.where-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="logo"><b>Ladder</b> Script</div>
  <div class="act-tabs" id="atabs"></div>
  <div class="progress"><div class="progress-fill" id="pbar"></div></div>
  <div class="nr">
    <button id="pb" onclick="prev()">&#8592;</button>
    <span class="ct" id="ct"></span>
    <button id="nb" onclick="next()">&#8594;</button>
  </div>
</nav>

<div class="main" id="root"></div>

<script>
const S = [

// === ACT 0: THE LADDER ===

{act:0,t:"WHAT IS A LADDER?",s:"Rungs · Blocks · OR / AND logic",h:`
<div class="desc">A <strong>Ladder Script</strong> transaction locks funds behind a <strong>ladder</strong> of spending conditions. The ladder has <strong>rungs</strong> — each rung is an independent spending path. Within each rung are <strong>blocks</strong> — each block is a single condition (signature, timelock, hash lock, etc).</div>
<div class="card blue">
<div class="card-t">Logic Rules</div>
<div class="desc" style="margin-bottom:0">
<strong style="color:var(--nblue)">Between rungs: OR</strong> — any one rung can spend the output.<br>
<strong style="color:var(--npurple)">Within a rung: AND</strong> — every block in the rung must be satisfied.<br>
<strong style="color:var(--ngreen)">Coil</strong> — output metadata (unlock type, attestation mode). Always revealed at spend time.
</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">The spender reveals only the rung they use. All other rungs stay hidden behind SHA-256 proof hashes — permanently concealed.</div>
`},

{act:0,t:"THE QUANTUM VAULT",s:"Rung 0 (Schnorr) · Rung 1 (FALCON512 + CSV) · Coil",h:`
<div class="desc">This is how the vault looks in the <strong>Ladder Script Engine</strong> — blocks sit on rungs between power rails, wired in series. The coil at the end fires when all blocks on a rung are satisfied.</div>

<div class="eng-ladder">
  <div style="font-family:var(--mono);font-size:11px;color:#444;margin-bottom:8px;letter-spacing:1px">RUNG 0 — PRIMARY</div>
  <div class="eng-rung">
    <div class="eng-rail eng-rail-l"></div>
    <div class="eng-wire"></div>
    <div class="eng-contact">
      <span class="eng-bracket">─┤</span>
      <div class="eng-body" style="border-top-color:var(--nblue)">
        <span class="eng-type" style="color:var(--nblue)">SIG</span>
        <span class="eng-val">Schnorr · key A</span>
      </div>
      <span class="eng-bracket">├─</span>
    </div>
    <div class="eng-wire"></div>
    <div class="eng-coil"><span class="eng-coil-sym">( )</span><span class="eng-coil-name">UNLOCK</span></div>
    <div class="eng-wire" style="width:8px"></div>
    <div class="eng-rail eng-rail-r"></div>
  </div>

  <div class="eng-or">OR</div>

  <div style="font-family:var(--mono);font-size:11px;color:#444;margin-bottom:8px;letter-spacing:1px">RUNG 1 — RECOVERY</div>
  <div class="eng-rung">
    <div class="eng-rail eng-rail-l"></div>
    <div class="eng-wire"></div>
    <div class="eng-contact">
      <span class="eng-bracket">─┤</span>
      <div class="eng-body" style="border-top-color:var(--npurple)">
        <span class="eng-type" style="color:var(--npurple)">SIG</span>
        <span class="eng-val">FALCON512 · key D</span>
      </div>
      <span class="eng-bracket">├─</span>
    </div>
    <div class="eng-wire"></div>
    <div class="eng-contact">
      <span class="eng-bracket">─┤</span>
      <div class="eng-body" style="border-top-color:var(--npurple)">
        <span class="eng-type" style="color:var(--npurple)">CSV</span>
        <span class="eng-val">1008 blocks</span>
      </div>
      <span class="eng-bracket">├─</span>
    </div>
    <div class="eng-wire"></div>
    <div class="eng-coil"><span class="eng-coil-sym">( )</span><span class="eng-coil-name">UNLOCK</span></div>
    <div class="eng-wire" style="width:8px"></div>
    <div class="eng-rail eng-rail-r"></div>
  </div>
</div>

<div class="desc" style="margin-top:1rem;font-size:.82rem;color:#555"><strong style="color:var(--nblue)">Rung 0:</strong> 1 block (SIG Schnorr) — everyday spending.<br><strong style="color:var(--npurple)">Rung 1:</strong> 2 blocks (SIG FALCON512 <strong style="color:#555">AND</strong> CSV 1008) — quantum-safe recovery after ~1 week.<br><strong style="color:var(--ngreen)">Coil:</strong> UNLOCK · INLINE · SCHNORR — always revealed at spend time.</div>
`},

{act:0,t:"THE CHALLENGE",s:"How do we commit to this structure without revealing it?",h:`
<div class="desc">The vault has 2 rungs, 3 blocks, a 33-byte Schnorr pubkey, a 897-byte FALCON512 pubkey, a CSV timelock, and a coil. All of this must be <strong>committed to on-chain</strong> so it can't be changed — but <strong>none of it should be visible</strong> until spent.</div>
<div class="desc">The answer: <strong>MLSC</strong> (Merkelised Ladder Script Conditions). Every rung becomes a <strong>leaf</strong> in a Merkle tree. The leaves are <strong>SHA-256 digests</strong> of the serialised data + pubkeys. Only the 32-byte <strong>root</strong> goes on-chain.</div>
<div class="desc">Let's trace every byte through this process.</div>
`},

// === ACT 1: CREATION ===

{act:1,t:"TRANSACTION SHELL",s:"createrungtx · version 4 · MLSC flag",h:`
<div class="desc">The user calls <code>createrungtx</code>. The system creates a <code>CMutableTransaction</code> with <strong>version = 4</strong> (RUNG_TX_VERSION). Inputs are outpoints to spend. Outputs specify conditions and amounts. The <code>mlsc: true</code> flag triggers Merkle output format.</div>
<div class="sv">
<span class="lbl">Transaction skeleton</span>
<span class="b s">version</span><span class="bn">= 4 (RUNG_TX_VERSION)</span><br>
<span class="b s">vin[]</span><span class="bn">input outpoints (txid + vout + sequence)</span><br>
<span class="b s">vout[]</span><span class="bn">each output: amount + conditions + mlsc:true</span><br>
<span class="b s">nLockTime</span><span class="bn">optional, default 0</span>
</div>
`},

{act:1,t:"RUNG 0 — BLOCK TYPE PARSING",s:'ParseBlockType("SIG") → 0x0001',h:`
<div class="desc">User specifies <code>{"type": "SIG"}</code>. The string is mapped to <code>RungBlockType::SIG</code> (0x0001).</div>
<div class="card blue">
<div class="card-t">Checks</div>
<div class="chk ok"><span class="ic">✓</span> ParseBlockType("SIG") → RungBlockType::SIG (0x0001)</div>
<div class="chk ok"><span class="ic">✓</span> IsKnownBlockType(0x0001) = true — one of 60 known types</div>
<div class="chk ok"><span class="ic">✓</span> No "inverted" flag — default false</div>
<div class="chk ok"><span class="ic">✓</span> IsKeyConsumingBlockType(SIG) = true — SIG consumes 1 pubkey</div>
<div class="chk ok"><span class="ic">✓</span> IsInvertibleBlockType(SIG) = false — key-consuming blocks can NEVER be inverted</div>
</div>
<div class="co">If user tried "inverted": true on SIG → rejected: "Block type SIG cannot be inverted." This prevents garbage-pubkey data embedding via inversion (fail → invert → SATISFIED).</div>
`},

{act:1,t:"RUNG 0 — PUBKEY INPUT",s:"33 bytes · compressed secp256k1 · prefix check",h:`
<div class="desc">User provides <code>{"type": "PUBKEY", "hex": "02a3f2..."}</code>. The raw public key enters the system.</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--npink)">PUBKEY</div>
  <div class="fs-m">
    <div class="hex">02a3f2c8...8d01b7e5</div>
    <div class="note">33 bytes · compressed secp256k1</div>
  </div>
</div>
<div class="card pink" style="margin-top:.5rem">
<div class="card-t">Validation — RungField::IsValid()</div>
<div class="chk ok"><span class="ic">✓</span> ParseDataType("PUBKEY") → RungDataType::PUBKEY (0x01)</div>
<div class="chk ok"><span class="ic">✓</span> FieldMinSize(PUBKEY) = 1, FieldMaxSize(PUBKEY) = 2048 — size 33 passes</div>
<div class="chk ok"><span class="ic">✓</span> Size == 33 → special check: data[0] must be 0x02 or 0x03 — prefix 0x02 passes</div>
</div>
`},

{act:1,t:"RUNG 0 — PUBKEY INTERCEPT",s:"merkle_pub_key · pubkey collected, NOT stored in conditions",h:`
<div class="desc">The PUBKEY field hits the <strong>intercept gate</strong>. Because <code>conditions_only = true</code> and field type is PUBKEY, the system does NOT add it to the block's fields. Instead, the raw pubkey bytes are collected into a separate vector.</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--npink)">PUBKEY</div>
  <div class="fs-m">
    <div class="hex">02a3f2c8...8d01b7e5</div>
    <div class="note">33 bytes</div>
  </div>
  <div class="fs-r">
    <span class="arrow">&#8594;</span>
    <span class="action">INTERCEPTED<br>→ rung_pubkeys[0]<br>NOT in block.fields</span>
  </div>
</div>
<div class="desc" style="margin-top:.75rem;font-size:.72rem;color:#555">The <code>continue</code> statement at rpc.cpp:369 skips adding this field to the block. The pubkey leaves the conditions structure entirely. It will be folded into the Merkle leaf hash later.</div>
<div class="co">Why? Because there is no PUBKEY_COMMIT field in conditions anymore. The Merkle tree IS the commitment. No writable 32-byte pubkey slot exists for an attacker to stuff arbitrary data into.</div>
`},

{act:1,t:"RUNG 0 — SCHEME INPUT",s:"1 byte · 6 valid values · stored in conditions",h:`
<div class="desc">User provides <code>{"type": "SCHEME", "hex": "01"}</code> (SCHNORR).</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--ncyan)">SCHEME</div>
  <div class="fs-m">
    <div class="hex">01</div>
    <div class="note">1 byte · SCHNORR</div>
  </div>
  <div class="fs-r">
    <span class="arrow">&#8594;</span>
    <span class="action">STORED<br>in block.fields</span>
  </div>
</div>
<div class="card green" style="margin-top:.5rem">
<div class="card-t">Validation</div>
<div class="chk ok"><span class="ic">✓</span> FieldMinSize(SCHEME) = 1, FieldMaxSize(SCHEME) = 1 — size 1 passes</div>
<div class="chk ok"><span class="ic">✓</span> IsKnownScheme(0x01) = true — SCHNORR is one of 6 known schemes</div>
<div class="chk ok"><span class="ic">✓</span> IsConditionDataType(SCHEME) = true — allowed in conditions</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem">Valid schemes: SCHNORR (0x01), ECDSA (0x02), FALCON512 (0x10), FALCON1024 (0x11), DILITHIUM3 (0x12), SPHINCS_SHA (0x13). Any other value → rejected.</div>
`},

{act:1,t:"PUBKEY_COMMIT REJECTION",s:"If someone tries to use PUBKEY_COMMIT...",h:`
<div class="desc">What happens if a user (or attacker via RPC) tries <code>{"type": "PUBKEY_COMMIT", "hex": "..."}</code>?</div>
<div class="card" style="border-color:rgba(255,34,68,.2)">
<div class="card-t" style="color:var(--nred)">Two rejection layers</div>
<div class="chk no"><span class="ic">✗</span> RPC layer: ParseDataType("PUBKEY_COMMIT") throws JSONRPCError — "PUBKEY_COMMIT is no longer a condition field"</div>
<div class="chk no"><span class="ic">✗</span> Consensus layer: IsConditionDataType(PUBKEY_COMMIT) returns false — deserialization rejects it</div>
</div>
<div class="desc" style="margin-top:.5rem;font-size:.72rem;color:#555">Even someone crafting a raw transaction and bypassing the RPC entirely cannot use PUBKEY_COMMIT — the consensus deserialization in <code>DeserializeMLSCProof</code> checks every field against <code>IsConditionDataType()</code> and rejects PUBKEY_COMMIT at the protocol level.</div>
`},

{act:1,t:"RUNG 1 — SIG FALCON512",s:"897-byte PQ public key · SCHEME 0x10",h:`
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;margin-bottom:2px">
  <div class="fs-l" style="color:var(--npink)">PUBKEY</div>
  <div class="fs-m">
    <div class="hex">d41a...f702</div>
    <div class="note">897 bytes · FALCON-512 <span class="cst ok">1 ≤ 897 ≤ 2048 ✓</span></div>
  </div>
  <div class="fs-r"><span class="arrow">&#8594;</span><span class="action">INTERCEPTED<br>→ rung_pubkeys[1]</span></div>
</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--ncyan)">SCHEME</div>
  <div class="fs-m">
    <div class="hex">10</div>
    <div class="note">FALCON512 <span class="cst ok">IsKnownScheme ✓</span></div>
  </div>
  <div class="fs-r"><span class="arrow">&#8594;</span><span class="action">STORED</span></div>
</div>
<div class="desc" style="margin-top:.5rem;font-size:.72rem;color:#555">Size 897 ≠ 33, so the compressed-key prefix check is skipped. FALCON512 keys have their own internal structure validation. The 897-byte key goes into rung_pubkeys[1] — not into conditions.</div>
`},

{act:1,t:"RUNG 1 — CSV BLOCK",s:"block type 0x0101 · NUMERIC 1008 · relative timelock",h:`
<div class="card purple">
<div class="card-t">Block Type</div>
<div class="chk ok"><span class="ic">✓</span> ParseBlockType("CSV") → RungBlockType::CSV (0x0101)</div>
<div class="chk ok"><span class="ic">✓</span> IsKnownBlockType(0x0101) = true</div>
<div class="chk ok"><span class="ic">✓</span> IsKeyConsumingBlockType(CSV) = false — CSV doesn't consume pubkeys</div>
<div class="chk ok"><span class="ic">✓</span> IsInvertibleBlockType(CSV) = true — timelocks CAN be inverted (useful for "spend before X")</div>
</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;margin-top:.5rem">
  <div class="fs-l" style="color:var(--nyellow)">NUMERIC</div>
  <div class="fs-m">
    <div class="hex">F0 03</div>
    <div class="note">2 bytes LE = 1008 blocks (~1 week) <span class="cst ok">1 ≤ 2 ≤ 4 ✓</span> <span class="cst ok">≤ 0xFFFFFFFF ✓</span></div>
  </div>
  <div class="fs-r"><span class="arrow">&#8594;</span><span class="action">STORED<br>varint on wire:<br>FD F0 03</span></div>
</div>
`},

<div class="fs" style="background:#080808;margin-bottom:2px">

</div>

</div>

{act:1,t:"CONDITIONS SUMMARY",s:"What survived · What's separate",h:`
<div class="desc">After all input processing, here's what we have:</div>
<div class="card blue">
<div class="card-t">Rung 0 conditions (SIG block)</div>
<div style="font-family:var(--mono);font-size:.65rem;color:#888;padding:.2rem 0">fields: [<span style="color:var(--ncyan)">{SCHEME, 0x01}</span>] — 1 field, 1 byte</div>
<div style="font-family:var(--mono);font-size:.65rem;color:var(--npink);padding:.2rem 0">pubkeys: [<span style="color:var(--npink)">33-byte compressed key</span>] — separate vector</div>
</div>
<div class="card purple">
<div class="card-t">Rung 1 conditions (SIG + CSV blocks)</div>
<div style="font-family:var(--mono);font-size:.65rem;color:#888;padding:.2rem 0">SIG fields: [<span style="color:var(--ncyan)">{SCHEME, 0x10}</span>] · CSV fields: [<span style="color:var(--nyellow)">{NUMERIC, 1008}</span>]</div>
<div style="font-family:var(--mono);font-size:.65rem;color:var(--npink);padding:.2rem 0">pubkeys: [<span style="color:var(--npink)">897-byte FALCON512 key</span>] — separate vector</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem">No PUBKEY_COMMIT anywhere. No raw pubkeys in conditions. The conditions contain only tiny typed values (SCHEME, NUMERIC). The pubkeys live in separate vectors, ready to be folded into Merkle leaves.</div>
`},

{act:1,t:"SERIALIZE RUNG 0",s:"SerializeRungBlocks → 4 bytes",h:`
<div class="desc"><code>SerializeRungBlocks(rung_0, CONDITIONS)</code> converts the structure to bytes. SIG has micro-header slot 0 and an implicit field layout — minimal encoding.</div>
<div class="sv">
<span class="lbl">Byte-by-byte output</span>
<span class="b s">01</span><span class="bn">WriteCompactSize(1) — n_blocks = 1</span><br>
<span class="b s">00</span><span class="bn">micro-header slot 0 → SIG (MICRO_HEADER_TABLE[0] = 0x0001)</span><br>
<span class="b v">01</span><span class="bn">SCHEME = SCHNORR — implicit field, fixed_size=1, no type byte, no length prefix</span><br>
<span class="b s">00</span><span class="bn">WriteCompactSize(0) — n_relay_refs = 0</span>
</div>
<div class="desc" style="font-size:.72rem;color:#555"><strong style="color:#fff">4 bytes total.</strong> The implicit layout (SIG_CONDITIONS = [{SCHEME, fixed 1}]) means no field count and no type bytes are needed. The micro-header compresses the 2-byte block type (0x0001) into 1 byte (0x00).</div>
`},

{act:1,t:"BUILD RUNG 0 LEAF",s:"4 bytes + 33-byte pubkey → SHA-256 → 32 bytes",h:`
<div class="desc"><code>ComputeRungLeaf(rung_0, rung_pubkeys[0])</code> — the serialised bytes and the raw pubkey are hashed together into a single leaf.</div>
<div class="sv">
<span class="lbl">Hash input: serialised blocks (4) + pubkey (33) = 37 bytes</span>
<span class="b s">01 00</span> <span class="b v">01</span> <span class="b s">00</span>
<span style="color:#333;margin:0 .2rem">‖</span>
<span class="b k">02 a3 f2 c8 ... 8d 01 b7 e5</span><span class="bn">← pubkey appended (merkle_pub_key)</span>
</div>
<div class="ha">
<div class="fn">SHA256( SHA256("LadderLeaf") ‖ SHA256("LadderLeaf") ‖ 37 bytes )</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">&#1..327; rung_leaf_0</div>
<div class="h">0x4a8c...b3d7</div>
<div class="g">The SCHEME byte and the 33-byte pubkey are the preimage. They are gone. Only this 32-byte SHA-256 digest exists. Nobody can extract the pubkey from this hash.</div>
</div>
`},

{act:1,t:"SERIALIZE RUNG 1",s:"SerializeRungBlocks → 8 bytes",h:`
<div class="sv">
<span class="lbl">Byte-by-byte output — 2 blocks (SIG + CSV)</span>
<span class="b s">02</span><span class="bn">n_blocks = 2</span><br>
<span class="b s">00</span><span class="bn">micro-header → SIG</span>
<span class="b v">10</span><span class="bn">SCHEME = FALCON512 (implicit, fixed 1 byte)</span><br>
<span class="b s">03</span><span class="bn">micro-header slot 3 → CSV</span>
<span class="b v">FD F0 03</span><span class="bn">NUMERIC = 1008 (CompactSize varint: 1008 > 252 → 0xFD + uint16 LE)</span><br>
<span class="b s">00</span><span class="bn">n_relay_refs = 0</span>
</div>
<div class="desc" style="font-size:.72rem;color:#555"><strong style="color:#fff">8 bytes.</strong> Two blocks, two micro-headers, two implicit field layouts. The entire recovery path — PQ signature + timelock — serializes to 8 bytes of conditions.</div>
`},

{act:1,t:"BUILD RUNG 1 LEAF",s:"8 bytes + 897-byte FALCON key → SHA-256 → 32 bytes",h:`
<div class="sv">
<span class="lbl">Hash input: rung bytes (8) + FALCON512 pubkey (897) = 905 bytes</span>
<span class="b s">02 00</span> <span class="b v">10</span> <span class="b s">03</span> <span class="b v">FD F0 03</span> <span class="b s">00</span>
<span style="color:#333;margin:0 .2rem">‖</span>
<span class="b k">d4 1a ... f7 02</span><span class="bn">← 897-byte FALCON-512 key appended</span>
</div>
<div class="ha">
<div class="fn">TaggedHash("LadderLeaf", 905 bytes)</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">&#1..327; rung_leaf_1</div>
<div class="h">0x91e5...20ac</div>
<div class="g">905 bytes — the FALCON512 key, the SCHEME, the CSV timelock — all compressed into 32 bytes. An observer cannot tell this was a post-quantum recovery path with a 1-week timelock.</div>
</div>
`},

{act:1,t:"SERIALIZE & BUILD COIL LEAF",s:"5 bytes → SHA-256 → 32 bytes · no pubkeys",h:`
<div class="sv">
<span class="lbl">SerializeCoilData → 5 bytes</span>
<span class="b v">01</span><span class="bn">UNLOCK</span>
<span class="b v">01</span><span class="bn">INLINE</span>
<span class="b v">01</span><span class="bn">SCHNORR</span>
<span class="b s">00</span><span class="bn">addr_len = 0</span>
<span class="b s">00</span><span class="bn">n_conditions = 0</span>
</div>
<div class="ha">
<div class="fn">TaggedHash("LadderLeaf", 5 bytes) — no pubkeys appended to coil</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">&#1..327; coil_leaf</div>
<div class="h">0xf7c2...8891</div>
</div>
`},

{act:1,t:"ASSEMBLE LEAVES",s:"3 leaves · ordered: rungs, then coil",h:`
<div class="desc"><code>ComputeConditionsRoot()</code> collects leaves in fixed order: <strong>rung leaves</strong> (index 0, 1, ...) then <strong>relay leaves</strong> (none here) then <strong>coil leaf</strong> (always last).</div>
<div style="display:flex;gap:.5rem;margin:.75rem 0;flex-wrap:wrap">
<div class="leaf" style="flex:1;min-width:150px"><div class="n">&#1..327; leaves[0]</div><div class="h" style="font-size:.7rem">0x4a8c...b3d7</div><div class="g">Rung 0 · SIG Schnorr</div></div>
<div class="leaf" style="flex:1;min-width:150px"><div class="n">&#1..327; leaves[1]</div><div class="h" style="font-size:.7rem">0x91e5...20ac</div><div class="g">Rung 1 · FALCON + CSV</div></div>
<div class="leaf" style="flex:1;min-width:150px"><div class="n">&#1..327; leaves[2]</div><div class="h" style="font-size:.7rem">0xf7c2...8891</div><div class="g">Coil · UNLOCK</div></div>
</div>
`},

{act:1,t:"PAD TO POWER OF 2",s:"3 leaves → 4 · EMPTY_LEAF padding",h:`
<div class="desc"><code>BuildMerkleTree()</code> — <code>NextPowerOf2(3) = 4</code>. Pad with <code>MLSC_EMPTY_LEAF = TaggedHash("LadderLeaf", "")</code>. This is a nothing-up-my-sleeve constant — it cannot collide with any valid leaf because valid serialised data has minimum length requirements.</div>
<div style="display:flex;gap:.5rem;margin:.75rem 0;flex-wrap:wrap">
<div class="leaf" style="flex:1;min-width:120px"><div class="n" style="font-size:.6rem">leaves[0]</div><div class="h" style="font-size:.62rem">0x4a8c...b3d7</div></div>
<div class="leaf" style="flex:1;min-width:120px"><div class="n" style="font-size:.6rem">leaves[1]</div><div class="h" style="font-size:.62rem">0x91e5...20ac</div></div>
<div class="leaf" style="flex:1;min-width:120px"><div class="n" style="font-size:.6rem">leaves[2]</div><div class="h" style="font-size:.62rem">0xf7c2...8891</div></div>
<div style="flex:1;min-width:120px;background:#0a0a0a;border:1px dashed #222;border-radius:7px;padding:.9rem 1rem;font-family:var(--mono);font-size:.6rem;color:#333;text-align:center">leaves[3]<br>EMPTY_LEAF<br><span style="font-size:.5rem">padding</span></div>
</div>
`},

{act:1,t:"BUILD INTERIOR NODES",s:"Sorted children · LadderInternal tag · domain separation",h:`
<div class="desc"><code>MerkleInterior(a, b)</code>: compare a and b lexicographically. Place smaller left, larger right. Hash: <code>TaggedHash("LadderInternal", min(a,b) ‖ max(a,b))</code>.</div>
<div class="sv">
<span class="lbl">Level 1: two interior nodes</span>
<span class="b s">node_left</span> = TaggedHash("LadderInternal", sorted(leaf_0, leaf_1))<br>
<span class="b s">node_right</span> = TaggedHash("LadderInternal", sorted(coil_leaf, EMPTY_LEAF))
</div>
<div class="sv">
<span class="lbl">Level 0: root</span>
<span class="b v">conditions_root</span> = TaggedHash("LadderInternal", sorted(node_left, node_right))
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem"><strong style="color:#fff">Domain separation:</strong> Leaf tag = "LadderLeaf", Interior tag = "LadderInternal". The 64-byte tag prefix is different, so a valid leaf hash can NEVER collide with a valid interior hash. This follows BIP-341 (Taproot) convention.</div>
`},

{act:1,t:"OUTPUT CREATION",s:"0xDF ‖ root → 33 bytes on-chain",h:`
<div class="desc"><code>CreateMLSCScript(root)</code> — push prefix byte 0xDF (RUNG_MLSC_PREFIX), append 32-byte root.</div>
<div class="out">
<div class="pre">scriptPubKey</div>
<div class="val">0xDF ‖ conditions_root</div>
<div class="sz">33 bytes: prefix (1) + Merkle root (32)</div>
<div class="msg">
This is <strong>everything</strong> on-chain at creation.<br>
Zero conditions. Zero public keys. Zero block types. Zero timelocks.<br>
The 33-byte Schnorr key, the 897-byte FALCON key, the CSV timelock —<br>
all inside SHA-256 leaf digests. <strong>Irrecoverable.</strong>
</div>
</div>
`},

{act:1,t:"WHAT GOES WHERE",s:"UTXO set · Blockchain · Wallet",h:`
<div class="where-grid">
<div class="where-box" style="border-color:rgba(0,255,136,.2)">
  <div class="wt">UTXO Set</div>
  <div class="wv" style="color:var(--ngreen)">40 bytes</div>
  <div class="ws">value (8 bytes int64) + conditions_root (32 bytes)</div>
  <div class="ws" style="margin-top:.3rem;color:#555">Same size for single-sig or 15-of-15 multisig with 16 rungs</div>
</div>
<div class="where-box" style="border-color:rgba(0,212,255,.2)">
  <div class="wt">Blockchain (in block)</div>
  <div class="wv" style="color:var(--nblue)">33 bytes</div>
  <div class="ws">0xDF + root in the transaction output</div>
  <div class="ws" style="margin-top:.3rem;color:#555">No conditions, no pubkeys, no scripts visible</div>
</div>
</div>
<div class="where-grid">
<div class="where-box" style="border-color:rgba(255,136,0,.2)">
  <div class="wt">Wallet (off-chain)</div>
  <div class="wv" style="color:var(--norange)">Full conditions + pubkeys</div>
  <div class="ws">Stored locally. Needed to spend. If lost, UTXO is unspendable.</div>
</div>
<div class="where-box" style="border-color:rgba(179,102,255,.2)">
  <div class="wt">NOT on-chain</div>
  <div class="wv" style="color:var(--npurple)">Everything else</div>
  <div class="ws">Pubkeys, schemes, timelocks, block types, coil details — all hidden until spend.</div>
</div>
</div>
`},

// === ACT 2: SPEND ===

{act:2,t:"SPENDING TRANSACTION",s:"Witness stack · Two elements",h:`
<div class="desc">A new v4 transaction spends the UTXO. The input's witness has exactly <strong>2 stack elements</strong>:</div>
<div class="card orange">
<div class="card-t">stack[0] — LadderWitness</div>
<div class="desc" style="margin-bottom:0;font-size:.72rem">The unlock data: pubkeys, signatures, preimages for the one rung being spent.</div>
</div>
<div class="card orange">
<div class="card-t">stack[1] — MLSCProof</div>
<div class="desc" style="margin-bottom:0;font-size:.72rem">The revealed rung's conditions + Merkle proof hashes for unrevealed leaves.</div>
</div>
<div class="desc" style="margin-top:.5rem;font-size:.72rem;color:#555">The node doesn't know which rung is being spent until it deserializes these. Let's trace <strong>spending via Rung 0</strong> (Schnorr).</div>
`},

{act:2,t:"DESERIALIZE WITNESS",s:"LadderWitness · size gate · block parsing",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,136,0,.1);color:var(--norange)">1</div><div class="stg-t">DeserializeLadderWitness — size & structure</div></div>
<div class="chk ok"><span class="ic">✓</span> Not empty</div>
<div class="chk ok"><span class="ic">✓</span> Size ≤ MAX_LADDER_WITNESS_SIZE (100,000 bytes)</div>
<div class="chk ok"><span class="ic">✓</span> n_rungs = ReadCompactSize = 1 (not 0 = not diff witness, ≤ MAX_RUNGS = 16)</div>
<div class="chk ok"><span class="ic">✓</span> n_blocks = ReadCompactSize = 1 (> 0 = not compact rung, ≤ MAX_BLOCKS_PER_RUNG = 8)</div>
</div>
`},

{act:2,t:"WITNESS SIG BLOCK",s:"Micro-header · implicit layout · PUBKEY + SIGNATURE",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,136,0,.1);color:var(--norange)">2</div><div class="stg-t">DeserializeBlock — WITNESS context</div></div>
<div class="chk ok"><span class="ic">✓</span> first_byte = 0x00 → MICRO_HEADER_TABLE[0] = SIG (0x0001)</div>
<div class="chk ok"><span class="ic">✓</span> IsKnownBlockType(0x0001) = true</div>
<div class="chk ok"><span class="ic">✓</span> Not inverted on non-invertible type</div>
<div class="chk ok"><span class="ic">✓</span> GetImplicitLayout(SIG, WITNESS) = SIG_WITNESS = [PUBKEY(var), SIGNATURE(var)]</div>
</div>
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,68,136,.1);color:var(--npink)">P</div><div class="stg-t">Field 0: PUBKEY</div></div>
<div class="chk ok"><span class="ic">✓</span> Length = 33 bytes (ReadCompactSize) — within [1, 2048]</div>
<div class="chk ok"><span class="ic">✓</span> RungField::IsValid() — 33 bytes, prefix 0x02 ✓</div>
</div>
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,212,255,.1);color:var(--nblue)">S</div><div class="stg-t">Field 1: SIGNATURE</div></div>
<div class="chk ok"><span class="ic">✓</span> Length = 64 bytes (Schnorr BIP-340) — within [1, 50000]</div>
<div class="chk ok"><span class="ic">✓</span> RungField::IsValid() — passes (no special content check for signatures)</div>
</div>
`},

{act:2,t:"WITNESS ANTI-SPAM",s:"Embedding check · preimage count · trailing bytes",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,136,0,.1);color:var(--norange)">3</div><div class="stg-t">Anti-spam gates</div></div>
<div class="chk ok"><span class="ic">✓</span> IsDataEmbeddingType — blocks PUBKEY_COMMIT, HASH256, HASH160, DATA in witness for non-implicit blocks</div>
<div class="chk ok"><span class="ic">✓</span> PREIMAGE/SCRIPT_BODY field count: 0 ≤ MAX_PREIMAGE_FIELDS_PER_WITNESS (2)</div>
<div class="chk ok"><span class="ic">✓</span> Relay chain depth: 0 ≤ MAX_RELAY_DEPTH (4)</div>
<div class="chk ok"><span class="ic">✓</span> ss.empty() = true — no trailing bytes</div>
</div>
`},

{act:2,t:"MLSC DETECTION",s:"0xDF prefix · extract root",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">4</div><div class="stg-t">IsMLSCScript + GetMLSCRoot</div></div>
<div class="chk ok"><span class="ic">✓</span> scriptPubKey.size() = 33, within [33, 65]</div>
<div class="chk ok"><span class="ic">✓</span> scriptPubKey[0] = 0xDF (RUNG_MLSC_PREFIX)</div>
<div class="chk ok"><span class="ic">✓</span> Extract bytes 1-32 → conditions_root (the expected Merkle root)</div>
<div class="chk ok"><span class="ic">✓</span> witness.stack.size() ≥ 2 (MLSC requires 2 elements)</div>
</div>
`},

{act:2,t:"MLSC PROOF — HEADER",s:"total_rungs · total_relays · rung_index",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(179,102,255,.1);color:var(--npurple)">5</div><div class="stg-t">DeserializeMLSCProof — header</div></div>
<div class="chk ok"><span class="ic">✓</span> total_rungs = 2 — within [1, MAX_RUNGS=16]</div>
<div class="chk ok"><span class="ic">✓</span> total_relays = 0 — within [0, MAX_RELAYS=8]</div>
<div class="chk ok"><span class="ic">✓</span> rung_index = 0 — less than total_rungs (2)</div>
</div>
`},

{act:2,t:"MLSC PROOF — REVEALED RUNG",s:"Conditions deserialised with consensus validation",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(179,102,255,.1);color:var(--npurple)">6</div><div class="stg-t">Revealed rung — SIG block in CONDITIONS context</div></div>
<div class="chk ok"><span class="ic">✓</span> n_blocks = 1 (not 0 — compact rungs rejected: "deprecated")</div>
<div class="chk ok"><span class="ic">✓</span> Micro-header 0x00 → SIG (0x0001) — IsKnownBlockType ✓</div>
<div class="chk ok"><span class="ic">✓</span> Not deprecated block type</div>
<div class="chk ok"><span class="ic">✓</span> Implicit layout: SIG_CONDITIONS = [{SCHEME, fixed 1}]</div>
<div class="chk ok"><span class="ic">✓</span> SCHEME = 0x01 — IsConditionDataType(SCHEME) = true</div>
<div class="chk ok"><span class="ic">✓</span> RungField::IsValid() — IsKnownScheme(0x01) = true</div>
<div class="chk no"><span class="ic">✗</span> PUBKEY_COMMIT would fail here — IsConditionDataType returns false</div>
</div>
`},

{act:2,t:"MLSC PROOF — PROOF HASHES",s:"1 hash for the unrevealed rung",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(179,102,255,.1);color:var(--npurple)">7</div><div class="stg-t">Proof hashes + trailing bytes check</div></div>
<div class="chk ok"><span class="ic">✓</span> n_relay_refs = 0, n_revealed_relays = 0</div>
<div class="chk ok"><span class="ic">✓</span> n_proof_hashes = 1 — max allowed: (total_rungs-1) + (total_relays-revealed) = 1</div>
<div class="chk ok"><span class="ic">✓</span> Read 32 bytes: proof_hash[0] = 0x91e5...20ac</div>
<div class="chk ok"><span class="ic">✓</span> ss.empty() = true — no trailing bytes</div>
</div>
<div class="co">Rung 1 stays hidden. This 32-byte proof hash is a SHA-256 digest. It contains the 897-byte FALCON key and the CSV timelock — but nobody can extract them.</div>
`},

{act:2,t:"SINGLE RUNG RULE",s:"witness_ladder.rungs.size() must be exactly 1",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,136,0,.1);color:var(--norange)">8</div><div class="stg-t">Consensus enforcement</div></div>
<div class="chk ok"><span class="ic">✓</span> witness_ladder.rungs.size() == 1 — exactly one rung in witness</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">Multiple rungs would harm privacy with no benefit (OR semantics — only one needs to pass). The single rung rule is enforced at consensus.</div>
`},

{act:2,t:"EXTRACT PUBKEYS FROM WITNESS",s:"ExtractBlockPubkeys · PubkeyCountForBlock",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">9</div><div class="stg-t">ExtractBlockPubkeys(witness blocks)</div></div>
<div class="desc" style="font-size:.72rem;margin-bottom:.3rem">Walks blocks left-to-right. For each block, <code>PubkeyCountForBlock(type, block)</code> determines how many PUBKEY fields to collect.</div>
<div class="chk ok"><span class="ic">✓</span> Block 0 (SIG): PubkeyCountForBlock(SIG) = 1 — collect 1 PUBKEY</div>
<div class="chk ok"><span class="ic">✓</span> FindAllFields(block, PUBKEY) → [33-byte pubkey_A]</div>
<div class="chk ok"><span class="ic">✓</span> Result: rung_pks = [pubkey_A]</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem">These are the same pubkeys that were separated out during creation. The system extracts them from the witness to re-fold them into the leaf hash — verifying they match what was committed.</div>
`},

{act:2,t:"REBUILD MERKLE TREE",s:"Recompute leaves · fill proof hashes · check root",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">10</div><div class="stg-t">VerifyMLSCProof</div></div>
<div class="chk ok"><span class="ic">✓</span> total_leaves = 2 + 0 + 1 = 3</div>
<div class="chk ok"><span class="ic">✓</span> leaves[0] = ComputeRungLeaf(revealed_rung, [pubkey_A]) → recomputed</div>
<div class="chk ok"><span class="ic">✓</span> leaves[1] = proof_hash[0] = 0x91e5...20ac → from proof</div>
<div class="chk ok"><span class="ic">✓</span> leaves[2] = ComputeCoilLeaf(coil) → recomputed</div>
<div class="chk ok"><span class="ic">✓</span> Pad to 4 with EMPTY_LEAF</div>
<div class="chk ok"><span class="ic">✓</span> BuildMerkleTree → computed_root</div>
<div class="chk ok"><span class="ic" style="font-size:.6rem">✓</span><span style="font-weight:700"> computed_root == expected_root — MATCH</span></div>
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem"><strong style="color:#fff">This is the binding:</strong> if the attacker changed the pubkey, the leaf hash changes, the root changes, verification fails. The pubkeys were committed at creation inside the leaf hash. The Merkle tree IS the commitment.</div>
`},

{act:2,t:"EVALUATE",s:"Conditions + witness merged · SIG evaluator · result",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">11</div><div class="stg-t">Merge & Evaluate</div></div>
<div class="desc" style="font-size:.72rem;margin-bottom:.3rem">Conditions (from MLSCProof: SCHEME) merged with witness (PUBKEY + SIGNATURE). Pubkeys trusted directly — Merkle proof already verified they match creation.</div>
<div class="chk ok"><span class="ic">✓</span> Block count matches: conditions 1 block == witness 1 block</div>
<div class="chk ok"><span class="ic">✓</span> Block type matches: SIG == SIG</div>
<div class="chk ok"><span class="ic">✓</span> Merged block: [{SCHEME, 0x01}, {PUBKEY, 33B}, {SIGNATURE, 64B}]</div>
<div class="chk ok"><span class="ic">✓</span> EvalSigBlock: SCHEME=SCHNORR, not PQ → Schnorr path</div>
<div class="chk ok"><span class="ic">✓</span> Extract x-only key from compressed pubkey (strip prefix byte)</div>
<div class="chk ok"><span class="ic">✓</span> CheckSchnorrSignature(sig, xonly_key) → VALID</div>
<div class="chk ok"><span class="ic">✓</span> Rung 0: all blocks SATISFIED (1/1)</div>
<div class="chk ok"><span class="ic">✓</span> EvalLadder: first satisfied rung found → TRUE</div>
</div>
<div class="result">
<h3>SPEND VALID</h3>
<p>Rung 1 (FALCON-512 + CSV recovery) was never revealed.</p>
<div class="dim">An observer sees one 32-byte proof hash. They cannot determine the recovery path's structure, keys, scheme, or timelock.</div>
</div>
`},

{act:2,t:"PRIVACY SUMMARY",s:"What the blockchain sees at each stage",h:`
<div class="where-grid">
<div class="where-box" style="border-color:rgba(0,255,136,.2)">
  <div class="wt">At creation</div>
  <div class="wv" style="color:var(--ngreen);font-size:.75rem">0xDF ‖ root</div>
  <div class="ws">33 bytes. Zero information about conditions.</div>
</div>
<div class="where-box" style="border-color:rgba(255,136,0,.2)">
  <div class="wt">At spend (Rung 0)</div>
  <div class="wv" style="color:var(--norange);font-size:.75rem">SIG + pubkey + sig + coil</div>
  <div class="ws">Observer learns: Schnorr key controlled funds.</div>
</div>
</div>
<div class="where-grid">
<div class="where-box" style="border-color:rgba(179,102,255,.2)">
  <div class="wt">Hidden forever</div>
  <div class="wv" style="color:var(--npurple);font-size:.75rem">Rung 1</div>
  <div class="ws">FALCON512 key, CSV timelock — represented by one 32-byte hash, indistinguishable from random.</div>
</div>
<div class="where-box" style="border-color:rgba(255,34,68,.2)">
  <div class="wt">Cannot be embedded</div>
  <div class="wv" style="color:var(--nred);font-size:.75rem">Arbitrary data</div>
  <div class="ws">No PUBKEY_COMMIT field. Proof hashes are root-locked SHA-256 outputs. Every field typed & validated.</div>
</div>
</div>
`},

];

// Act metadata
const acts = [
  {name:"THE LADDER",color:"var(--nblue)"},
  {name:"CREATE",color:"var(--ngreen)"},
  {name:"SPEND",color:"var(--norange)"}
];
const actLabels = ["LADDER","CREATE","SPEND"];

let cur = 0;
const N = S.length;

function render(){
  const s = S[cur];
  // Tabs
  let tabs = '';
  for(let a=0;a<3;a++){
    const on = s.act===a?'on':'';
    tabs+=`<button class="act-tab ${on}" data-a="${a}" onclick="goAct(${a})">${actLabels[a]}</button>`;
  }
  document.getElementById('atabs').innerHTML=tabs;
  // Progress
  document.getElementById('pbar').style.width=((cur+1)/N*100)+'%';
  document.getElementById('pbar').style.background=acts[s.act].color;
  document.getElementById('ct').textContent=(cur+1)+'/'+N;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===N-1;
  // Scene
  document.getElementById('root').innerHTML=`
    <div class="scene on">
      <div class="act-label" style="color:${acts[s.act].color}">ACT ${s.act}: ${acts[s.act].name}</div>
      <div class="title">${s.t}</div>
      <div class="sub">${s.s}</div>
      ${s.h}
    </div>`;
}

function goTo(i){cur=Math.max(0,Math.min(N-1,i));render();}
function next(){goTo(cur+1);}
function prev(){goTo(cur-1);}
function goAct(a){
  for(let i=0;i<N;i++){if(S[i].act===a){goTo(i);return;}}
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});

render();
</script>
