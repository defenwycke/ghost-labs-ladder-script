\* TLC model configuration for LadderEval
\* Checks all safety properties with small model values

CONSTANTS
    \* Use small sets for model checking (scales combinatorially)
    BlockTypes = {b1, b2, b3, b4, b5}
    InvertibleTypes = {b1, b2, b3}
    KeyConsumingTypes = {b4, b5}
    MaxRungs = 3
    MaxBlocksPerRung = 3
    MaxRelays = 2
    MaxRelayDepth = 2
    MaxRecurseDepth = 3

SPECIFICATION RecurseSpec

INVARIANTS
    KeyConsumingNeverInvertible
    InversionPreservesError
    DoubleInversionIdentity
    EmptyRungError
    EmptyLadderNeverSatisfied
    AntiSpamKeyInvariant
    InvertedNonInvertibleAlwaysError
    RecurseTerminates
