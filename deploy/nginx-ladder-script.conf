# /etc/nginx/sites-available/ladder-script
#
# Nginx vhost for ladder-script.org. Lives on the same machine as
# the ladder-proxy Python service so /api/ladder/* is a localhost
# hop rather than a public-internet round trip.
#
# Topology:
#   client → nginx (ladder-script.org:443) → 127.0.0.1:8340 (ladder-proxy)
#
# CORS on the ladder-proxy is a strict whitelist — the systemd
# drop-in at deploy/ladder-proxy.service.d/cors.conf sets
# ALLOWED_ORIGINS to include https://ladder-script.org. OPTIONS
# preflight must be allowed through nginx (see limit_except below)
# or browser POSTs will fail at the edge with 403.

limit_req_zone $binary_remote_addr zone=ladder_script_api:10m rate=300r/m;

server {
    server_name ladder-script.org www.ladder-script.org;
    root /var/www/ladder-script;
    # The labs tree's landing page is ladder-script.html, not
    # index.html, so we list it first in the index directive.
    # index.html is kept as a fallback for subdirectories that do
    # use it (block-docs/, docs/, ladder-engine/, qabio-playground/).
    index ladder-script.html index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Ladder Script signet proxy — localhost hop to the Python
    # ladder-proxy service.
    location /api/ladder/ {
        limit_req zone=ladder_script_api burst=60 nodelay;
        # OPTIONS must be allowed for CORS preflight on browser POSTs.
        limit_except GET POST OPTIONS {
            deny all;
        }
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8340;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # No cache for HTML — playground and engine change often
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # TLS (filled in by certbot after running `sudo certbot --nginx`)
    # listen [::]:443 ssl ipv6only=on;
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/ladder-script.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ladder-script.org/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    listen 80;
    listen [::]:80;
}

