# /etc/nginx/sites-available/ladder-script
#
# Nginx vhost for ladder-script.org — the neutral, project-specific
# home for Ladder Script and QABIO. This vhost lives on the same
# machine as the ladder-proxy (ghost-labs, 85.9.213.194) so the
# /api/ladder/* reverse proxy is a localhost hop rather than a
# public-internet round trip.
#
# Topology:
#   client → nginx (ladder-script.org:443) → 127.0.0.1:8340 (ladder-proxy)
#
# The existing bitcoinghost.org/api/ladder/* path is unchanged: it
# still reverse-proxies from ghost-web to 85.9.213.194:8340 over the
# public internet, hitting the same Python service. Both domains can
# coexist on independent rate-limit zones.
#
# Deployment procedure (see deploy/CUTOVER-RUNBOOK.md):
#   1. Install nginx on ghost-labs: sudo apt install -y nginx
#   2. Copy this file to /etc/nginx/sites-available/ladder-script and
#      symlink to /etc/nginx/sites-enabled/
#   3. Sync the labs tree to /var/www/ladder-script/ via rsync
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. Obtain TLS cert via certbot:
#        sudo certbot --nginx -d ladder-script.org -d www.ladder-script.org
#
# CORS policy on the ladder-proxy already allows any origin via the
# * wildcard, so no backend changes are needed.

limit_req_zone $binary_remote_addr zone=ladder_script_api:10m rate=300r/m;

server {
    server_name ladder-script.org www.ladder-script.org;
    root /var/www/ladder-script;
    # The labs tree's landing page is ladder-script.html, not
    # index.html, so we list it first in the index directive.
    # index.html is kept as a fallback for subdirectories that do
    # use it (block-docs/, docs/, ladder-engine/, qabio-playground/).
    index ladder-script.html index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Ladder Script signet proxy — localhost hop to the same Python
    # ladder-proxy service that bitcoinghost.org/api/ladder/* hits
    # over the public internet. Independent rate-limit zone so load
    # on one domain cannot starve the other.
    location /api/ladder/ {
        limit_req zone=ladder_script_api burst=60 nodelay;
        limit_except GET POST {
            deny all;
        }
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8340;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # No cache for HTML — playground and engine change often
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # TLS (filled in by certbot after running `sudo certbot --nginx`)
    # listen [::]:443 ssl ipv6only=on;
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/ladder-script.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ladder-script.org/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    listen 80;
    listen [::]:80;
}

